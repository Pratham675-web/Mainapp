        function calculateFeesFromStructure() {
            let multiplier = selectedMonths.length > 0 ? selectedMonths.length : 1;
            let allStudents = getAllStudents();
            
            // Update tuition fee inputs — skip free students
            let tuitionInputs = document.querySelectorAll('.fee-value');
            tuitionInputs.forEach(input => {
                let col = input.getAttribute('data-column');
                if(col && col.toLowerCase().replace(/\s+/g,'') === 'tuitionfees') {
                    let sid = input.getAttribute('data-student');
                    let member = allStudents.find(s => String(s.id) === String(sid));
                    if(member && isStudentTuitionFree(member.id)) {
                        input.value = 0;
                    } else {
                        let fee = member ? getClassFees(member.className, 'Tuition Fees') : 0;
                        input.value = fee * multiplier;
                    }
                }
            });
            
            // Exam fees are now handled dynamically via renderTable() — re-render table to show/hide exam col
            if(typeof window.renderTable === 'function') {
                window.renderTable();
                return;
            }
            
            // Recalculate each row's total by summing its own fee-value inputs
            let rows = document.querySelectorAll('#feesTableContainer tbody tr');
            rows.forEach((row, idx) => {
                let rowTotal = 0;
                row.querySelectorAll('.fee-value').forEach(input => {
                    rowTotal += parseFloat(input.value) || 0;
                });
                let totalInput = row.querySelector('.row-total');
                if(totalInput) totalInput.value = rowTotal;
            });
            calculateTotal();
        }
        
        function renderFeesCard(studentId, studentName) {
            let students = getAllStudents();
            let student = students.find(s => s.id == studentId);
            if(!student) {
                showPopup('Student not found!', false);
                return;
            }
            
            window.currentFeesCardStudent = student;
            
            let familyMembers = [];
            if(student.type === 'family') {
                familyMembers = students.filter(s => s.familyId === student.familyId);
            } else {
                familyMembers = [student];
            }
            
            let savedData = feesData[studentId] || {};
            let currentDate = new Date().toLocaleDateString('en-IN', { day:'numeric', month:'long', year:'numeric' });
            
            // Get actual old balance from last payment record of primary member
            let primaryMemberForBalance = familyMembers[0];
            // Always reload paymentHistory from localStorage for latest data
            /* paymentHistory already in memory */
            let primaryHistoryForBalance = paymentHistory[primaryMemberForBalance?.id] || [];
            let oldBalanceAmount = primaryHistoryForBalance.length > 0 
                ? (primaryHistoryForBalance[primaryHistoryForBalance.length - 1].balance || 0) 
                : 0;
            
            // Reset selected months to current month only
            selectedMonths = [new Date().getMonth()];
            
            function renderTable() {
                let multiplier = selectedMonths.length > 0 ? selectedMonths.length : 1;
                
                // Force reload from localStorage to get latest data
                /* examFeesMonthWise & classFeesStructure already in memory */
                
                let showExamCol = false;
                familyMembers.forEach(member => {
                    selectedMonths.forEach(m => {
                        let classExam = examFeesMonthWise[member.className] || {};
                        // Check both string and number key
                        if(classExam[m] > 0 || classExam[String(m)] > 0) showExamCol = true;
                    });
                });
                
                let tableHtml = `<table class="fees-table"><thead>
                    <th style="width:50px; text-align:center;">#</th>
                    <th>Student Name</th>
                    <th style="width:100px;">Class</th>`;
                feesColumns.forEach(col => { 
                    tableHtml += `<th style="min-width:120px;">${col}</th>`; 
                });
                if(showExamCol) {
                    tableHtml += `<th style="min-width:140px; background:#fff3cd; color:#b45309;">Exam Fees</th>`;
                }
                tableHtml += `<th style="min-width:100px;">Total</th></thead><tbody>`;
                
                familyMembers.forEach((member, idx) => {
                    let isTuitionFree = isStudentTuitionFree(member.id);
                    let isExamFree = isStudentExamFree(member.id);
                    let isAdditionalFree = isStudentAdditionalFree(member.id);
                    let isAnyFree = isStudentFree(member.id);
                    let freeType = getStudentFreeType(member.id);
                    let freeBadgeText = freeType ? getFreeTypeBadge(freeType) : '';

                    let memberData = savedData[member.id] || {};
                    let rowTotal = 0;
                    let tuitionFee = isTuitionFree ? 0 : getClassFees(member.className, 'Tuition Fees');
                    let examFeeThisMonth = isExamFree ? 0 : getExamFeesForSelectedMonths(member.className, selectedMonths);

                    let freeBadgeHtml = isAnyFree ? ` <span style="background:#f59e0b;color:white;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:700;">${freeBadgeText}</span>` : '';
                    tableHtml += `<tr class="${isAnyFree ? 'family-row' : ''}">
                        <td style="text-align:center;">${idx + 1}</td>
                        <td>${member.name}${freeBadgeHtml}</td>
                        <td>${member.className}</td>`;
                    feesColumns.forEach(col => {
                        let isFixed = col.toLowerCase().replace(/\s+/g,'') === 'tuitionfees';
                        let value = '';
                        if(isFixed) {
                            value = isTuitionFree ? 0 : tuitionFee * multiplier;
                        } else {
                            if(isAdditionalFree) {
                                value = 0;
                            } else {
                                value = memberData[col] || '';
                            }
                        }
                        let readonlyAttr = (isFixed && !isTuitionFree) ? 'readonly' : (isAdditionalFree && !isFixed ? 'readonly' : '');
                        let numVal = parseFloat(value) || 0;
                        rowTotal += numVal;
                        tableHtml += `<td><input type="text" class="fee-value" data-student="${member.id}" data-column="${col}" placeholder="0" value="${value}" ${readonlyAttr} oninput="updateRowTotal(${idx})" onchange="updateRowTotal(${idx})"></td>`;
                    });
                    if(showExamCol) {
                        rowTotal += examFeeThisMonth;
                        let examMonthLabels = isExamFree ? '' : selectedMonths.filter(m => getExamFeeForMonth(member.className, m) > 0).map(m => months[m]).join(', ');
                        tableHtml += `<td style="background:#fffbeb;">
                            <input type="text" class="fee-value exam-fee-auto" data-student="${member.id}" data-column="Exam Fees" 
                                value="${examFeeThisMonth}" readonly 
                                title="${isExamFree ? 'Exam Fees Free' : 'Exam Fees for: ' + examMonthLabels}"
                                style="background:#fef3c7; font-weight:600; color:#b45309; width:100%; cursor:not-allowed;">
                            ${!isExamFree && examMonthLabels ? `<div style="font-size:10px; color:#b45309; margin-top:3px;">${examMonthLabels}</div>` : ''}
                        </td>`;
                    }
                    tableHtml += `<td><input type="text" class="row-total" id="rowTotal${idx}" value="${rowTotal}" readonly style="background:#f0f0f0; width:100px;"></td>`;
                    tableHtml += `</tr>`;
                });
                tableHtml += `</tbody></table>`;
                document.getElementById('feesTableContainer').innerHTML = tableHtml;
                // Auto-calculate totals after rendering
                if(typeof calculateTotal === 'function') calculateTotal();
            }
            
            window.updateRowTotal = (idx) => {
                let rowTotal = 0;
                let rowInputs = document.querySelectorAll(`#feesTableContainer tr:nth-child(${idx+1}) .fee-value`);
                rowInputs.forEach(input => {
                    rowTotal += parseFloat(input.value) || 0;
                });
                document.getElementById(`rowTotal${idx}`).value = rowTotal;
                calculateTotal();
            };
            
            window.calculateTotal = () => {
                let grandTotal = 0;
                let rowTotals = document.querySelectorAll('.row-total');
                rowTotals.forEach(rowTotal => {
                    grandTotal += parseFloat(rowTotal.value) || 0;
                });
                let oldBalance = parseFloat(document.getElementById('oldBalance').innerText) || 0;
                let finalGrandTotal = grandTotal + oldBalance;
                let discount = parseFloat(document.getElementById('discountAmount').value) || 0;
                let submittedAmount = parseFloat(document.getElementById('submittedAmount').value) || 0;
                let afterDiscount = finalGrandTotal - discount;
                let balance = afterDiscount - submittedAmount;
                let finalBalance = balance >= 0 ? balance : 0;
                
                document.getElementById('grandTotal').innerText = finalGrandTotal;
                document.getElementById('afterDiscount').innerText = afterDiscount;
                document.getElementById('balanceAmount').innerText = finalBalance;
                
                let balanceMsg = document.getElementById('balanceMessage');
                if(balanceMsg) {
                    if(finalBalance === 0) {
                        balanceMsg.innerHTML = '<span class="balance-clear"><i class="fas fa-check-circle"></i> Balance Clear</span>';
                    } else {
                        balanceMsg.innerHTML = '';
                    }
                }
            };
            
            window.saveFeesData = () => {
                let spinner = document.getElementById('saveSpinner');
                let saveBtn = document.getElementById('saveFeesBtn');
                spinner.style.display = 'inline-block';
                saveBtn.disabled = true;
                
                // Collect fees per member
                let currentData = {};
                let inputs = document.querySelectorAll('.fee-value');
                let feeValidationErr = null;
                inputs.forEach(input => {
                    let studentIdVal = input.getAttribute('data-student');
                    let column = input.getAttribute('data-column');
                    // Point 10: Validate each fee amount
                    let amtErr = validateAmount(input.value || '0');
                    if(amtErr && !feeValidationErr) feeValidationErr = amtErr;
                    if(!currentData[studentIdVal]) currentData[studentIdVal] = {};
                    currentData[studentIdVal][column] = input.value;
                });
                if(feeValidationErr) { spinner.style.display='none'; saveBtn.disabled=false; showPopup(feeValidationErr, false); return; }
                // Validate submitted amount
                let submittedAmtErr = validateAmount(document.getElementById('submittedAmount')?.value || '0');
                if(submittedAmtErr) { spinner.style.display='none'; saveBtn.disabled=false; showPopup(submittedAmtErr, false); return; }
                if(!feesData[studentId]) feesData[studentId] = {};
                Object.assign(feesData[studentId], currentData);
                fsSave('feesData', feesData); localStorage.setItem('eRegister_fees_data', JSON.stringify(feesData));
                
                // Save to history — one record per member with that member's own fees
                let totalPaid = parseFloat(document.getElementById('submittedAmount').value) || 0;
                let remark = document.getElementById('remarkText').value || '';
                let currentBalance = parseFloat(document.getElementById('balanceAmount').innerText) || 0;
                let selectedMonthNames = selectedMonths.map(m => months[m]);
                
                familyMembers.forEach(member => {
                    let memberFees = currentData[member.id] || {};
                    let memberTotal = 0;
                    let rowInput = document.getElementById(`rowTotal${familyMembers.indexOf(member)}`);
                    if(rowInput) memberTotal = parseFloat(rowInput.value) || 0;
                    // Also capture exam fee for this member's months
                    let memberExamFee = getExamFeesForSelectedMonths(member.className, selectedMonths);
                    if(memberExamFee > 0) memberFees['Exam Fees'] = memberExamFee;
                    
                    let historyRecord = {
                        date: new Date().toLocaleString(),
                        months: selectedMonthNames,
                        amount: totalPaid,
                        submittedAmount: totalPaid,
                        memberTotal: memberTotal,
                        balance: currentBalance,
                        oldBalance: oldBalanceAmount,
                        fees: memberFees,
                        examFees: memberExamFee,
                        remark: remark
                    };
                    if(!paymentHistory[member.id]) paymentHistory[member.id] = [];
                    paymentHistory[member.id].push(historyRecord);
                });
                fsSaveWithChecksum('paymentHistory', paymentHistory); localStorage.setItem('eRegister_payment_history', JSON.stringify(paymentHistory));
                
                setTimeout(() => {
                    spinner.style.display = 'none';
                    saveBtn.disabled = false;
                    showPopup('✅ Fees saved successfully!');
                }, 1500);
            };
            
            document.getElementById('app').innerHTML = `<div class="inner-bg"><div class="sticky-header">${getHeader('Fees Card', true)}</div><div class="inner-container"><div class="form-card"><div class="header-buttons">
                    <div class="real-time">📅 ${currentDate}</div>
                    <div class="action-icons-right">
                        <button class="calendar-icon" onclick="openMonthSelector()"><img src="${img.monthIcon}"></button>
                        <button class="calc-icon" onclick="calculateFeesFromStructure()"><img src="${img.calculateIcon}"></button>
                        <button class="print-icon" onclick="printFeesCard()"><img src="${img.printIcon}"></button>
                        <button class="history-icon" onclick="navigateTo(renderHistoryPage, '${student.id}', '${student.name}')"><img src="${img.historyIcon}"></button>
                    </div>
                </div>
                <div id="selectedMonthsContainer" class="selected-months"></div>
                <div id="feesTableContainer" style="overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%;"></div>
                <div class="calculation-box">
                    <div class="calculation-row"><span style="color:#ef4444; font-weight:700;">Old Balance:</span><span id="oldBalance" class="old-balance-text">${oldBalanceAmount}</span></div>
                    <div class="calculation-row"><span>Grand Total (with Old Balance):</span><span id="grandTotal" class="total-text">0</span></div>
                    <div class="calculation-row"><span>Discount:</span><input type="number" id="discountAmount" placeholder="0" style="width:120px;" oninput="calculateTotal()"></div>
                    <div class="calculation-row"><span>After Discount:</span><span id="afterDiscount">0</span></div>
                    <div class="calculation-row"><span>Submitted Amount:</span><input type="number" id="submittedAmount" placeholder="0" style="width:120px;" oninput="calculateTotal()"></div>
                    <div class="calculation-row"><span>Balance:</span><span id="balanceAmount" class="balance-text">0</span><span id="balanceMessage"></span></div>
                </div>
                <div class="input-group"><label><i class="fas fa-comment"></i> Remark</label><textarea id="remarkText" rows="2" placeholder="Enter remark here..."></textarea></div>
                <button id="saveFeesBtn" class="btn btn-success" style="margin-top:20px; width:100%;" onclick="saveFeesData()"><i class="fas fa-save"></i> Save Fees <span id="saveSpinner" class="spinner" style="display:none; width:20px; height:20px;"></span></button>
                </div></div></div>
                <div id="monthModal" class="modal"><div class="modal-content"><h3>Select Months</h3><div id="monthModalContent" class="month-checkbox-group"></div><div class="modal-buttons"><button class="btn btn-secondary" onclick="document.getElementById('monthModal').style.display='none'">Cancel</button><button class="btn btn-primary" onclick="saveMonthSelection()">Apply</button></div></div></div>
                ${getOverlay()}`;
            renderTable();
            renderSelectedMonths();
            calculateFeesFromStructure();
            calculateTotal();
            window.saveFeesData = saveFeesData;
            window.updateRowTotal = updateRowTotal;
            window.calculateTotal = calculateTotal;
            window.calculateFeesFromStructure = calculateFeesFromStructure;
            window.openMonthSelector = openMonthSelector;
            window.saveMonthSelection = saveMonthSelection;
            window.renderTable = renderTable;
        }

        function renderClassAttendanceList(className) {

                students.forEach(s => {
                    let status = getStudentAttendance(s.name, date);

            function nextDate() { let newDate = new Date(currentAttendanceDate); newDate.setDate(newDate.getDate() + 1); if(newDate <= new Date()) { currentAttendanceDate = newDate.toISOString().split('T')[0]; loadData(currentAttendanceDate); } else showPopup('Cannot go to future dates!', false); }

            window.prevDate = prevDate; window.nextDate = nextDate;
            loadData(currentAttendanceDate);
        }

        // ==================== INDIVIDUAL STUDENT ATTENDANCE CALENDAR ====================
        let calYear = new Date().getFullYear(), calMonth = new Date().getMonth();
        function renderAttendanceCalendar(studentName) {
            let key = studentName.replace(/\s/g,'_');
            if(!attendanceRecords[key]) attendanceRecords[key]={};
            let today = new Date();
            let currentYear = today.getFullYear();
            let currentMonth = today.getMonth();
            let currentDate = today.getDate();
            
            function loadCalendar(year, month) {
                let firstDay = new Date(year, month, 1).getDay(), daysInMonth = new Date(year, month+1, 0).getDate();
                let daysHtml = '<div class="calendar-weekdays"><span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span></div><div class="calendar-days">';
                for(let i=0;i<firstDay;i++) daysHtml+='<div class="calendar-day empty"></div>';
                for(let d=1;d<=daysInMonth;d++){
                    let dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    let status = attendanceRecords[key][dateStr] || '';
                    let cls = status==='present'?'present':status==='half'?'half':status==='absent'?'absent':'';
                    let canMark = (year === currentYear && month === currentMonth && d === currentDate);
                    let clickable = canMark ? `onclick="markAttendanceDay('${studentName}',${year},${month},${d})"` : '';
                    daysHtml+=`<div class="calendar-day ${cls}" ${clickable}>${d}</div>`;
                }
                daysHtml+='</div>';
                let present = Object.values(attendanceRecords[key]).filter(v=>v==='present').length;
                let half = Object.values(attendanceRecords[key]).filter(v=>v==='half').length;
                let absent = Object.values(attendanceRecords[key]).filter(v=>v==='absent').length;
                document.getElementById('calendarDays').innerHTML = daysHtml;
                document.getElementById('presentCount').innerText = present;
                document.getElementById('absentCount').innerText = absent+half;
                document.getElementById('monthYear').innerText = new Date(year,month).toLocaleString('default',{month:'long',year:'numeric'});
            }
            function prevMonth() { let newMonth = calMonth-1; if(newMonth>=0){ calMonth=newMonth; loadCalendar(calYear,calMonth); } else if(calYear>2020){ calYear--; calMonth=11; loadCalendar(calYear,calMonth); } else showPopup('Cannot go before 2020',false); }
            function nextMonth() { let newMonth = calMonth+1; if(newMonth<=(currentMonth && calYear===currentYear ? currentMonth : 11)){ calMonth=newMonth; loadCalendar(calYear,calMonth); } else if(calYear<currentYear && newMonth<=11){ calMonth=newMonth; loadCalendar(calYear,calMonth); } else showPopup('Cannot go to future months!',false); }
            
            window.markAttendanceDay = (name,y,m,d) => {
                let dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                if(!canMarkDate(dateStr)) { showPopup('You can only mark attendance for today!', false); return; }
                let k = name.replace(/\s/g,'_');
                let opts = ['present','half','absent'];
                let curr = attendanceRecords[k][dateStr] || '';
                let idx = opts.indexOf(curr);
                let next = opts[(idx+1)%opts.length];
                if(next) attendanceRecords[k][dateStr] = next;
                else attendanceRecords[k][dateStr] = 'present';
                fsSave('attendanceRecords', attendanceRecords); localStorage.setItem('eRegister_attendance', JSON.stringify(attendanceRecords));
                loadCalendar(calYear,calMonth);
                showPopup('Attendance marked successfully!');
            };
            document.getElementById('app').innerHTML = `<div class="inner-bg"><div class="sticky-header">${getHeader(`Attendance: ${studentName}`, true)}</div><div class="inner-container"><div class="form-card"><div class="two-column-layout"><div class="form-column"><div class="form-title"><i class="fas fa-calendar-alt"></i> Mark Attendance</div><div class="calendar"><div class="calendar-header"><button onclick="prevMonth()"><i class="fas fa-chevron-left"></i></button><h3 id="monthYear"></h3><button onclick="nextMonth()"><i class="fas fa-chevron-right"></i></button></div><div id="calendarDays"></div></div></div><div class="image-column"><img src="${img.calendarLogo}" class="big-logo"><div class="stats-box"><h4><i class="fas fa-calendar-check"></i> Total Present</h4><p id="presentCount" class="present-count">0</p></div><div class="stats-box"><h4><i class="fas fa-calendar-times"></i> Total Absent</h4><p id="absentCount" class="absent-count">0</p></div><div style="display:flex;gap:10px;justify-content:center;margin-top:10px;"><span style="background:#10b981;width:20px;height:20px;border-radius:50%;display:inline-block;"></span><span>Present</span><span style="background:#f59e0b;width:20px;height:20px;border-radius:50%;display:inline-block;"></span><span>Half Day</span><span style="background:#ef4444;width:20px;height:20px;border-radius:50%;display:inline-block;"></span><span>Absent</span></div></div></div></div></div>${getOverlay()}</div>`;
            window.prevMonth = prevMonth;
            window.nextMonth = nextMonth;
            loadCalendar(calYear,calMonth);
        }

        function viewStudentDetail(studentId, className) {
            let students = getAllStudents();

        function viewExamResult(studentId, examName) {

        function addExamResult(studentId, studentName, studentClass) {

            isEditMode = false;

        function renderResultForm() {
            function renderTable() {
                let tableHtml = `<table class="result-table"><thead><tr><th>Subject Name</th><th>Obtained Marks</th><th>Total Marks</th><th>Action</th></tr></thead><tbody>`;
                currentSubjects.forEach((sub, idx) => {
                    tableHtml += `<tr>
                        <td><input type="text" id="subName${idx}" value="${sub.name}" placeholder="Subject name"></td>
                        <td><input type="number" id="subObtained${idx}" value="${sub.obtained}" placeholder="Obtained"></td>
                        <td><input type="number" id="subTotal${idx}" value="${sub.total}" placeholder="Total"></td>
                        <td>${idx > 0 ? `<button class="delete-row-icon" onclick="removeSubjectRow(${idx})"><img src="${img.deleteIcon}"></button>` : `<button class="add-row-icon" onclick="addSubjectRow()"><img src="${img.plusIcon}"></button>`}</td>
                    </tr>`;
                });
                tableHtml += `</tbody></table>`;
                document.getElementById('resultTableContainer').innerHTML = tableHtml;
            }
            
            window.addSubjectRow = () => {
                currentSubjects.push({ name: '', obtained: '', total: '' });
                renderTable();
            };
            
            window.removeSubjectRow = (idx) => {
                currentSubjects.splice(idx, 1);
                renderTable();
            };
            
            window.calculateResult = () => {
                let totalObtained = 0, totalMarks = 0;
                currentSubjects.forEach((sub, idx) => {
                    let obtained = parseInt(document.getElementById(`subObtained${idx}`)?.value) || 0;
                    let total = parseInt(document.getElementById(`subTotal${idx}`)?.value) || 0;
                    totalObtained += obtained;
                    totalMarks += total;
                });
                let percentage = totalMarks > 0 ? (totalObtained / totalMarks * 100).toFixed(2) : 0;
                document.getElementById('calculationResult').innerHTML = `<div class="result-summary"><strong>Total Obtained: ${totalObtained} / ${totalMarks}</strong><br><strong>Percentage: ${percentage}%</strong></div>`;
            };
            
            window.saveResult = () => {
                let examName = document.getElementById('examNameInput').value;
                if(!examName) { showPopup('Please enter exam name!', false); return; }
                let subjects = [];
                let valid = true;
                currentSubjects.forEach((sub, idx) => {
                    let name = document.getElementById(`subName${idx}`)?.value;
                    let obtained = document.getElementById(`subObtained${idx}`)?.value;
                    let total = document.getElementById(`subTotal${idx}`)?.value;
                    if(!name || !obtained || !total) valid = false;
                    subjects.push({ name, obtained: parseInt(obtained), total: parseInt(total) });
                });
                if(!valid) { showPopup('Please fill all subject fields!', false); return; }
                
                showProgress(() => {
                    if(!examResults[currentStudentId]) examResults[currentStudentId] = {};
                    if(isEditMode && editExamName !== examName) {
                        delete examResults[currentStudentId][editExamName];
                    }
                    examResults[currentStudentId][examName] = { subjects, studentName: currentStudentName, date: new Date().toLocaleString() };
                    fsSave('examResults', examResults); localStorage.setItem('eRegister_exam_results', JSON.stringify(examResults));
                    showPopup('✅ Result saved successfully!');
                    navigateTo(viewStudentResults, currentStudentId, currentStudentName);
                });
            };
            
            document.getElementById('app').innerHTML = `<div class="inner-bg"><div class="sticky-header">${getHeader('Add Result', true)}</div><div class="inner-container"><div class="form-card"><div class="two-column-layout"><div class="image-column"><img src="${img.resultIcon}" class="big-logo"></div><div class="form-column"><div class="form-title"><i class="fas fa-plus-circle"></i> ${isEditMode ? 'Edit' : 'Add'} Exam Result for ${currentStudentName}</div><div class="input-group"><label><i class="fas fa-file-alt"></i> Exam Name</label><input type="text" id="examNameInput" value="${isEditMode ? editExamName : ''}" placeholder="e.g., Half Yearly, Final Exam"></div><div id="resultTableContainer" style="overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%;"></div><button class="calc-icon" style="margin:10px 0;" onclick="calculateResult()"><img src="${img.calculateIcon}"></button><div id="calculationResult"></div><div id="progressContainer" class="progress-container"><div id="progressBar" class="progress-bar"></div></div><button class="btn btn-success" onclick="saveResult()"><i class="fas fa-save"></i> Save Result</button></div></div></div></div>${getOverlay()}</div>`;
            renderTable();
        }

                let rows = document.querySelectorAll('#billingTable tbody tr');

                rows.forEach(row => {

                    if(cb && cb.checked) toDelete.push(row);
                });
                if(toDelete.length === 0) { showPopup('Koi row select nahi ki!', false); return; }

                }

                rows.forEach(row => {
                    let priceInput = row.querySelector('.billing-input');
                    let qtyInput = row.querySelector('.billing-qty');
                    let totalCell = row.querySelector('.billing-row-total');
                    if (priceInput && qtyInput && totalCell) {
                        let price = parseFloat(priceInput.value) || 0;
                        let qty = parseFloat(qtyInput.value) || 1;
                        let dressQty = row.querySelector('.dress-qty');

                            <input type="number" class="billing-qty" value="1" min="1" style="width:50px;padding:6px;border:1px solid #e0e0e0;border-radius:8px;text-align:center;" onchange="recalcBilling()">
                            <button onclick="let q=this.previousElementSibling;q.value=parseInt(q.value)+1;recalcBilling();" style="width:28px;height:28px;background:#10b981;border:none;border-radius:50%;color:white;cursor:pointer;font-size:16px;">+</button>

            window.addItemToBilling_detail = function(itemName, itemPrice) {
                document.getElementById('addItemModal_billing').style.display = 'none';
                let tbody = document.getElementById('billingBody');

                newRow.innerHTML = `

                    <td><input type="number" class="billing-input" value="${itemPrice}" style="width:100%;padding:8px;border:1px solid #e0e0e0;border-radius:8px;background:#f9f9f9;" ${billingEditMode?'':'readonly'} onchange="recalcBilling()"></td>
                    <td>
                        <div style="display:flex;align-items:center;gap:6px;">
                            <button onclick="let q=this.nextElementSibling;q.value=Math.max(1,parseInt(q.value)-1);recalcBilling();" style="width:28px;height:28px;background:#ef4444;border:none;border-radius:50%;color:white;cursor:pointer;font-size:16px;">−</button>
                            <input type="number" class="billing-qty" value="1" min="1" style="width:50px;padding:6px;border:1px solid #e0e0e0;border-radius:8px;text-align:center;" onchange="recalcBilling()">
                            <button onclick="let q=this.previousElementSibling;q.value=parseInt(q.value)+1;recalcBilling();" style="width:28px;height:28px;background:#10b981;border:none;border-radius:50%;color:white;cursor:pointer;font-size:16px;">+</button>

                recalcBilling();
                showPopup(`✅ ${itemName} added!`);
                markUnsaved();

            window.calculateGrandTotalBilling = function() {
                let total = 0;
                document.querySelectorAll('#billingTable .billing-row-total').forEach(cell => {
                    total += parseFloat(cell.textContent.replace('₹','')) || 0;
                });
                document.getElementById('bilGrandTotal').textContent = '₹' + total;
                document.getElementById('bilFinalTotal').textContent = '₹' + total;
                document.getElementById('bilDiscount').value = 0;
                document.getElementById('bilSubmitted').value = 0;
                document.getElementById('bilBalance').textContent = '₹' + total;
                document.getElementById('grandTotalBox').style.display = 'block';
            };

            window.applyBillingDiscount = function() {
                let grandRaw = parseFloat(document.getElementById('bilGrandTotal').textContent.replace('₹','')) || 0;
                let disc = parseFloat(document.getElementById('bilDiscount').value) || 0;
                let finalTotal = Math.max(0, grandRaw - disc);
                document.getElementById('bilFinalTotal').textContent = '₹' + finalTotal;
                calcBillingBalance();
                markUnsaved();
            };

            window.calcBillingBalance = function() {
                let finalTotal = parseFloat(document.getElementById('bilFinalTotal').textContent.replace('₹','')) || 0;
                let submitted = parseFloat(document.getElementById('bilSubmitted').value) || 0;
                let balance = Math.max(0, finalTotal - submitted);
                document.getElementById('bilBalance').textContent = '₹' + balance;
                markUnsaved();
            };

            window.saveBillingSummary = function() {
                billingSaved = true;
                // Collect billing data
                let rows = [];
                document.querySelectorAll('#billingTable tbody tr').forEach(row => {
                    let nameCell = row.cells[0];
                    let priceCell = row.querySelector('.billing-input');
                    let qtyCell = row.querySelector('.billing-qty');
                    let totalCell = row.querySelector('.billing-row-total');
                    if(nameCell && totalCell) {
                        rows.push({
                            name: nameCell.textContent.trim().replace('×','').trim(),
                            price: priceCell ? priceCell.value : '',
                            qty: qtyCell ? qtyCell.value : 1,
                            total: totalCell.textContent
                        });
                    }
                });
                let grandTotalRaw = parseFloat((document.getElementById('bilGrandTotal')?.textContent||'0').replace('₹','')) || 0;
                let submittedRaw = parseFloat(document.getElementById('bilSubmitted')?.value || '0') || 0;
                let balanceRaw = parseFloat((document.getElementById('bilBalance')?.textContent||'0').replace('₹','')) || 0;
                let discountRaw = parseFloat(document.getElementById('bilDiscount')?.value || '0') || 0;
                let finalTotalRaw = parseFloat((document.getElementById('bilFinalTotal')?.textContent||'0').replace('₹','')) || 0;

                let saveData = {
                    admId: admId,
                    rows,
                    grandTotal: '₹' + grandTotalRaw,
                    discount: discountRaw,
                    finalTotal: '₹' + finalTotalRaw,
                    submitted: submittedRaw,
                    balance: '₹' + balanceRaw,
                    savedAt: new Date().toLocaleString()
                };
                let allSaved = Object.assign({}, billingSaved);
                allSaved[admId] = saveData;
                billingSaved = allSaved; fsSave('billingSaved', billingSaved); localStorage.setItem('eRegister_billing_saved', JSON.stringify(allSaved));

                // Save to paymentHistory so fees card & history page shows balance
                // Find all student IDs belonging to this admission
                let admission = admissions.find(a => String(a.id) === String(admId));
                if(admission) {
                    let studentIds = [];
                    if(admission.type === 'single') {
                        studentIds.push(admission.id);
                    } else if(admission.type === 'family') {
                        (admission.students||[]).forEach(s => studentIds.push(admission.id + '_' + s.id));
                    }
                    // Save an admission-type history record for the primary student
                    let primaryId = studentIds[0];
                    if(primaryId) {
                        if(!paymentHistory[primaryId]) paymentHistory[primaryId] = [];
                        paymentHistory[primaryId].push({
                            date: new Date().toLocaleString(),
                            isAdmissionEntry: true,
                            contact: admission.contact || '',
                            totalAmount: finalTotalRaw,
                            submittedAmount: submittedRaw,
                            balance: balanceRaw,
                            months: [],
                            fees: {},
                            amount: submittedRaw,
                            memberTotal: finalTotalRaw,
                            oldBalance: 0,
                            remark: 'Admission Entry'
                        });
                        fsSaveWithChecksum('paymentHistory', paymentHistory); localStorage.setItem('eRegister_payment_history', JSON.stringify(paymentHistory));
                    }
                }

                showPopup('✅ Billing saved successfully!');
                // Show print button, hide save button
                document.getElementById('saveBillingBtn').style.display = 'none';
                document.getElementById('printBillingBtn').style.display = 'inline-flex';
            };

            window.printBillingSummary = function() {
                let ps = printSettings;
                let bf = ps.billingFields || {};
                let d = admission;
                // Build student detail section
                let studentHtml = '';

                    let rows=[];
                    if(bf.studentName!==false)   rows.push('<tr><td style="font-weight:600;padding:5px 8px;width:40%;color:#555;">Student Name</td><td style="padding:5px 8px;">'+(d.name||'')+'</td></tr>');
                    if(bf.studentClass!==false)   rows.push('<tr><td style="font-weight:600;padding:5px 8px;color:#555;">Class</td><td style="padding:5px 8px;">'+(d.newClass||'')+'</td></tr>');
                    if(bf.fatherName!==false)     rows.push('<tr><td style="font-weight:600;padding:5px 8px;color:#555;">Father\'s Name</td><td style="padding:5px 8px;">'+(d.fatherName||'N/A')+'</td></tr>');
                    if(bf.motherName!==false)     rows.push('<tr><td style="font-weight:600;padding:5px 8px;color:#555;">Mother\'s Name</td><td style="padding:5px 8px;">'+(d.motherName||'N/A')+'</td></tr>');
                    if(bf.dob!==false)            rows.push('<tr><td style="font-weight:600;padding:5px 8px;color:#555;">Date of Birth</td><td style="padding:5px 8px;">'+(d.dob||'N/A')+'</td></tr>');
                    if(bf.contact!==false)        rows.push('<tr><td style="font-weight:600;padding:5px 8px;color:#555;">Contact</td><td style="padding:5px 8px;">'+(d.contact||'N/A')+'</td></tr>');
                    if(bf.gender!==false)         rows.push('<tr><td style="font-weight:600;padding:5px 8px;color:#555;">Gender</td><td style="padding:5px 8px;">'+(d.gender||'N/A')+'</td></tr>');
                    if(bf.aadhar!==false)         rows.push('<tr><td style="font-weight:600;padding:5px 8px;color:#555;">Aadhar</td><td style="padding:5px 8px;">'+(d.aadhar||'N/A')+'</td></tr>');
                    if(bf.address!==false)        rows.push('<tr><td style="font-weight:600;padding:5px 8px;color:#555;">Address</td><td style="padding:5px 8px;">'+(d.presentAddress||d.permanentAddress||'N/A')+'</td></tr>');
                    if(bf.prevSchool!==false)     rows.push('<tr><td style="font-weight:600;padding:5px 8px;color:#555;">Previous School</td><td style="padding:5px 8px;">'+(d.prevSchool||'N/A')+'</td></tr>');
                    if(bf.admissionDate!==false)  rows.push('<tr><td style="font-weight:600;padding:5px 8px;color:#555;">Admission Date</td><td style="padding:5px 8px;">'+(d.date||'')+'</td></tr>');
                    if(rows.length>0) studentHtml='<div style="margin-bottom:14px;"><div style="font-weight:700;font-size:12px;color:#667eea;margin-bottom:6px;border-bottom:1px solid #e0e0e0;padding-bottom:4px;">📋 Student Details</div><table style="border-collapse:collapse;width:100%;font-size:12px;"><tbody>'+rows.join('')+'</tbody></table></div>';
                } else if(d && d.type==='family') {
                    let members=(d.students||[]).map(s=>'<li style="padding:2px 0;"><strong>'+s.name+'</strong> — Class: '+(s.class||'')+'</li>').join('');
                    studentHtml='<div style="margin-bottom:14px;font-size:12px;"><strong>Family:</strong> '+(d.familyName||'')+'<ul style="margin:4px 0 0 16px;">'+members+'</ul></div>';
                }
                // Build billing table
                let bilTableEl=document.getElementById('billingTable');
                let bilTableClone=bilTableEl?bilTableEl.cloneNode(true):null;

                    bilTableClone.querySelectorAll('tr').forEach(row=>{ let last=row.lastElementChild; if(last) last.remove(); });
                }
                let tableHtml = (bf.billingTable!==false && bilTableClone) ? bilTableClone.outerHTML : '';
                let grandTotal = document.getElementById('bilGrandTotal')?.textContent || '₹0';
                let discount   = document.getElementById('bilDiscount')?.value || '0';

                let submitted  = document.getElementById('bilSubmitted')?.value || '0';

                // ── helper for a summary row ──
                let bRow = function(label, val, bold, color){
                    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #eee;">'
                        +'<span style="font-size:12px;">'+label+'</span>'
                        +'<span style="font-size:12px;font-weight:'+(bold?'700':'500')+';color:'+(color||'inherit')+';">'+val+'</span>'
                        +'</div>';
                };
                let billingBody = '<div style="margin:10mm;">'
                    + buildPrintHeader()
                    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">'
                    +   '<span style="font-size:14px;font-weight:800;color:#1a1a2e;">Admission Billing Summary</span>'
                    +   '<span style="font-size:10px;color:#888;">'+new Date().toLocaleDateString('en-IN')+'</span>'
                    + '</div>'
                    + studentHtml
                    + (tableHtml ? '<div style="margin-bottom:10px;overflow-x:auto;">'+tableHtml+'</div>' : '')
                    + '<div style="margin-top:8px;border-top:2px solid #667eea;padding-top:8px;">'
                    + (bf.grandTotal!==false     ? bRow('Grand Total', grandTotal) : '')
                    + (bf.discount!==false       ? bRow('Discount', '&#8377;'+discount) : '')
                    + (bf.totalAmount!==false    ? bRow('Total Amount', finalTotal, true, '#059669') : '')
                    + (bf.submittedAmount!==false ? bRow('Submitted Amount', '&#8377;'+submitted) : '')
                    + (bf.balance!==false        ? bRow('Balance', balance, true, '#dc2626') : '')
                    + '</div>'
                    + '</div>';
                doPrint(billingBody);
            };
        }

        function renderAdmissionSettings() {
            /* admissionSettings already in memory */

            function renderDressRows() {
                let dressHtml = '';
                (admissionSettings.dresses||[]).forEach((dr, di) => {
                    dressHtml += `<tr id="admDressRow_${di}">

                                <th style="padding:12px;text-align:center;">Action</th>
                            </tr></thead>
                            <tbody id="dressTableBody"></tbody>
                        </table>
                        </div>
                        <button class="btn btn-success" style="margin-top:25px;width:100%;" onclick="saveAdmissionSettings()"><i class="fas fa-save"></i> Save Settings</button>
                    </div>
                </div>
                ${getOverlay()}

            renderDressRows();

            window.addDressRow = function() {
                admissionSettings.dresses = admissionSettings.dresses || [];
                admissionSettings.dresses.push({ name: '', color: '', price: 0 });
                renderDressRows();
                // Auto-enable edit for new row
                let newIdx = admissionSettings.dresses.length - 1;
                setTimeout(() => {
                    ['dressName_','dressColor_','dressPrice_'].forEach(pre => {
                        let el = document.getElementById(pre + newIdx);
                        if (el) { el.removeAttribute('readonly'); el.style.border = '2px solid #667eea'; el.focus(); }
                    });
                }, 50);
            };

            window.toggleDressEdit = function(di) {
                let fields = [`dressName_${di}`, `dressColor_${di}`, `dressPrice_${di}`];
                let first = document.getElementById(fields[0]);
                let isReadonly = first ? first.readOnly : true;
                fields.forEach(fid => {
                    let el = document.getElementById(fid);
                    if (!el) return;
                    el.readOnly = !isReadonly;
                    el.style.border = isReadonly ? '2px solid #667eea' : '2px solid #e0e0e0';
                    el.style.background = isReadonly ? 'white' : '#f9f9f9';
                    if (!isReadonly) {
                        // Save values when locking
                        admissionSettings.dresses[di].name = document.getElementById(`dressName_${di}`)?.value || '';
                        admissionSettings.dresses[di].color = document.getElementById(`dressColor_${di}`)?.value || '';
                        admissionSettings.dresses[di].price = parseFloat(document.getElementById(`dressPrice_${di}`)?.value) || 0;

                });

                    admissionSettings.dresses.splice(di, 1);

                (admissionSettings.dresses||[]).forEach((dr, di) => {
                    dr.name = document.getElementById(`dressName_${di}`)?.value || dr.name;
                    dr.color = document.getElementById(`dressColor_${di}`)?.value || dr.color;

" id="s1FAadhar" value="${singleStep1Data.fatherAadhar||''}"></div><div class="input-group"><label><i class="fas fa-id-card"></i> Mother Aadhar</label><input type="text" id="s1MAadhar" value="${singleStep1Data.motherAadhar||''}"></div></div><button class="btn btn-primary" onclick="goToSingleStep2()"><i class="fas fa-arrow-right"></i> Next</button></div><div class="image-column"><img src="${img.singleProfile}" class="big-logo"></div></div></div></div>${getOverlay()}</div>`;

        function goToSingleStep2() {
            // Point 10: Early validation before moving to step 2
            let n = document.getElementById('s1Name').value, c = document.getElementById('s1Contact').value;
            let ne = validateName(n); if(ne){ showPopup(ne, false); return; }

        // Teacher Attendance Calendar
        let teacherCalYear = new Date().getFullYear(), teacherCalMonth = new Date().getMonth();
        function renderTeacherAttendanceCalendar(teacherId, teacherName) {
            let key = 'teacher_' + teacherId;
            if(!teacherAttendance[key]) teacherAttendance[key]={};
            let today = new Date();
            let currentYear = today.getFullYear();
            let currentMonth = today.getMonth();
            let currentDate = today.getDate();
            
            function loadCalendar(year, month) {
                let firstDay = new Date(year, month, 1).getDay(), daysInMonth = new Date(year, month+1, 0).getDate();
                let daysHtml = '<div class="calendar-weekdays"><span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span></div><div class="calendar-days">';
                for(let i=0;i<firstDay;i++) daysHtml+='<div class="calendar-day empty"></div>';
                for(let d=1;d<=daysInMonth;d++){
                    let dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    let status = teacherAttendance[key][dateStr] || '';
                    let cls = status==='present'?'present':status==='half'?'half':status==='absent'?'absent':'';
                    let canMark = (year === currentYear && month === currentMonth && d === currentDate);
                    let clickable = canMark ? `onclick="markTeacherAttendance('${teacherId}',${year},${month},${d})"` : '';
                    daysHtml+=`<div class="calendar-day ${cls}" ${clickable}>${d}</div>`;
                }
                daysHtml+='</div>';
                let present = Object.values(teacherAttendance[key]).filter(v=>v==='present').length;
                let half = Object.values(teacherAttendance[key]).filter(v=>v==='half').length;
                let absent = Object.values(teacherAttendance[key]).filter(v=>v==='absent').length;
                document.getElementById('calendarDays').innerHTML = daysHtml;
                document.getElementById('presentCount').innerText = present;
                document.getElementById('absentCount').innerText = absent+half;
                document.getElementById('monthYear').innerText = new Date(year,month).toLocaleString('default',{month:'long',year:'numeric'});
            }
            function prevMonth() { let newMonth = teacherCalMonth-1; if(newMonth>=0){ teacherCalMonth=newMonth; loadCalendar(teacherCalYear,teacherCalMonth); } else if(teacherCalYear>2020){ teacherCalYear--; teacherCalMonth=11; loadCalendar(teacherCalYear,teacherCalMonth); } else showPopup('Cannot go before 2020',false); }
            function nextMonth() { let newMonth = teacherCalMonth+1; if(newMonth<=(currentMonth && teacherCalYear===currentYear ? currentMonth : 11)){ teacherCalMonth=newMonth; loadCalendar(teacherCalYear,teacherCalMonth); } else if(teacherCalYear<currentYear && newMonth<=11){ teacherCalMonth=newMonth; loadCalendar(teacherCalYear,teacherCalMonth); } else showPopup('Cannot go to future months!',false); }
            
            window.markTeacherAttendance = (id,y,m,d) => {
                let dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                if(!canMarkDate(dateStr)) { showPopup('You can only mark attendance for today!', false); return; }
                let k = 'teacher_' + id;
                let opts = ['present','half','absent'];
                let curr = teacherAttendance[k][dateStr] || '';
                let idx = opts.indexOf(curr);
                let next = opts[(idx+1)%opts.length];
                if(next) teacherAttendance[k][dateStr] = next;
                else teacherAttendance[k][dateStr] = 'present';
                fsSave('teacherAttendance', teacherAttendance); localStorage.setItem('eRegister_teacher_attendance', JSON.stringify(teacherAttendance));
                loadCalendar(teacherCalYear,teacherCalMonth);
                showPopup('Attendance marked successfully!');
            };
            document.getElementById('app').innerHTML = `<div class="inner-bg"><div class="sticky-header">${getHeader(`Attendance: ${teacherName}`, true)}</div><div class="inner-container"><div class="form-card"><div class="two-column-layout"><div class="form-column"><div class="form-title"><i class="fas fa-calendar-alt"></i> Mark Attendance</div><div class="calendar"><div class="calendar-header"><button onclick="prevMonth()"><i class="fas fa-chevron-left"></i></button><h3 id="monthYear"></h3><button onclick="nextMonth()"><i class="fas fa-chevron-right"></i></button></div><div id="calendarDays"></div></div></div><div class="image-column"><img src="${img.calendarLogo}" class="big-logo"><div class="stats-box"><h4><i class="fas fa-calendar-check"></i> Total Present</h4><p id="presentCount" class="present-count">0</p></div><div class="stats-box"><h4><i class="fas fa-calendar-times"></i> Total Absent</h4><p id="absentCount" class="absent-count">0</p></div><div style="display:flex;gap:10px;justify-content:center;margin-top:10px;"><span style="background:#10b981;width:20px;height:20px;border-radius:50%;display:inline-block;"></span><span>Present</span><span style="background:#f59e0b;width:20px;height:20px;border-radius:50%;display:inline-block;"></span><span>Half Day</span><span style="background:#ef4444;width:20px;height:20px;border-radius:50%;display:inline-block;"></span><span>Absent</span></div></div></div></div></div>${getOverlay()}</div>`;
            window.prevMonth = prevMonth;
            window.nextMonth = nextMonth;
            loadCalendar(teacherCalYear,teacherCalMonth);
        }

        // Teacher Attendance Dashboard

        function renderTeacherAttendanceDetail() {

            let presentTeachers = [], absentTeachers = [], halfTeachers = [];
            teachers.forEach(teacher => {
                let status = getTeacherAttendance(teacher.id, todayStr);
                if(status === 'present') presentTeachers.push(teacher);
                else if(status === 'half') halfTeachers.push(teacher);
                else if(status === 'absent') absentTeachers.push(teacher);
                else absentTeachers.push(teacher);
            });
            let html = '';
            if(presentTeachers.length > 0) {
                html += `<h3 style="margin:20px 0 10px; color:#10b981;"><i class="fas fa-check-circle"></i> Present Teachers</h3>`;
                presentTeachers.forEach(t => { html += `<div class="attendance-student-card" style="background:#dcfce7;"><span><i class="fas fa-user-check"></i> ${t.name}</span><span><i class="fas fa-phone"></i> ${t.contact}</span></div>`; });
            }
            if(halfTeachers.length > 0) {
                html += `<h3 style="margin:20px 0 10px; color:#f59e0b;"><i class="fas fa-adjust"></i> Half Day Teachers</h3>`;
                halfTeachers.forEach(t => { html += `<div class="attendance-student-card" style="background:#fef3c7;"><span><i class="fas fa-user-clock"></i> ${t.name}</span><span><i class="fas fa-phone"></i> ${t.contact}</span></div>`; });
            }
            if(absentTeachers.length > 0) {
                html += `<h3 style="margin:20px 0 10px; color:#ef4444;"><i class="fas fa-times-circle"></i> Absent Teachers</h3>`;
                absentTeachers.forEach(t => { html += `<div class="attendance-student-card" style="background:#fee2e2;"><span><i class="fas fa-user-slash"></i> ${t.name}</span><span><i class="fas fa-phone"></i> ${t.contact}</span></div>`; });
            }
            if(html === '') html = '<div style="text-align:center;padding:40px;">No attendance records for today</div>';
            document.getElementById('app').innerHTML = `<div class="inner-bg"><div class="sticky-header">${getHeader('Teacher Attendance Details', true)}</div><div class="inner-container"><div class="form-card"><div class="form-title"><i class="fas fa-calendar-day"></i> Today's Attendance (${new Date().toLocaleDateString()})</div>${html}</div></div>${getOverlay()}</div>`;
        }

        // Start the app — load data from Firestore first, then render
        initAppData();
    </script>
</body>
</html>
