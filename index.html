        function renderResultForm() {
            function renderTable() {
                let tableHtml = `<table class="result-table"><thead><tr><th>Subject Name</th><th>Obtained Marks</th><th>Total Marks</th><th>Action</th></tr></thead><tbody>`;
                currentSubjects.forEach((sub, idx) => {
                    tableHtml += `<tr>
                        <td><input type="text" id="subName${idx}" value="${sub.name}" placeholder="Subject name"></td>
                        <td><input type="number" id="subObtained${idx}" value="${sub.obtained}" placeholder="Obtained"></td>
                        <td><input type="number" id="subTotal${idx}" value="${sub.total}" placeholder="Total"></td>
                        <td>${idx > 0 ? `<button class="delete-row-icon" onclick="removeSubjectRow(${idx})"><img src="${img.deleteIcon}"></button>` : `<button class="add-row-icon" onclick="addSubjectRow()"><img src="${img.plusIcon}"></button>`}</td>
                    </tr>`;
                });
                tableHtml += `</tbody></table>`;
                document.getElementById('resultTableContainer').innerHTML = tableHtml;
            }
            
            window.addSubjectRow = () => {
                currentSubjects.push({ name: '', obtained: '', total: '' });
                renderTable();
            };
            
            window.removeSubjectRow = (idx) => {
                currentSubjects.splice(idx, 1);
                renderTable();
            };
            
            window.calculateResult = () => {
                let totalObtained = 0, totalMarks = 0;
                currentSubjects.forEach((sub, idx) => {
                    let obtained = parseInt(document.getElementById(`subObtained${idx}`)?.value) || 0;
                    let total = parseInt(document.getElementById(`subTotal${idx}`)?.value) || 0;
                    totalObtained += obtained;
                    totalMarks += total;
                });
                let percentage = totalMarks > 0 ? (totalObtained / totalMarks * 100).toFixed(2) : 0;
                document.getElementById('calculationResult').innerHTML = `<div class="result-summary"><strong>Total Obtained: ${totalObtained} / ${totalMarks}</strong><br><strong>Percentage: ${percentage}%</strong></div>`;
            };
            
            window.saveResult = () => {
                let examName = document.getElementById('examNameInput').value;
                if(!examName) { showPopup('Please enter exam name!', false); return; }
                let subjects = [];
                let valid = true;
                currentSubjects.forEach((sub, idx) => {
                    let name = document.getElementById(`subName${idx}`)?.value;
                    let obtained = document.getElementById(`subObtained${idx}`)?.value;
                    let total = document.getElementById(`subTotal${idx}`)?.value;
                    if(!name || !obtained || !total) valid = false;
                    subjects.push({ name, obtained: parseInt(obtained), total: parseInt(total) });
                });
                if(!valid) { showPopup('Please fill all subject fields!', false); return; }
                
                showProgress(() => {
                    if(!examResults[currentStudentId]) examResults[currentStudentId] = {};
                    if(isEditMode && editExamName !== examName) {
                        delete examResults[currentStudentId][editExamName];
                    }
                    examResults[currentStudentId][examName] = { subjects, studentName: currentStudentName, date: new Date().toLocaleString() };
                    fsSave('examResults', examResults); localStorage.setItem('eRegister_exam_results', JSON.stringify(examResults));
                    showPopup('✅ Result saved successfully!');
                    navigateTo(viewStudentResults, currentStudentId, currentStudentName);
                });
            };
            
            document.getElementById('app').innerHTML = `<div class="inner-bg"><div class="sticky-header">${getHeader('Add Result', true)}</div><div class="inner-container"><div class="form-card"><div class="two-column-layout"><div class="image-column"><img src="${img.resultIcon}" class="big-logo"></div><div class="form-column"><div class="form-title"><i class="fas fa-plus-circle"></i> ${isEditMode ? 'Edit' : 'Add'} Exam Result for ${currentStudentName}</div><div class="input-group"><label><i class="fas fa-file-alt"></i> Exam Name</label><input type="text" id="examNameInput" value="${isEditMode ? editExamName : ''}" placeholder="e.g., Half Yearly, Final Exam"></div><div id="resultTableContainer" style="overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%;"></div><button class="calc-icon" style="margin:10px 0;" onclick="calculateResult()"><img src="${img.calculateIcon}"></button><div id="calculationResult"></div><div id="progressContainer" class="progress-container"><div id="progressBar" class="progress-bar"></div></div><button class="btn btn-success" onclick="saveResult()"><i class="fas fa-save"></i> Save Result</button></div></div></div></div>${getOverlay()}</div>`;

        // ==================== APPROVAL ====================
        function renderApproval() {
            let currentFilter = window._approvalFilter || 'all';

            function buildApprovalList(filter) {
                window._approvalFilter = filter;
                // approvalDeleted wale approved admissions approval list mein nahi dikhenge
                // (woh class list mein rehte hain — sirf approval list se hata diye)
                let filtered = [...admissions].filter(a => !a.approvalDeleted);
                if(filter === 'pending') filtered = filtered.filter(a => a.status !== 'approved');
                else if(filter === 'approved') filtered = filtered.filter(a => a.status === 'approved');
                else if(filter === 'date_new') filtered = filtered.sort((a,b) => new Date(b.date||0) - new Date(a.date||0));
                else if(filter === 'date_old') filtered = filtered.sort((a,b) => new Date(a.date||0) - new Date(b.date||0));
                
                let listHtml = '';
                filtered.forEach(ad=>{
                    let isApproved = ad.status==='approved';
                    let badge = isApproved
                        ? '<span style="background:#dcfce7;color:#16a34a;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-left:6px;">✅ Approved</span>'
                        : '<span style="background:#fef3c7;color:#d97706;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-left:6px;">⏳ Pending</span>';
                    let btns = isApproved

                            </button>
                            <button onclick="toggleBillingDeleteMode()" title="Delete Rows" id="billingDeleteModeBtn" style="background:none;border:none;cursor:pointer;">
                                <img src="${img.deleteIconBig}" style="width:46px;height:46px;">

                <div id="addItemModal_billing" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1001;justify-content:center;align-items:center;">
                    <div style="background:white;border-radius:24px;padding:28px;width:420px;max-width:90%;max-height:80vh;overflow-y:auto;">
                        <h3 style="margin-bottom:20px;color:#1a1a2e;"><i class="fas fa-list" style="color:#667eea;"></i> Select Item</h3>

            let billingEditMode = false;
            let billingDeleteMode = false;
            let billingSaved = false;

            document.getElementById('printBillingBtn').style.display = 'none';
            document.getElementById('saveBillingBtn').style.display = 'inline-flex';

            function markUnsaved() {
                billingSaved = false;
                document.getElementById('saveBillingBtn').style.display = 'inline-flex';
                document.getElementById('printBillingBtn').style.display = 'none';
            }

            window.toggleBillingEdit_detail = function() {
                billingEditMode = !billingEditMode;
                let inputs = document.querySelectorAll('#billingSummaryContent input.billing-input, #billingSummaryContent select.billing-input');
                inputs.forEach(inp => {
                    inp.readOnly = !billingEditMode;
                    inp.disabled = !billingEditMode;
                    inp.style.background = billingEditMode ? 'white' : '#f9f9f9';
                    inp.style.border = billingEditMode ? '2px solid #667eea' : '1px solid #e0e0e0';
                });
                showPopup(billingEditMode ? '✏️ Editing enabled' : '✅ Editing locked');
                if(billingEditMode) markUnsaved();
            };

            window.toggleBillingDeleteMode = function() {
                billingDeleteMode = !billingDeleteMode;
                let checks = document.querySelectorAll('#billingTable .billing-delete-check');
                let deleteColHeader = document.getElementById('deleteColHeader');
                let deleteBtn = document.getElementById('deleteSelectedRowsBtn');
                checks.forEach(c => c.style.display = billingDeleteMode ? 'block' : 'none');
                if(deleteColHeader) deleteColHeader.style.display = billingDeleteMode ? 'table-cell' : 'none';
                if(deleteBtn) deleteBtn.style.display = billingDeleteMode ? 'inline-flex' : 'none';
                showPopup(billingDeleteMode ? '🗑️ Select rows to delete' : '✅ Delete mode off');
                if(billingDeleteMode) markUnsaved();
            };

            window.confirmDeleteBillingRows = function() {
                let rows = document.querySelectorAll('#billingTable tbody tr');
                let toDelete = [];
                rows.forEach(row => {
                    let cb = row.querySelector('.billing-delete-check');
                    if(cb && cb.checked) toDelete.push(row);
                });
                if(toDelete.length === 0) { showPopup('Koi row select nahi ki!', false); return; }
                if(confirm(`${toDelete.length} row(s) delete karein?`)) {
                    toDelete.forEach(r => r.remove());
                    showPopup(`✅ ${toDelete.length} row(s) deleted!`);
                    markUnsaved();
                }
            };

            window.recalcBilling = function() {
                let rows = document.querySelectorAll('#billingTable tbody tr');
                rows.forEach(row => {
                    let priceInput = row.querySelector('.billing-input');
                    let qtyInput = row.querySelector('.billing-qty');
                    let totalCell = row.querySelector('.billing-row-total');
                    if (priceInput && qtyInput && totalCell) {
                        let price = parseFloat(priceInput.value) || 0;
                        let qty = parseFloat(qtyInput.value) || 1;
                        let dressQty = row.querySelector('.dress-qty');
                        if (dressQty) {
                            price = parseFloat(dressQty.getAttribute('data-price')) || 0;
                        }
                        totalCell.textContent = '₹' + (price * qty);
                    }
                });
                calculateGrandTotalBilling();
                markUnsaved();
            };

            window.openAddItemModal_billing = function() {
                let listHtml = '';
                defaultItemsList.forEach(item => {
                    let price = itemsFees[item] || 0;
                    listHtml += `<div onclick="addItemToBilling_detail('${item}', ${price})" style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid #f0f0f0;cursor:pointer;border-radius:12px;transition:0.2s;" onmouseover="this.style.background='#f0f0f0'" onmouseout="this.style.background='white'">
                        <span style="font-weight:500;">${item}</span>
                        <span style="font-weight:700;color:#667eea;">₹${price}</span>
                    </div>`;
                });
                // Add inventory items to the list
                (window._inventoryData || []).forEach((inv, invIdx) => {
                    let invPrice = inv.price || 0;
                    let invQtyBadge = inv.qty > 0
                        ? `<span style="font-size:11px;background:#dcfce7;color:#15803d;padding:2px 7px;border-radius:10px;margin-right:6px;">Stock: ${inv.qty}</span>`
                        : `<span style="font-size:11px;background:#fee2e2;color:#dc2626;padding:2px 7px;border-radius:10px;margin-right:6px;">Out of stock</span>`;
                    let invClickFn = inv.qty <= 0

                        : `addItemToBilling_detail('${inv.name}', ${invPrice})`;
                    listHtml += `<div onclick="${invClickFn}" style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid #f0f0f0;cursor:pointer;border-radius:12px;transition:0.2s;${inv.qty<=0?'opacity:0.6;':''}" onmouseover="this.style.background='#f0f0f0'" onmouseout="this.style.background='white'">
                        <span style="font-weight:500;"><i class="fas fa-box" style="color:#667eea;font-size:11px;margin-right:5px;"></i> ${inv.name}</span>
                        <span>${invQtyBadge}<span style="font-weight:700;color:#667eea;">₹${invPrice}</span></span>
                    </div>`;
                });
                (admissionSettings.dresses||[]).forEach((dr) => {
                    let drPrice = dr.price || 0;
                    let drName = dr.name || 'Dress';
                    listHtml += `<div onclick="addItemToBilling_detail('${drName.replace(/'/g,"\\'")}', ${drPrice})" style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid #f0f0f0;cursor:pointer;border-radius:12px;transition:0.2s;" onmouseover="this.style.background='#f0f0f0'" onmouseout="this.style.background='white'">
                        <span style="font-weight:500;"><i class="fas fa-tshirt" style="color:#667eea;font-size:11px;margin-right:5px;"></i> ${drName}</span>
                        <span style="font-weight:700;color:#667eea;">₹${drPrice}</span>

                document.getElementById('itemsSelectionList').innerHTML = listHtml;
                document.getElementById('addItemModal_billing').style.display = 'flex';
            };

                let price = dr.price || 0;

                    <td style="padding:8px;">${dr.name||'Dress'} <button onclick="this.closest('tr').remove();recalcBilling();" style="background:#ef4444;border:none;color:white;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:12px;margin-left:6px;">×</button></td>
                    <td><select class="billing-input" style="width:120px;padding:6px;border:1px solid #e0e0e0;border-radius:8px;background:#f9f9f9;" disabled>${(dr.color||'').split(',').map(c=>`<option${c.trim()===color?' selected':''}>${c.trim()}</option>`).join('')}</select></td>

                            <button onclick="let q=this.nextElementSibling;q.value=Math.max(1,parseInt(q.value)-1);recalcBilling();" style="width:28px;height:28px;background:#ef4444;border:none;border-radius:50%;color:white;cursor:pointer;font-size:16px;">−</button>
                            <input type="number" class="billing-qty" value="1" min="1" style="width:50px;padding:6px;border:1px solid #e0e0e0;border-radius:8px;text-align:center;" onchange="recalcBilling()">
                            <button onclick="let q=this.previousElementSibling;q.value=parseInt(q.value)+1;recalcBilling();" style="width:28px;height:28px;background:#10b981;border:none;border-radius:50%;color:white;cursor:pointer;font-size:16px;">+</button>

                    <td class="billing-row-total">₹${price}</td>
                    <td><input type="checkbox" class="billing-delete-check" style="width:18px;height:18px;cursor:pointer;${billingDeleteMode?'':'display:none'}"></td>`;

                showPopup(`✅ ${dr.name} added!`);
                markUnsaved();

            window.addItemToBilling_detail = function(itemName, itemPrice) {
                document.getElementById('addItemModal_billing').style.display = 'none';
                let tbody = document.getElementById('billingBody');
                let newRow = document.createElement('tr');
                newRow.innerHTML = `
                    <td style="padding:8px;">${itemName} <button onclick="this.closest('tr').remove();recalcBilling();" style="background:#ef4444;border:none;color:white;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:12px;margin-left:6px;">×</button></td>
                    <td><input type="number" class="billing-input" value="${itemPrice}" style="width:100%;padding:8px;border:1px solid #e0e0e0;border-radius:8px;background:#f9f9f9;" ${billingEditMode?'':'readonly'} onchange="recalcBilling()"></td>
                    <td>
                        <div style="display:flex;align-items:center;gap:6px;">
                            <button onclick="let q=this.nextElementSibling;q.value=Math.max(1,parseInt(q.value)-1);recalcBilling();" style="width:28px;height:28px;background:#ef4444;border:none;border-radius:50%;color:white;cursor:pointer;font-size:16px;">−</button>
                            <input type="number" class="billing-qty" value="1" min="1" style="width:50px;padding:6px;border:1px solid #e0e0e0;border-radius:8px;text-align:center;" onchange="recalcBilling()">
                            <button onclick="let q=this.previousElementSibling;q.value=parseInt(q.value)+1;recalcBilling();" style="width:28px;height:28px;background:#10b981;border:none;border-radius:50%;color:white;cursor:pointer;font-size:16px;">+</button>
                        </div>
                    </td>
                    <td class="billing-row-total">₹${itemPrice}</td>
                    <td><input type="checkbox" class="billing-delete-check" style="width:18px;height:18px;cursor:pointer;${billingDeleteMode?'':'display:none'}"></td>`;
                tbody.insertBefore(newRow, document.getElementById('addedItemsRows'));
                recalcBilling();
                showPopup(`✅ ${itemName} added!`);
                markUnsaved();

            window.calculateGrandTotalBilling = function() {
                let total = 0;
                document.querySelectorAll('#billingTable .billing-row-total').forEach(cell => {
                    total += parseFloat(cell.textContent.replace('₹','')) || 0;
                });
                document.getElementById('bilGrandTotal').textContent = '₹' + total;
                let disc = parseFloat(document.getElementById('bilDiscount')?.value) || 0;
                let finalTotal = Math.max(0, total - disc);
                document.getElementById('bilFinalTotal').textContent = '₹' + finalTotal;
                if(!disc) document.getElementById('bilDiscount').value = 0;
                let submitted = parseFloat(document.getElementById('bilSubmitted')?.value) || 0;
                let balance = Math.max(0, finalTotal - submitted);
                document.getElementById('bilBalance').textContent = '₹' + balance;
                document.getElementById('grandTotalBox').style.display = 'block';
            };

            window.calcMonthlyTotalFor = function(si) {
                let feeInput = document.querySelector('.monthly-fee-amt[data-sidx="'+si+'"]');
                let tuitionFee = parseFloat(feeInput?.value) || 0;
                let cls = feeInput?.dataset.cls || '';
                let checkedBoxes = Array.from(document.querySelectorAll('.monthly-fee-month-s'+si+':checked'));
                let checked = checkedBoxes.map(cb => cb.value);
                // Har checked month ke liye tuition + (us mahine ki) exam fee jodo —
                // flat multiplier nahi, kyunki exam fee sirf kuch mahino mein lagti hai.
                let totalAmt = 0;
                let totalExam = 0;
                checkedBoxes.forEach(cb => {
                    let mi = parseInt(cb.dataset.monthidx);
                    let examFee = getExamFeeForMonth(cls, mi);
                    totalExam += examFee;
                    totalAmt += tuitionFee + examFee;
                });
                let display = document.getElementById('monthlyTotalDisplay_'+si);
                let addBtn = document.getElementById('addMonthlyToBillBtn_'+si);
                if(display) {
                    let examPart = totalExam > 0 ? ` + Exam ₹${totalExam}` : '';
                    display.textContent = checked.length > 0 ? checked.join(', ') + ': Tuition ₹' + (tuitionFee*checked.length) + examPart + ' = ₹' + totalAmt : '';
                }
                if(addBtn) addBtn.style.display = checked.length > 0 && totalAmt > 0 ? 'inline-flex' : 'none';
            };
            window.calcMonthlyTotal = function() { for(let i=0;i<10;i++) window.calcMonthlyTotalFor(i); };

            window.addMonthlyTuitionToBillFor = function(si) {
                let feeInput = document.querySelector('.monthly-fee-amt[data-sidx="'+si+'"]');
                let studentName = feeInput?.dataset.student || '';
                let cls = feeInput?.dataset.cls || '';
                let tuitionFee = parseFloat(feeInput?.value) || 0;
                let checkedBoxes = Array.from(document.querySelectorAll('.monthly-fee-month-s'+si+':checked'));
                let checked = checkedBoxes.map(cb => cb.value);
                if(!checked.length) { showPopup('Month select karein!', false); return; }
                let tbody = document.getElementById('billingBody');
                let addedRow = document.getElementById('addedItemsRows');
                // Tuition fees ek row mein (sabhi checked months ke liye), aur agar kisi
                // checked month mein exam fee hai to woh alag row mein — taaki bill par
                // calculation clearly tuition vs exam mein dikhe.
                let tuitionTotal = tuitionFee * checked.length;
                if(tuitionTotal > 0) {
                    let label = (studentName ? studentName + ' - ' : '') + 'Tuition Fees (' + checked.join(', ') + ')';
                    let newRow = document.createElement('tr');
                    newRow.innerHTML = `
                        <td style="padding:8px;">${label} <button onclick="this.closest('tr').remove();recalcBilling();calculateGrandTotalBilling();" style="background:#ef4444;border:none;color:white;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:12px;margin-left:6px;">×</button></td>
                        <td><input type="number" class="billing-input" value="${tuitionFee}" style="width:100%;padding:8px;border:1px solid #e0e0e0;border-radius:8px;background:#f9f9f9;" readonly onchange="recalcBilling();calculateGrandTotalBilling();"></td>
                        <td><input type="number" class="billing-qty" value="${checked.length}" min="1" style="width:60px;padding:8px;border:1px solid #e0e0e0;border-radius:8px;background:#f9f9f9;" readonly onchange="recalcBilling();calculateGrandTotalBilling();"></td>
                        <td class="billing-row-total">₹${tuitionTotal}</td>
                        <td><input type="checkbox" class="billing-delete-check" style="width:18px;height:18px;cursor:pointer;display:none;"></td>`;
                    if(addedRow) tbody.insertBefore(newRow, addedRow); else tbody.appendChild(newRow);
                }
                checkedBoxes.forEach(cb => {
                    let mi = parseInt(cb.dataset.monthidx);
                    let examFee = getExamFeeForMonth(cls, mi);
                    if(examFee > 0) {
                        let examLabel = (studentName ? studentName + ' - ' : '') + 'Exam Fees (' + cb.value + ')';
                        let examRow = document.createElement('tr');
                        examRow.innerHTML = `
                            <td style="padding:8px;">${examLabel} <button onclick="this.closest('tr').remove();recalcBilling();calculateGrandTotalBilling();" style="background:#ef4444;border:none;color:white;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:12px;margin-left:6px;">×</button></td>
                            <td><input type="number" class="billing-input" value="${examFee}" style="width:100%;padding:8px;border:1px solid #e0e0e0;border-radius:8px;background:#f9f9f9;" readonly onchange="recalcBilling();calculateGrandTotalBilling();"></td>
                            <td><input type="number" class="billing-qty" value="1" min="1" style="width:60px;padding:8px;border:1px solid #e0e0e0;border-radius:8px;background:#f9f9f9;" readonly onchange="recalcBilling();calculateGrandTotalBilling();"></td>
                            <td class="billing-row-total">₹${examFee}</td>
                            <td><input type="checkbox" class="billing-delete-check" style="width:18px;height:18px;cursor:pointer;display:none;"></td>`;
                        if(addedRow) tbody.insertBefore(examRow, addedRow); else tbody.appendChild(examRow);
                    }
                });
                document.querySelectorAll('.monthly-fee-month-s'+si).forEach(cb => cb.checked = false);
                window.calcMonthlyTotalFor(si);
                recalcBilling();
                calculateGrandTotalBilling();
                showPopup('✅ Fees added!');
                markUnsaved();
            };
            window.addMonthlyTuitionToBill = function() { window.addMonthlyTuitionToBillFor(0); };

            window.applyBillingDiscount = function() {
                let grandRaw = parseFloat(document.getElementById('bilGrandTotal').textContent.replace('₹','')) || 0;
                let disc = parseFloat(document.getElementById('bilDiscount').value) || 0;
                let finalTotal = Math.max(0, grandRaw - disc);
                document.getElementById('bilFinalTotal').textContent = '₹' + finalTotal;
                calcBillingBalance();
                markUnsaved();
            };

            window.calcBillingBalance = function() {
                let finalTotal = parseFloat(document.getElementById('bilFinalTotal').textContent.replace('₹','')) || 0;
                let submitted = parseFloat(document.getElementById('bilSubmitted').value) || 0;
                let balance = Math.max(0, finalTotal - submitted);
                document.getElementById('bilBalance').textContent = '₹' + balance;
                markUnsaved();
            };

            window.saveBillingSummary = function() {
                billingSaved = true;
                let rows = [];
                document.querySelectorAll('#billingTable tbody tr').forEach(row => {
                    let nameCell = row.cells[0];
                    let priceCell = row.querySelector('.billing-input');
                    let qtyCell = row.querySelector('.billing-qty');
                    let totalCell = row.querySelector('.billing-row-total');
                    if(nameCell && totalCell) {
                        rows.push({
                            name: nameCell.textContent.trim().replace('×','').trim(),
                            price: priceCell ? priceCell.value : '',
                            qty: qtyCell ? qtyCell.value : 1,
                            total: totalCell.textContent
                        });
                    }
                });
                // Deduct saved billing items from inventory
                if(window._inventoryData && window._inventoryData.length > 0) {
                    let invChanged = false;
                    rows.forEach(row => {
                        let itemName = (row.name||'').toLowerCase().trim();
                        let itemQty = parseInt(row.qty) || 1;
                        let invIdx = window._inventoryData.findIndex(inv => (inv.name||'').toLowerCase().trim() === itemName);
                        if(invIdx >= 0 && window._inventoryData[invIdx].qty > 0) {
                            window._inventoryData[invIdx].qty = Math.max(0, window._inventoryData[invIdx].qty - itemQty);
                            invChanged = true;
                        }
                    });
                    if(invChanged) {
                        fsSave('inventoryData', window._inventoryData);
                        localStorage.setItem('eRegister_inventory', JSON.stringify(window._inventoryData));
                    }
                }
                let grandTotalRaw = parseFloat((document.getElementById('bilGrandTotal')?.textContent||'0').replace('₹','')) || 0;
                let submittedRaw = parseFloat(document.getElementById('bilSubmitted')?.value || '0') || 0;
                let balanceRaw = parseFloat((document.getElementById('bilBalance')?.textContent||'0').replace('₹','')) || 0;
                let discountRaw = parseFloat(document.getElementById('bilDiscount')?.value || '0') || 0;
                let finalTotalRaw = parseFloat((document.getElementById('bilFinalTotal')?.textContent||'0').replace('₹','')) || 0;

                // Generate ADR number
                let adrNumber = getNextADRNumber();

                let saveData = {
                    admId: admId,
                    rows,
                    grandTotal: '₹' + grandTotalRaw,
                    discount: discountRaw,
                    finalTotal: '₹' + finalTotalRaw,
                    submitted: submittedRaw,
                    balance: '₹' + balanceRaw,
                    savedAt: new Date().toLocaleString(),
                    adrNumber: adrNumber
                };
                let allSaved = Object.assign({}, billingSaved);
                allSaved[admId] = saveData;
                billingSaved = allSaved; fsSave('billingSaved', billingSaved); localStorage.setItem('eRegister_billing_saved', JSON.stringify(allSaved));

                let admission = admissions.find(a => String(a.id) === String(admId));
                if(admission) {
                    let studentIds = [];
                    if(admission.type === 'single') {
                        studentIds.push(admission.id);
                    } else if(admission.type === 'family' || admission.type === 'double') {
                        (admission.students||[]).forEach(s => studentIds.push(admission.id + '_' + s.id));
                    }
                    let primaryId = studentIds[0];
                    if(primaryId) {
                        if(!paymentHistory[primaryId]) paymentHistory[primaryId] = [];
                        // Billing rows mein se Tuition Fees ke selected months extract karo
                        let admissionMonths = [];
                        rows.forEach(row => {
                            let match = (row.name || '').match(/Tuition Fees \(([^)]+)\)/i);
                            if(match) {
                                let ms = match[1].split(',').map(m => m.trim()).filter(Boolean);
                                ms.forEach(m => { if(!admissionMonths.includes(m)) admissionMonths.push(m); });
                            }
                        });
                        paymentHistory[primaryId].push({
                            date: new Date().toLocaleString(),
                            isAdmissionEntry: true,
                            contact: admission.contact || '',
                            totalAmount: finalTotalRaw,
                            submittedAmount: submittedRaw,
                            balance: balanceRaw,
                            months: admissionMonths,
                            fees: {},
                            amount: submittedRaw,
                            memberTotal: finalTotalRaw,
                            oldBalance: 0,
                            remark: 'Admission Entry',
                            receiptNo: adrNumber
                        });
                        fsSaveWithChecksum('paymentHistory', paymentHistory); localStorage.setItem('eRegister_payment_history', JSON.stringify(paymentHistory));
                    }
                }

                showPopup('✅ Billing saved successfully!');
                document.getElementById('saveBillingBtn').style.display = 'none';
                document.getElementById('printBillingBtn').style.display = 'inline-flex';
            };

            window.printBillingSummary = function() {
                let ps = printSettings;
                let bf = ps.billingFields || {};
                let d = admission;
                let studentHtml = '';
                if(d && d.type==='single') {
                    let rows=[];
                    if(bf.studentName!==false)   rows.push('<tr><td style="font-weight:600;padding:5px 8px;width:40%;color:#555;">Student Name</td><td style="padding:5px 8px;">'+(d.name||'')+'</td></tr>');
                    if(bf.studentClass!==false)   rows.push('<tr><td style="font-weight:600;padding:5px 8px;color:#555;">Class</td><td style="padding:5px 8px;">'+(d.newClass||'')+'</td></tr>');
                    if(bf.fatherName!==false)     rows.push('<tr><td style="font-weight:600;padding:5px 8px;color:#555;">Father\'s Name</td><td style="padding:5px 8px;">'+(d.fatherName||'N/A')+'</td></tr>');
                    if(bf.motherName!==false)     rows.push('<tr><td style="font-weight:600;padding:5px 8px;color:#555;">Mother\'s Name</td><td style="padding:5px 8px;">'+(d.motherName||'N/A')+'</td></tr>');

                    if(bf.contact!==false)        rows.push('<tr><td style="font-weight:600;padding:5px 8px;color:#555;">Contact</td><td style="padding:5px 8px;">'+(d.contact||'N/A')+'</td></tr>');
                    if(bf.gender!==false)         rows.push('<tr><td style="font-weight:600;padding:5px 8px;color:#555;">Gender</td><td style="padding:5px 8px;">'+(d.gender||'N/A')+'</td></tr>');

                    if(bf.address!==false)        rows.push('<tr><td style="font-weight:600;padding:5px 8px;color:#555;">Address</td><td style="padding:5px 8px;">'+(d.presentAddress||d.permanentAddress||'N/A')+'</td></tr>');
                    if(bf.prevSchool!==false)     rows.push('<tr><td style="font-weight:600;padding:5px 8px;color:#555;">Previous School</td><td style="padding:5px 8px;">'+(d.prevSchool||'N/A')+'</td></tr>');
                    if(bf.admissionDate!==false)  rows.push('<tr><td style="font-weight:600;padding:5px 8px;color:#555;">Admission Date</td><td style="padding:5px 8px;">'+(d.date||'')+'</td></tr>');
                    if(rows.length>0) studentHtml='<div style="margin-bottom:14px;"><div style="font-weight:700;font-size:12px;color:#667eea;margin-bottom:6px;border-bottom:1px solid #e0e0e0;padding-bottom:4px;">📋 Student Details</div><table style="border-collapse:collapse;width:100%;font-size:12px;"><tbody>'+rows.join('')+'</tbody></table></div>';
                } else if(d && (d.type==='family' || d.type==='double')) {
                    let members=(d.students||[]).map(s=>'<li style="padding:2px 0;"><strong>'+s.name+'</strong> — Class: '+(s.class||'')+'</li>').join('');
                    studentHtml='<div style="margin-bottom:14px;font-size:12px;"><strong>Family:</strong> '+(d.familyName||'')+'<ul style="margin:4px 0 0 16px;">'+members+'</ul></div>';
                }
                
                let bilTableEl=document.getElementById('billingTable');
                let bilTableClone=bilTableEl?bilTableEl.cloneNode(true):null;
                if(bilTableClone){
                    bilTableClone.querySelectorAll('button').forEach(btn=>btn.remove());
                    bilTableClone.querySelectorAll('input').forEach(inp=>{ let s=document.createElement('span'); s.textContent=inp.value||'0'; inp.replaceWith(s); });
                    bilTableClone.querySelectorAll('select').forEach(sel=>{ let s=document.createElement('span'); s.textContent=sel.options[sel.selectedIndex]?.text||''; sel.replaceWith(s); });
                    bilTableClone.querySelectorAll('tr').forEach(row=>{ let last=row.lastElementChild; if(last) last.remove(); });
                }
                let tableHtml = (bf.billingTable!==false && bilTableClone) ? bilTableClone.outerHTML : '';
                let grandTotal = document.getElementById('bilGrandTotal')?.textContent || '₹0';
                let discount   = document.getElementById('bilDiscount')?.value || '0';
                let finalTotal = document.getElementById('bilFinalTotal')?.textContent || '₹0';
                let submitted  = document.getElementById('bilSubmitted')?.value || '0';
                let balance    = document.getElementById('bilBalance')?.textContent || '₹0';
                
                // Get ADR number from saved data
                let adrNumber = '';
                let savedData = billingSaved[admId];
                if(savedData && savedData.adrNumber) adrNumber = savedData.adrNumber;
                if(!adrNumber) adrNumber = getNextADRNumber();

                let bRow = function(label, val, bold, color){
                    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #eee;">'
                        +'<span style="font-size:12px;">'+label+'</span>'
                        +'<span style="font-size:12px;font-weight:'+(bold?'700':'500')+';color:'+(color||'inherit')+';">'+val+'</span>'
                        +'</div>';
                };
                let billingBody = '<div style="margin:10mm;">'
                    + buildPrintHeader()
                    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">'
                    +   '<span style="font-size:14px;font-weight:800;color:#1a1a2e;">Admission Billing Summary</span>'
                    +   '<span style="font-size:10px;color:#888;">'+new Date().toLocaleDateString('en-IN')+'</span>'
                    + '</div>'
                    + (adrNumber ? '<div style="text-align:right;font-size:12px;font-weight:700;color:#dc2626;margin-bottom:6px;">Receipt: '+adrNumber+'</div>' : '')
                    + studentHtml
                    + (tableHtml ? '<div style="margin-bottom:10px;overflow-x:auto;">'+tableHtml+'</div>' : '')
                    + '<div style="margin-top:8px;border-top:2px solid #667eea;padding-top:8px;">'
                    + (bf.grandTotal!==false     ? bRow('Grand Total', grandTotal) : '')
                    + (bf.discount!==false       ? bRow('Discount', '&#8377;'+discount) : '')
                    + (bf.totalAmount!==false    ? bRow('Total Amount', finalTotal, true, '#059669') : '')
                    + (bf.submittedAmount!==false ? bRow('Submitted Amount', '&#8377;'+submitted) : '')
                    + (bf.balance!==false        ? bRow('Balance', balance, true, '#dc2626') : '')
                    + '</div>'
                    + '</div>';
                doPrint(billingBody);
            };

            // Auto-calculate grand total on initial load
            setTimeout(function() {
                if(typeof calculateGrandTotalBilling !== 'undefined') calculateGrandTotalBilling();
                else if(window.calculateGrandTotalBilling) window.calculateGrandTotalBilling();
            }, 80);
        }

                setTimeout(() => document.getElementById('newDressName').focus(), 100);

                let name = document.getElementById('newDressName').value.trim();
                let price = parseFloat(document.getElementById('newDressPrice').value) || 0;
                let size = document.getElementById('newDressSize').value.trim();
                if(!name) { showPopup('Dress name is required!', false); return; }
                admissionSettings.dresses = admissionSettings.dresses || [];

                document.getElementById('addDressPopup').style.display = 'none';

            window.deleteSelectedDresses = function() {
                let toDelete = [];
                document.querySelectorAll('.dress-del-check:checked').forEach(cb => toDelete.push(parseInt(cb.getAttribute('data-di'))));
                if(toDelete.length === 0) { showPopup('Select at least one dress to delete!', false); return; }

                admissionSettings.dresses = admissionSettings.dresses.filter((_, i) => !toDelete.includes(i));

                document.getElementById('deleteSelectedDressBtn').style.display = 'none';

                showPopup('✅ Deleted successfully!');

                showPopup('✅ Dress Settings saved successfully!');
                navigateTo(renderHome);
            };
        }

        // ==================== WALLPAPER SETTING ====================
        function renderWallpaperSetting() {
            const wallpapers = [
                { css:'linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%)', label:'Purple Glow' },
                { css:'linear-gradient(135deg, #f97316 0%, #ef4444 50%, #ec4899 100%)', label:'Sunset Blaze' },

                { css:'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)', label:'Dark Navy' }
            ];
            let gridHtml = wallpapers.map(w => {
                let isSelected = selectedWallpaper === w.css;
                return `<div onclick="applyWallpaper('${w.css}')" style="cursor:pointer;border-radius:16px;overflow:hidden;border:${isSelected?'4px solid #667eea':'3px solid transparent'};box-shadow:${isSelected?'0 0 0 3px #667eea':'0 2px 12px rgba(0,0,0,0.15)'};transition:all 0.2s;position:relative;">
                    <div style="width:100%;height:160px;background:${w.css};display:flex;align-items:center;justify-content:center;">
                        ${isSelected?`<div style="background:rgba(255,255,255,0.3);border-radius:50%;width:48px;height:48px;display:flex;align-items:center;justify-content:center;font-size:24px;"><i class='fas fa-check' style='color:white;'></i></div>`:'<i class="fas fa-image" style="color:rgba(255,255,255,0.5);font-size:36px;"></i>'}
                    </div>

                    <div style="padding:8px 10px;font-size:13px;font-weight:700;color:#333;background:white;text-align:center;">${w.label}</div>
                </div>`;
            }).join('');
            let noneSelected = !selectedWallpaper;

            <div style="margin-bottom:20px;"><button onclick="applyWallpaper('')" style="padding:10px 22px;border-radius:30px;border:${noneSelected?'3px solid #667eea':'2px solid #ccc'};background:${noneSelected?'linear-gradient(135deg,#667eea,#764ba2)':'white'};color:${noneSelected?'white':'#333'};font-weight:600;cursor:pointer;font-size:14px;"><i class="fas fa-times-circle"></i> No Wallpaper (Default)</button></div>
            <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px;">${gridHtml}</div>
            </div></div>${getOverlay()}</div>`;
        }

        function applyWallpaper(cssVal) {
            selectedWallpaper = cssVal;
            fsSave('selectedWallpaper', cssVal);
            localStorage.setItem('eRegister_wallpaper', cssVal);
            // Instantly apply to home-bg if visible
            let hbEl = document.querySelector('.home-bg');
            if(hbEl) hbEl.style.backgroundImage = cssVal || '';
            showPopup(cssVal ? '✅ Wallpaper applied successfully!' : '✅ Wallpaper removed.');
            renderWallpaperSetting();
        }
