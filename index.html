        document.addEventListener('contextmenu', function(e){
            e.preventDefault(); return false;
        });

        /* ── 3. KEYBOARD SHORTCUTS BLOCK ───────────────────────────────────
           F12, Ctrl+U, Ctrl+S, Ctrl+Shift+I/J/C, Ctrl+Shift+K (Firefox)    */
        document.addEventListener('keydown', function(e){
            var ctrl  = e.ctrlKey || e.metaKey;
            var shift = e.shiftKey;
            var key   = (e.key || '').toLowerCase();
            var code  = e.keyCode || e.which;

            /* F12 */
            if(code === 123){ e.preventDefault(); return false; }
            /* Ctrl+U (view-source), Ctrl+S (save page) */
            if(ctrl && (key === 'u' || key === 's')){ e.preventDefault(); return false; }
            /* Ctrl+Shift+I  Ctrl+Shift+J  Ctrl+Shift+C  Ctrl+Shift+K */
            if(ctrl && shift && (key === 'i' || key === 'j' || key === 'c' || key === 'k')){
                e.preventDefault(); return false;
            }
        }, true);

        /* ── 4. TEXT SELECTION DISABLE (inputs/textareas allowed) ──────── */
        document.addEventListener('selectstart', function(e){
            var t = e.target;
            if(t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA'
                     || t.isContentEditable)) return;
            e.preventDefault(); return false;
        });

        /* ── 5. DRAG DISABLE ────────────────────────────────────────────── */
        document.addEventListener('dragstart', function(e){
            e.preventDefault(); return false;
        });

        /* ── 6. DEVTOOLS DETECTION (size-based) ─────────────────────────── */
        var _devOpen = false;
        var _THRESH  = 180;
        function _checkDev(){
            var wDiff = window.outerWidth  - window.innerWidth;
            var hDiff = window.outerHeight - window.innerHeight;
            var open  = (wDiff > _THRESH || hDiff > _THRESH);
            if(open && !_devOpen){
                _devOpen = true;
                var el = document.getElementById('app') || document.body;
                el.style.filter        = 'blur(10px)';
                el.style.userSelect    = 'none';
                el.style.pointerEvents = 'none';
            } else if(!open && _devOpen){
                _devOpen = false;
                var el2 = document.getElementById('app') || document.body;
                el2.style.filter        = '';
                el2.style.userSelect    = '';
                el2.style.pointerEvents = '';
            }
        }
        setInterval(_checkDev, 900);

        /* ── 7. CONSOLE WATERMARK ───────────────────────────────────────── */
        setTimeout(function(){
            console.clear();
            console.log('%c⛔ STOP!', 'color:red;font-size:48px;font-weight:900;');

                'color:#667eea;font-size:16px;font-weight:700;',
                'color:#888;font-size:13px;'
            );
        }, 500);

    })();

        // Silently write a key-value pair to Firestore (does not block UI)
        function fsSave(field, value) {
            SCHOOL_DOC.set({ [field]: JSON.stringify(value) }, { merge: true })
                .catch(e => console.warn('Firestore write failed:', e));
        }

        // Load all school data from Firestore; returns a Promise<object>
        async function fsLoadAll() {
            try {

<body id="appBody">
    <div id="app"></div>

    <script>
        // ── Helper: parse a Firestore field (string) or fall back to localStorage ──
        function fsGet(fsData, fsKey, lsKey, defaultVal) {
            if(fsData && fsData[fsKey] !== undefined) {
                try { return JSON.parse(fsData[fsKey]); } catch(e) {}
            }
            let ls = localStorage.getItem(lsKey);
            if(ls) { try { return JSON.parse(ls); } catch(e) {} }
            return defaultVal;
        }

        // Stop App state (loaded from Firebase)
        let stopAppState = null;

        // Data Stores (populated by initAppData below)
        let users = [];
        let coAdmins = [];
        let rawCoinsMap = {}; // full per-user coins map {code: {startDate, addedCoins, ...}}
        let currentUser = JSON.parse(sessionStorage.getItem('eRegister_currentUser')) || null;
        let notifications = [];
        let admissions = [];
        let attendanceRecords = {};
        let teachers = [];
        let teacherAttendance = {};
        let examResults = {};
        
        // Fees Settings
        let feesColumns = ['Tuition Fees'];
        let feesData = {};
        let classFeesStructure = {};
        let editSettings = { balanceEditable: false };
        let paymentHistory = {};
        
        // Exam Fees - month-wise settings
        let examFeesMonthWise = {};
        
        // Items fees (Tie, Belt, Socks etc.)
        const defaultItemsList = ['Tie','Belt','Socks','I Card','Diary','Activity Charge','Entrance Test','Building Charge','Smart Class Charge','Registration'];
        let itemsFees = {};
        
        // Books fees per class
        let booksFees = {};
        
        // Admission Settings (charges + dress)
        let admissionSettings = { activityCharge: 0, entranceTest: 0, buildingCharge: 0, facultyCharge: 0, firstAidCharge: 0, smartClassCharge: 0, registrationCharge: 0, dresses: [] };

        // ── Load all data from Firestore (with localStorage fallback) ───────────
        async function initAppData() {
            // Show loading screen
            document.getElementById('app').innerHTML = `<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:20px;"><div style="width:60px;height:60px;border:5px solid rgba(255,255,255,0.3);border-top:5px solid white;border-radius:50%;animation:spin 1s linear infinite;"></div><p style="color:white;font-size:18px;font-weight:600;">Loading data...</p></div><style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;

            let fsData = await fsLoadAll();

            users             = fsGet(fsData, 'users',              'eRegister_users',              []);
            notifications     = fsGet(fsData, 'notifications',      null,                           []);
            admissions        = fsGet(fsData, 'admissions',         'eRegister_admissions',         []);
            attendanceRecords = fsGet(fsData, 'attendanceRecords',  'eRegister_attendance',         {});
            teachers          = fsGet(fsData, 'teachers',           'eRegister_teachers',           []);
            teacherAttendance = fsGet(fsData, 'teacherAttendance',  'eRegister_teacher_attendance', {});
            examResults       = fsGet(fsData, 'examResults',        'eRegister_exam_results',       {});
            feesColumns       = fsGet(fsData, 'feesColumns',        'eRegister_fees_columns',       ['Tuition Fees']);
            feesData          = fsGet(fsData, 'feesData',           'eRegister_fees_data',          {});
            classFeesStructure= fsGet(fsData, 'classFeesStructure', 'eRegister_class_fees',         {});
            editSettings      = fsGet(fsData, 'editSettings',       'eRegister_edit_settings',      { balanceEditable: false });
            // Point 6: paymentHistory ONLY from Firestore — localStorage is cache only, never source
            paymentHistory    = fsData && fsData['paymentHistory'] ? (() => { try { return JSON.parse(fsData['paymentHistory']); } catch(e) { return {}; } })() : {};
            examFeesMonthWise = fsGet(fsData, 'examFeesMonthWise',  'eRegister_exam_fees_monthwise',{});
            itemsFees         = fsGet(fsData, 'itemsFees',          'eRegister_items_fees',         {});
            booksFees         = fsGet(fsData, 'booksFees',          'eRegister_books_fees',         {});
            admissionSettings = fsGet(fsData, 'admissionSettings',  'eRegister_admission_settings', { activityCharge:0, entranceTest:0, buildingCharge:0, facultyCharge:0, firstAidCharge:0, smartClassCharge:0, registrationCharge:0, dresses:[] });
            extraFeeColumns   = fsGet(fsData, 'extraFeeColumns',    'eRegister_extra_fee_columns',  []);
            classList         = fsGet(fsData, 'classList',          'eRegister_class_list',         defaultClassList);
            freeStudentsList  = fsGet(fsData, 'freeStudentsList',   'eRegister_free_students',      {});
            billingSaved      = fsGet(fsData, 'billingSaved',       'eRegister_billing_saved',      {});
            coAdmins          = fsGet(fsData, 'coAdmins',           null,                           []);
            if(!Array.isArray(coAdmins)) coAdmins = [];

            defaultItemsList.forEach(item => { if(itemsFees[item] === undefined) itemsFees[item] = 0; });

            // ── Load coins — per-user format (keyed by admin code) ──────────────
            let savedCoinsRaw = fsGet(fsData, 'coins', 'eRegister_coins', null);
            function extractUserCoins(raw, code) {
                if(!raw) return null;
                // New per-user format: {code:{startDate,...}}
                if(raw[code] && typeof raw[code]==='object') return raw[code];
                // Old global format: {startDate,...}
                if(raw.startDate) return raw;
                return null;
            }
            if(savedCoinsRaw) {
                rawCoinsMap = savedCoinsRaw;
                // Store whole map — resolved per-user on login
                coinsData = savedCoinsRaw;
            } else {
                rawCoinsMap = {};
                coinsData = { startDate: Date.now(), addedCoins: 0 };
            }
            // Apply elapsed-day deductions now (works even if app wasn't opened)
            initCoinSystem();

            // ── Load Stop App state from Firebase ──────────────────────────────
            if(fsData && fsData['stopApp']) {
                try { stopAppState = JSON.parse(fsData['stopApp']); } catch(e) {}
            }

            // ── Real-time listener for Stop App changes ────────────────────────
            SCHOOL_DOC.onSnapshot(snap => {
                if(snap.exists()) {
                    let raw = snap.data();
                    // Update stop app state
                    if(raw.stopApp) { try { stopAppState = JSON.parse(raw.stopApp); } catch(e) {} }
                    else { stopAppState = null; }
                    // Update notifications in real-time
                    if(raw.notifications) { try { notifications = JSON.parse(raw.notifications); updateNotifBadge(); } catch(e) {} }
                    // Update coins in real-time (per-user map)
                    if(raw.coins) { try { const cm = JSON.parse(raw.coins); rawCoinsMap = cm; if(currentUser) { const uc=cm[currentUser.code]||cm; if(uc&&(uc.startDate||uc.addedCoins!==undefined)) coinsData=uc; } else { coinsData=cm; } } catch(e) {} }
                    // Update users in real-time (to get fresh block status)
                    if(raw.users) { try { users = JSON.parse(raw.users); } catch(e) {} }
                    // Update coAdmins in real-time
                    if(raw.coAdmins) { try { coAdmins = JSON.parse(raw.coAdmins); if(!Array.isArray(coAdmins)) coAdmins=[]; } catch(e) {} }

                    if(stopAppState && stopAppState.active && currentUser) {

                        renderLogin();

            if(!verifyChecksum(fsData, 'users'))      integrityWarn.push('users');
            if(!verifyChecksum(fsData, 'admissions')) integrityWarn.push('admissions');
            if(!verifyChecksum(fsData, 'paymentHistory')) integrityWarn.push('paymentHistory');
            if(integrityWarn.length > 0) {
                console.warn('[Security] Checksum mismatch for:', integrityWarn, '— Firebase data accepted (localStorage ignored)');
            }

            // Point 8: Session restore — if user was logged in, restart session timer
            // Also check if restored session user is now blocked
            if(currentUser) {

        // ── Point 5: XSS Sanitization ─────────────────────────────────────
        function sanitize(str) {
            if(!str && str !== 0) return '';
            return String(str)
                .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                .replace(/"/g,'&quot;').replace(/'/g,'&#x27;')
                .replace(/<script[\s\S]*?>/gi,'').replace(/<\/script>/gi,'')
                .replace(/javascript:/gi,'').replace(/on\w+\s*=/gi,'')
                .trim().substring(0, 200);
        }

        // ── Point 10: Input validation ────────────────────────────────────
        function validateName(name) {
            if(!name || name.trim().length < 2) return 'Naam kam se kam 2 characters ka hona chahiye';
            if(name.trim().length > 100) return 'Naam 100 characters se zyada nahi ho sakta';
            if(/<|>|script/i.test(name)) return 'Naam mein HTML/script allowed nahi';
            return null;
        }
        function validateContact(contact) {
            if(!contact) return 'Contact number required hai';
            let cleaned = contact.replace(/[\s\-\+]/g,'');
            if(!/^\d{10,12}$/.test(cleaned)) return 'Contact number 10-12 digits ka hona chahiye';
            return null;
        }
        function validateAmount(amount) {
            let num = parseFloat(amount);
            if(isNaN(num) || num < 0) return 'Amount negative nahi ho sakta';
            if(num > 1000000) return 'Amount bahut zyada hai (max ₹10,00,000)';
            return null;
        }

        // ── Point 9: Data integrity checksum ─────────────────────────────
        function simpleHash(obj) {
            try {
                let str = JSON.stringify(obj);
                let h = 0;
                for(let i = 0; i < str.length; i++) { h = Math.imul(31, h) + str.charCodeAt(i) | 0; }
                return (h >>> 0).toString(36);
            } catch(e) { return '0'; }
        }
        function fsSaveWithChecksum(field, value) {
            let checksum = simpleHash(value);
            SCHOOL_DOC.set({ [field]: JSON.stringify(value), [field + '_cs']: checksum }, { merge: true })
                .catch(e => console.warn('Firestore write failed:', e));
            localStorage.setItem('eRegister_' + field, JSON.stringify(value));
        }
        function verifyChecksum(fsData, field) {
            if(!fsData || !fsData[field]) return true; // no data = OK
            let storedCs = fsData[field + '_cs'];
            if(!storedCs) return true; // no checksum stored yet = OK
            try {
                let parsed = JSON.parse(fsData[field]);
                return simpleHash(parsed) === storedCs;
            } catch(e) { return false; }
        }

        function initCoinSystem() {
            if(!coinsData) coinsData = { startDate: Date.now(), addedCoins: 0 };
            // Migration from old format (count+lastTick) to new (startDate+addedCoins)
            if(coinsData.count !== undefined && coinsData.startDate === undefined) {
                let daysUsed = 30 - Math.max(0, coinsData.count);
                coinsData.startDate = Date.now() - (daysUsed * 86400000);
                coinsData.addedCoins = 0;
                delete coinsData.count;
                delete coinsData.lastTick;
                if(currentUser && currentUser.code) { _saveUserCoins(currentUser.code, coinsData); }

        function getCurrentCoins() {
            if(!coinsData || !coinsData.startDate) {
                if(currentUser && currentUser.trialStartDate) {
                    let d = Math.floor((Date.now() - currentUser.trialStartDate) / 86400000);
                    return Math.max(0, 7 - d);
                }
                return 7;
            }
            let daysSinceStart = Math.floor((Date.now() - coinsData.startDate) / 86400000);
            let added = coinsData.addedCoins || 0;
            if(coinsData.isTrial) return Math.max(0, 7 + added - daysSinceStart);
            return Math.max(0, 30 + added - daysSinceStart);
        }
        function addCoins(amount) {

                tableClone.querySelectorAll('input').forEach(inp=>{ let s=document.createElement('span'); s.textContent=inp.value||'0'; inp.replaceWith(s); });
                tableClone.querySelectorAll('select').forEach(sel=>{ let s=document.createElement('span'); s.textContent=sel.value||''; sel.replaceWith(s); });
                // Remove button cells (last column header + last td in each row)
                tableClone.querySelectorAll('th:last-child,td:last-child').forEach(el=>el.remove());
            }
            let tableHtml = (ff.table!==false && tableClone) ? tableClone.innerHTML : '';

            // ── Collect summary values ──
            let grandTotal     = document.getElementById('grandTotal')?.innerText || '0';
            let oldBalance     = document.getElementById('oldBalance')?.innerText || '0';
            let discount       = document.getElementById('discountAmount')?.value || '0';
            let afterDiscount  = document.getElementById('afterDiscount')?.innerText || '0';
            let submittedAmt   = document.getElementById('submittedAmount')?.value || '0';
            let balance        = document.getElementById('balanceAmount')?.innerText || '0';
            let remark         = document.getElementById('remarkText')?.value || '';

            // ── Months: get tags from the month container ──
            let monthEls = document.querySelectorAll('#selectedMonthsContainer .month-tag, #selectedMonthsContainer span, #selectedMonthsContainer .tag');
            let monthNames = [];
            monthEls.forEach(el => { let t=el.innerText||el.textContent; if(t&&t.trim()) monthNames.push(t.trim()); });
            if(!monthNames.length){
                let raw = document.getElementById('selectedMonthsContainer')?.innerText||'';
                if(raw.trim()) monthNames = raw.split(/[,\n]+/).map(s=>s.trim()).filter(Boolean);
            }
            let monthsRow = (ff.months!==false && monthNames.length)
                ? '<tr style="background:#eef2ff;"><td colspan="10" style="padding:5px 8px;font-weight:700;font-size:11px;color:#667eea;border:1px solid #ccc;">Months: '+monthNames.join(' &nbsp;|&nbsp; ')+'</td></tr>'
                : '';

            // ── Build totals block ──
            let totals = '';
            let tRow = function(label, val, bold, color){ return '<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid #eee;">'+'<span style="font-size:11px;">'+label+'</span>'+'<span style="font-size:11px;font-weight:'+(bold?'700':'500')+';color:'+(color||'inherit')+';">'+val+'</span>'+'</div>'; };
            if(ff.oldBalance!==false)      totals += tRow('Old Balance', oldBalance);
            if(ff.grandTotal!==false)      totals += tRow('Grand Total', grandTotal);
            if(ff.discount!==false)        totals += tRow('Discount', '&#8377;'+discount);
            if(ff.afterDiscount!==false)   totals += tRow('After Discount', afterDiscount);
            if(ff.submittedAmount!==false) totals += tRow('Submitted Amount', '&#8377;'+submittedAmt);
            if(ff.balance!==false)         totals += tRow('Balance', balance, true, '#dc2626');

            // ── Content inside the card ──
            let cardBody = buildPrintHeader()
                + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">'
                +   '<span style="font-size:13px;font-weight:800;color:#1a1a2e;">Fees Card</span>'
                +   '<span style="font-size:10px;color:#888;">'+new Date().toLocaleDateString('en-IN')+'</span>'
                + '</div>'
                + (ff.table!==false && tableHtml ? '<table style="margin-bottom:0;"><thead>'+monthsRow+'</thead><tbody>'+tableHtml+'</tbody></table>' : '')
                + '<div style="margin-top:8px;">' + totals + '</div>'
                + (ff.remark!==false && remark ? '<div style="margin-top:6px;font-size:10px;color:#555;"><strong>Remark:</strong> '+remark+'</div>' : '')
                + (ff.dateTime!==false ? '<div style="margin-top:4px;font-size:9px;color:#aaa;text-align:right;">Printed: '+new Date().toLocaleString('en-IN')+'</div>' : '');

            // ── Wrap in half-page bordered box OR full-page wrapper ──
            let bodyHtml, pageStyle;
            if(isHalf){
                // A4 = 297mm tall. Half = 148.5mm. With 5mm body padding each side → inner height ~ 138mm
                pageStyle = '';
                bodyHtml = '<div style="margin:5mm;border:1.5px solid #667eea;padding:6mm;height:133mm;box-sizing:border-box;overflow:hidden;">'
                    + cardBody
                    + '</div>';
            } else {
                pageStyle = '';
                bodyHtml = '<div style="margin:10mm;">' + cardBody + '</div>';
            }
            doPrint(bodyHtml, pageStyle);
        }

        function handleCoAdminLogin() {
            if(stopAppState && stopAppState.active) {
                let e=document.getElementById('loginError'); if(e){e.innerHTML='🔴 App is under maintenance.';e.classList.remove('hidden');}
                return;
            }
            const code = (document.getElementById('loginCode').value||'').trim();
            const pwd = (document.getElementById('caLoginPassword').value||'');
            const ca = coAdmins.find(x => x.code === code);
            if(!ca) { let e=document.getElementById('loginError');e.innerHTML='❌ Co-admin nahi mila!';e.classList.remove('hidden');return; }
            if(ca.blocked) { let e=document.getElementById('loginError');e.innerHTML='⚠️ Account blocked hai.';e.classList.remove('hidden');return; }
            if(ca.password !== pwd) { let e=document.getElementById('loginError');e.innerHTML='❌ Password galat hai!';e.classList.remove('hidden');return; }
            // Co-admin uses admin's account data — find parent admin
            const adminUser = users.find(u => u.code === ca.adminCode);
            if(!adminUser) { let e=document.getElementById('loginError');e.innerHTML='❌ Parent admin nahi mila!';e.classList.remove('hidden');return; }
            // Log in as co-admin with a composite user object
            const coAdminUser = { ...adminUser, name: ca.name, code: ca.code, designation: 'Co-Admin', isCoAdmin: true, adminCode: ca.adminCode, databaseName: ca.databaseName };
            currentUser = coAdminUser;
            sessionStorage.setItem('eRegister_currentUser', JSON.stringify(coAdminUser));
            // Load admin's coins
            const cm = coinsData;
            if(cm && cm[adminUser.code]) coinsData = cm[adminUser.code];
            else if(cm && cm.startDate) coinsData = cm;
            setupSessionTimeout();
            navigateTo(renderHome);
        }

        function handleLogin() {
            // Block login if Stop App is active
            if(stopAppState && stopAppState.active) {
                let e = document.getElementById('loginError');
                if(e) { e.innerHTML = '🔴 App is under maintenance. Please try again later.'; e.classList.remove('hidden'); }
                return;
            }
            const code = (document.getElementById('loginCode').value||'').trim();
            const pwd = document.getElementById('loginPassword').value;
            const dbInput = (document.getElementById('loginDatabase').value||'').trim().toUpperCase();
            // Find user matching code + password
            let user = users.find(u => u.code === code && u.password === pwd);
            // If database name entered, also verify it matches
            if(user && dbInput) {
                const userDb = (user.databaseName||user.organisation||'').toUpperCase();
                if(userDb && userDb !== dbInput) {
                    let e=document.getElementById('loginError');
                    e.innerHTML='❌ Database name match nahi kiya! Sahi database name daalo.';
                    e.classList.remove('hidden');
                    return;
                }
            }
            if(user){ 
                if(user.blocked) {
                    let e=document.getElementById('loginError');
                    e.style.background='#fee2e2'; e.style.color='#dc2626'; e.style.border='1px solid #fca5a5';
                    e.innerHTML='⚠️ Server Error. Please try again later.';
                    e.classList.remove('hidden');
                    return;
                }
                currentUser=user;
                sessionStorage.setItem('eRegister_currentUser', JSON.stringify(user));
                setupSessionTimeout();
                // Resolve per-user coins for this user from rawCoinsMap
                if(rawCoinsMap && rawCoinsMap[user.code]) {
                    coinsData = rawCoinsMap[user.code];
                } else if(rawCoinsMap && rawCoinsMap.startDate) {
                    // Old global format — adopt it as this user's coins
                    coinsData = rawCoinsMap;
                    _saveUserCoins(user.code, coinsData);
                }
                // Initialize trial coins for new users on first login
                if(user.isNewUser && (!coinsData || !coinsData.isTrial)) {
                    coinsData = { startDate: user.trialStartDate || Date.now(), addedCoins: 0, isTrial: true };
                    _saveUserCoins(user.code, coinsData);
                }
                navigateTo(renderHome);
                // Welcome popup for new users (first login after signup)
                if(user.isNewUser) {
                    setTimeout(() => showWelcomePopup(), 2000);
                }
            } else { 
                let e=document.getElementById('loginError'); 
                e.innerHTML='❌ Invalid code, password, or database name!'; 
                e.classList.remove('hidden'); 
            } 
        }

        // Save coins for a specific user (per-user coins map)
        function _saveUserCoins(code, coinsObj) {
            if(!code) return;
            rawCoinsMap = Object.assign({}, rawCoinsMap, {[code]: coinsObj});
            fsSave('coins', rawCoinsMap);
            localStorage.setItem('eRegister_coins', JSON.stringify(coinsObj));
        }

            if(!currentUser) return;

            if(idx >= 0) { notifications[idx].read = true; fsSave('notifications', notifications); }
            let overlay = document.createElement('div');
            overlay.className = 'popup-controller-msg';

        function isTrialExpired() {
            if(!currentUser || !currentUser.trialStartDate) return false;
            return (Date.now() - currentUser.trialStartDate) > (7 * 24 * 60 * 60 * 1000);
        }

        function getTrialDaysLeft() {
            if(!currentUser || !currentUser.trialStartDate) return 7;
            let elapsed = Math.floor((Date.now() - currentUser.trialStartDate) / (24 * 60 * 60 * 1000));
            return Math.max(0, 7 - elapsed);
        }

        function handleSignup() {
            let org = (document.getElementById('signupOrg').value||'').trim().toUpperCase();
            let n   = document.getElementById('signupName').value.trim();
            let d   = document.getElementById('signupDesignation').value;
            let c   = document.getElementById('signupCode').value.trim();
            let p   = document.getElementById('signupPassword').value;
            let cp  = document.getElementById('signupConfirmPassword').value;
            let err = document.getElementById('signupError');
            function showErr(msg) { err.innerHTML = '❌ ' + msg; err.classList.remove('hidden'); err.style.display='block'; }
            err.classList.add('hidden'); err.style.display='none';
            if(!org) { showErr('Database Name is required!'); return; }
            // Validate format: e.g. SANSKAR6709@ABC  (letters+4digits @ 3letters)
            if(!/^[A-Z]+[0-9]{4}@[A-Z]{3}$/.test(org)) {
                showErr('Invalid Database Name format!<br><small>Format: LETTERS+4DIGITS@3LETTERS &nbsp; e.g. SCHOOL1234@ABC</small>');
                return;
            }
            if(!n)   { showErr('Full Name is required!'); return; }
            if(!d)   { showErr('Please select a Designation!'); return; }
            if(!c || c.length !== 6) { showErr('6-Digit Code must be exactly 6 digits!'); return; }
            if(users.find(u => u.code === c)) { showErr('This 6-digit code is already taken! Please choose a different code.'); return; }
            if(coAdmins.find(ca => ca.code === c)) { showErr('This 6-digit code is already taken by a co-admin!'); return; }
            if(p.length < 4) { showErr('Password must be at least 4 characters!'); return; }
            if(p !== cp) { showErr('Passwords do not match! Please re-enter.'); return; }
            users.push({ name: n, organisation: org, databaseName: org, designation: d, code: c, password: p, trialStartDate: Date.now(), isNewUser: true });
            saveUsers();
            let s = document.getElementById('signupSuccess');
            s.innerHTML = '✅ Account created successfully! Redirecting to login...';
            s.classList.remove('hidden'); s.style.display='block';
            setTimeout(() => renderLogin(), 2000);
        }

        // Excel Backup Function with Progress Bar Animation
        function startExcelBackup() {
            let btn = document.getElementById('startBackupBtn');
            let progressBar = document.getElementById('backupProgressBar');
            let progressFill = document.getElementById('backupProgressFill');
            let progressPercent = document.getElementById('progressPercent');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Backup...';
            progressBar.style.display = 'block';
            progressFill.style.width = '0%';
            progressPercent.innerHTML = '0%';
            
            // Animate progress from 0 to 100 over 1.5 seconds
            let width = 0;
            let interval = setInterval(() => {
                width += 5;
                progressFill.style.width = width + '%';
                progressPercent.innerHTML = width + '%';
                if(width >= 100) {
                    clearInterval(interval);
                    // Actually create and download Excel file
                    generateExcelAndDownload();
                }
            }, 75);
            
            function generateExcelAndDownload() {
                try {
                    // Create workbook
                    const workbook = XLSX.utils.book_new();
                    
                    // Sheet 1: Students
                    const students = getAllStudents();
                    const studentsData = [
                        ['Roll No', 'Student Name', 'Father Name', 'Class', 'Contact', 'Type', 'Family ID']
                    ];
                    students.forEach(s => {
                        studentsData.push([s.rollNo, s.name, s.fatherName || 'N/A', s.className, s.contact, s.type, s.familyId || '']);
                    });
                    const studentsSheet = XLSX.utils.aoa_to_sheet(studentsData);
                    XLSX.utils.book_append_sheet(workbook, studentsSheet, 'Students');
                    
                    // Sheet 2: Teachers
                    const teachersData = [['Name', 'Father Name', 'Contact', 'Gender', 'Qualification']];
                    teachers.forEach(t => {
                        teachersData.push([t.name, t.fatherName || 'N/A', t.contact, t.gender || 'N/A', t.qualification || 'N/A']);
                    });
                    const teachersSheet = XLSX.utils.aoa_to_sheet(teachersData);
                    XLSX.utils.book_append_sheet(workbook, teachersSheet, 'Teachers');
                    
                    // Sheet 3: Fees Structure
                    const feesDataRows = [['Class', 'Tuition Fees', 'Exam Fees', ...extraFeeColumns.map(c => c.name)]];
                    classList.forEach(className => {
                        const fees = classFeesStructure[className] || { tuitionFees: 0, examFees: 0, extraFees: {} };
                        const row = [className, fees.tuitionFees, fees.examFees];
                        extraFeeColumns.forEach(col => {
                            row.push(fees.extraFees?.[col.name] || 0);
                        });
                        feesDataRows.push(row);
                    });
                    const feesSheet = XLSX.utils.aoa_to_sheet(feesDataRows);
                    XLSX.utils.book_append_sheet(workbook, feesSheet, 'Fees Structure');
                    
                    // Sheet 4: Attendance Summary (last 30 days)
                    const attendanceData = [['Student Name', 'Last 30 Days Present', 'Last 30 Days Absent', 'Total Present', 'Total Absent']];
                    const todayStr = new Date().toISOString().split('T')[0];
                    students.forEach(s => {
                        let key = s.name.replace(/\s/g, '_');
                        let records = attendanceRecords[key] || {};
                        let last30Present = 0, last30Absent = 0, totalPresent = 0, totalAbsent = 0;
                        Object.keys(records).forEach(dateStr => {
                            if(records[dateStr] === 'present') totalPresent++;
                            if(records[dateStr] === 'absent' || records[dateStr] === 'half') totalAbsent++;
                            // Check if within last 30 days
                            let dateDiff = (new Date(todayStr) - new Date(dateStr)) / (1000 * 3600 * 24);
                            if(dateDiff <= 30 && dateDiff >= 0) {
                                if(records[dateStr] === 'present') last30Present++;
                                if(records[dateStr] === 'absent' || records[dateStr] === 'half') last30Absent++;
                            }
                        });
                        attendanceData.push([s.name, last30Present, last30Absent, totalPresent, totalAbsent]);
                    });
                    const attendanceSheet = XLSX.utils.aoa_to_sheet(attendanceData);
                    XLSX.utils.book_append_sheet(workbook, attendanceSheet, 'Attendance');
                    
                    // Sheet 5: Payment History Summary
                    const paymentData = [['Student Name', 'Total Payments', 'Total Amount Paid', 'Last Payment Date']];
                    students.forEach(s => {
                        let history = paymentHistory[s.id] || [];
                        let totalPaid = history.reduce((sum, h) => sum + (h.submittedAmount || h.amount || 0), 0);
                        let lastDate = history.length > 0 ? history[history.length - 1].date : 'N/A';
                        paymentData.push([s.name, history.length, totalPaid, lastDate]);
                    });
                    const paymentSheet = XLSX.utils.aoa_to_sheet(paymentData);
                    XLSX.utils.book_append_sheet(workbook, paymentSheet, 'Payment Summary');
                    
                    // Sheet 6: JSON Backup Data (for restore)
                    const jsonBackup = {
                        exportDate: new Date().toLocaleString(),
                        version: '1.0',
                        admissions, teachers, attendanceRecords, paymentHistory, 
                        examResults, classFeesStructure, feesData, feesColumns,
                        classList, itemsFees, booksFees, admissionSettings, extraFeeColumns,
                        freeStudentsList, billingSaved, editSettings, examFeesMonthWise
                    };
                    const jsonStr = JSON.stringify(jsonBackup, null, 2);
                    const jsonSheetData = [['JSON Backup Data - For Restore Only'], ['==================='], [jsonStr]];
                    const jsonSheet = XLSX.utils.aoa_to_sheet(jsonSheetData);
                    XLSX.utils.book_append_sheet(workbook, jsonSheet, 'JSON_Backup');
                    
                    // Download Excel file
                    const fileName = `eRegister_Backup_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.xlsx`;
                    XLSX.writeFile(workbook, fileName);
                    
                    // Also save JSON backup separately for easy restore
                    const jsonBlob = new Blob([jsonStr], { type: 'application/json' });
                    const jsonUrl = URL.createObjectURL(jsonBlob);
                    const jsonA = document.createElement('a');
                    jsonA.href = jsonUrl;
                    jsonA.download = `eRegister_Backup_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
                    jsonA.click();
                    URL.revokeObjectURL(jsonUrl);
                    
                    showPopup('✅ Backup completed! Excel and JSON files downloaded.', true);
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-download"></i> Start Excel Backup';
                    setTimeout(() => {
                        progressBar.style.display = 'none';
                        progressFill.style.width = '0%';
                        progressPercent.innerHTML = '';
                    }, 2000);
                } catch(err) {
                    console.error('Backup error:', err);
                    showPopup('❌ Backup failed: ' + err.message, false);
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-download"></i> Start Excel Backup';
                    progressBar.style.display = 'none';
                }
            }
        }
        
        // Restore from JSON
        function handleRestoreFromJSON() {
            const fileInput = document.getElementById('restoreFileInput');
            if(!fileInput.files.length) {
                showPopup('Please select a JSON backup file first!', false);
                return;
            }
            if(!confirm('⚠️ WARNING: This will replace ALL your current data (students, teachers, fees, attendance, payments). Are you absolutely sure?')) return;
            
            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    // Validate backup
                    if(!data.exportDate && !data.admissions) {
                        showPopup('❌ Invalid backup file format!', false);
                        return;
                    }
                    
                    // Restore all data
                    if(data.admissions) admissions = data.admissions;
                    if(data.teachers) teachers = data.teachers;
                    if(data.attendanceRecords) attendanceRecords = data.attendanceRecords;
                    if(data.paymentHistory) paymentHistory = data.paymentHistory;
                    if(data.examResults) examResults = data.examResults;
                    if(data.classFeesStructure) classFeesStructure = data.classFeesStructure;
                    if(data.feesData) feesData = data.feesData;
                    if(data.feesColumns) feesColumns = data.feesColumns;
                    if(data.classList) classList = data.classList;
                    if(data.itemsFees) itemsFees = data.itemsFees;
                    if(data.booksFees) booksFees = data.booksFees;
                    if(data.admissionSettings) admissionSettings = data.admissionSettings;
                    if(data.extraFeeColumns) extraFeeColumns = data.extraFeeColumns;
                    if(data.freeStudentsList) freeStudentsList = data.freeStudentsList;
                    if(data.billingSaved) billingSaved = data.billingSaved;
                    if(data.editSettings) editSettings = data.editSettings;
                    if(data.examFeesMonthWise) examFeesMonthWise = data.examFeesMonthWise;
                    
                    // Save to Firebase
                    saveAllToFirebase();
                    
                    showPopup('✅ Restore successful! Refreshing page...', true);
                    setTimeout(() => location.reload(), 2000);
                } catch(err) {
                    showPopup('❌ Error parsing backup file: ' + err.message, false);
                }
            };
            reader.readAsText(file);
        }

        // ==================== HISTORY PAGE ====================
        function renderHistoryPage(studentId, studentName) {
            let students = getAllStudents();
            let student = students.find(s => s.id == studentId);
            if(!student) return;
            
            let familyMembers = [];
            if(student.type === 'family') {
                familyMembers = students.filter(s => s.familyId === student.familyId);
            } else {
                familyMembers = [student];
            }
            
            // Build history table headers — #, Student, Date & Time, Month(s), fee columns, Exam Fees, Submitted Amount, Total, Remark
            let tableHeaders = '<th>#</th><th>Student Name</th><th>Date & Time</th><th>Month(s)</th>';
            feesColumns.forEach(col => { tableHeaders += `<th>${col}</th>`; });
            tableHeaders += '<th>Exam Fees</th><th>Old Balance</th><th>Total</th><th style="background:#10b981;">Submitted Amount</th><th>Remark</th>';
            
            function makeEditable(studentIdField, memberId) {
                let balanceSpan = document.getElementById(`balance_${memberId}`);
                if(balanceSpan) {
                    let currentBalance = balanceSpan.innerText.replace('₹', '');
                    let input = document.createElement('input');
                    input.type = 'number';
                    input.value = currentBalance;
                    input.className = 'inline-edit';
                    input.onblur = function() {
                        let newBalance = parseFloat(this.value) || 0;
                        if(paymentHistory[memberId] && paymentHistory[memberId].length > 0) {
                            paymentHistory[memberId][paymentHistory[memberId].length-1].balance = newBalance;
                        } else {
                            if(!paymentHistory[memberId]) paymentHistory[memberId] = [];
                            paymentHistory[memberId].push({ balance: newBalance, date: new Date().toLocaleString(), months: [], amount: 0 });
                        }
                        fsSaveWithChecksum('paymentHistory', paymentHistory); localStorage.setItem('eRegister_payment_history', JSON.stringify(paymentHistory));
                        balanceSpan.innerHTML = `₹${newBalance}`;
                        showPopup('✅ Balance updated successfully!');
                    };
                    balanceSpan.parentNode.replaceChild(input, balanceSpan);
                    input.focus();
                }
            }
            
            let historyHtml = `<div class="form-title"><i class="fas fa-history"></i> Transaction History</div>`;
            
            // Family card — list all members (name/class/roll only), then ONE balance section
            let isYellow = (m) => m.isFree === true;
            let primaryMember = familyMembers.find(m => !isYellow(m)) || familyMembers[0];
            let primaryHistory = paymentHistory[primaryMember?.id] || [];
            let lastBalance = primaryHistory.length > 0 ? primaryHistory[primaryHistory.length - 1].balance : 0;

            historyHtml += `<div class="family-history-card"><div class="family-members-list">`;
            familyMembers.forEach(member => {
                historyHtml += `<div class="family-member-row" style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0;">
                    <div>
                        <span><strong>${member.name}</strong> &nbsp;<span style="color:#555;font-size:13px;">(Class: ${member.className} | Roll: ${member.rollNo})</span></span>
                        <span style="display:inline-block;margin-left:12px;color:#667eea;font-size:13px;"><i class="fas fa-phone"></i> ${member.contact || 'N/A'}</span>
                    </div>
                    <img src="${img.classAttendanceLogo}" style="width:34px;height:34px;object-fit:contain;flex-shrink:0;">
                </div>`;
            });
            let editBtnHtml = editSettings.balanceEditable ? ('&nbsp;<button class="edit-icon-big" onclick="makeEditable(\'' + (primaryMember?.id) + '\', \'' + (primaryMember?.id) + '\')"><img src="' + img.editIcon + '"></button>') : '';
            historyHtml += `</div>
            <div style="margin-top:12px; padding:12px 16px; background:#fff3cd; border-radius:12px; display:flex; justify-content:space-between; align-items:center;">
                <span style="font-weight:700; color:#333;"><i class="fas fa-wallet"></i> Outstanding Balance:</span>
                <span>
                    <span id="balance_${primaryMember?.id}" class="old-balance-text" style="font-size:18px;">₹${lastBalance}</span>
                    ${editBtnHtml}
                </span>
            </div>`;
            
            // Collect all transactions from all members — include months and per-member fees
            let allTransactions = [];
            familyMembers.forEach(member => {
                let memberHistory = paymentHistory[member.id] || [];
                memberHistory.forEach(record => {
                    allTransactions.push({
                        memberName: member.name,
                        date: record.date,
                        months: record.months || [],
                        fees: record.fees || {},
                        submittedAmount: record.submittedAmount !== undefined ? record.submittedAmount : (record.amount || 0),
                        total: record.memberTotal !== undefined ? record.memberTotal : (record.amount || 0),
                        oldBalance: record.oldBalance || 0,
                        remark: record.remark || '',
                        isAdmissionEntry: record.isAdmissionEntry || false,
                        contact: record.contact || '',
                        totalAmount: record.totalAmount || 0
                    });
                });
            });
            
            // Sort by date descending
            allTransactions.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            if(allTransactions.length > 0) {
                historyHtml += `<div style="overflow-x:auto; margin-top:15px;">`;
                // Separate admission entries and fee entries
                let admissionEntries = allTransactions.filter(t => t.isAdmissionEntry);
                let feeEntries = allTransactions.filter(t => !t.isAdmissionEntry);

                // Show admission entries — ALL in ONE box for family
                if(admissionEntries.length > 0) {
                    // Group all admission entries into one combined box
                    let latestAdm = admissionEntries[0]; // most recent first (already sorted)
                    // Sum all submitted & total amounts across all admission entries for family
                    let combinedTotalAmount = admissionEntries.reduce((sum, t) => sum + (t.totalAmount || t.total || 0), 0);
                    let combinedSubmitted = admissionEntries.reduce((sum, t) => sum + (t.submittedAmount || 0), 0);
                    historyHtml += `<div style="margin-bottom:20px;">`;
                    historyHtml += `
                    <div style="background:linear-gradient(135deg,#e0e7ff,#f0fdf4);border:2px solid #667eea;border-radius:16px;padding:18px;margin-bottom:12px;">
                        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
                            <span style="background:#667eea;color:white;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:700;"><i class="fas fa-user-graduate"></i> ADMISSION ENTRY</span>
                            <span style="color:#888;font-size:13px;">${latestAdm.date}</span>
                        </div>
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:14px;">
                            <div><i class="fas fa-phone" style="color:#667eea;width:16px;"></i> <strong>Contact:</strong> ${latestAdm.contact || 'N/A'}</div>
                            <div><i class="fas fa-rupee-sign" style="color:#1a1a2e;width:16px;"></i> <strong>Total Amount:</strong> <span style="font-weight:700;color:#1a1a2e;">₹${combinedTotalAmount}</span></div>
                            <div><i class="fas fa-check-circle" style="color:#10b981;width:16px;"></i> <strong>Submitted:</strong> <span style="font-weight:700;color:#10b981;">₹${combinedSubmitted}</span></div>
                        </div>
                    </div>`;
                    historyHtml += `</div>`;
                }

                // Show regular fee entries in table — group by same date+months (family members combined)
                if(feeEntries.length > 0) {
                    historyHtml += `<div style="overflow-x:auto; margin-top:15px;"><table class="history-table"><thead></tr>${tableHeaders}</tr></thead><tbody>`;
                    // Group entries by date+month key so family members share one serial number
                    let groups = [];
                    feeEntries.forEach(trans => {
                        let key = trans.date + '|' + (trans.months||[]).join(',');
                        let existing = groups.find(g => g.key === key);
                        if(existing) {
                            existing.members.push(trans);
                        } else {
                            groups.push({ key, date: trans.date, months: trans.months, submittedAmount: trans.submittedAmount, remark: trans.remark, members: [trans] });
                        }
                    });
                    let serialNum = 1;
                    groups.forEach(group => {
                        let monthStr = group.months && group.months.length > 0 ? group.months.join(', ') : '-';
                        let rowCount = group.members.length;
                        // Calculate combined total for the group (free "everything" members count as 0)
                        let combinedTotal = group.members.reduce((sum, t) => {
                            let ms = getAllStudents().find(s => s.name === t.memberName);
                            let ft = ms ? getStudentFreeType(ms.id) : null;
                            if(ft && (ft === true || ft.everything)) return sum;
                            return sum + (t.total || 0);
                        }, 0);
                        group.members.forEach((trans, mIdx) => {
                            // Check if this member is currently "everything free"
                            let ms = getAllStudents().find(s => s.name === trans.memberName);
                            let ft = ms ? getStudentFreeType(ms.id) : null;
                            let isEverythingFree = ft && (ft === true || ft.everything);
                            let rowHtml = '';
                            if(mIdx === 0) {
                                rowHtml += `<td rowspan="${rowCount}" style="text-align:center;vertical-align:middle;font-weight:700;">${serialNum}</td>`;
                            }
                            rowHtml += `<td>${trans.memberName}</td><td>${trans.date}</td><td>${monthStr}</td>`;
                            feesColumns.forEach(col => {
                                let val = isEverythingFree ? 0 : (trans.fees[col] !== undefined ? trans.fees[col] : 0);
                                rowHtml += `<td>₹${val}</td>`;
                            });
                            let examFeeVal = isEverythingFree ? 0 : (trans.fees['Exam Fees'] !== undefined ? trans.fees['Exam Fees'] : (trans.examFees || 0));
                            let examCellStyle = examFeeVal > 0 ? 'background:#fff3cd; font-weight:600; color:#b45309;' : '';
                            rowHtml += '<td style="' + examCellStyle + '">₹' + examFeeVal + '</td>';
                            let oldBalVal = isEverythingFree ? 0 : (trans.oldBalance !== undefined ? trans.oldBalance : 0);
                            rowHtml += `<td>₹${oldBalVal}</td>`;
                            if(mIdx === 0) {
                                rowHtml += `<td rowspan="${rowCount}" style="vertical-align:middle;font-weight:700;">₹${combinedTotal}</td>`;
                                rowHtml += `<td rowspan="${rowCount}" style="background:#dcfce7; font-weight:600; color:#059669; vertical-align:middle;">₹${group.submittedAmount || 0}</td>`;
                                rowHtml += `<td rowspan="${rowCount}" style="vertical-align:middle;">${group.remark || ''}</td>`;
                            }
                            historyHtml += `<tr>${rowHtml}</tr>`;
                        });
                        serialNum++;
                    });
                    historyHtml += `</tbody></table></div>`;
                } else if(admissionEntries.length === 0) {
                    historyHtml += `<div style="margin-top:20px; color:#999; text-align:center;"><i class="fas fa-inbox"></i><br>No payment history found</div>`;
                }
                historyHtml += `</div>`;
            } else {
                historyHtml += `<div style="margin-top:20px; color:#999; text-align:center;"><i class="fas fa-inbox"></i><br>No payment history found</div>`;
            }
            
            document.getElementById('app').innerHTML = `<div class="inner-bg"><div class="sticky-header">${getHeader('Transaction History', true)}</div><div class="inner-container"><div class="form-card">${historyHtml}</div></div>${getOverlay()}</div>`;
            window.makeEditable = makeEditable;
        }

                        <select id="freeStudentClassFilter" onchange="searchFreeStudent()" style="padding:12px 16px;border:2px solid #e0e0e0;border-radius:50px;font-size:14px;background:white;cursor:pointer;">

        // ==================== FEES STRUCTURE PAGE ====================
        // extraFeeColumns loaded in initAppData
        
        function renderFeesStructure() {
            function renderStructureTable() {
                // ---- Section 1+2+4 combined: Class | Tuition | ExtraFees | Exam Fees (with month picker) | Books ----
                let tableHtml = '';

                // ---- Section 2 & 4: Exam Fees + Books Fees as compact vertical columns beside Tuition ----
                // We extend the main table to add Exam Fees (with month slider) and Books Fees columns
                // Rebuild main table with all 3 vertical columns: Tuition | Exam Fees (with month picker) | Books Price
                tableHtml = `<div class="header-buttons" style="justify-content: space-between; margin-bottom: 20px;">
                    <h3>Class-wise Fees Structure</h3>
                    <div>
                        <button class="plus-icon-big" onclick="openAddColumnModal()"><img src="${img.plusIcon}"></button>
                        <button class="delete-icon-big" onclick="openDeleteColumnModal()"><img src="${img.deleteIcon}"></button>
                    </div>
                </div>
                <div style="overflow-x:auto;">
                <table class="fees-structure-table">
                    <thead><tr>
                        <th style="background:#5b6af0; min-width:120px;">Class</th>
                        <th style="background:#5b6af0; min-width:130px;">Tuition Fees</th>`;
                extraFeeColumns.forEach(col => { tableHtml += `<th style="background:#5b6af0;">${col.name}</th>`; });
                tableHtml += `
                        <th style="background:#f59e0b; min-width:200px;">
                            <div style="display:flex; align-items:center; justify-content:center; gap:6px;">
                                <i class="fas fa-calendar-check"></i> Exam Fees
                            </div>
                            <div style="font-size:10px; font-weight:400; margin-top:3px; opacity:0.9;">Amount | Month Select →</div>
                        </th>
                        <th style="background:#10b981; min-width:130px;">
                            <div style="display:flex; align-items:center; justify-content:center; gap:6px;">
                                <i class="fas fa-book"></i> Books Price
                            </div>
                            <div style="font-size:10px; font-weight:400; margin-top:3px; opacity:0.9;">(₹ per class)</div>
                        </th>
                    </tr></thead><tbody>`;

                classList.forEach(className => {
                    let fees = classFeesStructure[className] || { tuitionFees: 0, examFees: 0, extraFees: {} };
                    let classExam = examFeesMonthWise[className] || {};
                    // Exam fee amount: use first set value or 0
                    let examVals = Object.values(classExam);
                    let examAmt = examVals.length > 0 ? examVals[0] : 0;
                    let examAmtDisp = examAmt > 0 ? examAmt : '';
                    // Selected months for this class — check both string and number keys
                    let selMonths = Object.keys(classExam).map(Number);
                    // Month toggle button labels
                    let monthBtnsHtml = months.map((m, idx) => {
                        let active = selMonths.includes(idx);
                        return `<button type="button" onclick="toggleExamMonth('${className}',${idx},this)" 
                            style="padding:2px 6px; border-radius:10px; font-size:10px; border:1px solid #f59e0b; cursor:pointer; transition:0.2s;
                            background:${active ? '#f59e0b' : 'white'}; color:${active ? 'white' : '#b45309'}; margin:1px;">
                            ${m.substring(0,3)}</button>`;
                    }).join('');
                    // Books fee
                    let booksVal = booksFees[className] || 0;
                    let booksDisp = booksVal > 0 ? booksVal : '';
                    let booksBg = booksVal > 0 ? 'background:#dcfce7; font-weight:600;' : '';

                    tableHtml += `<tr>
                        <td style="font-weight:600;">${className}</td>
                        <td><input type="number" class="tuition-input" data-class="${className}" value="${fees.tuitionFees}" onchange="updateTuitionFees('${className}', this.value)"></td>`;
                    extraFeeColumns.forEach(col => {
                        let val = (fees.extraFees && fees.extraFees[col.name]) || 0;
                        tableHtml += `<td><input type="number" class="extra-input" data-class="${className}" data-col="${col.name}" value="${val}" onchange="updateExtraFees('${className}', '${col.name}', this.value)"></td>`;
                    });
                    tableHtml += `
                        <td style="background:#fffbeb; padding:8px;">
                            <div style="display:flex; align-items:center; gap:6px; margin-bottom:5px;">
                                <input type="number" min="0" placeholder="0" id="examAmt_${className}"
                                    style="width:80px; padding:5px 8px; border:1px solid #f59e0b; border-radius:8px; text-align:center; font-weight:600; color:#b45309;"
                                    value="${examAmtDisp}"
                                    onchange="updateExamAmtAllMonths('${className}', this.value)">
                                <span style="font-size:10px; color:#b45309;">₹</span>
                            </div>
                            <div id="examMonthBtns_${className}" style="display:flex; flex-wrap:wrap; gap:1px; max-width:200px;">
                                ${monthBtnsHtml}
                            </div>
                        </td>
                        <td style="background:#f0fdf4;">
                            <input type="number" min="0" placeholder="0" 
                                style="width:100px; padding:5px 8px; border:1px solid #10b981; border-radius:8px; text-align:center; ${booksBg}"
                                value="${booksDisp}"
                                onchange="updateBooksFee('${className}', this.value, this)">
                        </td>
                    </tr>`;
                });
                tableHtml += `</tbody></table></div>`;

                // ---- Section 3: Items Fees (Tie, Belt etc.) ----
                tableHtml += `
                <div style="margin-top:35px; border-top: 2px solid #e0e0e0; padding-top:25px;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                        <h3 style="color:#667eea;"><i class="fas fa-tags" style="color:#667eea;"></i> &nbsp;Items Fees</h3>
                        <button onclick="openAddItemModal()" style="background:none;border:none;cursor:pointer;padding:0;" title="Add new item">
                            <img src="https://i.ibb.co/BV26M7vb/plus-icon.png" style="width:38px;height:38px;">
                        </button>
                    </div>
                    <table class="fees-structure-table" style="max-width:560px; border-top:3px solid #667eea;" id="itemsFeesTable">
                        <thead><tr><th>Item</th><th style="width:180px;">Price (₹)</th><th style="width:90px; text-align:center;">Action</th></tr></thead>
                        <tbody id="itemsFeesBody">`;
                defaultItemsList.forEach(function(item) {
                    let val = itemsFees[item] || 0;
                    let dispVal = val > 0 ? val : '';
                    tableHtml += `<tr id="itemRow_${item.replace(/\s/g,'_')}">
                        <td id="itemName_${item.replace(/\s/g,'_')}" style="font-weight:500;">${item}</td>
                        <td><input type="number" min="0" placeholder="0" id="itemVal_${item.replace(/\s/g,'_')}" 
                            style="width:140px; padding:8px; border:1px solid #e0e0e0; border-radius:8px;" 
                            value="${dispVal}" onchange="updateItemFee('${item}', this.value)"></td>
                        <td style="text-align:center;">
                            <button onclick="startEditItem('${item}')" title="Edit item name" style="background:none;border:none;cursor:pointer;padding:2px;">
                                <img src="https://i.ibb.co/ymMx1nhZ/edit-icon.png" style="width:34px;height:34px;">
                            </button>
                        </td>
                    </tr>`;
                });
                tableHtml += `</tbody></table></div>
                
                <!-- Add Item Modal -->
                <div id="addItemModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1001; justify-content:center; align-items:center;">
                    <div style="background:white; border-radius:20px; padding:28px; width:340px; max-width:90%;">
                        <h3 style="margin-bottom:16px;"><i class="fas fa-plus-circle" style="color:#667eea;"></i> Add New Item</h3>
                        <div class="input-group">
                            <label>Item Name</label>
                            <input type="text" id="newItemNameInput" placeholder="e.g. Shoes, Lab Fee..." style="width:100%; padding:10px; border:2px solid #e0e0e0; border-radius:12px; font-size:14px;">
                        </div>
                        <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:16px;">
                            <button onclick="document.getElementById('addItemModal').style.display='none'" style="padding:10px 20px; border:none; border-radius:12px; background:#e0e0e0; cursor:pointer; font-weight:600;">Cancel</button>
                            <button onclick="submitNewItem()" style="padding:10px 20px; border:none; border-radius:12px; background:linear-gradient(135deg,#667eea,#764ba2); color:white; cursor:pointer; font-weight:600;">Add Item</button>
                        </div>
                    </div>
                </div>`;

                document.getElementById('structureTableContainer').innerHTML = tableHtml;
            }
            
            window.updateTuitionFees = (className, value) => {
                if(!classFeesStructure[className]) classFeesStructure[className] = { tuitionFees: 0, examFees: 0, extraFees: {} };
                classFeesStructure[className].tuitionFees = parseInt(value) || 0;
                fsSave('classFeesStructure', classFeesStructure); localStorage.setItem('eRegister_class_fees', JSON.stringify(classFeesStructure));
            };
            
            window.updateExamFees = (className, value) => {
                if(!classFeesStructure[className]) classFeesStructure[className] = { tuitionFees: 0, examFees: 0, extraFees: {} };
                classFeesStructure[className].examFees = parseInt(value) || 0;
                fsSave('classFeesStructure', classFeesStructure); localStorage.setItem('eRegister_class_fees', JSON.stringify(classFeesStructure));
            };
            
            window.updateExtraFees = (className, colName, value) => {
                if(!classFeesStructure[className]) classFeesStructure[className] = { tuitionFees: 0, examFees: 0, extraFees: {} };
                if(!classFeesStructure[className].extraFees) classFeesStructure[className].extraFees = {};
                classFeesStructure[className].extraFees[colName] = parseInt(value) || 0;
                fsSave('classFeesStructure', classFeesStructure); localStorage.setItem('eRegister_class_fees', JSON.stringify(classFeesStructure));
            };
            
            window.updateExamMonthFee = (className, monthIdx, value, el) => {
                if(!examFeesMonthWise[className]) examFeesMonthWise[className] = {};
                let val = parseInt(value) || 0;
                if(val > 0) examFeesMonthWise[className][monthIdx] = val;
                else delete examFeesMonthWise[className][monthIdx];
                fsSave('examFeesMonthWise', examFeesMonthWise); localStorage.setItem('eRegister_exam_fees_monthwise', JSON.stringify(examFeesMonthWise));
                if(el) { el.style.background = val > 0 ? '#fff3cd' : ''; el.style.fontWeight = val > 0 ? '600' : ''; }
            };
            
            // New: toggle a month button on/off for exam fees
            window.toggleExamMonth = (className, monthIdx, btn) => {
                if(!examFeesMonthWise[className]) examFeesMonthWise[className] = {};
                let amtInput = document.getElementById('examAmt_' + className);
                let amt = amtInput ? (parseInt(amtInput.value) || 0) : 0;
                let key = String(monthIdx);
                if(examFeesMonthWise[className][key] || examFeesMonthWise[className][monthIdx]) {
                    // deselect
                    delete examFeesMonthWise[className][key];
                    delete examFeesMonthWise[className][monthIdx];
                    btn.style.background = 'white';
                    btn.style.color = '#b45309';
                } else {
                    // select — use current amount input value
                    if(amt <= 0) { showPopup('Pehle Exam Fees amount enter karein!', false); return; }
                    examFeesMonthWise[className][key] = amt;
                    btn.style.background = '#f59e0b';
                    btn.style.color = 'white';
                }
                fsSave('examFeesMonthWise', examFeesMonthWise); localStorage.setItem('eRegister_exam_fees_monthwise', JSON.stringify(examFeesMonthWise));
            };
            
            // New: when amount changes, update all already-selected months with new amount
            window.updateExamAmtAllMonths = (className, value) => {
                let amt = parseInt(value) || 0;
                if(!examFeesMonthWise[className]) examFeesMonthWise[className] = {};
                let keys = Object.keys(examFeesMonthWise[className]);
                if(keys.length === 0) return; // no months selected yet
                keys.forEach(mKey => {
                    if(amt > 0) examFeesMonthWise[className][mKey] = amt;
                    else delete examFeesMonthWise[className][mKey];
                });
                fsSave('examFeesMonthWise', examFeesMonthWise); localStorage.setItem('eRegister_exam_fees_monthwise', JSON.stringify(examFeesMonthWise));
            };
            
            window.updateItemFee = (itemName, value) => {
                itemsFees[itemName] = parseInt(value) || 0;
                fsSave('itemsFees', itemsFees); localStorage.setItem('eRegister_items_fees', JSON.stringify(itemsFees));
            };
            
            // Edit item name inline
            window.startEditItem = (oldName) => {
                let key = oldName.replace(/\s/g,'_');
                let nameCell = document.getElementById('itemName_' + key);
                if(!nameCell) return;
                let currentName = nameCell.innerText;
                nameCell.innerHTML = `<input type="text" id="editItemInput_${key}" value="${currentName}" 
                    style="width:100%; padding:6px; border:2px solid #667eea; border-radius:8px; font-size:14px;">`;
                // Replace edit btn with save btn
                let actionCell = nameCell.nextElementSibling.nextElementSibling;
                actionCell.innerHTML = `<button onclick="saveEditItem('${oldName}')" title="Save" style="background:none;border:none;cursor:pointer;padding:2px;">
                    <img src="https://i.ibb.co/7NCYqxkC/pencil-icon.png" style="width:34px;height:34px;">
                </button>`;
            };
            
            window.saveEditItem = (oldName) => {
                let key = oldName.replace(/\s/g,'_');
                let input = document.getElementById('editItemInput_' + key);
                if(!input) return;
                let newName = input.value.trim();
                if(!newName) { showPopup('Item name empty hai!', false); return; }
                // Update itemsFees with new key
                let oldVal = itemsFees[oldName] || 0;
                delete itemsFees[oldName];
                itemsFees[newName] = oldVal;
                // Update defaultItemsList
                let idx2 = defaultItemsList.indexOf(oldName);
                if(idx2 >= 0) defaultItemsList[idx2] = newName;
                fsSave('itemsFees', itemsFees); localStorage.setItem('eRegister_items_fees', JSON.stringify(itemsFees));
                showPopup('✅ Item name updated successfully!');
                renderStructureTable();
            };
            
            window.openAddItemModal = () => {
                document.getElementById('addItemModal').style.display = 'flex';
                let inp = document.getElementById('newItemNameInput');
                if(inp) { inp.value = ''; setTimeout(()=>inp.focus(), 100); }
            };
            
            window.submitNewItem = () => {
                let inp = document.getElementById('newItemNameInput');
                let newItem = inp ? inp.value.trim() : '';
                if(!newItem) { showPopup('Item ka naam dalein!', false); return; }
                if(defaultItemsList.includes(newItem)) { showPopup('Yeh item pehle se exist karta hai!', false); return; }
                defaultItemsList.push(newItem);
                itemsFees[newItem] = 0;
                fsSave('itemsFees', itemsFees); localStorage.setItem('eRegister_items_fees', JSON.stringify(itemsFees));
                document.getElementById('addItemModal').style.display = 'none';
                showPopup('✅ New item added successfully!');
                renderStructureTable();
            };
            
            window.updateBooksFee = (className, value, el) => {
                booksFees[className] = parseInt(value) || 0;
                fsSave('booksFees', booksFees); localStorage.setItem('eRegister_books_fees', JSON.stringify(booksFees));
                let val = parseInt(value) || 0;
                if(el) { el.style.background = val > 0 ? '#dcfce7' : ''; el.style.fontWeight = val > 0 ? '600' : ''; }
            };
            
            window.openAddColumnModal = () => {
                document.getElementById('columnModal').style.display = 'flex';
            };
            
            window.addNewFeeColumn = () => {
                let colName = document.getElementById('newFeeColumnName').value;
                if(!colName) { showPopup('Please enter column name!', false); return; }
                extraFeeColumns.push({ name: colName });
                fsSave('extraFeeColumns', extraFeeColumns); localStorage.setItem('eRegister_extra_fee_columns', JSON.stringify(extraFeeColumns));
                document.getElementById('columnModal').style.display = 'none';
                document.getElementById('newFeeColumnName').value = '';
                renderStructureTable();
                showPopup('✅ Column added successfully!');
            };
            
            window.openDeleteColumnModal = () => {
                let colsHtml = '<div style="max-height:300px; overflow-y:auto;">';
                extraFeeColumns.forEach((col, idx) => {
                    colsHtml += `<div><input type="checkbox" id="delCol${idx}" value="${col.name}"> <label>${col.name}</label></div>`;
                });
                colsHtml += `</div><div class="modal-buttons"><button class="btn btn-secondary" onclick="document.getElementById('deleteModal').style.display='none'">Cancel</button><button class="btn btn-danger" onclick="deleteSelectedColumns()">Delete Selected</button></div>`;
                document.getElementById('deleteModalContent').innerHTML = colsHtml;
                document.getElementById('deleteModal').style.display = 'flex';
            };
            
            window.deleteSelectedColumns = () => {
                let toDelete = [];
                extraFeeColumns.forEach((col, idx) => {
                    let cb = document.getElementById(`delCol${idx}`);
                    if(cb && cb.checked) toDelete.push(col.name);
                });
                extraFeeColumns = extraFeeColumns.filter(col => !toDelete.includes(col.name));
                fsSave('extraFeeColumns', extraFeeColumns); localStorage.setItem('eRegister_extra_fee_columns', JSON.stringify(extraFeeColumns));
                Object.keys(classFeesStructure).forEach(className => {
                    if(classFeesStructure[className].extraFees) {
                        toDelete.forEach(colName => {
                            delete classFeesStructure[className].extraFees[colName];
                        });
                    }
                });
                fsSave('classFeesStructure', classFeesStructure); localStorage.setItem('eRegister_class_fees', JSON.stringify(classFeesStructure));
                document.getElementById('deleteModal').style.display = 'none';
                renderStructureTable();
                showPopup('✅ Columns deleted successfully!');
            };
            
            document.getElementById('app').innerHTML = `<div class="inner-bg"><div class="sticky-header">${getHeader('Fees Structure', true)}</div><div class="inner-container"><div class="form-card"><div id="structureTableContainer"></div></div></div>${getOverlay()}
                <div id="columnModal" class="modal"><div class="modal-content"><h3>Add New Column</h3><div class="input-group"><label>Column Name</label><input type="text" id="newFeeColumnName" placeholder="e.g., Library Fees"></div><div class="modal-buttons"><button class="btn btn-secondary" onclick="document.getElementById('columnModal').style.display='none'">Cancel</button><button class="btn btn-primary" onclick="addNewFeeColumn()">Submit</button></div></div></div>
                <div id="deleteModal" class="modal"><div class="modal-content"><h3>Select columns to delete</h3><div id="deleteModalContent"></div></div></div>`;
            renderStructureTable();
        }

                  Created: <strong>${myCoAdmins.length}/2</strong>
                </div>
                ${maxReached ? `<div style="color:#dc2626;background:#fee2e2;border-radius:10px;padding:12px;font-size:13px;font-weight:600;text-align:center;"><i class="fas fa-times-circle"></i> Maximum limit reached — delete one co-admin first</div>` : `
                <div id="caCreateError" class="error hidden" style="margin-bottom:12px;"></div>
                <div id="caCreateSuccess" class="success hidden" style="margin-bottom:12px;"></div>

                  </div>

        async function handleCreateCoAdmin() {
            const name = (document.getElementById('caName').value||'').trim();
            const code = (document.getElementById('caCode').value||'').trim();
            const pwd  = (document.getElementById('caPassword').value||'').trim();
            const db   = currentUser.databaseName||currentUser.organisation||'';
            const err  = document.getElementById('caCreateError');
            const suc  = document.getElementById('caCreateSuccess');
            function showErr(msg) { err.innerHTML='❌ '+msg; err.classList.remove('hidden'); err.style.display='block'; }
            err.classList.add('hidden'); err.style.display='none';
            suc.classList.add('hidden'); suc.style.display='none';
            if(!name) { showErr('Co-admin name is required!'); return; }
            if(!code||code.length!==6) { showErr('6-digit ID is required!'); return; }
            if(users.find(u=>u.code===code)) { showErr('This ID is already taken by another admin!'); return; }
            if(coAdmins.find(ca=>ca.code===code)) { showErr('This ID is already taken by another co-admin!'); return; }
            if(!pwd||pwd.length!==6) { showErr('6-digit password is required!'); return; }
            const myCoAdmins = coAdmins.filter(ca=>ca.adminCode===currentUser.code);
            if(myCoAdmins.length>=2) { showErr('Maximum 2 co-admins limit has been reached!'); return; }
            const newCa = { id: Date.now().toString(), name, code, password: pwd, databaseName: db, adminCode: currentUser.code, createdAt: new Date().toLocaleString('en-IN'), blocked: false };
            const updated = [...coAdmins, newCa];
            try {
                await fsSave('coAdmins', updated);
                coAdmins = updated;
                suc.innerHTML='✅ Co-admin created successfully! Refreshing page...'; suc.classList.remove('hidden'); suc.style.display='block';
                setTimeout(()=>navigateTo(renderAccessibility), 1500);
            } catch(e) { showErr('Firebase error! Please try again.'); }
        }

            navigateTo(renderAccessibility);

                container.innerHTML = selectedMonths.map(m => `<span class="month-tag">${months[m]}</span>`).join('');
