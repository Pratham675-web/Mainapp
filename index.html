                    <div style="font-size:13px;margin-top:4px;"><strong>${s.name}</strong> &nbsp; Class: ${s.className || '—'}</div>
                    <div style="font-size:12px;color:#555;">Submitted: ₹${h.submittedAmount || h.amount || 0} &nbsp; Balance: ₹${h.balance || 0} &nbsp; Date: ${h.date ? new Date(h.date).toLocaleDateString('en-IN') : '—'}</div>
                    <div style="font-size:11px;color:#667eea;margin-top:4px;"><i class="fas fa-arrow-right"></i> Tap to view & submit fees</div>
                </div>`;
            }).join('');
            resultDiv.innerHTML = html;
        }

        function performSearch() {

            let filterClass = document.getElementById('filterClassHidden').value;
            let spinner = document.getElementById('searchSpinner');
            let resultsDiv = document.getElementById('searchResults');

            resultsDiv.innerHTML = '';
            setTimeout(() => {
                let students = getAllStudents();
                let results = students.filter(s => {
                    let admNum = String(s.id).toLowerCase();
                    let matchesQuery = !query ||
                                      s.name.toLowerCase().includes(query) || 
                                      s.contact.includes(query) || 
                                      (s.familyName && s.familyName.toLowerCase().includes(query)) ||
                                      admNum.includes(query);
                    let matchesClass = (filterClass === 'all' || s.className === filterClass);
                    return matchesQuery && matchesClass;
                });
                spinner.style.display = 'none';

                    resultsDiv.innerHTML = '<div style="text-align:center;padding:40px;"><i class="fas fa-search-slash"></i><p>No students found</p></div>';

                    <p style="margin-bottom:8px;"><strong><i class="fas fa-user" style="color:#667eea; width:18px;"></i>&nbsp; Name:</strong>&nbsp; ${student.name}</p>
                    <p style="margin-bottom:8px;"><strong><i class="fas fa-chalkboard" style="color:#667eea; width:18px;"></i>&nbsp; Class:</strong>&nbsp; ${student.className}</p>
                    <p style="margin-bottom:8px;"><strong><i class="fas fa-hashtag" style="color:#667eea; width:18px;"></i>&nbsp; Roll Number:</strong>&nbsp; ${student.rollNo}</p>
                    <p style="margin-bottom:8px;"><strong><i class="fas fa-phone" style="color:#667eea; width:18px;"></i>&nbsp; Contact:</strong>&nbsp; ${student.contact}</p>
                    <p style="margin-bottom:0;"><strong><i class="fas fa-user-tie" style="color:#667eea; width:18px;"></i>&nbsp; Father Name:</strong>&nbsp; ${student.fatherName || 'N/A'}</p>
                </div>
                ${familyHtml}
                <div class="header-buttons" style="justify-content: flex-end; gap: 15px; margin-top: 20px;">
                    <button class="history-icon" onclick="navigateTo(renderHistoryPage, '${student.id}', '${student.name}')"><img src="${img.historyIcon}"></button>
                    <button class="plus-icon-big" onclick="navigateTo(renderFeesCard, '${student.id}', '${student.name}')"><img src="${img.openFeesCardIcon}"></button>
                </div>
                </div></div></div></div>${getOverlay()}</div>`;
        }

        // ==================== FEES CARD ====================
        function openMonthSelector() {
            let monthCheckboxes = '';
            months.forEach((month, idx) => {
                monthCheckboxes += `<label><input type="checkbox" value="${idx}" ${selectedMonths.includes(idx) ? 'checked' : ''}> ${month}</label>`;
            });
            document.getElementById('monthModalContent').innerHTML = monthCheckboxes;
            document.getElementById('monthModal').style.display = 'flex';
        }

        function saveMonthSelection() {
            selectedMonths = [];
            let checkboxes = document.querySelectorAll('#monthModalContent input[type="checkbox"]');
            checkboxes.forEach(cb => {
                if(cb.checked) selectedMonths.push(parseInt(cb.value));
            });
            selectedMonths.sort((a,b) => a-b);
            document.getElementById('monthModal').style.display = 'none';
            renderSelectedMonths();
            if(typeof window.renderTable === 'function') {
                window.renderTable();
                if(typeof window.calculateTotal === 'function') window.calculateTotal();
            } else {
                calculateFeesFromStructure();
            }
        }

        function renderSelectedMonths() {
            let container = document.getElementById('selectedMonthsContainer');
            if(container) {
                container.innerHTML = selectedMonths.map(m => `<span class="month-tag">${months[m]}</span>`).join('');
            }
        }

        function calculateFeesFromStructure() {
            let multiplier = selectedMonths.length > 0 ? selectedMonths.length : 1;
            let allStudents = getAllStudents();
            let tuitionInputs = document.querySelectorAll('.fee-value');
            tuitionInputs.forEach(input => {
                let col = input.getAttribute('data-column');
                if(col && col.toLowerCase().replace(/\s+/g,'') === 'tuitionfees') {
                    let sid = input.getAttribute('data-student');
                    let member = allStudents.find(s => String(s.id) === String(sid));
                    if(member && isStudentTuitionFree(member.id)) {
                        input.value = 0;
                    } else {
                        let fee = member ? getClassFees(member.className, 'Tuition Fees') : 0;
                        input.value = fee * multiplier;
                    }
                }
            });
            if(typeof window.renderTable === 'function') {
                window.renderTable();
                return;
            }
            let rows = document.querySelectorAll('#feesTableContainer tbody tr');
            rows.forEach((row, idx) => {
                let rowTotal = 0;
                row.querySelectorAll('.fee-value').forEach(input => {
                    rowTotal += parseFloat(input.value) || 0;
                });
                let totalInput = row.querySelector('.row-total');
                if(totalInput) totalInput.value = rowTotal;
            });
            calculateTotal();
        }

        function renderFeesCard(studentId, studentName) {
            let students = getAllStudents();
            let student = students.find(s => s.id == studentId);
            if(!student) {
                showPopup('Student not found!', false);
                return;
            }
            
            window.currentFeesCardStudent = student;
            
            let familyMembers = [];
            if(student.type === 'family') {
                familyMembers = students.filter(s => s.familyId === student.familyId);
            } else {
                familyMembers = [student];
            }
            
            let savedData = feesData[studentId] || {};
            let currentDate = new Date().toLocaleDateString('en-IN', { day:'numeric', month:'long', year:'numeric' });
            
            let primaryMemberForBalance = familyMembers[0];
            let primaryHistoryForBalance = paymentHistory[primaryMemberForBalance?.id] || [];
            let oldBalanceAmount = 0;
            if(primaryHistoryForBalance.length > 0) {
                oldBalanceAmount = primaryHistoryForBalance[primaryHistoryForBalance.length - 1].balance || 0;
            } else {
                let admRec = admissions.find(a => {
                    if(a.status === 'approved') {
                        if(a.type === 'single' && String(a.id) === String(primaryMemberForBalance?.admissionId)) return true;
                        if((a.type === 'family' || a.type === 'double') && a.students) {
                            return a.students.some(s => String(a.id + '_' + s.id) === String(primaryMemberForBalance?.id) || String(a.id) === String(primaryMemberForBalance?.admissionId));
                        }
                        if(String(a.id) === String(primaryMemberForBalance?.admissionId)) return true;
                    }
                    return false;
                });
                if(admRec) {
                    if(admRec.type === 'family' || admRec.type === 'double') {
                        let matchedStu = admRec.students && admRec.students.find(s => String(admRec.id+'_'+s.id) === String(primaryMemberForBalance?.id));
                        oldBalanceAmount = parseFloat((matchedStu && matchedStu.oldBalance) || admRec.oldBalance || 0);
                    } else {
                        oldBalanceAmount = parseFloat(admRec.oldBalance || 0);
                    }
                }
            }
            
            selectedMonths = [new Date().getMonth()];
            
            // Custom columns added via the "+" button are temporary for this card session only -
            // they are NOT saved into the global feesColumns list, so they vanish once you leave this page.
            let sessionFeesColumns = feesColumns.filter(c => c.toLowerCase().trim() !== 'book').slice();
            
            // Get FC number for this fees card session - reuse pending number if not yet saved
            let fcNumber = pendingFcNumbers[studentId];
            if(!fcNumber) {
                fcNumber = peekNextFCNumber();
                pendingFcNumbers[studentId] = fcNumber;
                fsSave('pendingFcNumbers', pendingFcNumbers); localStorage.setItem('eRegister_pending_fc', JSON.stringify(pendingFcNumbers));
            }
            
            function renderTable() {
                let multiplier = selectedMonths.length > 0 ? selectedMonths.length : 1;
                let showExamCol = false;
                familyMembers.forEach(member => {
                    selectedMonths.forEach(m => {
                        let classExam = examFeesMonthWise[member.className] || {};
                        if(classExam[m] > 0 || classExam[String(m)] > 0) showExamCol = true;
                    });
                });
                
                let tableHtml = `<table class="fees-table"><thead>
                    <th style="width:50px; text-align:center;">#</th>
                    <th>Student Name</th>
                    <th style="width:100px;">Class</th>`;
                sessionFeesColumns.forEach(col => { 
                    tableHtml += `<th style="min-width:120px;">${col}</th>`; 
                });
                if(showExamCol) {
                    tableHtml += `<th style="min-width:140px; background:#fff3cd; color:#b45309;">Exam Fees</th>`;
                }
                tableHtml += `<th style="min-width:100px;">Total</th></thead><tbody>`;
                
                familyMembers.forEach((member, idx) => {
                    let isTuitionFree = isStudentTuitionFree(member.id);
                    let isExamFree = isStudentExamFree(member.id);
                    let isAdditionalFree = isStudentAdditionalFree(member.id);
                    let isAnyFree = isStudentFree(member.id);
                    let freeType = getStudentFreeType(member.id);
                    let freeBadgeText = freeType ? getFreeTypeBadge(freeType) : '';

                    let memberData = savedData[member.id] || {};
                    let rowTotal = 0;
                    let tuitionFee = isTuitionFree ? 0 : getClassFees(member.className, 'Tuition Fees');
                    let examFeeThisMonth = isExamFree ? 0 : getExamFeesForSelectedMonths(member.className, selectedMonths);

                    let freeBadgeHtml = isAnyFree ? ` <span style="background:#f59e0b;color:white;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:700;">${freeBadgeText}</span>` : '';
                    tableHtml += `<tr class="${isAnyFree ? 'family-row' : ''}">
                        <td style="text-align:center;">${idx + 1}</td>
                        <td>${member.name}${freeBadgeHtml}</td>
                        <td>${member.className}</td>`;
                    sessionFeesColumns.forEach(col => {
                        let isFixed = col.toLowerCase().replace(/\s+/g,'') === 'tuitionfees';
                        let value = '';
                        if(isFixed) {
                            value = (isTuitionFree || selectedMonths.length === 0) ? 0 : tuitionFee * multiplier;
                        } else {
                            if(isAdditionalFree) {
                                value = 0;
                            } else {
                                value = memberData[col] || '';
                            }
                        }
                        let readonlyAttr = (isFixed && !isTuitionFree) ? 'readonly' : (isAdditionalFree && !isFixed ? 'readonly' : '');
                        let numVal = parseFloat(value) || 0;
                        rowTotal += numVal;
                        tableHtml += `<td><input type="text" class="fee-value" data-student="${member.id}" data-column="${col}" placeholder="0" value="${value}" ${readonlyAttr} oninput="updateRowTotal(${idx})" onchange="updateRowTotal(${idx})"></td>`;
                    });
                    if(showExamCol) {
                        rowTotal += examFeeThisMonth;
                        let examMonthLabels = isExamFree ? '' : selectedMonths.filter(m => getExamFeeForMonth(member.className, m) > 0).map(m => months[m]).join(', ');
                        tableHtml += `<td style="background:#fffbeb;">
                            <input type="text" class="fee-value exam-fee-auto" data-student="${member.id}" data-column="Exam Fees" 
                                value="${examFeeThisMonth}" readonly 
                                title="${isExamFree ? 'Exam Fees Free' : 'Exam Fees for: ' + examMonthLabels}"
                                style="background:#fef3c7; font-weight:600; color:#b45309; width:100%; cursor:not-allowed;">
                            ${!isExamFree && examMonthLabels ? `<div style="font-size:10px; color:#b45309; margin-top:3px;">${examMonthLabels}</div>` : ''}
                        </td>`;
                    }
                    tableHtml += `<td><input type="text" class="row-total" id="rowTotal${idx}" value="${rowTotal}" readonly style="background:#f0f0f0; width:100px;"></td>`;
                    tableHtml += `</tr>`;
                });
                tableHtml += `</tbody></table>`;
                document.getElementById('feesTableContainer').innerHTML = tableHtml;
                if(typeof calculateTotal === 'function') calculateTotal();
            }
            
            window.updateRowTotal = (idx) => {
                let rowTotal = 0;
                let rowInputs = document.querySelectorAll(`#feesTableContainer tr:nth-child(${idx+1}) .fee-value`);
                rowInputs.forEach(input => {
                    rowTotal += parseFloat(input.value) || 0;
                });
                document.getElementById(`rowTotal${idx}`).value = rowTotal;
                calculateTotal();
            };
            
            window._discMode = 'rupee';
            window._setDiscMode = function(mode) {
                window._discMode = mode;
                let pBtn = document.getElementById('discTogglePercent');
                let rBtn = document.getElementById('discToggleRupee');
                if(pBtn && rBtn) {
                    if(mode === 'percent') {
                        pBtn.style.background = '#667eea'; pBtn.style.color = 'white';
                        rBtn.style.background = 'transparent'; rBtn.style.color = '#667eea';
                    } else {
                        rBtn.style.background = '#667eea'; rBtn.style.color = 'white';
                        pBtn.style.background = 'transparent'; pBtn.style.color = '#667eea';
                    }
                }
                calculateTotal();
            };

            window._updateMOP = function() {
                let labels = ['mopCashLabel','mopPaytmLabel','mopBothLabel'];
                let colors = ['#10b981','#00baf2','#f59e0b'];
                let isBoth = false;
                labels.forEach((id, i) => {
                    let el = document.getElementById(id);
                    if(el) {
                        let radio = el.querySelector('input[type="radio"]');
                        if(radio && radio.checked) {
                            el.style.borderColor = colors[i];
                            el.style.background = colors[i] + '15';
                            if(id === 'mopBothLabel') {
                                document.getElementById('mopSubFields').style.display = 'block';
                                isBoth = true;
                            }
                        } else {
                            el.style.borderColor = '#e0e0e0';
                            el.style.background = 'white';
                            if(id === 'mopBothLabel') {
                                document.getElementById('mopSubFields').style.display = 'none';
                            }
                        }
                    }
                });
                // When Cash & Paytm: hide submitted amount row (auto-calc from inputs)
                let submRow = document.getElementById('submittedAmountRow');
                if(submRow) submRow.style.display = isBoth ? 'none' : '';
                calculateTotal();
            };

            window.calculateTotal = () => {
                let grandTotal = 0;
                let rowTotals = document.querySelectorAll('.row-total');
                rowTotals.forEach(rowTotal => {
                    grandTotal += parseFloat(rowTotal.value) || 0;
                });
                let oldBalance = parseFloat(document.getElementById('oldBalance').innerText) || 0;
                let finalGrandTotal = grandTotal + oldBalance;
                let discInput = parseFloat(document.getElementById('discountAmount').value) || 0;
                let discount = (window._discMode === 'percent') ? Math.round(finalGrandTotal * discInput / 100) : discInput;
                let afterDiscount = finalGrandTotal - discount;

                // Check if Cash & Paytm mode is selected
                let mopRadios = document.querySelectorAll('input[name="modeOfPayment"]');
                let selectedMOP = '';
                for(let r of mopRadios) { if(r.checked) { selectedMOP = r.value; break; } }
                let submittedAmount = 0;
                if(selectedMOP === 'Cash & Paytm') {
                    let cashAmt = parseFloat(document.getElementById('mopCashAmount')?.value) || 0;
                    let paytmAmt = parseFloat(document.getElementById('mopPaytmAmount')?.value) || 0;
                    submittedAmount = cashAmt + paytmAmt;
                    let sEl = document.getElementById('submittedAmount');
                    if(sEl) sEl.value = submittedAmount;
                    let mopTotEl = document.getElementById('mopTotalDisplay');
                    if(mopTotEl) mopTotEl.innerText = '₹' + submittedAmount;
                } else {
                    submittedAmount = parseFloat(document.getElementById('submittedAmount')?.value) || 0;
                }

                let balance = afterDiscount - submittedAmount;
                
                document.getElementById('grandTotal').innerText = finalGrandTotal;
                document.getElementById('afterDiscount').innerText = afterDiscount;

                let balLabel = document.getElementById('fcBalanceLabel');
                let balEl = document.getElementById('balanceAmount');
                let balanceMsg = document.getElementById('balanceMessage');

                if(balance < 0) {
                    if(balLabel) balLabel.innerHTML = '<span style="color:#10b981;font-weight:700;"><i class="fas fa-plus-circle"></i> Advance:</span>';
                    if(balEl) { balEl.innerText = '₹' + Math.abs(balance); balEl.style.color = '#10b981'; }
                    if(balanceMsg) balanceMsg.innerHTML = '<span style="color:#10b981;font-size:12px;font-weight:600;"><i class="fas fa-check-circle"></i> Advance Amount</span>';
                } else if(balance === 0) {
                    if(balLabel) balLabel.innerHTML = 'Balance:';
                    if(balEl) { balEl.innerText = '0'; balEl.style.color = ''; }
                    if(balanceMsg) balanceMsg.innerHTML = '<span class="balance-clear"><i class="fas fa-check-circle"></i> Balance Clear</span>';
                } else {
                    if(balLabel) balLabel.innerHTML = 'Balance:';
                    if(balEl) { balEl.innerText = balance; balEl.style.color = ''; }
                    if(balanceMsg) balanceMsg.innerHTML = '';
                }
            };

            window._getSelectedMOP = function() {
                let radios = document.querySelectorAll('input[name="modeOfPayment"]');
                for(let r of radios) { if(r.checked) return r.value; }
                return '';
            };

            window._mopSubUpdate = function() {
                let cashAmt = parseFloat(document.getElementById('mopCashAmount')?.value) || 0;
                let paytmAmt = parseFloat(document.getElementById('mopPaytmAmount')?.value) || 0;
                let total = cashAmt + paytmAmt;
                document.getElementById('submittedAmount').value = total;
                document.getElementById('mopTotalDisplay').innerText = '₹' + total;
                calculateTotal();
            };
            
            window.saveFeesData = () => {
                let spinner = document.getElementById('saveSpinner');
                let saveBtn = document.getElementById('saveFeesBtn');
                spinner.style.display = 'inline-block';
                saveBtn.disabled = true;
                
                let currentData = {};
                let inputs = document.querySelectorAll('.fee-value');
                let feeValidationErr = null;
                inputs.forEach(input => {
                    let studentIdVal = input.getAttribute('data-student');
                    let column = input.getAttribute('data-column');
                    let amtErr = validateAmount(input.value || '0');
                    if(amtErr && !feeValidationErr) feeValidationErr = amtErr;
                    if(!currentData[studentIdVal]) currentData[studentIdVal] = {};
                    currentData[studentIdVal][column] = input.value;
                });
                if(feeValidationErr) { spinner.style.display='none'; saveBtn.disabled=false; showPopup(feeValidationErr, false); return; }
                let submittedAmtErr = validateAmount(document.getElementById('submittedAmount')?.value || '0');
                if(submittedAmtErr) { spinner.style.display='none'; saveBtn.disabled=false; showPopup(submittedAmtErr, false); return; }
                if(!feesData[studentId]) feesData[studentId] = {};
                Object.assign(feesData[studentId], currentData);
                fsSave('feesData', feesData); localStorage.setItem('eRegister_fees_data', JSON.stringify(feesData));
                
                let totalPaid = parseFloat(document.getElementById('submittedAmount').value) || 0;
                let remark = document.getElementById('remarkText').value || '';
                let currentBalance = parseFloat(document.getElementById('balanceAmount').innerText) || 0;
                let selectedMonthNames = selectedMonths.map(m => months[m]);
                let modeOfPayment = window._getSelectedMOP();
                let mopDetails = '';
                if(modeOfPayment === 'Cash & Paytm') {
                    let cashAmt = parseFloat(document.getElementById('mopCashAmount')?.value) || 0;
                    let paytmAmt = parseFloat(document.getElementById('mopPaytmAmount')?.value) || 0;
                    mopDetails = `Cash: ₹${cashAmt}, Paytm: ₹${paytmAmt}`;
                }
                let fcReceiptNumber = commitFCNumber(fcNumber);
                delete pendingFcNumbers[studentId];
                fsSave('pendingFcNumbers', pendingFcNumbers); localStorage.setItem('eRegister_pending_fc', JSON.stringify(pendingFcNumbers));
                
                familyMembers.forEach(member => {
                    let memberFees = currentData[member.id] || {};
                    let memberTotal = 0;
                    let rowInput = document.getElementById(`rowTotal${familyMembers.indexOf(member)}`);
                    if(rowInput) memberTotal = parseFloat(rowInput.value) || 0;
                    let memberExamFee = getExamFeesForSelectedMonths(member.className, selectedMonths);
                    if(memberExamFee > 0) memberFees['Exam Fees'] = memberExamFee;
                    
                    let now2 = new Date();
                    let yymmdd = now2.getFullYear().toString() + ('0'+(now2.getMonth()+1)).slice(-2) + ('0'+now2.getDate()).slice(-2);
                    let recSeq = ((paymentHistory[member.id]||[]).length + 1).toString().padStart(4,'0');
                    let receiptNo = 'RCP-' + yymmdd + '-' + recSeq;

                    let historyRecord = {
                        date: new Date().toLocaleString(),
                        months: selectedMonthNames,
                        amount: totalPaid,
                        submittedAmount: totalPaid,
                        memberTotal: memberTotal,
                        balance: currentBalance,
                        oldBalance: oldBalanceAmount,
                        fees: memberFees,
                        examFees: memberExamFee,
                        remark: remark,
                        modeOfPayment: modeOfPayment,
                        mopDetails: mopDetails,
                        receiptNo: receiptNo,
                        fcNumber: fcReceiptNumber
                    };
                    if(!paymentHistory[member.id]) paymentHistory[member.id] = [];
                    paymentHistory[member.id].push(historyRecord);
                    logActivity('Fees Submitted', `Student: ${member.name}, Contact: ${member.contact||'-'}, Receipt: ${receiptNo}, FC: ${fcReceiptNumber}, Discount: ${document.getElementById('discountAmount')?.value||0}, Member Total: ₹${memberTotal}, Mode: ${modeOfPayment}${mopDetails?(' ['+mopDetails+']'):''}, Submitted: ₹${totalPaid}, Balance: ₹${currentBalance}`);
                });
                fsSaveWithChecksum('paymentHistory', paymentHistory); localStorage.setItem('eRegister_payment_history', JSON.stringify(paymentHistory));
                
                setTimeout(() => {
                    spinner.style.display = 'none';
                    saveBtn.disabled = false;
                    showPopup('✅ Fees saved successfully!');
                }, 1500);
            };
            
            document.getElementById('app').innerHTML = `<div class="inner-bg"><div class="sticky-header">${getHeader('Fees Card', true)}</div><div class="inner-container"><div class="form-card"><div class="header-buttons">
                    <div class="real-time">📅 ${currentDate}</div>
                    <div style="display:flex;align-items:center;gap:10px;">
                        <span style="background:#ef4444;color:white;padding:4px 16px;border-radius:20px;font-size:14px;font-weight:700;">${fcNumber}</span>
                    </div>
                    <div class="action-icons-right">
                        <button class="calendar-icon" onclick="openMonthSelector()"><img src="${img.monthIcon}"></button>
                        <button class="calc-icon" onclick="calculateFeesFromStructure()"><img src="${img.calculateIcon}"></button>
                        <button class="plus-icon-big" title="Add custom column" onclick="document.getElementById('customColModalFC').style.display='flex'"><img src="${img.plusIcon}"></button>
                        <button class="print-icon" onclick="printFeesCard()"><img src="${img.printIcon}"></button>
                        <button class="history-icon" onclick="navigateTo(renderHistoryPage, '${student.id}', '${student.name}')"><img src="${img.historyIcon}"></button>
                    </div>
                </div>
                <div id="selectedMonthsContainer" class="selected-months"></div>
                <div id="feesTableContainer" style="overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%;"></div>
                <div id="customColModalFC" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1001;justify-content:center;align-items:center;">
                    <div style="background:white;border-radius:20px;padding:26px;width:320px;max-width:90%;">
                        <h3 style="margin-bottom:14px;"><i class="fas fa-plus-circle" style="color:#667eea;"></i> Add Custom Column</h3>
                        <input type="text" id="customColNameFC" placeholder="Column name (e.g. Transport)" style="width:100%;padding:10px;border:2px solid #e0e0e0;border-radius:12px;font-size:14px;margin-bottom:14px;">
                        <div style="display:flex;gap:10px;justify-content:flex-end;">
                            <button onclick="document.getElementById('customColModalFC').style.display='none'" style="padding:9px 18px;border:none;border-radius:12px;background:#e0e0e0;cursor:pointer;font-weight:600;">Cancel</button>
                            <button onclick="window._addCustomColFC()" style="padding:9px 18px;border:none;border-radius:12px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;cursor:pointer;font-weight:600;">Add</button>
                        </div>
                    </div>
                </div>
                <div class="calculation-box">
                    <div class="calculation-row"><span style="color:#ef4444; font-weight:700;">Old Balance:</span><span id="oldBalance" class="old-balance-text">${oldBalanceAmount}</span></div>
                    <div class="calculation-row"><span>Grand Total (with Old Balance):</span><span id="grandTotal" class="total-text">0</span></div>
                    <div class="calculation-row">
                        <span>Discount:
                            <span style="display:inline-flex;align-items:center;gap:4px;margin-left:8px;background:#f0f0f0;border-radius:20px;padding:2px 6px;">
                                <button id="discTogglePercent" onclick="window._setDiscMode('percent')"
                                    style="padding:3px 10px;border-radius:15px;border:none;cursor:pointer;font-size:12px;font-weight:700;background:#667eea;color:white;">%</button>
                                <button id="discToggleRupee" onclick="window._setDiscMode('rupee')"
                                    style="padding:3px 10px;border-radius:15px;border:none;cursor:pointer;font-size:12px;font-weight:700;background:transparent;color:#667eea;">₹</button>
                            </span>
                        </span>
                        <input type="number" id="discountAmount" placeholder="0" style="width:120px;" oninput="calculateTotal()">
                    </div>
                    <div class="calculation-row"><span>After Discount:</span><span id="afterDiscount">0</span></div>
                    <div style="padding:10px 0 6px;border-top:1px dashed #e0e7ff;margin:6px 0 2px;">
                        <div style="font-size:13px;font-weight:700;color:#1a1a2e;margin-bottom:8px;"><i class="fas fa-credit-card" style="color:#667eea;"></i> Mode of Payment</div>
                        <div style="display:flex;gap:8px;flex-wrap:wrap;">

        // Print Fees Card with MOP and Receipt Number
        function printFeesCard() {
            let ps = printSettings;
            let ff = ps.feesFields || {};
            let isHalf = (ps.feesPageSize !== 'full');

            let tableEl = document.getElementById('feesTableContainer');
            let tableClone = tableEl ? tableEl.cloneNode(true) : null;
            if(tableClone){
                tableClone.querySelectorAll('input').forEach(inp=>{ let s=document.createElement('span'); s.textContent=inp.value||'0'; inp.replaceWith(s); });
                tableClone.querySelectorAll('select').forEach(sel=>{ let s=document.createElement('span'); s.textContent=sel.value||''; sel.replaceWith(s); });
                tableClone.querySelectorAll('th:last-child,td:last-child').forEach(el=>el.remove());
            }
            let tableHtml = (ff.table!==false && tableClone) ? tableClone.innerHTML : '';

            let grandTotal     = document.getElementById('grandTotal')?.innerText || '0';
            let oldBalance     = document.getElementById('oldBalance')?.innerText || '0';
            let discount       = document.getElementById('discountAmount')?.value || '0';
            let afterDiscount  = document.getElementById('afterDiscount')?.innerText || '0';
            let submittedAmt   = document.getElementById('submittedAmount')?.value || '0';
            let balance        = document.getElementById('balanceAmount')?.innerText || '0';
            let remark         = document.getElementById('remarkText')?.value || '';
            
            // Get MOP
            let mop = window._getSelectedMOP ? window._getSelectedMOP() : '';
            let mopDetails = '';
            if(mop === 'Cash & Paytm') {
                let cashAmt = document.getElementById('mopCashAmount')?.value || '0';
                let paytmAmt = document.getElementById('mopPaytmAmount')?.value || '0';
                mopDetails = `Cash: ₹${cashAmt}, Paytm: ₹${paytmAmt}`;
            } else if(mop) {
                mopDetails = mop;
            }

            // Get FC number from the page
            let fcNumber = document.querySelector('.header-buttons .action-icons-right .fc-number-display')?.innerText || '';

                let fcEl = document.querySelector('.header-buttons div span[style*="background:#ef4444"]');

            let monthEls = document.querySelectorAll('#selectedMonthsContainer .month-tag, #selectedMonthsContainer span, #selectedMonthsContainer .tag');

            monthEls.forEach(el => { let t=el.innerText||el.textContent; if(t&&t.trim()) monthNames.push(t.trim()); });
            if(!monthNames.length){
                let raw = document.getElementById('selectedMonthsContainer')?.innerText||'';
                if(raw.trim()) monthNames = raw.split(/[,\n]+/).map(s=>s.trim()).filter(Boolean);
            }
            let monthsRow = (ff.months!==false && monthNames.length)
                ? '<tr style="background:#eef2ff;"><td colspan="10" style="padding:5px 8px;font-weight:700;font-size:11px;color:#667eea;border:1px solid #ccc;">Months: '+monthNames.join(' &nbsp;|&nbsp; ')+'</td></tr>'
                : '';

            let tRow = function(label, val, bold, color){ return '<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid #eee;">'+'<span style="font-size:11px;">'+label+'</span>'+'<span style="font-size:11px;font-weight:'+(bold?'700':'500')+';color:'+(color||'inherit')+';">'+val+'</span>'+'</div>'; };
            if(ff.oldBalance!==false)      totals += tRow('Old Balance', oldBalance);
            if(ff.grandTotal!==false)      totals += tRow('Grand Total', grandTotal);
            if(ff.discount!==false)        totals += tRow('Discount', '&#8377;'+discount);
            if(ff.afterDiscount!==false)   totals += tRow('After Discount', afterDiscount);
            if(ff.submittedAmount!==false) totals += tRow('Submitted Amount', '&#8377;'+submittedAmt);
            if(ff.balance!==false)         totals += tRow('Balance', balance, true, '#dc2626');
            totals += tRow('Mode of Payment', mopDetails || '—');

            let cardBody = buildPrintHeader()

                +   '<span style="font-size:10px;color:#888;">'+new Date().toLocaleDateString('en-IN')+'</span>'
                + '</div>'
                + (fcNumber ? '<div style="text-align:right;font-size:11px;font-weight:700;color:#dc2626;margin-bottom:4px;">Receipt: '+fcNumber+'</div>' : '')
                + (ff.table!==false && tableHtml ? '<table style="margin-bottom:0;"><thead>'+monthsRow+'</thead><tbody>'+tableHtml+'</tbody></table>' : '')
                + '<div style="margin-top:8px;">' + totals + '</div>'

                + (ff.dateTime!==false ? '<div style="margin-top:4px;font-size:9px;color:#aaa;text-align:right;">Printed: '+new Date().toLocaleString('en-IN')+'</div>' : '');

            let bodyHtml, pageStyle;

                pageStyle = '';
                bodyHtml = '<div style="margin:5mm;border:1.5px solid #667eea;padding:6mm;height:133mm;box-sizing:border-box;overflow:hidden;">'

                pageStyle = '';
                bodyHtml = '<div style="margin:10mm;">' + cardBody + '</div>';
            }
            doPrint(bodyHtml, pageStyle);
        }

        // ==================== INDIVIDUAL STUDENT ATTENDANCE CALENDAR ====================
        function renderAttendanceCalendar(studentName) {
            let key = studentName.replace(/\s/g,'_');
            if(!attendanceRecords[key]) attendanceRecords[key]={};
            let today = new Date();
            let currentYear = today.getFullYear();
            let currentMonth = today.getMonth();
            let currentDate = today.getDate();
            
            function loadCalendar(year, month) {
                let firstDay = new Date(year, month, 1).getDay(), daysInMonth = new Date(year, month+1, 0).getDate();
                let daysHtml = '<div class="calendar-weekdays"><span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span></div><div class="calendar-days">';
                for(let i=0;i<firstDay;i++) daysHtml+='<div class="calendar-day empty"></div>';
                for(let d=1;d<=daysInMonth;d++){
                    let dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    let status = attendanceRecords[key][dateStr] || '';
                    let cls = status==='present'?'present':status==='half'?'half':status==='absent'?'absent':'';
                    let canMark = (year === currentYear && month === currentMonth && d === currentDate);
                    let clickable = canMark ? `onclick="markAttendanceDay('${studentName}',${year},${month},${d})"` : '';
                    daysHtml+=`<div class="calendar-day ${cls}" ${clickable}>${d}</div>`;
                }
                daysHtml+='</div>';
                let present = Object.values(attendanceRecords[key]).filter(v=>v==='present').length;
                let half = Object.values(attendanceRecords[key]).filter(v=>v==='half').length;
                let absent = Object.values(attendanceRecords[key]).filter(v=>v==='absent').length;
                document.getElementById('calendarDays').innerHTML = daysHtml;
                document.getElementById('presentCount').innerText = present;
                document.getElementById('absentCount').innerText = absent+half;
                document.getElementById('monthYear').innerText = new Date(year,month).toLocaleString('default',{month:'long',year:'numeric'});
            }
            function prevMonth() { let newMonth = calMonth-1; if(newMonth>=0){ calMonth=newMonth; loadCalendar(calYear,calMonth); } else if(calYear>2020){ calYear--; calMonth=11; loadCalendar(calYear,calMonth); } else showPopup('Cannot go before 2020',false); }
            function nextMonth() { let newMonth = calMonth+1; if(newMonth<=(currentMonth && calYear===currentYear ? currentMonth : 11)){ calMonth=newMonth; loadCalendar(calYear,calMonth); } else if(calYear<currentYear && newMonth<=11){ calMonth=newMonth; loadCalendar(calYear,calMonth); } else showPopup('Cannot go to future months!',false); }
            
            window.markAttendanceDay = (name,y,m,d) => {
                let dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                if(!canMarkDate(dateStr)) { showPopup('You can only mark attendance for today!', false); return; }
                let k = name.replace(/\s/g,'_');
                let opts = ['present','half','absent'];
                let curr = attendanceRecords[k][dateStr] || '';
                let idx = opts.indexOf(curr);
                let next = opts[(idx+1)%opts.length];
                if(next) attendanceRecords[k][dateStr] = next;
                else attendanceRecords[k][dateStr] = 'present';
                fsSave('attendanceRecords', attendanceRecords); localStorage.setItem('eRegister_attendance', JSON.stringify(attendanceRecords));
                loadCalendar(calYear,calMonth);
                showPopup('Attendance marked successfully!');
            };
            document.getElementById('app').innerHTML = `<div class="inner-bg"><div class="sticky-header">${getHeader(`Attendance: ${studentName}`, true)}</div><div class="inner-container"><div class="form-card"><div class="two-column-layout"><div class="form-column"><div class="form-title"><i class="fas fa-calendar-alt"></i> Mark Attendance</div><div class="calendar"><div class="calendar-header"><button onclick="prevMonth()"><i class="fas fa-chevron-left"></i></button><h3 id="monthYear"></h3><button onclick="nextMonth()"><i class="fas fa-chevron-right"></i></button></div><div id="calendarDays"></div></div></div><div class="image-column"><img src="${img.calendarLogo}" class="big-logo"><div class="stats-box"><h4><i class="fas fa-calendar-check"></i> Total Present</h4><p id="presentCount" class="present-count">0</p></div><div class="stats-box"><h4><i class="fas fa-calendar-times"></i> Total Absent</h4><p id="absentCount" class="absent-count">0</p></div><div style="display:flex;gap:10px;justify-content:center;margin-top:10px;"><span style="background:#10b981;width:20px;height:20px;border-radius:50%;display:inline-block;"></span><span>Present</span><span style="background:#f59e0b;width:20px;height:20px;border-radius:50%;display:inline-block;"></span><span>Half Day</span><span style="background:#ef4444;width:20px;height:20px;border-radius:50%;display:inline-block;"></span><span>Absent</span></div></div></div></div></div>${getOverlay()}</div>`;
            window.prevMonth = prevMonth;
            window.nextMonth = nextMonth;
            loadCalendar(calYear,calMonth);
        }

        // ==================== DEFAULTER LIST ====================
        function renderDefaulterList() {
            let students = getAllStudents();
            let now = new Date();
            let nowYear = now.getFullYear();
            let nowMonth = now.getMonth(); // 0-indexed

            function buildDefaulterList(searchQuery) {
                searchQuery = (searchQuery || '').toLowerCase().trim();
                let classMap = {};
                students.forEach(s => {
                    let hist = (paymentHistory[s.id] || []).slice();
                    // Defaulter = student with NO payment in current month
                    let paidThisMonth = hist.some(h => {
                        let d = new Date(h.date);
                        return d.getFullYear() === nowYear && d.getMonth() === nowMonth && (h.submittedAmount > 0 || h.amount > 0);
                    });
                    if(!paidThisMonth) {
                        let cls = s.className || 'Unknown';
                        if(!classMap[cls]) classMap[cls] = [];
                        let bal = 0;
                        hist.forEach(h => { bal += (parseFloat(h.balance) || 0); });

                        // Find last paid entry (most recent with submittedAmount > 0)
                        let paidEntries = hist.filter(h => (h.submittedAmount > 0 || h.amount > 0));
                        let lastPaidMonths = [];
                        let lastPaidDate = null;
                        if(paidEntries.length > 0) {
                            paidEntries.sort((a, b) => new Date(b.date) - new Date(a.date));
                            lastPaidMonths = paidEntries[0].months || [];
                            lastPaidDate = new Date(paidEntries[0].date);
                        }

                        // Compute unpaid months from last paid to now (full history)
                        let unpaidMonths = [];
                        if(lastPaidDate && lastPaidMonths.length > 0) {
                            let lastMonthName = lastPaidMonths[lastPaidMonths.length - 1];
                            let lastMonthIdx = months.indexOf(lastMonthName);
                            let lastYear = lastPaidDate.getFullYear();
                            if(lastMonthIdx >= 0) {
                                let y = lastYear;
                                let m = lastMonthIdx + 1;
                                if(m > 11) { m = 0; y++; }
                                while(y < nowYear || (y === nowYear && m <= nowMonth)) {
                                    unpaidMonths.push(months[m]);
                                    m++;
                                    if(m > 11) { m = 0; y++; }
                                }
                            }
                        }

                        classMap[cls].push({ ...s, pendingBal: bal, lastPaidMonths, unpaidMonths });
                    }
                });

                // Apply search filter if any
                if(searchQuery) {
                    Object.keys(classMap).forEach(cls => {
                        classMap[cls] = classMap[cls].filter(s =>
                            (s.name || '').toLowerCase().includes(searchQuery) ||
                            (s.admissionNumber || '').toLowerCase().includes(searchQuery)
                        );
                        if(classMap[cls].length === 0) delete classMap[cls];
                    });
                }

                let total = Object.values(classMap).reduce((a, v) => a + v.length, 0);
                let listHtml = total === 0
                    ? `<div style="text-align:center;padding:40px;"><i class="fas fa-check-circle" style="font-size:48px;color:#10b981;"></i><p style="color:#10b981;font-weight:700;font-size:16px;margin-top:12px;">${searchQuery ? 'Koi result nahi mila.' : 'Koi defaulter nahi! Sab payments up-to-date hain.'}</p></div>`
                    : Object.entries(classMap).sort(([a],[b])=>a.localeCompare(b)).map(([cls, sts]) => `
                        <div style="margin-bottom:18px;">
                            <div style="background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:10px 18px;border-radius:12px 12px 0 0;font-weight:700;font-size:14px;">
                                <i class="fas fa-chalkboard"></i> ${cls} <span style="background:rgba(255,255,255,0.25);padding:2px 10px;border-radius:20px;margin-left:8px;">${sts.length} students</span>
                            </div>
                            ${sts.map(s => `<div style="background:white;border:1px solid #e0e0e0;padding:12px 18px;border-top:none;cursor:pointer;" onclick="navigateTo(viewFeesStructure,'${s.id}','${s.name}')">
                                <div style="display:flex;justify-content:space-between;align-items:flex-start;">
                                    <div style="flex:1;">
                                        <div style="font-weight:700;font-size:14px;margin-bottom:3px;">
                                            <i class="fas fa-user" style="color:#ef4444;"></i> ${s.name}
                                            ${s.rollNo ? `<span style="background:#e0e7ff;color:#667eea;padding:1px 8px;border-radius:8px;font-size:10px;font-weight:700;margin-left:6px;">Roll: ${s.rollNo}</span>` : ''}
                                            ${s.admissionNumber ? `<span style="background:#fef3c7;color:#b45309;padding:1px 8px;border-radius:8px;font-size:10px;font-weight:700;margin-left:4px;">${s.admissionNumber}</span>` : ''}
                                        </div>

            currentSubjects = [...result.subjects];

            isEditMode = true;
            editExamName = examName;

        function addExamResult(studentId, studentName, studentClass) {
            currentSubjects = [{ name: '', obtained: '', total: '' }];
            currentStudentId = studentId;
            currentStudentName = studentName;
            isEditMode = false;
            renderResultForm();
        }

        function renderResultForm() {
            function renderTable() {
                let tableHtml = `<table class="result-table"><thead><tr><th>Subject Name</th><th>Obtained Marks</th><th>Total Marks</th><th>Action</th></tr></thead><tbody>`;
                currentSubjects.forEach((sub, idx) => {
                    tableHtml += `<tr>
                        <td><input type="text" id="subName${idx}" value="${sub.name}" placeholder="Subject name"></td>
                        <td><input type="number" id="subObtained${idx}" value="${sub.obtained}" placeholder="Obtained"></td>
                        <td><input type="number" id="subTotal${idx}" value="${sub.total}" placeholder="Total"></td>
                        <td>${idx > 0 ? `<button class="delete-row-icon" onclick="removeSubjectRow(${idx})"><img src="${img.deleteIcon}"></button>` : `<button class="add-row-icon" onclick="addSubjectRow()"><img src="${img.plusIcon}"></button>`}</td>
                    </tr>`;
                });
                tableHtml += `</tbody></table>`;
                document.getElementById('resultTableContainer').innerHTML = tableHtml;
            }
            
            window.addSubjectRow = () => {
                currentSubjects.push({ name: '', obtained: '', total: '' });
                renderTable();
            };
            
            window.removeSubjectRow = (idx) => {
                currentSubjects.splice(idx, 1);
                renderTable();
            };
            
            window.calculateResult = () => {
                let totalObtained = 0, totalMarks = 0;
                currentSubjects.forEach((sub, idx) => {
                    let obtained = parseInt(document.getElementById(`subObtained${idx}`)?.value) || 0;
                    let total = parseInt(document.getElementById(`subTotal${idx}`)?.value) || 0;
                    totalObtained += obtained;
                    totalMarks += total;
                });
                let percentage = totalMarks > 0 ? (totalObtained / totalMarks * 100).toFixed(2) : 0;
                document.getElementById('calculationResult').innerHTML = `<div class="result-summary"><strong>Total Obtained: ${totalObtained} / ${totalMarks}</strong><br><strong>Percentage: ${percentage}%</strong></div>`;
            };
            
            window.saveResult = () => {
                let examName = document.getElementById('examNameInput').value;
                if(!examName) { showPopup('Please enter exam name!', false); return; }
                let subjects = [];
                let valid = true;
                currentSubjects.forEach((sub, idx) => {
                    let name = document.getElementById(`subName${idx}`)?.value;
                    let obtained = document.getElementById(`subObtained${idx}`)?.value;
                    let total = document.getElementById(`subTotal${idx}`)?.value;
                    if(!name || !obtained || !total) valid = false;
                    subjects.push({ name, obtained: parseInt(obtained), total: parseInt(total) });
                });
                if(!valid) { showPopup('Please fill all subject fields!', false); return; }
                
                showProgress(() => {
                    if(!examResults[currentStudentId]) examResults[currentStudentId] = {};
                    if(isEditMode && editExamName !== examName) {
                        delete examResults[currentStudentId][editExamName];
                    }
                    examResults[currentStudentId][examName] = { subjects, studentName: currentStudentName, date: new Date().toLocaleString() };
                    fsSave('examResults', examResults); localStorage.setItem('eRegister_exam_results', JSON.stringify(examResults));
                    showPopup('✅ Result saved successfully!');
                    navigateTo(viewStudentResults, currentStudentId, currentStudentName);
                });
            };
            
            document.getElementById('app').innerHTML = `<div class="inner-bg"><div class="sticky-header">${getHeader('Add Result', true)}</div><div class="inner-container"><div class="form-card"><div class="two-column-layout"><div class="image-column"><img src="${img.resultIcon}" class="big-logo"></div><div class="form-column"><div class="form-title"><i class="fas fa-plus-circle"></i> ${isEditMode ? 'Edit' : 'Add'} Exam Result for ${currentStudentName}</div><div class="input-group"><label><i class="fas fa-file-alt"></i> Exam Name</label><input type="text" id="examNameInput" value="${isEditMode ? editExamName : ''}" placeholder="e.g., Half Yearly, Final Exam"></div><div id="resultTableContainer" style="overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%;"></div><button class="calc-icon" style="margin:10px 0;" onclick="calculateResult()"><img src="${img.calculateIcon}"></button><div id="calculationResult"></div><div id="progressContainer" class="progress-container"><div id="progressBar" class="progress-bar"></div></div><button class="btn btn-success" onclick="saveResult()"><i class="fas fa-save"></i> Save Result</button></div></div></div></div>${getOverlay()}</div>`;
            renderTable();
        }

        // ==================== APPROVAL ====================

                let isApproved = ad.status==='approved';
                let badge = isApproved
                    ? '<span style="background:#dcfce7;color:#16a34a;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-left:6px;">✅ Approved</span>'
                    : '<span style="background:#fef3c7;color:#d97706;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-left:6px;">⏳ Pending</span>';
                let btns = isApproved
                    ? '<button class="btn btn-warning btn-sm" onclick="viewPayment(\''+ad.id+'\')"><i class="fas fa-eye"></i> View</button><button class="btn btn-danger btn-sm" onclick="deleteAdmission(\''+ad.id+'\')"><i class="fas fa-trash"></i> Delete</button>'
                    : '<button class="btn btn-warning btn-sm" onclick="viewPayment(\''+ad.id+'\')"><i class="fas fa-eye"></i> View</button><button class="btn btn-success btn-sm" onclick="approveAdmission(\''+ad.id+'\')"><i class="fas fa-check"></i> Approve</button><button class="btn btn-danger btn-sm" onclick="deleteAdmission(\''+ad.id+'\')"><i class="fas fa-trash"></i> Delete</button>';
                let admBadge = ad.admissionSeqNo ? '<span style="background:#e0e7ff;color:#667eea;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;margin-left:6px;">ADM-'+String(ad.admissionSeqNo).padStart(4,'0')+'</span>' : '';
                if(ad.type==='single') singles+='<div class="student-card"><div class="student-info"><span><i class="fas fa-user"></i> '+ad.name+badge+admBadge+'</span><span><i class="fas fa-chalkboard"></i> '+(ad.newClass||'')+'</span><span><i class="fas fa-phone"></i> '+(ad.contact||'')+'</span><span><i class="far fa-calendar"></i> '+(ad.date||'')+'</span></div><div style="display:flex;gap:8px;flex-wrap:wrap;">'+btns+'</div></div>';
                else families+='<div class="student-card"><div class="student-info"><span><i class="fas fa-users"></i> Family'+badge+admBadge+'</span><span><i class="fas fa-user"></i> '+((ad.students||[]).map(s=>s.name).join(', '))+'</span><span><i class="fas fa-phone"></i> '+(ad.contact||'')+'</span><span><i class="far fa-calendar"></i> '+(ad.date||'')+'</span></div><div style="display:flex;gap:8px;flex-wrap:wrap;">'+btns+'</div></div>';
            });
            document.getElementById('app').innerHTML = `<div class="inner-bg"><div class="sticky-header">${getHeader('Approval', true)}</div><div class="inner-container"><div class="form-card"><div class="two-column-layout" style="align-items:flex-start;"><div class="image-column" style="min-width:160px;max-width:180px;"><img src="${img.singleProfile}" style="width:160px;height:160px;object-fit:contain;"></div><div class="form-column"><div class="form-title"><i class="fas fa-check-circle"></i> All Admissions</div>${singles||families ? (singles?`<h3 style="margin:15px 0 10px"><i class="fas fa-user-graduate"></i> Single Admissions</h3>${singles}`:'')+(families?`<h3 style="margin:15px 0 10px"><i class="fas fa-users"></i> Family Admissions</h3>${families}`:'') : '<div style="text-align:center;padding:40px;"><i class="fas fa-clipboard" style="font-size:48px;color:#94a3b8;"></i><p>Koi bhi admission nahi hai!</p></div>'}</div></div></div></div>${getOverlay()}</div>`;
        }

        function viewPayment(id) { navigateTo(renderAdmissionDetail, id); }

        function approveAdmission(id) {
            let ad = admissions.find(a=>a.id==id);
            if(ad){
                ad.status='approved';
                window._admissionSeqNumber = (window._admissionSeqNumber || 0) + 1;
                ad.admissionSeqNo = window._admissionSeqNumber;
                let admNum = 'ADM-' + String(window._admissionSeqNumber).padStart(4, '0');
                SCHOOL_DOC.set({ admissionSeqNumber: String(window._admissionSeqNumber) }, { merge: true }).catch(()=>{});
                localStorage.setItem('eRegister_admission_seq', String(window._admissionSeqNumber));
                fsSaveWithChecksum('admissions', admissions);
                localStorage.setItem('eRegister_admissions',JSON.stringify(admissions));
                let admittedNames = ad.type==='single' ? (ad.name||'') : (ad.students||[]).map(s=>s.name).join(', ');
                logActivity('Admission Approved', `Admission No: ${admNum}, Student(s): ${admittedNames}`);
                showPopup('✅ Student approved! Admission No: ' + admNum);
                navigateTo(renderApproval);
            }
        }

        function deleteAdmission(id) {
            if(!confirm('Are you sure you want to delete this admission permanently?')) return;
            admissions = admissions.filter(a => String(a.id) !== String(id));
            fsSaveWithChecksum('admissions', admissions); localStorage.setItem('eRegister_admissions', JSON.stringify(admissions));
            showPopup('✅ Admission deleted successfully!');
            navigateTo(renderApproval);
        }

                <div id="addItemModal_billing" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1001;justify-content:center;align-items:center;">
                    <div style="background:white;border-radius:24px;padding:28px;width:420px;max-width:90%;max-height:80vh;overflow-y:auto;">
                        <h3 style="margin-bottom:20px;color:#1a1a2e;"><i class="fas fa-list" style="color:#667eea;"></i> Select Item</h3>
                        <div id="itemsSelectionList"></div>
                        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
                            <button onclick="document.getElementById('addItemModal_billing').style.display='none'" style="padding:10px 20px;border:none;border-radius:12px;background:#e0e0e0;cursor:pointer;font-weight:600;">Cancel</button>
