        // ==================== CREATE RECEIPT ====================
        function renderCreateReceipt() {
            let crKey = 'eRegister_crReceiptNum';
            let crNum = parseInt(localStorage.getItem(crKey) || '0') + 1;
            let receiptLabel = 'CR-' + String(crNum).padStart(4,'0');

            // Yeh page HAMESHA bilkul fresh/blank khulta hai — kabhi koi purani history,
            // auto-loaded students, ya saved data nahi dikhega. Har baar naya banao.
            // customColumns: user jitne chahe naam-wale columns "+" se jod sakta hai.
            // Yeh sab Total column se PEHLE aate hain. rows: har row ek entry hai jisme
            // har custom column ke liye manual value bhar sakte hain.
            let customColumns = []; // [{id, label}]
            let rows = []; // [{id, name, values:{[colId]:val}}]
            let colSeq = 0, rowSeq = 0;

            function addColumn(label) {
                colSeq++;
                let col = { id: 'col'+colSeq, label: label || ('Column '+colSeq) };
                customColumns.push(col);
                rows.forEach(r => { r.values[col.id] = ''; });
                return col;
            }
            function addRow() {
                rowSeq++;
                let vals = {};
                customColumns.forEach(c => vals[c.id] = '');
                rows.push({ id:'row'+rowSeq, name:'', values: vals });
            }
            addRow(); // start with one blank row so the table isn't empty

            function computeRowTotal(r) {
                return customColumns.reduce((sum,c) => sum + (parseFloat(r.values[c.id]) || 0), 0);
            }

            function buildTable() {
                let headCols = customColumns.map(c => `
                    <th style="padding:8px 10px;background:#667eea;color:white;font-size:12px;position:relative;min-width:110px;">
                        <input type="text" value="${c.label}" oninput="window._crRenameCol('${c.id}',this.value)" style="width:100%;background:transparent;border:none;color:white;font-size:12px;font-weight:700;text-align:left;padding:2px;" placeholder="Column name">
                        <button onclick="window._crDeleteCol('${c.id}')" title="Remove column" style="position:absolute;top:2px;right:2px;background:rgba(255,255,255,0.25);border:none;color:white;border-radius:50%;width:16px;height:16px;font-size:10px;cursor:pointer;line-height:1;">×</button>
                    </th>`).join('');
                let bodyRows = rows.map((r,ri) => {
                    let valCells = customColumns.map(c => `
                        <td style="padding:5px 6px;"><input type="number" value="${r.values[c.id]||''}" oninput="window._crUpdateVal('${r.id}','${c.id}',this.value)" style="width:90px;padding:6px;border:1px solid #e0e0e0;border-radius:6px;font-size:12px;" placeholder="0"></td>`).join('');
                    return `<tr id="crRow_${r.id}" style="background:${ri%2===0?'white':'#f9fafb'};">
                        <td style="padding:5px 6px;"><input type="text" value="${r.name||''}" oninput="window._crUpdateName('${r.id}',this.value)" style="width:140px;padding:6px;border:1px solid #e0e0e0;border-radius:6px;font-size:12px;" placeholder="Name / Item"></td>
                        ${valCells}
                        <td style="padding:5px 6px;font-weight:700;color:#10b981;">₹${computeRowTotal(r)}</td>
                        <td style="padding:5px 6px;text-align:center;"><button onclick="window._crDeleteRow('${r.id}')" style="background:#ef4444;border:none;color:white;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:13px;font-weight:700;">×</button></td>
                    </tr>`;
                }).join('');
                let grandTotal = rows.reduce((s,r) => s + computeRowTotal(r), 0);
                return `<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;"><table id="crAutoTable" style="width:100%;border-collapse:collapse;font-size:12px;min-width:480px;">
                    <thead><tr>
                        <th style="padding:8px 10px;background:#667eea;color:white;font-size:12px;min-width:140px;">Name / Item</th>
                        ${headCols}
                        <th style="padding:8px 10px;background:#4f46e5;color:white;font-size:12px;">Total</th>
                        <th style="padding:8px 10px;background:#4f46e5;color:white;font-size:12px;"></th>
                    </tr></thead>
                    <tbody>${bodyRows}</tbody>
                    <tfoot><tr><td colspan="${1+customColumns.length}" style="padding:10px;text-align:right;font-weight:800;color:#1a1a2e;">Grand Total:</td><td style="padding:10px;font-weight:800;color:#10b981;font-size:14px;">₹${grandTotal}</td><td></td></tr></tfoot>
                </table></div>`;
            }

            function refreshTable() {
                let c = document.getElementById('crTableContainer');
                if(c) c.innerHTML = buildTable();
            }

            let schoolInfo = admissionSettings.schoolName || currentUser?.schoolName || 'School';
            let today = new Date();
            let dateStr = today.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
            let timeStr = today.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});

            document.getElementById('app').innerHTML = `
            <div class="inner-bg">
                <div class="sticky-header">${getHeader('Create Receipt', true)}</div>
                <div class="inner-container">
                <div class="form-card">
                    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:18px;">
                        <div>
                            <div class="form-title"><i class="fas fa-receipt"></i> Create Receipt</div>
                            <p style="color:#666;font-size:13px;margin-top:4px;">Naya receipt banayein — columns khud jodiye aur values manually bharein.</p>
                        </div>
                        <div style="display:flex;gap:10px;flex-wrap:wrap;">
                            <button onclick="window._saveReceipt&&window._saveReceipt()" style="background:linear-gradient(135deg,#10b981,#059669);color:white;border:none;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;"><i class="fas fa-save"></i> Save</button>
                            <button onclick="window._printReceipt&&window._printReceipt()" style="background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;"><i class="fas fa-print"></i> Print</button>
                        </div>
                    </div>

                    <div style="background:#f0f4ff;border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
                        <div style="font-size:13px;color:#4338ca;font-weight:700;"><i class="fas fa-hashtag"></i> Receipt No: <span style="font-size:15px;">${receiptLabel}</span></div>
                        <div style="font-size:12px;color:#666;"><i class="fas fa-calendar-alt"></i> ${dateStr} &nbsp;|&nbsp; <i class="fas fa-clock"></i> ${timeStr}</div>
                    </div>

                    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px;">
                        <div style="font-size:13px;font-weight:800;color:#1a1a2e;display:flex;align-items:center;gap:8px;">
                            <i class="fas fa-table" style="color:#667eea;"></i> Receipt Table
                        </div>
                        <div style="display:flex;gap:8px;">
                            <button onclick="window._crAddColumn&&window._crAddColumn()" title="Naya column jodein" style="background:linear-gradient(135deg,#10b981,#059669);color:white;border:none;width:34px;height:34px;border-radius:50%;font-size:16px;font-weight:700;cursor:pointer;"><i class="fas fa-plus"></i></button>
                            <button onclick="window._crAddRow&&window._crAddRow()" style="background:linear-gradient(135deg,#f97316,#ea580c);color:white;border:none;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;"><i class="fas fa-plus"></i> Add Row</button>
                        </div>
                    </div>
                    <div id="crTableContainer"></div>
                </div>
                </div>
            </div>
            ${getOverlay()}
            `;

            refreshTable();

            window._crAddColumn = function() {
                let label = prompt('Column ka naam likhein (jaise: Tuition Fees, Exam Fees, etc.):', '');
                if(label === null) return;
                addColumn(label.trim() || ('Column '+(colSeq+1)));
                refreshTable();
            };
            window._crRenameCol = function(colId, val) {
                let col = customColumns.find(c=>c.id===colId);
                if(col) col.label = val;
            };
            window._crDeleteCol = function(colId) {
                customColumns = customColumns.filter(c=>c.id!==colId);
                rows.forEach(r => { delete r.values[colId]; });
                refreshTable();
            };
            window._crAddRow = function() { addRow(); refreshTable(); };
            window._crDeleteRow = function(rowId) {
                if(rows.length<=1){ showPopup('Kam se kam ek row honi chahiye!', false); return; }
                rows = rows.filter(r=>r.id!==rowId);
                refreshTable();
            };
            window._crUpdateName = function(rowId, val) {
                let r = rows.find(r=>r.id===rowId);
                if(r) r.name = val;
            };
            window._crUpdateVal = function(rowId, colId, val) {
                let r = rows.find(r=>r.id===rowId);
                if(r) { r.values[colId] = val; refreshTable(); }
            };

            window._saveReceipt = function() {
                localStorage.setItem(crKey, String(crNum));
                let rec = {
                    receiptNo: receiptLabel, date: dateStr, time: timeStr,
                    createdBy: currentUser?.name||'Admin',
                    columns: customColumns, rows: rows,
                    timestamp: Date.now()
                };
                let saved = [];
                try { saved = JSON.parse(localStorage.getItem('eRegister_customReceipts')||'[]'); } catch(e){}
                saved.push(rec);
                localStorage.setItem('eRegister_customReceipts', JSON.stringify(saved));
                fsSave('customReceipts', saved);
                showPopup('✅ Receipt #'+receiptLabel+' saved!');
            };

            window._printReceipt = function() {
                localStorage.setItem(crKey, String(crNum));
                let tableHtml = document.getElementById('crAutoTable') ? document.getElementById('crAutoTable').outerHTML.replace(/<input[^>]*value="([^"]*)"[^>]*>/g, '$1') : '';
                // Print mein delete-buttons wali aakhri column hata do, aur input boxes ko plain text mein dikhao
                let printWin = window.open('', '_blank');
                if(!printWin) { showPopup('Popup block hai! Browser settings check karein.', false); return; }
                printWin.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Receipt ${receiptLabel}</title>
                <style>
                    body{font-family:Arial,sans-serif;padding:20px;font-size:12px;}
                    .header{text-align:center;margin-bottom:20px;border-bottom:2px solid #667eea;padding-bottom:14px;}
                    .header h2{color:#1a1a2e;font-size:18px;margin:0 0 4px;}
                    .header p{color:#666;margin:2px 0;font-size:11px;}
                    .receipt-meta{display:flex;justify-content:space-between;margin-bottom:14px;font-size:11px;color:#555;}
                    table{width:100%;border-collapse:collapse;margin-bottom:10px;}
                    th{padding:8px;text-align:left;background:#667eea;color:white;font-size:11px;}
                    td{padding:7px 8px;font-size:11px;border-bottom:1px solid #f0f0f0;}
                    tr:nth-child(even){background:#f8f9fa;}
                    .footer{margin-top:24px;border-top:1px solid #e0e0e0;padding-top:12px;text-align:right;font-size:11px;color:#666;}
                    @media print{body{margin:0;}button{display:none;}}
                </style>
                </head><body>
                <div class="header">
                    <h2>${schoolInfo}</h2>
                    <p><i>Fees Receipt</i></p>
                </div>
                <div class="receipt-meta">
                    <span><b>Receipt No:</b> ${receiptLabel}</span>
                    <span><b>Date:</b> ${dateStr} &nbsp; <b>Time:</b> ${timeStr}</span>
                </div>
                ${tableHtml}
                <div class="footer">Printed by: ${currentUser?.name||'Admin'} &nbsp;|&nbsp; e-Register</div>
                <br>
                <div style="text-align:center;"><button onclick="window.print()" style="padding:10px 28px;background:#667eea;color:white;border:none;border-radius:20px;font-size:14px;font-weight:700;cursor:pointer;">🖨️ Print / Save PDF</button></div>
                </body></html>`);
                printWin.document.close();
                showPopup('✅ Receipt window khulee! Print karein.');
            };
        }

        // ==================== START APP ====================
        initAppData();
    </script>
</body>
</html>
