                    <span style="font-size:14px;color:#555;font-weight:600;"><i class="fas fa-percent" style="color:#f59e0b;"></i> Discount
                        <span style="display:inline-flex;align-items:center;gap:3px;margin-left:6px;background:#f3f4f6;border-radius:14px;padding:2px 5px;">
                            <button onclick="window._setQPGlobalDiscMode('percent')" id="qpSumDiscPctBtn" style="border:none;background:transparent;color:#555;font-size:12px;font-weight:800;cursor:pointer;padding:2px 6px;border-radius:10px;">%</button>
                            <button onclick="window._setQPGlobalDiscMode('rupee')" id="qpSumDiscRsBtn" style="border:none;background:#667eea;color:white;font-size:12px;font-weight:800;cursor:pointer;padding:2px 6px;border-radius:10px;">₹</button>
                        </span>
                    </span>
                    <input type="number" id="qpDiscount" value="0" min="0"
                           style="width:110px;border:1px solid #d1d5db;border-radius:8px;padding:6px 8px;font-size:14px;text-align:right;"
                           oninput="window._calcQPSummary()">
                </div>
                <div style="padding:10px 0;border-bottom:1px solid #e5e7eb;">
                    <div style="font-size:13px;font-weight:700;color:#1a1a2e;margin-bottom:8px;"><i class="fas fa-credit-card" style="color:#667eea;"></i> Mode of Payment</div>
                    <div style="display:flex;gap:7px;flex-wrap:wrap;">
                        <label id="qpMopCashLabel" style="display:flex;align-items:center;gap:5px;padding:7px 13px;border:2px solid #e0e0e0;border-radius:18px;cursor:pointer;background:white;font-size:12px;font-weight:600;">
                            <input type="radio" name="qpModeOfPayment" value="Cash" id="qpMopCash" style="accent-color:#10b981;" onchange="window._updateQPMOP()">
                            <i class="fas fa-money-bill-wave" style="color:#10b981;"></i> Cash
                        </label>
                        <label id="qpMopPaytmLabel" style="display:flex;align-items:center;gap:5px;padding:7px 13px;border:2px solid #e0e0e0;border-radius:18px;cursor:pointer;background:white;font-size:12px;font-weight:600;">
                            <input type="radio" name="qpModeOfPayment" value="Paytm" id="qpMopPaytm" style="accent-color:#00baf2;" onchange="window._updateQPMOP()">
                            <i class="fas fa-mobile-alt" style="color:#00baf2;"></i> Paytm/UPI
                        </label>
                        <label id="qpMopBothLabel" style="display:flex;align-items:center;gap:5px;padding:7px 13px;border:2px solid #e0e0e0;border-radius:18px;cursor:pointer;background:white;font-size:12px;font-weight:600;">
                            <input type="radio" name="qpModeOfPayment" value="Cash & Paytm" id="qpMopBoth" style="accent-color:#f59e0b;" onchange="window._updateQPMOP()">
                            <i class="fas fa-exchange-alt" style="color:#f59e0b;"></i> Both
                        </label>
                    </div>
                    <div id="qpMopSubFields" style="display:none;margin-top:8px;padding:8px;background:#fef3c7;border-radius:10px;border:1px solid #f59e0b;">
                        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
                            <div><label style="font-size:12px;font-weight:600;">Cash (₹):</label> <input type="number" id="qpMopCashAmt" placeholder="0" style="width:80px;padding:5px;border:2px solid #10b981;border-radius:8px;" oninput="window._calcQPSummary()"></div>
                            <div><label style="font-size:12px;font-weight:600;">Paytm (₹):</label> <input type="number" id="qpMopPaytmAmt" placeholder="0" style="width:80px;padding:5px;border:2px solid #00baf2;border-radius:8px;" oninput="window._calcQPSummary()"></div>
                        </div>
                    </div>
                </div>
                <div id="qpSubmittedRow" style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #e5e7eb;">
                    <span style="font-size:14px;color:#555;font-weight:600;"><i class="fas fa-hand-holding-usd" style="color:#10b981;"></i> Submitted (₹)</span>
                    <input type="number" id="qpSubmitted" value="0" min="0"
                           style="width:110px;border:1px solid #d1d5db;border-radius:8px;padding:6px 8px;font-size:14px;text-align:right;"
                           oninput="window._calcQPSummary()">
                </div>
                <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0 0;">
                    <span id="qpBalanceLabel" style="font-size:16px;font-weight:700;color:#1a1a2e;"><i class="fas fa-wallet" style="color:#667eea;"></i> Balance</span>
                    <span id="qpBalanceDisplay" style="font-size:22px;font-weight:800;color:#667eea;">₹0</span>
                </div>
            </div>

            <div id="progressContainer" class="progress-container"><div id="progressBar" class="progress-bar"></div></div>
            <button class="btn btn-success" style="width:100%;padding:14px;font-size:16px;"
                    onclick="window._showQPSaveOptions()">
                <i class="fas fa-save"></i> Save Payment
            </button>
            <div id="qpSaveOptionsBox" style="display:none;margin-top:16px;background:#fef2f2;border-radius:16px;padding:18px;text-align:center;border:1.5px solid #fecaca;">
                <p style="font-weight:700;font-size:15px;margin-bottom:14px;color:#dc2626;">
                    <i class="fas fa-arrow-down"></i> Save as Expense?
                </p>
                <div style="font-size:13px;color:#666;margin-bottom:14px;">Quick payments are recorded in the Expense (red) section of Day Book.</div>
                <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
                    <button onclick="window._saveQP('expense')"
                        style="background:linear-gradient(135deg,#ef4444,#dc2626);color:white;border:none;padding:12px 28px;border-radius:30px;font-size:15px;font-weight:700;cursor:pointer;">
                        <i class="fas fa-save"></i> Confirm &amp; Save
                    </button>
                    <button onclick="document.getElementById('qpSaveOptionsBox').style.display='none'"
                        style="background:#e5e7eb;color:#374151;border:none;padding:12px 24px;border-radius:30px;font-size:15px;font-weight:700;cursor:pointer;">
                        Cancel
                    </button>
                </div>
            </div>

            </div></div>${getOverlay()}</div>`;

            // Show preview QP number (not incremented until Save is pressed)
            let qpNumber = peekNextQPNumber();
            document.getElementById('qpReceiptDisplay').textContent = qpNumber;

            window._setQPDiscMode = function(mode) {
                window._qpDiscMode = mode;
                let pBtn = document.getElementById('qpDiscPctBtn');
                let rBtn = document.getElementById('qpDiscRsBtn');
                if(pBtn && rBtn) {
                    if(mode === 'percent') {
                        pBtn.style.background = 'rgba(255,255,255,0.3)';
                        rBtn.style.background = 'transparent';
                    } else {
                        rBtn.style.background = 'rgba(255,255,255,0.3)';
                        pBtn.style.background = 'transparent';
                    }
                }
                // Table header buttons only — summary discount is independent
                // Update all item discount inputs to reflect mode
                document.querySelectorAll('.qp-item-disc').forEach(inp => {
                    let row = inp.closest('tr');
                    let idx = row ? parseInt(row.getAttribute('data-idx')) : -1;
                    if(idx >= 0 && window._qpRows[idx]) {
                        window._qpRows[idx].discMode = mode;
                    }
                });
                window._calcQPSummary();
            };

            window._setQPGlobalDiscMode = function(mode) {
                window._qpGlobalDiscMode = mode;
                let sp = document.getElementById('qpSumDiscPctBtn');
                let sr = document.getElementById('qpSumDiscRsBtn');
                if(sp && sr) {
                    if(mode === 'percent') {
                        sp.style.background = '#667eea'; sp.style.color = 'white';
                        sr.style.background = 'transparent'; sr.style.color = '#555';
                    } else {
                        sr.style.background = '#667eea'; sr.style.color = 'white';
                        sp.style.background = 'transparent'; sp.style.color = '#555';
                    }
                }
                window._calcQPSummary();
            };

            window._renderQPRows = function() {
                let rows = window._qpRows;
                document.getElementById('qpItemsBody').innerHTML = rows.map((r, i) => {
                    let price = parseFloat(r.price) || 0;
                    let qty = parseFloat(r.qty) || 0;
                    let discVal = parseFloat(r.discount) || 0;
                    let discMode = r.discMode || 'rupee';
                    let subtotal = price * qty;
                    let discountAmt = discMode === 'percent' ? (subtotal * discVal / 100) : discVal;
                    let amt = Math.max(0, subtotal - discountAmt);
                    return `<tr data-idx="${i}" style="background:${i%2===0?'white':'#f9fafb'};">
                        <td style="padding:6px;text-align:center;font-size:12px;color:#999;">${i+1}</td>
                        <td style="padding:6px;">
                            <input value="${r.item||''}"
                                   placeholder="Item name"
                                   style="width:100%;border:1px solid #e5e7eb;border-radius:7px;padding:5px 8px;font-size:13px;"
                                   oninput="window._qpRows[${i}].item=this.value">
                        </td>
                        <td style="padding:6px;text-align:center;">
                            <input type="text" inputmode="numeric" value="${r.qty||1}"
                                   style="width:50px;border:1px solid #e5e7eb;border-radius:7px;padding:5px 4px;font-size:13px;text-align:center;"
                                   oninput="window._qpRows[${i}].qty=+this.value||1;window._calcQPSummary()">
                        </td>
                        <td style="padding:6px;text-align:right;">
                            <input type="text" inputmode="numeric" value="${r.price||0}"
                                   style="width:72px;border:1px solid #e5e7eb;border-radius:7px;padding:5px 6px;font-size:13px;text-align:right;"
                                   oninput="window._qpRows[${i}].price=+this.value||0;window._calcQPSummary()">
                        </td>
                        <td style="padding:6px;text-align:center;">
                            <input type="text" inputmode="numeric" value="${r.discount||0}"
                                   class="qp-item-disc"
                                   style="width:70px;border:1px solid #f59e0b;border-radius:7px;padding:5px 6px;font-size:13px;text-align:center;"
                                   oninput="window._qpRows[${i}].discount=+this.value||0;window._calcQPSummary()">
                        </td>
                        <td id="qpAmt_${i}" style="padding:6px;text-align:right;font-size:13px;font-weight:700;color:#667eea;">₹${amt}</td>
                        <td style="padding:4px;text-align:center;">
                            ${rows.length>1 ? `<button onclick="window._removeQPRow(${i})"
                                style="background:#fee2e2;border:none;color:#ef4444;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer;font-weight:700;">✕</button>` : ''}
                        </td>
                    </tr>`;
                }).join('');
            };

            window._updateQPMOP = function() {
                let labels = ['qpMopCashLabel','qpMopPaytmLabel','qpMopBothLabel'];
                let colors = ['#10b981','#00baf2','#f59e0b'];
                let isBoth = false;
                labels.forEach((id, i) => {
                    let el = document.getElementById(id);
                    if(el) {
                        let radio = el.querySelector('input[type="radio"]');
                        if(radio && radio.checked) {
                            el.style.borderColor = colors[i];
                            el.style.background = colors[i] + '18';
                            if(id === 'qpMopBothLabel') { document.getElementById('qpMopSubFields').style.display = 'block'; isBoth = true; }
                        } else {
                            el.style.borderColor = '#e0e0e0';
                            el.style.background = 'white';
                            if(id === 'qpMopBothLabel') { document.getElementById('qpMopSubFields').style.display = 'none'; }
                        }
                    }
                });
                let submRow = document.getElementById('qpSubmittedRow');
                if(submRow) submRow.style.display = isBoth ? 'none' : '';
                window._calcQPSummary();
            };

            window._searchOldQPReceipt = function() {
                let query = (document.getElementById('qpOldReceiptInput')?.value || '').trim();
                let resultDiv = document.getElementById('qpOldReceiptResult');
                if(!resultDiv) return;
                if(!query) { resultDiv.style.display = 'none'; return; }
                // Match by last 3-4 digits OR exact receipt number (case-insensitive)
                let queryDigits = query.replace(/\D/g, '');
                let queryUpper = query.toUpperCase();
                let found = quickPayments.filter(p => {
                    let rNo = (p.receiptNo || '').toUpperCase();
                    let rDigits = rNo.replace(/\D/g, '');
                    if(rNo === queryUpper) return true;
                    if(queryDigits.length >= 3 && rDigits.endsWith(queryDigits)) return true;
                    return false;
                });
                if(found.length === 0) {
                    resultDiv.style.display = 'block';
                    resultDiv.innerHTML = '<div style="color:#ef4444;font-size:13px;font-weight:600;"><i class="fas fa-times-circle"></i> Receipt not found: ' + query + '</div>';
                    return;
                }
                let p = found[found.length - 1];
                let mop = p.modeOfPayment || p.type || '—';
                let itemsList = Array.isArray(p.items) ? p.items.map(it => `<span style="background:#e0e7ff;color:#667eea;padding:1px 8px;border-radius:8px;font-size:11px;margin:2px;">${it.item || ''} x${it.qty} @₹${it.price}</span>`).join('') : '—';
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `<div style="background:white;border:1px solid #10b981;border-radius:10px;padding:10px;font-size:12px;">
                    <div style="font-weight:700;color:#10b981;margin-bottom:4px;"><i class="fas fa-check-circle"></i> Found: ${p.receiptNo}</div>
                    <div><strong>Name:</strong> ${p.name || '—'} &nbsp; <strong>Date:</strong> ${p.date || '—'}</div>
                    <div><strong>Items:</strong> ${itemsList}</div>
                    <div><strong>Total:</strong> ₹${p.total||0} &nbsp; <strong>Disc:</strong> ₹${p.discount||0} &nbsp; <strong>Submitted:</strong> ₹${p.submitted||0} &nbsp; <strong>Balance:</strong> ₹${p.balance||0}</div>
                    <div><strong>Mode:</strong> ${mop}</div>
                    <button onclick="navigateTo(renderQPMoreInfo,'${p.receiptNo}')" style="margin-top:8px;padding:7px 16px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;"><i class="fas fa-info-circle"></i> More Information</button>
                </div>`;
            };

            window._calcQPSummary = function() {
                let grandTotal = 0;
                let totalDiscount = 0;
                window._qpRows.forEach((r, i) => {
                    let price = parseFloat(r.price) || 0;
                    let qty = parseFloat(r.qty) || 0;
                    let discVal = parseFloat(r.discount) || 0;
                    let discMode = r.discMode || 'rupee';
                    let subtotal = price * qty;
                    let discountAmt = discMode === 'percent' ? (subtotal * discVal / 100) : discVal;
                    let amt = Math.max(0, subtotal - discountAmt);
                    grandTotal += amt;
                    totalDiscount += discountAmt;
                    let el = document.getElementById('qpAmt_' + i);
                    if(el) el.textContent = '₹' + amt;
                });
                let disc = parseFloat(document.getElementById('qpDiscount').value) || 0;
                // Check if global discount is percent mode (uses its own independent mode)
                if(window._qpGlobalDiscMode === 'percent') {
                    disc = Math.round(grandTotal * disc / 100);
                }
                let finalTotal = Math.max(0, grandTotal - disc);

                // Handle MOP
                let qpMopBoth = document.getElementById('qpMopBoth');
                let isBoth = qpMopBoth && qpMopBoth.checked;
                let subm = 0;
                if(isBoth) {
                    let cashAmt = parseFloat(document.getElementById('qpMopCashAmt')?.value) || 0;
                    let paytmAmt = parseFloat(document.getElementById('qpMopPaytmAmt')?.value) || 0;
                    subm = cashAmt + paytmAmt;
                    let sEl = document.getElementById('qpSubmitted');
                    if(sEl) sEl.value = subm;
                } else {
                    subm = parseFloat(document.getElementById('qpSubmitted').value) || 0;
                }

                let bal = finalTotal - subm;
                document.getElementById('qpTotalDisplay').textContent = '₹' + grandTotal;

                let balLabel = document.getElementById('qpBalanceLabel');
                let balDisplay = document.getElementById('qpBalanceDisplay');
                if(bal < 0) {
                    if(balLabel) balLabel.innerHTML = '<i class="fas fa-plus-circle" style="color:#10b981;"></i> <span style="color:#10b981;">Advance</span>';
                    if(balDisplay) { balDisplay.textContent = '₹' + Math.abs(bal); balDisplay.style.color = '#10b981'; }
                } else {
                    if(balLabel) balLabel.innerHTML = '<i class="fas fa-wallet" style="color:#667eea;"></i> Balance';
                    if(balDisplay) { balDisplay.textContent = '₹' + bal; balDisplay.style.color = '#667eea'; }
                }
            };

            window._addQPRow = function() {
                window._qpRows.push({ id: Date.now(), item:'', qty:1, price:0, discount:0, discMode:window._qpDiscMode || 'rupee' });
                window._renderQPRows();
                window._calcQPSummary();
            };

            window._removeQPRow = function(idx) {
                window._qpRows.splice(idx, 1);
                window._renderQPRows();
                window._calcQPSummary();
            };

            window._showQPSaveOptions = function() {
                let name = document.getElementById('qpName').value.trim();
                let prop = document.getElementById('qpProperty').value;
                let hasItem = window._qpRows.some(r => r.item.trim());
                if(!name){ showPopup('Name required!', false); return; }
                if(!prop){ showPopup('Select property type!', false); return; }
                if(!hasItem){ showPopup('Enter at least one item!', false); return; }
                document.getElementById('qpSaveOptionsBox').style.display = 'block';
                document.getElementById('qpSaveOptionsBox').scrollIntoView({ behavior:'smooth' });
            };

            window._saveQP = function(type) {
                let grandTotal = 0;
                let itemsWithDiscount = window._qpRows.filter(r => r.item.trim()).map(r => {
                    let price = parseFloat(r.price) || 0;
                    let qty = parseFloat(r.qty) || 0;
                    let discVal = parseFloat(r.discount) || 0;
                    let discMode = r.discMode || 'rupee';
                    let subtotal = price * qty;
                    let discountAmt = discMode === 'percent' ? (subtotal * discVal / 100) : discVal;
                    let amt = Math.max(0, subtotal - discountAmt);
                    grandTotal += amt;
                    return { ...r, discountAmt, amt };
                });
                let discRaw = parseFloat(document.getElementById('qpDiscount').value) || 0;
                let disc = (window._qpDiscMode === 'percent') ? Math.round(grandTotal * discRaw / 100) : discRaw;
                let finalTotal = Math.max(0, grandTotal - disc);

                // Get MOP
                let qpMopBothEl = document.getElementById('qpMopBoth');
                let qpIsBoth = qpMopBothEl && qpMopBothEl.checked;
                let subm = 0;
                let modeOfPayment = '';
                let mopCashAmt = 0, mopPaytmAmt = 0;
                if(qpIsBoth) {
                    mopCashAmt = parseFloat(document.getElementById('qpMopCashAmt')?.value) || 0;
                    mopPaytmAmt = parseFloat(document.getElementById('qpMopPaytmAmt')?.value) || 0;
                    subm = mopCashAmt + mopPaytmAmt;
                    modeOfPayment = 'Cash & Paytm';
                } else {
                    subm = parseFloat(document.getElementById('qpSubmitted').value) || 0;
                    let qpMopRadios = document.querySelectorAll('input[name="qpModeOfPayment"]');
                    for(let r of qpMopRadios) { if(r.checked) { modeOfPayment = r.value; break; } }
                }
                let bal = finalTotal - subm;
                let qpNumber = getNextQPNumber();
                
                let rec = {
                    id: Date.now(),
                    name:           document.getElementById('qpName').value.trim(),
                    property:       document.getElementById('qpProperty').value,
                    items:          itemsWithDiscount,
                    total:          grandTotal,
                    discount:       disc,
                    submitted:      subm,
                    // balance = amount STILL OWED (>=0). advance = amount PAID EXTRA (>=0).
                    // Yeh dono kabhi ek saath positive nahi honge — agar customer ne zyada
                    // diya hai to woh advance hai, balance 0 rahega; aur agar kam diya hai
                    // to balance wahi rahega, advance 0 rahega. Isse Day Book/print/More-Info
                    // sab jagah '-420' jaisa galat negative number kabhi nahi dikhega.
                    balance:        Math.max(0, bal),
                    advance:        bal < 0 ? Math.abs(bal) : 0,
                    modeOfPayment:  modeOfPayment,
                    cashAmount:     mopCashAmt || undefined,
                    paytmAmount:    mopPaytmAmt || undefined,
                    date: new Date().toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' }),
                    time: new Date().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' }),
                    type: type,
                    receiptNo: qpNumber,
                    timestamp: Date.now()
                };
                quickPayments.push(rec);
                fsSave('quickPayments', quickPayments);
                localStorage.setItem('eRegister_quick_payments', JSON.stringify(quickPayments));
                showProgress(() => {
                    showPopup('✅ Saved as ' + (type === 'expense' ? 'Expense' : 'Income') + '! Receipt: ' + qpNumber);
                    navigateTo(renderHome);
                });
            };

            window._renderQPRows();
            window._calcQPSummary();
            window._setQPDiscMode('rupee');
        }

        // ==================== QP MORE INFORMATION ====================
        function renderQPMoreInfo(receiptNo) {
            let queryDigits = (receiptNo || '').replace(/\D/g, '');
            let all = quickPayments;
            let p = all.find(x => {
                let rNo = (x.receiptNo || '').toUpperCase();
                let rDigits = rNo.replace(/\D/g, '');
                return rNo === (receiptNo || '').toUpperCase() || (queryDigits.length >= 3 && rDigits.endsWith(queryDigits));
            });
            if(!p) { showPopup('Receipt not found!', false); return; }
            let mop = p.modeOfPayment || p.type || '—';
            let itemsList = Array.isArray(p.items) ? p.items.map(it =>
                `<tr><td style="padding:6px 10px;border-bottom:1px solid #f0f0f0;">${it.item || '—'}</td><td style="padding:6px 10px;border-bottom:1px solid #f0f0f0;text-align:center;">${it.qty}</td><td style="padding:6px 10px;border-bottom:1px solid #f0f0f0;text-align:right;">₹${it.price}</td><td style="padding:6px 10px;border-bottom:1px solid #f0f0f0;text-align:right;">₹${(it.qty*(it.price||0)-(it.discountAmt||0)).toFixed(0)}</td></tr>`
            ).join('') : '<tr><td colspan="4" style="padding:10px;color:#999;text-align:center;">No items</td></tr>';
            let newReceiptPreview = peekNextQPNumber();

            document.getElementById('app').innerHTML = `<div class="inner-bg"><div class="sticky-header">${getHeader('More Information', true)}</div><div class="inner-container">
            <div class="form-card">
                <div class="form-title"><i class="fas fa-info-circle" style="color:#667eea;"></i> Last Transaction Details</div>
                <div style="background:#f8f9fa;border-radius:14px;padding:14px;margin-bottom:16px;">
                    <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px;">
                        <span style="background:linear-gradient(135deg,#10b981,#059669);color:white;padding:5px 14px;border-radius:20px;font-weight:700;font-size:13px;"><i class="fas fa-receipt"></i> ${p.receiptNo} <small style="opacity:0.85;">(Old)</small></span>
                        <span style="background:linear-gradient(135deg,#ef4444,#dc2626);color:white;padding:5px 14px;border-radius:20px;font-weight:700;font-size:13px;"><i class="fas fa-receipt"></i> ${newReceiptPreview} <small style="opacity:0.85;">(New)</small></span>
                    </div>
                    <div style="font-size:13px;color:#555;margin-bottom:8px;"><strong>Name:</strong> ${p.name || '—'} &nbsp; <strong>Mode:</strong> ${mop} &nbsp; <strong>Date:</strong> ${p.date || '—'}</div>
                    <table style="width:100%;border-collapse:collapse;font-size:13px;border-radius:10px;overflow:hidden;border:1px solid #e5e7eb;">
                        <thead><tr style="background:linear-gradient(135deg,#667eea,#764ba2);color:white;">
                            <th style="padding:8px 10px;text-align:left;">Item</th>
                            <th style="padding:8px 10px;text-align:center;">Qty</th>
                            <th style="padding:8px 10px;text-align:right;">Price</th>
                            <th style="padding:8px 10px;text-align:right;">Amount</th>
                        </tr></thead>
                        <tbody>${itemsList}</tbody>
                    </table>
                    <div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end;">
                        <span style="background:#e0e7ff;color:#667eea;padding:4px 12px;border-radius:10px;font-size:12px;font-weight:700;">Total: ₹${p.total||0}</span>
                        <span style="background:#fef3c7;color:#b45309;padding:4px 12px;border-radius:10px;font-size:12px;font-weight:700;">Disc: ₹${p.discount||0}</span>
                        <span style="background:#d1fae5;color:#065f46;padding:4px 12px;border-radius:10px;font-size:12px;font-weight:700;">Submitted: ₹${p.submitted||0}</span>
                        ${(p.advance||0)>0?`<span style="background:#d1fae5;color:#059669;padding:4px 12px;border-radius:10px;font-size:12px;font-weight:700;"><i class="fas fa-plus-circle"></i> Advance: ₹${p.advance}</span>`:''}
                        ${(p.balance||0)>0?`<span style="background:#fee2e2;color:#991b1b;padding:4px 12px;border-radius:10px;font-size:12px;font-weight:700;">Balance: ₹${p.balance}</span>`:''}
                    </div>
                </div>

                <div class="form-title" style="margin-top:6px;"><i class="fas fa-plus-circle" style="color:#667eea;"></i> New Transaction</div>
                <div style="margin-bottom:14px;">
                    ${(p.advance||0)>0
                        ? `<div style="background:#d1fae5;border:1.5px solid #6ee7b7;border-radius:12px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;">
                             <span style="font-size:13.5px;font-weight:700;color:#065f46;"><i class="fas fa-plus-circle"></i> Advance Available</span>
                             <span style="font-size:16px;font-weight:800;color:#059669;">₹${p.advance}</span>
                           </div>`
                        : `<div style="background:#fee2e2;border:1.5px solid #fca5a5;border-radius:12px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;">
                             <span style="font-size:13.5px;font-weight:700;color:#991b1b;"><i class="fas fa-wallet"></i> Old Balance</span>
                             <span style="font-size:16px;font-weight:800;color:#dc2626;">₹${p.balance||0}</span>
                           </div>`}
                </div>
                <div style="overflow-x:auto;margin-bottom:10px;">
                    <table style="width:100%;border-collapse:collapse;font-size:13px;" id="miItemsTable">
                        <thead><tr style="background:linear-gradient(135deg,#667eea,#764ba2);color:white;">
                            <th style="padding:8px;text-align:center;width:36px;">Sn.</th>
                            <th style="padding:8px;text-align:left;">Item</th>
                            <th style="padding:8px;text-align:center;width:56px;">Qty</th>
                            <th style="padding:8px;text-align:right;width:90px;">Price</th>
                            <th style="padding:8px;text-align:center;min-width:120px;">
                                Discount
                                <span style="display:inline-flex;align-items:center;gap:4px;margin-left:4px;background:rgba(255,255,255,0.2);border-radius:14px;padding:2px 5px;">
                                    <button onclick="window._setMIItemDiscMode('percent')" id="miItemDiscPctBtn" style="border:none;background:transparent;color:white;font-size:13px;font-weight:800;cursor:pointer;padding:2px 6px;border-radius:10px;">%</button>
                                    <button onclick="window._setMIItemDiscMode('rupee')" id="miItemDiscRsBtn" style="border:none;background:rgba(255,255,255,0.3);color:white;font-size:13px;font-weight:800;cursor:pointer;padding:2px 6px;border-radius:10px;">₹</button>
                                </span>
                            </th>
                            <th style="padding:8px;text-align:right;width:90px;">Amount</th>
                            <th style="padding:8px;width:30px;"></th>
                        </tr></thead>
                        <tbody id="miItemsBody"></tbody>
                    </table>
                </div>
                <button onclick="window._addMIRow()" style="background:#e0e7ff;color:#667eea;border:none;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:14px;"><i class="fas fa-plus"></i> Add Row</button>
                <div style="background:#f8f9fa;border-radius:12px;padding:12px;margin-bottom:10px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding-top:4px;">
                        <span style="font-size:13px;font-weight:700;color:#555;"><i class="fas fa-tag" style="color:#f59e0b;"></i> Discount
                            <span style="display:inline-flex;align-items:center;gap:3px;margin-left:6px;background:#e5e7eb;border-radius:14px;padding:2px 5px;">
                                <button onclick="window._setMIGlobalDiscMode('percent')" id="miSumDiscPctBtn" style="border:none;background:transparent;color:#555;font-size:12px;font-weight:800;cursor:pointer;padding:2px 6px;border-radius:10px;">%</button>
                                <button onclick="window._setMIGlobalDiscMode('rupee')" id="miSumDiscRsBtn" style="border:none;background:#667eea;color:white;font-size:12px;font-weight:800;cursor:pointer;padding:2px 6px;border-radius:10px;">₹</button>
                            </span>
                        </span>
                        <input type="number" id="miDiscount" value="0" min="0" style="width:110px;padding:6px;border:1px solid #e0e0e0;border-radius:8px;text-align:right;" oninput="window._calcMISummary()">
                    </div>
                    <div style="font-size:13px;font-weight:700;color:#555;margin-bottom:8px;"><i class="fas fa-credit-card" style="color:#667eea;"></i> Mode of Payment</div>
                    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;">
                        <label style="display:flex;align-items:center;gap:5px;padding:6px 12px;border:2px solid #10b981;border-radius:16px;cursor:pointer;background:#f0fdf4;font-size:12px;font-weight:600;">
                            <input type="radio" name="miMOP" value="Cash" id="miMopCash" checked style="accent-color:#10b981;"> <i class="fas fa-money-bill-wave" style="color:#10b981;"></i> Cash
                        </label>
                        <label style="display:flex;align-items:center;gap:5px;padding:6px 12px;border:2px solid #e0e0e0;border-radius:16px;cursor:pointer;background:white;font-size:12px;font-weight:600;">
                            <input type="radio" name="miMOP" value="Paytm" id="miMopPaytm" style="accent-color:#00baf2;"> <i class="fas fa-mobile-alt" style="color:#00baf2;"></i> Paytm/UPI
                        </label>
                    </div>
                    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid #e5e7eb;">
                        <span style="font-size:13px;font-weight:600;color:#555;">Total After Discount (₹)</span>
                        <span id="miTotalDisplay" style="font-size:18px;font-weight:800;color:#1a1a2e;">₹0</span>
                    </div>
                    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid #e5e7eb;">
                        <span style="font-size:13px;font-weight:600;color:#555;"><i class="fas fa-hand-holding-usd" style="color:#10b981;"></i> Submitted (₹)</span>
                        <input type="number" id="miSubmitted" value="0" min="0" style="width:110px;padding:6px;border:1px solid #e0e0e0;border-radius:8px;text-align:right;" oninput="window._calcMISummary()">
                    </div>
                    <div id="miAdjustNote" style="font-size:11.5px;color:#059669;font-weight:600;text-align:right;padding:2px 0;display:none;"></div>
                    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid #e5e7eb;">
                        <span id="miBalanceLabel" style="font-size:14px;font-weight:700;color:#1a1a2e;"><i class="fas fa-wallet" style="color:#667eea;"></i> Balance</span>
                        <span id="miBalanceDisplay" style="font-size:20px;font-weight:800;color:#667eea;">₹0</span>
                    </div>
                </div>
                <button onclick="window._saveMIQP('${p.receiptNo}')" style="width:100%;padding:14px;background:linear-gradient(135deg,#ef4444,#dc2626);color:white;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;">
                    <i class="fas fa-save"></i> Save as Expense &nbsp;<span style="opacity:0.85;font-size:12px;">(Receipt: ${newReceiptPreview})</span>
                </button>
            </div>
            </div>${getOverlay()}</div>`;

            // Naya transaction hamesha khaali items se shuru hota hai — purana balance/advance
            // ab line-item ke roop mein "fake" item nahi banta, balki neeche ke summary section
            // mein automatically settle/add hota hai (taaki Total Amount sirf asli items ka ho).
            window._miRows = [{ item: '', qty: 1, price: 0, discount: 0, discMode: 'rupee' }];
            window._miItemDiscMode = 'rupee';
            window._miGlobalDiscMode = 'rupee';

            window._setMIItemDiscMode = function(mode) {
                window._miItemDiscMode = mode;
                let pctBtn = document.getElementById('miItemDiscPctBtn');
                let rsBtn = document.getElementById('miItemDiscRsBtn');
                if(pctBtn && rsBtn) {
                    pctBtn.style.background = mode === 'percent' ? 'rgba(255,255,255,0.3)' : 'transparent';
                    rsBtn.style.background = mode === 'rupee' ? 'rgba(255,255,255,0.3)' : 'transparent';
                }
                // Naye add hone wale rows is mode ko use karenge; jo rows pehle se hain unka mode wahi rahega.
            };

            window._setMIGlobalDiscMode = function(mode) {
                window._miGlobalDiscMode = mode;
                let pctBtn = document.getElementById('miSumDiscPctBtn');
                let rsBtn = document.getElementById('miSumDiscRsBtn');
                if(pctBtn && rsBtn) {
                    pctBtn.style.background = mode === 'percent' ? '#667eea' : 'transparent';
                    pctBtn.style.color = mode === 'percent' ? 'white' : '#555';
                    rsBtn.style.background = mode === 'rupee' ? '#667eea' : 'transparent';
                    rsBtn.style.color = mode === 'rupee' ? 'white' : '#555';
                }
                window._calcMISummary();
            };

            window._renderMIRows = function() {
                let rows = window._miRows;
                document.getElementById('miItemsBody').innerHTML = rows.map((r, i) => {
                    let qty = parseFloat(r.qty)||0, price = parseFloat(r.price)||0;
                    let discVal = parseFloat(r.discount)||0;
                    let discMode = r.discMode || 'rupee';
                    let subtotal = qty * price;
                    let discountAmt = discMode === 'percent' ? (subtotal * discVal / 100) : discVal;
                    let amt = Math.max(0, subtotal - discountAmt);
                    return `<tr style="background:${i%2===0?'white':'#f9fafb'};">
                        <td style="padding:6px;text-align:center;font-size:12px;color:#999;">${i+1}</td>
                        <td style="padding:6px;"><input value="${r.item||''}" placeholder="Item name" style="width:100%;border:1px solid #e5e7eb;border-radius:7px;padding:5px 8px;font-size:13px;" oninput="window._miRows[${i}].item=this.value"></td>
                        <td style="padding:6px;text-align:center;"><input type="number" value="${r.qty||1}" style="width:46px;border:1px solid #e5e7eb;border-radius:7px;padding:5px 4px;font-size:13px;text-align:center;" oninput="window._miRows[${i}].qty=+this.value||1;window._calcMISummary()"></td>
                        <td style="padding:6px;text-align:right;"><input type="number" value="${r.price||0}" style="width:80px;border:1px solid #e5e7eb;border-radius:7px;padding:5px 6px;font-size:13px;text-align:right;" oninput="window._miRows[${i}].price=+this.value||0;window._calcMISummary()"></td>
                        <td style="padding:6px;text-align:center;">
                            <input type="number" value="${r.discount||0}" min="0" style="width:64px;border:1px solid #e5e7eb;border-radius:7px;padding:5px 4px;font-size:13px;text-align:center;" oninput="window._miRows[${i}].discount=+this.value||0;window._calcMISummary()">
                            <span style="display:inline-flex;gap:2px;margin-left:3px;background:#f1f3f8;border-radius:10px;padding:1px 3px;">
                                <button onclick="window._miRows[${i}].discMode='percent';window._renderMIRows();window._calcMISummary();" style="border:none;background:${discMode==='percent'?'#667eea':'transparent'};color:${discMode==='percent'?'white':'#555'};font-size:10px;font-weight:800;cursor:pointer;padding:1px 4px;border-radius:8px;">%</button>
                                <button onclick="window._miRows[${i}].discMode='rupee';window._renderMIRows();window._calcMISummary();" style="border:none;background:${discMode==='rupee'?'#667eea':'transparent'};color:${discMode==='rupee'?'white':'#555'};font-size:10px;font-weight:800;cursor:pointer;padding:1px 4px;border-radius:8px;">₹</button>
                            </span>
                        </td>
                        <td style="padding:6px;text-align:right;font-size:13px;font-weight:700;color:#667eea;">₹${amt}</td>
                        <td style="padding:4px;text-align:center;">${rows.length>1?`<button onclick="window._miRows.splice(${i},1);window._renderMIRows();window._calcMISummary();" style="background:#fee2e2;border:none;color:#ef4444;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer;">✕</button>`:''}</td>
                    </tr>`;
                }).join('');
            };

            window._addMIRow = function() {
                window._miRows.push({ item: '', qty: 1, price: 0, discount: 0, discMode: window._miItemDiscMode || 'rupee' });
                window._renderMIRows();
                window._calcMISummary();
            };

            // Total Amount = items ka sum (item-level discount ke baad), discount se pehle.
            function _miItemsTotal() {
                return (window._miRows||[]).reduce((s,r) => {
                    let qty = parseFloat(r.qty)||0, price = parseFloat(r.price)||0;
                    let discVal = parseFloat(r.discount)||0;
                    let discMode = r.discMode || 'rupee';
                    let subtotal = qty * price;
                    let discountAmt = discMode === 'percent' ? (subtotal * discVal / 100) : discVal;
                    return s + Math.max(0, subtotal - discountAmt);
                }, 0);
            }

            window._calcMISummary = function() {
                let itemsTotal = _miItemsTotal();

                let discRaw = parseFloat(document.getElementById('miDiscount')?.value) || 0;
                let disc = (window._miGlobalDiscMode === 'percent') ? Math.round(itemsTotal * discRaw / 100) : discRaw;
                let afterDiscount = Math.max(0, itemsTotal - disc);

                // Purana advance hamesha pehle is naye total ke against settle hota hai;
                // agar purana balance (udhaar) tha to woh is naye total mein jud jaata hai.
                let adjustedTotal = afterDiscount;
                let noteEl = document.getElementById('miAdjustNote');
                if((p.advance||0) > 0) {
                    let settled = Math.min(p.advance, afterDiscount);
                    adjustedTotal = Math.max(0, afterDiscount - p.advance);
                    if(noteEl) { noteEl.style.display = 'block'; noteEl.textContent = `Advance settled: ₹${settled} adjusted from previous advance.`; }
                } else if((p.balance||0) > 0) {
                    adjustedTotal = afterDiscount + p.balance;
                    if(noteEl) { noteEl.style.display = 'block'; noteEl.textContent = `Old balance added: ₹${p.balance} from previous due.`; }
                } else {
                    if(noteEl) { noteEl.style.display = 'none'; }
                }

                let submitted = parseFloat(document.getElementById('miSubmitted')?.value) || 0;
                let bal = adjustedTotal - submitted;

                let tEl = document.getElementById('miTotalDisplay');
                if(tEl) {
                    if((p.advance||0) > 0) {
                        let settled = Math.min(p.advance, afterDiscount);
                        tEl.style.color = '#f59e0b';
                        tEl.textContent = '₹' + afterDiscount + ' - ₹' + settled + ' = ₹' + adjustedTotal;
                    } else if((p.balance||0) > 0) {
                        tEl.style.color = '#f59e0b';
                        tEl.textContent = '₹' + afterDiscount + ' + ₹' + p.balance + ' = ₹' + adjustedTotal;
                    } else {
                        tEl.style.color = '#1a1a2e';
                        tEl.textContent = '₹' + adjustedTotal;
                    }
                }

                let balLabel = document.getElementById('miBalanceLabel');
                let balDisplay = document.getElementById('miBalanceDisplay');
                if(bal < 0) {
                    if(balLabel) balLabel.innerHTML = '<i class="fas fa-plus-circle" style="color:#10b981;"></i> <span style="color:#10b981;">Advance</span>';
                    if(balDisplay) { balDisplay.textContent = '₹' + Math.abs(bal); balDisplay.style.color = '#10b981'; }
                } else {
                    if(balLabel) balLabel.innerHTML = '<i class="fas fa-wallet" style="color:#667eea;"></i> Balance';
                    if(balDisplay) { balDisplay.textContent = '₹' + bal; balDisplay.style.color = '#667eea'; }
                }
            };

            window._saveMIQP = function(prevReceiptNo) {
                let name = p.name || '';
                if(!name) { showPopup('Name missing on original receipt!', false); return; }
                let items = (window._miRows||[]).filter(r => (r.item||'').trim()).map(r => {
                    let qty = parseFloat(r.qty)||0, price = parseFloat(r.price)||0;
                    let discVal = parseFloat(r.discount)||0;
                    let discMode = r.discMode || 'rupee';
                    let subtotal = qty * price;
                    let discountAmt = discMode === 'percent' ? (subtotal * discVal / 100) : discVal;
                    return { item: r.item, qty: qty||1, price: price||0, discount: discVal, discMode, discountAmt };
                });
                let itemsTotal = _miItemsTotal();
                let discRaw = parseFloat(document.getElementById('miDiscount')?.value) || 0;
                let disc = (window._miGlobalDiscMode === 'percent') ? Math.round(itemsTotal * discRaw / 100) : discRaw;
                let afterDiscount = Math.max(0, itemsTotal - disc);

                let adjustedTotal = afterDiscount;
                if((p.advance||0) > 0) adjustedTotal = Math.max(0, afterDiscount - p.advance);
                else if((p.balance||0) > 0) adjustedTotal = afterDiscount + p.balance;

                let submitted = parseFloat(document.getElementById('miSubmitted')?.value) || 0;
                let bal = adjustedTotal - submitted;
                let mopEl = document.querySelector('input[name="miMOP"]:checked');
                let mop = mopEl ? mopEl.value : 'Cash';
                let qpNumber = getNextQPNumber();
                let now = new Date();
                let newPayment = {
                    id: Date.now(), receiptNo: qpNumber, name,
                    date: now.toLocaleDateString('en-IN'), time: now.toLocaleTimeString('en-IN'),
                    items, total: adjustedTotal, discount: disc, submitted,
                    balance: Math.max(0, bal), advance: bal < 0 ? Math.abs(bal) : 0,
                    prevReceipt: prevReceiptNo, modeOfPayment: mop, type: 'expense',
                    timestamp: now.getTime()
                };
                quickPayments.push(newPayment);
                fsSave('quickPayments', quickPayments);
                localStorage.setItem('eRegister_quickPayments', JSON.stringify(quickPayments));
                showPopup('✅ Expense saved! Receipt: ' + qpNumber);
                navigateTo(renderQuickPayment);
            };

            window._renderMIRows();
            window._calcMISummary();
        }

        // ==================== DAY BOOK ====================
        function renderDayBook() {
            let income  = quickPayments.filter(p => p.type === 'income');
            let expense = quickPayments.filter(p => p.type === 'expense');

            function getItemSummary(e) {
                if(Array.isArray(e.items) && e.items.length) {
                    let lines = e.items.map(it => {
                        let qty = parseFloat(it.qty)||0;
                        let price = parseFloat(it.price)||0;
                        let discVal = parseFloat(it.discount)||0;
                        let discMode = it.discMode || 'rupee';
                        let subtotal = qty * price;
                        let discountAmt = discMode === 'percent' ? (subtotal * discVal / 100) : discVal;
                        let amt = Math.max(0, subtotal - discountAmt);
                        let discDisplay = discVal > 0 ? (discMode === 'percent' ? discVal + '%' : '₹' + discVal) : '';
                        return `<span style="display:block;">${it.item} ×${qty} @₹${price} ${discDisplay ? 'disc:'+discDisplay : ''} = <strong>₹${amt}</strong></span>`;
                    });
                    let grandTotal = e.items.reduce((s,it) => {
                        let qty = parseFloat(it.qty)||0;
                        let price = parseFloat(it.price)||0;
                        let discVal = parseFloat(it.discount)||0;
                        let discMode = it.discMode || 'rupee';
                        let subtotal = qty * price;
                        let discountAmt = discMode === 'percent' ? (subtotal * discVal / 100) : discVal;
                        return s + Math.max(0, subtotal - discountAmt);
                    }, 0);
                    lines.push(`<span style="display:block;border-top:1px solid #e0e0e0;margin-top:3px;padding-top:3px;color:#667eea;font-weight:700;">Total: ₹${grandTotal}</span>`);
                    return lines.join('');
                }
                return (e.item||'').replace(/\n/g,'<br>');
            }
            function getTotalQty(e) {
                if(Array.isArray(e.items) && e.items.length) {
                    return e.items.reduce((s,it) => s+(parseFloat(it.qty)||0), 0);
                }
                return e.qty||1;
            }
            function getName(e) { return e.name || e.creditorName || ''; }

            // Day Book Print Selection
            let selectedRows = new Set();

            function toggleRowSelect(id, cb) {
                if(cb.checked) selectedRows.add(id);
                else selectedRows.delete(id);
                document.getElementById('dayBookPrintBtn').style.display = selectedRows.size > 0 ? 'inline-flex' : 'none';
            }

            function printSelectedDayBook() {
                let allEntries = [...income, ...expense];
                let selected = allEntries.filter(e => selectedRows.has(e.id));
                if(selected.length === 0) { showPopup('Koi row select nahi ki!', false); return; }
                printDayBookEntries(selected);
            }

            function printDayBookEntries(entries) {
                function balParts(e) {
                    let rawBal = e.balance;
                    let adv = e.advance || 0;
                    if(adv === 0 && rawBal < 0) { adv = Math.abs(rawBal); rawBal = 0; }
                    return { balance: Math.max(0, rawBal||0), advance: adv };
                }
                let rowsHtml = entries.map(e => {
                    let receiptDisplay = e.receiptNo ? `<span style="background:#ef4444;color:white;padding:1px 8px;border-radius:10px;font-size:10px;font-weight:700;">${e.receiptNo}</span>` : '';
                    let mopText = e.modeOfPayment || '—';
                    let bp = balParts(e);
                    let balCell = bp.advance > 0
                        ? `<span style="color:#059669;font-weight:700;">+₹${bp.advance} (Advance)</span>`
                        : `₹${bp.balance}`;
                    return `<tr style="background:#f8fafc;border-bottom:1px solid #e0e0e0;">
                        <td style="padding:6px 8px;font-size:11px;">${e.date}<br><span style="color:#999;font-size:9px;">${e.time||''}</span><br>${receiptDisplay}</td>
                        <td style="padding:6px 8px;font-size:11px;font-weight:600;">${getName(e)}</td>
                        <td style="padding:6px 8px;font-size:11px;">${e.property||''}</td>
                        <td style="padding:6px 8px;font-size:11px;max-width:140px;word-break:break-word;">${getItemSummary(e)}</td>
                        <td style="padding:6px 8px;font-size:11px;text-align:center;">${getTotalQty(e)}</td>
                        <td style="padding:6px 8px;font-size:11px;text-align:right;">₹${e.discount||0}</td>
                        <td style="padding:6px 8px;font-size:11px;text-align:right;font-weight:700;">₹${e.total||0}</td>
                        <td style="padding:6px 8px;font-size:11px;text-align:right;">${balCell}</td>

            function buildTable(entries, color, typeLabel) {
                if(entries.length === 0) {

                let isExpense = typeLabel === 'Expense';
                // Backward-compatible helper: naye records mein 'advance' field alag se hai,
                // lekin purane records mein balance hi negative store ho sakta hai — dono
                // cases ko sahi se handle karo taaki kahin bhi '-420' jaisa number na dikhe.
                function balParts(e) {
                    let rawBal = e.balance;
                    let adv = e.advance || 0;
                    if(adv === 0 && rawBal < 0) { adv = Math.abs(rawBal); rawBal = 0; }
                    return { balance: Math.max(0, rawBal||0), advance: adv };

                let rows = entries.map((e, i) => {
                    let receiptDisplay = e.receiptNo ? `<span style="background:#ef4444;color:white;padding:1px 8px;border-radius:10px;font-size:10px;font-weight:700;">${e.receiptNo}</span>` : '';

                let sumTotal   = entries.reduce((s,e) => s + (e.total||0), 0);
                let sumBalance = entries.reduce((s,e) => s + balParts(e).balance, 0);
                let sumAdvance = entries.reduce((s,e) => s + balParts(e).advance, 0);
                let sumSubmitted = entries.reduce((s,e) => s + (e.submitted||0), 0);

        // ==================== PROFIT AND LOSS SUMMARY ====================
        function renderProfitLossSummary() {
            // Default range: last 7 days through today (purely a sensible starting point;
            // user can change both dates any time via the native date pickers).
            let todayObj = new Date();
            let weekAgoObj = new Date(); weekAgoObj.setDate(weekAgoObj.getDate() - 7);
            let toISO = (d) => d.toISOString().split('T')[0];

            window._plState = {
                fromDate: toISO(weekAgoObj),
                toDate: toISO(todayObj),
                filterMode: 'none',        // 'none' | 'income' | 'expense' | 'class' | 'date'
                filterClass: '',
                results: null              // populated after Search
            };

            // ---- Build a unified list of all transactions (Quick Payment income/expense
            // + Fees Card payment history, which always counts as income) ----
            function getAllTransactions() {
                let txns = [];
                // Quick Payment entries (income or expense, as tagged at save time)
                quickPayments.forEach(p => {
                    txns.push({
                        source: 'quickPayment',
                        txType: p.type === 'income' ? 'income' : 'expense',
                        timestamp: p.timestamp || 0,
                        date: p.date, time: p.time,
                        className: '', // Quick Payments aren't tied to a class
                        studentName: p.name || '',
                        contact: '', rollNo: '', fatherName: '',
                        totalAmount: p.total || 0,
                        submitted: p.submitted || 0,
                        discount: p.discount || 0,
                        balance: p.balance || 0,
                        advance: p.advance || 0,
                        modeOfPayment: p.modeOfPayment || '—',
                        submittedBy: p.submittedBy || (currentUser ? currentUser.name : '—'),
                        receiptNo: p.receiptNo || ''
                    });
                });
                // Fees Card payment history (always income — fees collected from students)
                Object.keys(paymentHistory).forEach(studentId => {
                    (paymentHistory[studentId] || []).forEach(h => {
                        if(!h.timestamp) return; // skip legacy records saved before this field existed
                        txns.push({
                            source: 'feesCard',
                            txType: 'income',
                            timestamp: h.timestamp || 0,
                            date: h.date ? h.date.split(',')[0] : '', time: h.date ? (h.date.split(',')[1]||'').trim() : '',
                            className: h.studentClass || '',
                            studentName: h.studentName || '',
                            contact: h.studentContact || '',
                            rollNo: h.studentRollNo || '',
                            fatherName: h.studentFatherName || '',
                            totalAmount: h.memberTotal || 0,
                            submitted: h.submittedAmount || h.amount || 0,
                            discount: h.discount || 0,
                            balance: h.balance || 0,
                            advance: 0,
                            modeOfPayment: h.modeOfPayment || '—',

                    let input = document.createElement('input');

                    input.id = `invName_${i}`;
                    nameEl.replaceWith(input);

                if(qtyEl) { qtyEl.readOnly = false; qtyEl.style.border = '2px solid #667eea'; qtyEl.style.background = 'white'; }
                if(priceEl) { priceEl.readOnly = false; priceEl.style.border = '2px solid #667eea'; priceEl.style.background = 'white'; }

            };

            window.saveInvRowEdit = function(i) {
                let nameEl = document.getElementById(`invName_${i}`);
                let qtyEl = document.getElementById(`invQty_${i}`);
                let priceEl = document.getElementById(`invPrice_${i}`);
                let name = nameEl ? (nameEl.value !== undefined ? nameEl.value : nameEl.textContent) : '';
                let qty = parseInt(qtyEl ? qtyEl.value : 0) || 0;
                let price = parseFloat(priceEl ? priceEl.value : 0) || 0;
                if(window._inventoryData[i]) {
                    window._inventoryData[i].name = name.trim() || window._inventoryData[i].name;
                    window._inventoryData[i].qty = qty;
                    window._inventoryData[i].price = price;
                }
                renderInvRows();
            };

            let invDelMode = false;
            window.toggleInvDeleteMode = function() {
                invDelMode = !invDelMode;

                document.querySelectorAll('.inv-sn').forEach(s => { s.style.display = invDelMode ? 'none' : 'inline'; });
                document.getElementById('invDeleteSelectedBtn').style.display = invDelMode ? 'block' : 'none';
                if(invDelMode) showPopup('Select items to delete.');
            };

            window.deleteSelectedInvItems = function() {
                let toDelete = [];
                document.querySelectorAll('.inv-del-check:checked').forEach(cb => toDelete.push(parseInt(cb.getAttribute('data-idx'))));
                if(toDelete.length === 0) { showPopup('Select at least one item!', false); return; }
                if(!confirm('Delete ' + toDelete.length + ' selected item(s)?')) return;
                window._inventoryData = window._inventoryData.filter((_, i) => !toDelete.includes(i));
                invDelMode = false;
                document.getElementById('invDeleteSelectedBtn').style.display = 'none';
                renderInvRows();
                showPopup('✅ Deleted!');
            };

            window.saveInventory = function() {

                    let nameEl = document.getElementById(`invName_${i}`);
                    if(qtyEl) item.qty = parseInt(qtyEl.value) || item.qty;
                    if(priceEl) item.price = parseFloat(priceEl.value) || item.price;
                    if(nameEl && nameEl.value !== undefined) item.name = nameEl.value.trim() || item.name;
                });
                fsSave('inventoryData', window._inventoryData);
                localStorage.setItem('eRegister_inventory', JSON.stringify(window._inventoryData));
                showPopup('✅ Inventory saved successfully!');
            };

        // hai: Tuition, Exam, Dress, Book, Admission, Registration Fees. Multiple ya single
        // ya koi bhi select na karna — sab allowed hai.
        function buildFreeStepOptionsHtml(localKey, label, subLabel) {
            return `<div style="background:white;border:2px solid #e0e0e0;border-radius:14px;padding:14px 16px;margin-bottom:12px;">

                    <label style="display:inline-flex;align-items:center;gap:6px;margin:4px 10px 4px 0;font-size:12px;cursor:pointer;background:#fef3c7;border:1px solid #f3d39b;border-radius:8px;padding:4px 10px;"><input type="checkbox" value="tuitionFree" style="width:15px;height:15px;cursor:pointer;">Tuition Fees</label>

                    <label style="display:inline-flex;align-items:center;gap:6px;margin:4px 10px 4px 0;font-size:12px;cursor:pointer;background:#fef3c7;border:1px solid #f3d39b;border-radius:8px;padding:4px 10px;"><input type="checkbox" value="dressFree" style="width:15px;height:15px;cursor:pointer;">Dress Fees</label>
                    <label style="display:inline-flex;align-items:center;gap:6px;margin:4px 10px 4px 0;font-size:12px;cursor:pointer;background:#fef3c7;border:1px solid #f3d39b;border-radius:8px;padding:4px 10px;"><input type="checkbox" value="bookFree" style="width:15px;height:15px;cursor:pointer;">Book Fees</label>
                    <label style="display:inline-flex;align-items:center;gap:6px;margin:4px 10px 4px 0;font-size:12px;cursor:pointer;background:#fef3c7;border:1px solid #f3d39b;border-radius:8px;padding:4px 10px;"><input type="checkbox" value="admissionFree" style="width:15px;height:15px;cursor:pointer;">Admission Fees</label>

                </div>

        }
        // localKey se us student ke selected free-flags collect karta hai. Agar kuch bhi
        // select nahi kiya gaya, to null return hota hai (matlab student free nahi hai).
        function collectFreeStepSelections(localKey) {
            let boxes = document.querySelectorAll(`#freeStepOpts_${localKey} input[type="checkbox"]`);
            let freeType = { everything:false, tuitionFree:false, examFree:false, dressFree:false, bookFree:false, admissionFree:false, registrationFree:false, additionalFree:false };
            let any = false;
            boxes.forEach(cb => { if(cb.checked) { freeType[cb.value] = true; any = true; } });
            return any ? freeType : null;
        }

        }

            let snap = window._singleStep2Snapshot || {};

div><div class="input-group"><label><i class="fas fa-calendar-alt"></i> DOB (Student 1)</label><input type="date" id="dbl1Dob" value="${doubleStep1Data.stu1Dob||''}"></div></div><div class="form-row"><div class="input-group"><label><i class="fas fa-calendar-alt"></i> DOB (Student 2)</label><input type="date" id="dbl2Dob" value="${doubleStep1Data.stu2Dob||''}"></div><div class="input-group"><label><i class="fas fa-home"></i> Present Address</label><textarea id="dblPresent" rows="2">${doubleStep1Data.presentAddress||''}</textarea></div></div><div class="form-row"><div class="input-group"><label><i class="fas fa-map-marker-alt"></i> Permanent Address</label><textarea id="dblPermanent" rows="2">${doubleStep1Data.permanentAddress||''}</textarea></div><div class="input-group"><label><i class="fas fa-id-card"></i> Father Aadhar</label><input type="text" id="dblFAadhar" value="${doubleStep1Data.fatherAadhar||''}"></div></div><div class="form-row"><div class="input-group"><label><i class="fas fa-id-card"></i> Mother Aadhar</label><input type="text" id="dblMAadhar" value="${doubleStep1Data.motherAadhar||''}"></div></div><div id="progressContainer" class="progress-container"><div id="progressBar" class="progress-bar"></div></div><button class="btn btn-primary" onclick="goToDoubleStep2()"><i class="fas fa-arrow-right"></i> Next</button></div><div class="image-column"><img src="${img.doubleProfile}" class="big-logo" onerror="this.src='${img.singleProfile}'"></div></div></div></div>${getOverlay()}</div>`;

div class="input-group"><label><i class="fas fa-chalkboard"></i> Old Passed Class</label><input type="text" id="dbl2OldClass"></div><div class="input-group"><label><i class="fas fa-user-graduate"></i> New Admission Class</label><select id="dbl2NewClass"><option value="">Select</option>${classList.map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div></div><div class="form-row"><div class="input-group"><label><i class="fas fa-fingerprint"></i> Student Aadhar Number</label><input type="text" id="dbl2Aadhar" maxlength="12" inputmode="numeric" placeholder="12-digit" oninput="this.value=this.value.replace(/[^0-9]/g,'')"></div><div class="input-group"><label><i class="fas fa-wallet"></i> Old Balance (₹)</label><input type="number" id="dbl2OldBal" value="0" min="0"></div></div><div id="progressContainer" class="progress-container"><div id="progressBar" class="progress-bar"></div></div><div class="flex-btns"><button class="btn btn-primary" onclick="navigateTo(renderDoubleStep1)"><i class="fas fa-arrow-left"></i> Back</button><button class="btn btn-success" onclick="goToDoubleStep3()"><i class="fas fa-arrow-right"></i> Next</button></div></div><div class="image-column"><img src="${img.doubleProfile}" class="big-logo" onerror="this.src='${img.singleProfile}'"></div></div></div></div>${getOverlay()}</div>`;

        // ==================== FAMILY ADMISSION ====================
        function renderFamilyStep1() {
            document.getElementById('app').innerHTML = `<div class="inner-bg"><div class="sticky-header">${getHeader('Family Admission', true)}</div><div class="inner-container"><div class="form-card"><div class="two-column-layout"><div class="form-column"><div class="form-title"><i class="fas fa-users"></i> Family Details</div><div class="form-row"><div class="input-group"><label><i class="fas fa-users"></i> Family Name <span style="color:#ef4444;">*</span></label><input type="text" id="famFamilyName" placeholder="e.g. Sharma Family" value="${familyDetailsData.familyName||''}"></div><div class="input-group"><label><i class="fas fa-phone"></i> Contact Number</label><input type="tel" id="famContact" value="${familyDetailsData.contact||''}"></div></div><div class="form-row"><div class="input-group"><label><i class="fas fa-father"></i> Father Name</label><input type="text" id="famFather" value="${familyDetailsData.fatherName||''}"></div><div class="input-group"><label><i class="fas fa-mother"></i> Mother Name</label><input type="text" id="famMother" value="${familyDetailsData.motherName||''}"></div></div><div class="form-row"><div class="input-group"><label><i class="fas fa-home"></i> Address</label><textarea id="famAddress" rows="2">${familyDetailsData.address||''}</textarea></div></div><div class="form-row"><div class="input-group"><label><i class="fas fa-id-card"></i> Father Aadhar</label><input type="text" id="famFAadhar" value="${familyDetailsData.fatherAadhar||''}"></div><div class="input-group"><label><i class="fas fa-id-card"></i> Mother Aadhar</label><input type="text" id="famMAadhar" value="${familyDetailsData.motherAadhar||''}"></div></div><button class="btn btn-primary" onclick="goToFamilyStep2()"><i class="fas fa-arrow-right"></i> Next</button></div><div class="image-column"><img src="${img.familyProfile}" class="big-logo"></div></div></div></div>${getOverlay()}</div>`;

        function renderFamilyStep2() {
            let studentsHtml='';
            familyStudents.forEach(s=>{ studentsHtml+=`<div class="student-row" id="row${s.id}"><div class="student-header"><span class="student-title"><i class="fas fa-user-graduate"></i> Student ${s.id}</span>${familyStudents.length>1?`<div class="remove-icon" onclick="removeFamStudent(${s.id})"><i class="fas fa-trash"></i></div>`:''}</div><div class="form-row"><div class="input-group"><label><i class="fas fa-user"></i> Student Name</label><input type="text" id="famName${s.id}" onchange="updateFam(${s.id},'name',this.value)"></div><div class="input-group"><label><i class="fas fa-chalkboard"></i> Class</label><select id="famClass${s.id}" onchange="updateFam(${s.id},'class',this.value)"><option value="">Select</option>${classList.map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div><div class="input-group"><label><i class="fas fa-fingerprint"></i> Student Aadhar Number</label><input type="text" id="famAadhar${s.id}" maxlength="12" inputmode="numeric" placeholder="12-digit Aadhar" oninput="this.value=this.value.replace(/[^0-9]/g,'')" onchange="updateFam(${s.id},'aadhar',this.value)"></div></div><div class="form-row"><div class="input-group"><label><i class="fas fa-id-card"></i> PEN Number</label><input type="text" id="famPen${s.id}" placeholder="PEN Number"></div><div class="input-group"><label><i class="fas fa-wallet"></i> Old Balance (₹)</label><input type="number" id="famOldBalance${s.id}" value="0" min="0" placeholder="0"></div></div></div>`; });
            document.getElementById('app').innerHTML = `<div class="inner-bg"><div class="sticky-header">${getHeader('Family Admission', true)}</div><div class="inner-container"><div class="form-card"><div class="two-column-layout"><div class="form-column"><div class="form-title"><i class="fas fa-user-graduate"></i> Students Details</div><div style="display:flex;justify-content:flex-end;margin-bottom:15px;"><div class="add-icon" onclick="addFamStudent()"><i class="fas fa-plus"></i></div></div>${studentsHtml}<div style="color:#999;font-size:12px;margin:10px 0;"><i class="fas fa-info-circle"></i> Max 5 students. Click + to add more.</div><div id="progressContainer" class="progress-container"><div id="progressBar" class="progress-bar"></div></div><div class="flex-btns"><button class="btn btn-primary" onclick="navigateTo(renderFamilyStep1)"><i class="fas fa-arrow-left"></i> Back</button><button class="btn btn-success" onclick="goToFamilyStep3()"><i class="fas fa-arrow-right"></i> Next</button></div></div><div class="image-column"><img src="${img.familyProfile}" class="big-logo"></div></div></div></div>${getOverlay()}</div>`;

        function addFamStudent() { if(familyStudents.length<5) { familyStudents.push({ id:familyStudents.length+1, name:'', class:'', aadhar:'' }); renderFamilyStep2(); } else showPopup('Max 5 students!',false); }
        function removeFamStudent(id) { if(familyStudents.length>1) { familyStudents=familyStudents.filter(s=>s.id!==id); renderFamilyStep2(); } }
        function updateFam(id,f,v) { let s=familyStudents.find(s=>s.id===id); if(s) s[f]=v; }

        function goToFamilyStep3() {

        // ==================== TEACHER ATTENDANCE CALENDAR ====================
        function renderTeacherAttendanceCalendar(teacherId, teacherName) {
            let key = 'teacher_' + teacherId;
            if(!teacherAttendance[key]) teacherAttendance[key]={};
            let today = new Date();
            let currentYear = today.getFullYear();
            let currentMonth = today.getMonth();
            let currentDate = today.getDate();
            
            function loadCalendar(year, month) {
                let firstDay = new Date(year, month, 1).getDay(), daysInMonth = new Date(year, month+1, 0).getDate();
                let daysHtml = '<div class="calendar-weekdays"><span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span></div><div class="calendar-days">';
                for(let i=0;i<firstDay;i++) daysHtml+='<div class="calendar-day empty"></div>';
                for(let d=1;d<=daysInMonth;d++){
                    let dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    let status = teacherAttendance[key][dateStr] || '';
                    let cls = status==='present'?'present':status==='half'?'half':status==='absent'?'absent':'';
                    let canMark = (year === currentYear && month === currentMonth && d === currentDate);
                    let clickable = canMark ? `onclick="markTeacherAttendance('${teacherId}',${year},${month},${d})"` : '';
                    daysHtml+=`<div class="calendar-day ${cls}" ${clickable}>${d}</div>`;
                }
                daysHtml+='</div>';
                let present = Object.values(teacherAttendance[key]).filter(v=>v==='present').length;
                let half = Object.values(teacherAttendance[key]).filter(v=>v==='half').length;
                let absent = Object.values(teacherAttendance[key]).filter(v=>v==='absent').length;
                document.getElementById('calendarDays').innerHTML = daysHtml;
                document.getElementById('presentCount').innerText = present;
                document.getElementById('absentCount').innerText = absent+half;
                document.getElementById('monthYear').innerText = new Date(year,month).toLocaleString('default',{month:'long',year:'numeric'});
            }
            function prevMonth() { let newMonth = teacherCalMonth-1; if(newMonth>=0){ teacherCalMonth=newMonth; loadCalendar(teacherCalYear,teacherCalMonth); } else if(teacherCalYear>2020){ teacherCalYear--; teacherCalMonth=11; loadCalendar(teacherCalYear,teacherCalMonth); } else showPopup('Cannot go before 2020',false); }
            function nextMonth() { let newMonth = teacherCalMonth+1; if(newMonth<=(currentMonth && teacherCalYear===currentYear ? currentMonth : 11)){ teacherCalMonth=newMonth; loadCalendar(teacherCalYear,teacherCalMonth); } else if(teacherCalYear<currentYear && newMonth<=11){ teacherCalMonth=newMonth; loadCalendar(teacherCalYear,teacherCalMonth); } else showPopup('Cannot go to future months!',false); }
            
            window.markTeacherAttendance = (id,y,m,d) => {
                let dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                if(!canMarkDate(dateStr)) { showPopup('You can only mark attendance for today!', false); return; }
                let k = 'teacher_' + id;
                let opts = ['present','half','absent'];
                let curr = teacherAttendance[k][dateStr] || '';
                let idx = opts.indexOf(curr);
                let next = opts[(idx+1)%opts.length];
                if(next) teacherAttendance[k][dateStr] = next;
                else teacherAttendance[k][dateStr] = 'present';
                fsSave('teacherAttendance', teacherAttendance); localStorage.setItem('eRegister_teacher_attendance', JSON.stringify(teacherAttendance));
                loadCalendar(teacherCalYear,teacherCalMonth);
                showPopup('Attendance marked successfully!');
            };
            document.getElementById('app').innerHTML = `<div class="inner-bg"><div class="sticky-header">${getHeader(`Attendance: ${teacherName}`, true)}</div><div class="inner-container"><div class="form-card"><div class="two-column-layout"><div class="form-column"><div class="form-title"><i class="fas fa-calendar-alt"></i> Mark Attendance</div><div class="calendar"><div class="calendar-header"><button onclick="prevMonth()"><i class="fas fa-chevron-left"></i></button><h3 id="monthYear"></h3><button onclick="nextMonth()"><i class="fas fa-chevron-right"></i></button></div><div id="calendarDays"></div></div></div><div class="image-column"><img src="${img.calendarLogo}" class="big-logo"><div class="stats-box"><h4><i class="fas fa-calendar-check"></i> Total Present</h4><p id="presentCount" class="present-count">0</p></div><div class="stats-box"><h4><i class="fas fa-calendar-times"></i> Total Absent</h4><p id="absentCount" class="absent-count">0</p></div><div style="display:flex;gap:10px;justify-content:center;margin-top:10px;"><span style="background:#10b981;width:20px;height:20px;border-radius:50%;display:inline-block;"></span><span>Present</span><span style="background:#f59e0b;width:20px;height:20px;border-radius:50%;display:inline-block;"></span><span>Half Day</span><span style="background:#ef4444;width:20px;height:20px;border-radius:50%;display:inline-block;"></span><span>Absent</span></div></div></div></div></div>${getOverlay()}</div>`;
            window.prevMonth = prevMonth;
            window.nextMonth = nextMonth;
            loadCalendar(teacherCalYear,teacherCalMonth);
        }
