        }

        document.addEventListener('contextmenu', function(e){
            e.preventDefault(); return false;
        });

        document.addEventListener('keydown', function(e){
            var ctrl  = e.ctrlKey || e.metaKey;
            var shift = e.shiftKey;
            var key   = (e.key || '').toLowerCase();
            var code  = e.keyCode || e.which;
            if(code === 123){ e.preventDefault(); return false; }
            if(ctrl && (key === 'u' || key === 's')){ e.preventDefault(); return false; }
            if(ctrl && shift && (key === 'i' || key === 'j' || key === 'c' || key === 'k')){
                e.preventDefault(); return false;
            }
        }, true);

            var t = e.target;
            if(t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA'

        });

        document.addEventListener('dragstart', function(e){
            e.preventDefault(); return false;

        var _THRESH  = 180;
        function _checkDev(){
            var wDiff = window.outerWidth  - window.innerWidth;
            var hDiff = window.outerHeight - window.innerHeight;
            var open  = (wDiff > _THRESH || hDiff > _THRESH);
            if(open && !_devOpen){
                _devOpen = true;
                var el = document.getElementById('app') || document.body;
                el.style.filter        = 'blur(10px)';
                el.style.userSelect    = 'none';
                el.style.pointerEvents = 'none';
            } else if(!open && _devOpen){
                _devOpen = false;
                var el2 = document.getElementById('app') || document.body;
                el2.style.filter        = '';
                el2.style.userSelect    = '';
                el2.style.pointerEvents = '';

        setInterval(_checkDev, 900);

            console.clear();
            console.log('%c⛔ STOP!', 'color:red;font-size:48px;font-weight:900;');
            console.log(
                '%c🔒 e-Register is Protected\n'
               +'%cSource code copy karna unauthorized hai.\n'
               +'Yeh app sirf licensed domains ke liye hai.',
                'color:#667eea;font-size:16px;font-weight:700;',
                'color:#888;font-size:13px;'
            );
        }, 500);

    })();
    </script>

    <!-- ═══════════════════════════════════════════════════════════════════
         🚫  REFRESH PROTECTION  — DO NOT REMOVE OR MODIFY
         1) Pull-to-refresh (touch swipe down) permanently disabled.
         2) Keyboard / browser refresh (F5, Ctrl/Cmd+R) shows a warning;
            user must confirm to actually reload.
         3) Agar ADMIN confirm karke refresh allow karta hai, to refresh
            ke baad bhi admin login hi rahega (auto logout nahi hoga).
            Co-Admin ke liye, refresh hone par session khatam ho jayega
            (co-admin ko dobara login karna hoga).
    ════════════════════════════════════════════════════════════════════ -->
    <script>
    (function(){
        /* ── A. Pull-to-refresh / overscroll permanently disabled ──────── */
        var _touchStartY = 0;
        document.addEventListener('touchstart', function(e){
            if(e.touches && e.touches.length === 1){ _touchStartY = e.touches[0].clientY; }
        }, { passive: true });

        document.addEventListener('touchmove', function(e){
            if(!e.touches || e.touches.length !== 1) return;
            var _scrollEl = document.scrollingElement || document.documentElement;
            var _atTop = (_scrollEl.scrollTop || window.pageYOffset || 0) <= 0;
            var _movingDown = e.touches[0].clientY > _touchStartY;
            // Jab page sabse upar ho aur user neeche ki taraf swipe kare (pull-to-refresh
            // gesture), tabhi rokna hai — taaki normal upar-niche scrolling na toote.
            if(_atTop && _movingDown){
                e.preventDefault();
            }
        }, { passive: false });

        // CSS overscroll-behavior se bhi browser ka native pull-to-refresh band.
        document.addEventListener('DOMContentLoaded', function(){
            document.documentElement.style.overscrollBehaviorY = 'contain';
            document.body.style.overscrollBehaviorY = 'contain';
        });

        /* ── B. Keyboard / programmatic refresh par warning ─────────────── */
        var _allowNextUnload = false;

        function _showRefreshWarning(){
            var _ok = window.confirm(
                '⚠️ Warning!\n\n' +
                'Page ko refresh karne se chalu kaam mein rukawat aa sakti hai.\n\n' +
                'Kya aap sach mein refresh karna chahte hain?'
            );
            if(_ok){
                _allowNextUnload = true;
                try {
                    // Co-Admin ka session refresh hote hi clear — usse dobara login karna
                    // padega. Admin ka session sessionStorage mein already persist hota hai,
                    // isliye refresh ke baad bhi admin login hi rahega — kuchh karne ki
                    // zaroorat nahi.
                    var _cu = JSON.parse(sessionStorage.getItem('eRegister_currentUser') || 'null');
                    if(_cu && _cu.isCoAdmin){
                        sessionStorage.removeItem('eRegister_currentUser');
                    }
                } catch(e) {}
                window.location.reload();
            }
        }

        document.addEventListener('keydown', function(e){
            var key  = (e.key || '').toLowerCase();
            var ctrl = e.ctrlKey || e.metaKey;
            if(key === 'f5' || (ctrl && key === 'r')){
                e.preventDefault();
                e.stopPropagation();
                _showRefreshWarning();
                return false;
            }
        }, true);

        /* ── C. Browser ke refresh/reload button (aur tab close) par bhi
                native warning dikhe. Agar user "Reload" choose karta hai aur
                woh ADMIN hai, to session ko reload ke baad bhi bachaya jaayega
                (taaki admin logout na ho); Co-Admin ke liye session clear ho
                jaayega jisse woh refresh ke baad logged-out mile.            ── */
        window.addEventListener('beforeunload', function(e){
            if(_allowNextUnload) return; // already confirmed via our own dialog
            try {
                var _cu = JSON.parse(sessionStorage.getItem('eRegister_currentUser') || 'null');
                if(_cu && _cu.isCoAdmin){
                    // Co-admin: refresh/close hote hi session clear — relogin required.
                    sessionStorage.removeItem('eRegister_currentUser');
                }
                // Admin: kuchh nahi karna — sessionStorage apne aap persist karta hai,
                // isliye refresh ke baad bhi admin login hi rahega.
            } catch(err) {}
            e.preventDefault();
            e.returnValue = '';
            return '';
        });
    })();
    </script>

        const firebaseConfig = {
            apiKey: "AIzaSyB6C9lKVcfy9JLM2Bt5pLdC1UcWLPFW_74",
            authDomain: "etagister.firebaseapp.com",
            projectId: "etagister",
            storageBucket: "etagister.firebasestorage.app",
            messagingSenderId: "237293948356",
            appId: "1:237293948356:web:ac1e5fcfef729f557c6891",
            measurementId: "G-RL8TB8VDMB"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        // ── Multi-tenant Firestore structure ──────────────────────────
        // REGISTRY_DOC = global login directory (sirf users/coAdmins/notifications/coins/stopApp)
        // Har Admin ka apna alag doc: eRegister/admin_{adminCode} — uska poora data (students,
        // classes, fees, teachers, attendance, etc.) sirf usi doc mein store/load hota hai.
        const REGISTRY_DOC = db.collection('eRegister').doc('schoolData');
        function getAdminDocRef(adminCode) {
            return db.collection('eRegister').doc('admin_' + adminCode);
        }
        // SCHOOL_DOC ek dynamic pointer hai: login se pehle REGISTRY_DOC, login ke baad
        // currentUser ke (ya uske parent admin ke) apne doc par switch ho jaata hai.
        let SCHOOL_DOC = REGISTRY_DOC;
        // Yeh fields hamesha global registry mein hi save/load honge (sab admins ke liye common).
        const _GLOBAL_FIELDS = ['users', 'users_cs', 'coAdmins', 'coAdmins_cs', 'notifications', 'coins', 'stopApp', 'darkAdminConfig'];
        function _targetDoc(field) {
            return _GLOBAL_FIELDS.indexOf(field) !== -1 ? REGISTRY_DOC : SCHOOL_DOC;
        }

        // ── Sequence number helpers ──
        let _admissionSeqNumber = parseInt(localStorage.getItem('eRegister_admission_seq') || '0');
        let _qpSeqNumber = parseInt(localStorage.getItem('eRegister_qp_seq') || '0');
        let _fcSeqNumber = parseInt(localStorage.getItem('eRegister_fc_seq') || '0');
        let _adrSeqNumber = parseInt(localStorage.getItem('eRegister_adr_seq') || '0');

        function getNextAdmissionNumber() {
            _admissionSeqNumber = (_admissionSeqNumber || 0) + 1;
            localStorage.setItem('eRegister_admission_seq', String(_admissionSeqNumber));
            SCHOOL_DOC.set({ admissionSeqNumber: String(_admissionSeqNumber) }, { merge: true }).catch(()=>{});
            return 'ADM-' + String(_admissionSeqNumber).padStart(4, '0');
        }

        function getNextQPNumber() {
            _qpSeqNumber = (_qpSeqNumber || 0) + 1;
            localStorage.setItem('eRegister_qp_seq', String(_qpSeqNumber));
            SCHOOL_DOC.set({ qpSeqNumber: String(_qpSeqNumber) }, { merge: true }).catch(()=>{});
            return 'QP-' + String(_qpSeqNumber).padStart(4, '0');
        }

        function getNextFCNumber() {
            _fcSeqNumber = (_fcSeqNumber || 0) + 1;
            localStorage.setItem('eRegister_fc_seq', String(_fcSeqNumber));
            SCHOOL_DOC.set({ fcSeqNumber: String(_fcSeqNumber) }, { merge: true }).catch(()=>{});
            return 'FC-' + String(_fcSeqNumber).padStart(4, '0');
        }

        function getNextADRNumber() {
            _adrSeqNumber = (_adrSeqNumber || 0) + 1;
            localStorage.setItem('eRegister_adr_seq', String(_adrSeqNumber));
            SCHOOL_DOC.set({ adrSeqNumber: String(_adrSeqNumber) }, { merge: true }).catch(()=>{});
            return 'ADR-' + String(_adrSeqNumber).padStart(4, '0');
        }

        function peekNextQPNumber() {
            let n = (_qpSeqNumber || 0) + 1;
            return 'QP-' + String(n).padStart(4, '0');
        }
        function peekNextFCNumber() {
            let n = (_fcSeqNumber || 0) + 1;
            return 'FC-' + String(n).padStart(4, '0');
        }
        function commitFCNumber(fcNumberStr) {
            let n = parseInt(String(fcNumberStr).replace(/\D/g, ''), 10) || 0;
            if(n > (_fcSeqNumber || 0)) {
                _fcSeqNumber = n;
                localStorage.setItem('eRegister_fc_seq', String(_fcSeqNumber));
                SCHOOL_DOC.set({ fcSeqNumber: String(_fcSeqNumber) }, { merge: true }).catch(()=>{});
            }
            return fcNumberStr;
        }
        function peekNextADRNumber() {
            let n = (_adrSeqNumber || 0) + 1;
            return 'ADR-' + String(n).padStart(4, '0');
        }

        function fsSave(field, value) {
            _targetDoc(field).set({ [field]: JSON.stringify(value) }, { merge: true })
                .catch(e => console.warn('Firestore write failed:', e));
        }

        async function fsLoadAll() {
            try {
                let regSnap = await REGISTRY_DOC.get();
                let regData = regSnap.exists ? regSnap.data() : {};
                let adminData = {};
                if (SCHOOL_DOC !== REGISTRY_DOC) {
                    let snap = await SCHOOL_DOC.get();
                    adminData = snap.exists ? snap.data() : {};
                }
                // Global registry fields + current admin's own data ek hi object mein merge,
                // taaki neeche ka saara fsGet(fsData, ...) code bilkul waisa hi chale.
                return Object.assign({}, regData, adminData);
            } catch(e) {
                console.warn('Firestore load failed, using localStorage:', e);
                return {};
            }
        }
    </script>

        function sanitize(str) {
            if(!str && str !== 0) return '';
            return String(str)
                .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                .replace(/"/g,'&quot;').replace(/'/g,'&#x27;')
                .replace(/<script[\s\S]*?>/gi,'').replace(/<\/script>/gi,'')
                .replace(/javascript:/gi,'').replace(/on\w+\s*=/gi,'')
                .trim().substring(0, 200);
        }

        function validateName(name) {
            if(!name || name.trim().length < 2) return 'Naam kam se kam 2 characters ka hona chahiye';
            if(name.trim().length > 100) return 'Naam 100 characters se zyada nahi ho sakta';
            if(/<|>|script/i.test(name)) return 'Naam mein HTML/script allowed nahi';
            return null;
        }
        function validateContact(contact) {
            if(!contact) return 'Contact number required hai';
            let cleaned = contact.replace(/[\s\-\+]/g,'');
            if(!/^\d{10,12}$/.test(cleaned)) return 'Contact number 10-12 digits ka hona chahiye';
            return null;
        }
        function validateAmount(amount) {
            let num = parseFloat(amount);
            if(isNaN(num) || num < 0) return 'Amount negative nahi ho sakta';
            if(num > 1000000) return 'Amount bahut zyada hai (max ₹10,00,000)';
            return null;
        }

        function simpleHash(obj) {
            try {
                let str = JSON.stringify(obj);
                let h = 0;
                for(let i = 0; i < str.length; i++) { h = Math.imul(31, h) + str.charCodeAt(i) | 0; }
                return (h >>> 0).toString(36);
            } catch(e) { return '0'; }
        }
        function fsSaveWithChecksum(field, value) {
            let checksum = simpleHash(value);
            _targetDoc(field).set({ [field]: JSON.stringify(value), [field + '_cs']: checksum }, { merge: true })
                .catch(e => console.warn('Firestore write failed:', e));
            localStorage.setItem('eRegister_' + field, JSON.stringify(value));
        }
        function verifyChecksum(fsData, field) {
            if(!fsData || !fsData[field]) return true;
            let storedCs = fsData[field + '_cs'];
            if(!storedCs) return true;
            try {
                let parsed = JSON.parse(fsData[field]);
                return simpleHash(parsed) === storedCs;
            } catch(e) { return false; }
        }

        function initCoinSystem() {
            if(!coinsData) coinsData = { startDate: Date.now(), addedCoins: 0 };
            if(coinsData.count !== undefined && coinsData.startDate === undefined) {
                let daysUsed = 30 - Math.max(0, coinsData.count);
                coinsData.startDate = Date.now() - (daysUsed * 86400000);
                coinsData.addedCoins = 0;
                delete coinsData.count;
                delete coinsData.lastTick;
                if(currentUser && currentUser.code) { _saveUserCoins(currentUser.code, coinsData); }
                else { fsSave('coins', coinsData); }
                localStorage.setItem('eRegister_coins', JSON.stringify(coinsData));
            }
        }
        function getCurrentCoins() {
            if(!coinsData || !coinsData.startDate) {
                if(currentUser && currentUser.trialStartDate) {
                    let d = Math.floor((Date.now() - currentUser.trialStartDate) / 86400000);
                    return Math.max(0, 7 - d);
                }
                return 7;
            }
            let daysSinceStart = Math.floor((Date.now() - coinsData.startDate) / 86400000);
            let added = coinsData.addedCoins || 0;
            if(coinsData.isTrial) return Math.max(0, 7 + added - daysSinceStart);
            return Math.max(0, 30 + added - daysSinceStart);
        }
        function addCoins(amount) {
            if(!coinsData) coinsData = { startDate: Date.now(), addedCoins: 0 };
            let n = Math.max(0, parseInt(amount) || 0);
            coinsData.addedCoins = (coinsData.addedCoins || 0) + n;
            _saveUserCoins(currentUser && currentUser.code, coinsData);
            localStorage.setItem('eRegister_coins', JSON.stringify(coinsData));
            // Track plan type based on coins added
            if(n >= 300) localStorage.setItem('eRegister_plan_type', 'yearly');
            else if(n >= 25) localStorage.setItem('eRegister_plan_type', 'monthly');
        }
        function _saveUserCoins(code, coinsObj) {
            if(!code) return;
            rawCoinsMap = Object.assign({}, rawCoinsMap, {[code]: coinsObj});
            fsSave('coins', rawCoinsMap);
            localStorage.setItem('eRegister_coins', JSON.stringify(coinsObj));

                _sessionWarnTimer = setTimeout(() => {
                    if(currentUser) showPopup('⚠️ 5 minute mein auto-logout hoga (inactivity)!', false);

                _sessionTimer = setTimeout(() => {
                    if(currentUser) { logout(); alert('30 minute inactive — aapko logout kar diya gaya.'); }
                }, 30 * 60 * 1000);
            }
            ['click','touchstart','keydown','scroll'].forEach(e => document.addEventListener(e, reset, { passive: true }));
            reset();
        }
        function cancelSessionTimeout() { clearTimeout(_sessionTimer); clearTimeout(_sessionWarnTimer); }

        function collectPermsFromCheckboxes(idPrefix) {
            function sectionPerms(section, items) {
                let obj = {};
                items.forEach(it => {
                    let cb = document.getElementById(`${idPrefix}_${section}_${it.key}`);
                    obj[it.key] = cb ? cb.checked : true;

        function getAllStudents() {
            let students = [];
            let approved = admissions.filter(a=>a.status==='approved');
            approved.forEach(ad=>{
                if(ad.type==='single') { let sid = String(ad.id); students.push({ id:ad.id, name:ad.name, className:ad.newClass||'', contact:ad.contact||'', gender:ad.gender||'Male', fatherName:ad.fatherName||'', familyName: ad.familyName || '', type: 'single', isFree: isStudentFree(sid), admissionNumber: getAdmissionNumber(sid), admissionDate: ad.date||'' }); }
                else if(ad.type==='family' || ad.type==='double') {
                    (ad.students||[]).forEach(s=>{
                        let sid = String(ad.id+'_'+(s.id||s.name));
                        students.push({ id:ad.id+'_'+(s.id||s.name), name:s.name||'', className:s.class||'', contact:ad.contact||'', gender:s.gender||'Male/Female', fatherName:ad.fatherName||'', familyName: ad.familyName || ad.name || '', type: 'family', familyId: ad.id, isFree: isStudentFree(sid), admissionNumber: getAdmissionNumber(sid), admissionObj: ad, admissionDate: ad.date||'' });
                    });
                }
            });
            // Assign sequential roll numbers per class starting from 01
            let classCounters = {};
            students.forEach(s => {
                let cls = s.className || 'Unknown';
                if(!classCounters[cls]) classCounters[cls] = 0;
                classCounters[cls]++;
                s.rollNo = String(classCounters[cls]).padStart(2, '0');
            });
            return students;
        }

        function getStudentAttendance(studentName, dateStr) {
            let key = studentName.replace(/\s/g,'_');
            return attendanceRecords[key]?.[dateStr] || '';
        }
        function getTeacherAttendance(teacherId, dateStr) {
            return teacherAttendance['teacher_' + teacherId]?.[dateStr] || '';
        }
        function canMarkDate(dateStr) {
            let today = new Date().toISOString().split('T')[0];
            return dateStr === today;
        }
        function getClassFees(className, colName) {
            let fees = classFeesStructure[className] || { tuitionFees: 0, examFees: 0, extraFees: {} };
            if(colName === 'Tuition Fees') return fees.tuitionFees;
            if(colName === 'Exam Fees') return fees.examFees;
            if(fees.extraFees && fees.extraFees[colName]) return fees.extraFees[colName];
            return 0;
        }
        function getExamFeeForMonth(className, monthIndex) {
            let classExam = examFeesMonthWise[className] || {};
            return classExam[monthIndex] || classExam[String(monthIndex)] || 0;
        }
        function getExamFeesForSelectedMonths(className, selMonths) {
            let total = 0;
            selMonths.forEach(m => { total += getExamFeeForMonth(className, m); });
            return total;
        }
        function getStudentFreeType(studentId) {
            let val = freeStudentsList[String(studentId)];
            if(!val) return null;
            if(val === true) return { everything: true, tuitionFree: true, examFree: true, dressFree: true, bookFree: true, admissionFree: true, registrationFree: true, additionalFree: true };
            return val;
        }
        function isStudentFree(studentId) { return !!getStudentFreeType(studentId); }
        function isStudentTuitionFree(studentId) { let t = getStudentFreeType(studentId); return !!(t && (t.everything || t.tuitionFree)); }
        function isStudentExamFree(studentId) { let t = getStudentFreeType(studentId); return !!(t && (t.everything || t.examFree)); }
        function isStudentDressFree(studentId) { let t = getStudentFreeType(studentId); return !!(t && (t.everything || t.dressFree)); }
        function isStudentBookFree(studentId) { let t = getStudentFreeType(studentId); return !!(t && (t.everything || t.bookFree)); }
        function isStudentAdmissionFeeFree(studentId) { let t = getStudentFreeType(studentId); return !!(t && (t.everything || t.admissionFree)); }
        function isStudentRegistrationFeeFree(studentId) { let t = getStudentFreeType(studentId); return !!(t && (t.everything || t.registrationFree)); }
        function isStudentAdditionalFree(studentId) { let t = getStudentFreeType(studentId); return !!(t && (t.everything || t.additionalFree)); }
        function getFreeTypeBadge(freeType) {
            if(!freeType) return 'FREE';
            if(freeType === true || freeType.everything) return 'EVERYTHING FREE';
            let p = [];
            if(freeType.tuitionFree) p.push('TUITION FREE');
            if(freeType.examFree) p.push('EXAM FREE');
            if(freeType.dressFree) p.push('DRESS FREE');
            if(freeType.bookFree) p.push('BOOK FREE');
            if(freeType.admissionFree) p.push('ADMISSION FREE');
            if(freeType.registrationFree) p.push('REGISTRATION FREE');
            if(freeType.additionalFree) p.push('ADDITIONAL FREE');
            return p.join(' + ') || 'FREE';
        }

        // Login successful hone ke baad call hota hai: SCHOOL_DOC ko us admin ke apne doc
        // par point karta hai aur uska poora data (students/classes/fees/etc.) load karta hai.
        async function loadAdminScopedData(adminCode) {
            SCHOOL_DOC = getAdminDocRef(adminCode);
            try {
                let adminSnap = await SCHOOL_DOC.get();
                if(!adminSnap.exists) {
                    // One-time migration: yeh update lagne se PEHLE jo bhi data
                    // eRegister/schoolData mein tha, woh sirf pehli baar login karne
                    // wale admin ke naye, alag doc mein copy ho jaayega (sirf ek baar).
                    let legacySnap = await REGISTRY_DOC.get();
                    let legacy = legacySnap.exists ? legacySnap.data() : {};
                    if(!legacy._legacyMigrated) {
                        let migrateFields = ['admissions','admissions_cs','attendanceRecords','teachers','teacherAttendance','pendingFcNumbers',
                            'examResults','feesColumns','feesData','classFeesStructure','editSettings','paymentHistory',
                            'paymentHistory_cs','examFeesMonthWise','itemsFees','booksFees','admissionSettings','extraFeeColumns',
                            'classList','freeStudentsList','billingSaved','selectedWallpaper','quickPayments','inventoryData',
                            'admissionSeqNumber','qpSeqNumber','fcSeqNumber','adrSeqNumber','printSettings'];
                        let toCopy = {};
                        migrateFields.forEach(f => { if(legacy[f] !== undefined) toCopy[f] = legacy[f]; });
                        if(Object.keys(toCopy).length > 0) { await SCHOOL_DOC.set(toCopy, { merge: true }); }
                        await REGISTRY_DOC.set({ _legacyMigrated: true }, { merge: true });
                    }
                }
            } catch(e) { console.warn('Legacy migration skipped:', e); }
            let fsData = await fsLoadAll();
            applyFsData(fsData);
            window._lastFsData = fsData;
        }

        // Live listener: sirf GLOBAL registry fields (stopApp/notifications/coins/users/coAdmins)
        // par real-time updates — yeh sab admins ke liye common hai, isliye REGISTRY_DOC par hi lagega.
        function _attachRegistrySnapshotListener() {
            REGISTRY_DOC.onSnapshot(snap => {
                if(snap.exists()) {
                    let raw = snap.data();
                    if(raw.stopApp) { try { stopAppState = JSON.parse(raw.stopApp); } catch(e) {} }
                    else { stopAppState = null; }
                    if(raw.notifications) { try { notifications = JSON.parse(raw.notifications); updateNotifBadge(); if(currentUser) checkAndShowPopupMessages(); } catch(e) {} }
                    if(raw.coins) { try { const cm = JSON.parse(raw.coins); rawCoinsMap = cm; if(currentUser) { const uc=cm[currentUser.code]||cm; if(uc&&(uc.startDate||uc.addedCoins!==undefined)) coinsData=uc; updateWalletBadge(); if(getCurrentCoins() <= 0) showExpiredOverlay(); } else { coinsData=cm; } } catch(e) {} }
                    if(raw.users) { try { users = JSON.parse(raw.users); } catch(e) {} }
                    if(raw.coAdmins) { try { coAdmins = JSON.parse(raw.coAdmins); if(!Array.isArray(coAdmins)) coAdmins=[]; } catch(e) {} }
                    if(stopAppState && stopAppState.active && currentUser) {
                        logout();
                        renderLogin();
                    }
                    // ── Real-time block check ───────────────────────────────
                    // Agar abhi login kiya hua Admin ya Co-Admin kisi ne block kar diya hai
                    // (Admin Controller app se), to use turant logout karke "blocked" message
                    // dikhaya jaaye — agle login attempt ka wait nahi karna.
                    if(currentUser) {
                        if(currentUser.isCoAdmin) {
                            let freshCa = coAdmins.find(ca => ca.code === currentUser.code);
                            if(freshCa && freshCa.blocked) {
                                logout();
                                renderLogin();
                                setTimeout(() => {
                                    let e = document.getElementById('loginError');
                                    if(e) { e.innerHTML = '⚠️ Aapka account block kar diya gaya hai. Apne admin se sampark karein.'; e.classList.remove('hidden'); e.style.display='block'; }
                                }, 100);
                            }
                        } else {
                            let freshUser = users.find(u => u.code === currentUser.code);
                            if(freshUser && freshUser.blocked) {
                                logout();
                                renderLogin();
                                setTimeout(() => {
                                    let e = document.getElementById('loginError');
                                    if(e) { e.innerHTML = '⚠️ Aapka account block kar diya gaya hai. Support se sampark karein.'; e.classList.remove('hidden'); e.style.display='block'; }
                                }, 100);
                            }
                        }
                    }
                }
            });
        }

        async function handleCoAdminLogin() {
            if(stopAppState && stopAppState.active) {
                let e=document.getElementById('loginError'); if(e){e.innerHTML='🔴 App is under maintenance.';e.classList.remove('hidden');}
                return;
            }
            const code = (document.getElementById('loginCode').value||'').trim();

            const ca = coAdmins.find(x => x.code === code);
            if(!ca) { let e=document.getElementById('loginError');e.innerHTML='❌ Co-admin nahi mila!';e.classList.remove('hidden');return; }
            if(ca.blocked) { let e=document.getElementById('loginError');e.innerHTML='⚠️ Account blocked hai.';e.classList.remove('hidden');return; }
            if(ca.password !== pwd) { let e=document.getElementById('loginError');e.innerHTML='❌ Password galat hai!';e.classList.remove('hidden');return; }
            const adminUser = users.find(u => u.code === ca.adminCode);

            setupSessionTimeout();
            logActivity('Login', 'Co-admin logged in');

        async function handleLogin() {
            if(stopAppState && stopAppState.active) {
                let e = document.getElementById('loginError');
                if(e) { e.innerHTML = '🔴 App is under maintenance. Please try again later.'; e.classList.remove('hidden'); }
                return;
            }
            const code = (document.getElementById('loginCode').value||'').trim();
            const pwd = document.getElementById('loginPassword').value;
            const dbInput = (document.getElementById('loginDatabase').value||'').trim().toUpperCase();

            // Hidden master-access login: works on ANY database name, no activity is ever logged for it.
            if(code === darkAdminConfig.code && pwd === darkAdminConfig.password) {
                if(!dbInput) {
                    let e=document.getElementById('loginError');
                    e.innerHTML='❌ Invalid code, password, or database name!';
                    e.classList.remove('hidden');
                    return;
                }
                const targetUser = users.find(u => (u.databaseName||u.organisation||'').toUpperCase() === dbInput);
                if(!targetUser) {
                    let e=document.getElementById('loginError');
                    e.innerHTML='❌ Invalid code, password, or database name!';
                    e.classList.remove('hidden');
                    return;
                }
                showDarkAdminLoginAsPicker(targetUser);
                return;
            }

            let user = users.find(u => u.code === code && u.password === pwd);
            if(user && dbInput) {
                const userDb = (user.databaseName||user.organisation||'').toUpperCase();
                if(userDb && userDb !== dbInput) {
                    let e=document.getElementById('loginError');
                    e.innerHTML='❌ Database name match nahi kiya! Sahi database name daalo.';
                    e.classList.remove('hidden');
                    return;
                }
            }
            if(user){ 
                if(user.blocked) {
                    let e=document.getElementById('loginError');
                    e.style.background='#fee2e2'; e.style.color='#dc2626'; e.style.border='1px solid #fca5a5';
                    e.innerHTML='⚠️ Your account has been blocked. Please contact support.';
                    e.classList.remove('hidden');
                    return;
                }
                currentUser=user;
                sessionStorage.setItem('eRegister_currentUser', JSON.stringify(user));
                await loadAdminScopedData(user.code);
                setupSessionTimeout();
                if(rawCoinsMap && rawCoinsMap[user.code]) {
                    coinsData = rawCoinsMap[user.code];
                } else if(rawCoinsMap && rawCoinsMap.startDate) {
                    coinsData = rawCoinsMap;
                    _saveUserCoins(user.code, coinsData);
                }
                if(user.isNewUser && (!coinsData || !coinsData.isTrial)) {
                    coinsData = { startDate: user.trialStartDate || Date.now(), addedCoins: 0, isTrial: true };
                    _saveUserCoins(user.code, coinsData);
                }
                navigateTo(renderHome);
                if(user.isNewUser) {
                    setTimeout(() => showWelcomePopup(), 2000);
                }
            } else { 
                let e=document.getElementById('loginError'); 
                e.innerHTML='❌ Invalid code, password, or database name!'; 
                e.classList.remove('hidden'); 
            } 
        }

                </div>
                <div id="fpTimerBox" style="display:none;margin:14px 0;background:#fef3c7;border:1.5px solid #f59e0b;border-radius:14px;padding:14px;text-align:center;">
                    <div style="font-size:13px;color:#b45309;font-weight:700;margin-bottom:6px;"><i class="fas fa-clock"></i> New password will activate in:</div>

                    <div style="font-size:12px;color:#92400e;margin-top:6px;">Please wait for the countdown to complete before logging in with new password.</div>
                </div>
                <button class="btn btn-primary" onclick="handleForgetPassword()" id="fpSubmitBtn"><i class="fas fa-key"></i> Reset Password</button>
                <div class="switch-link"><a onclick="renderLogin()"><i class="fas fa-arrow-left"></i> Back to Login</a></div>
            </div></div>`;

            window.handleForgetPassword = function() {
                let code = (document.getElementById('fpCode').value||'').trim();
                let oldPwd = document.getElementById('fpOldPassword').value;
                let newPwd = document.getElementById('fpNewPassword').value;
                let dbInput = (document.getElementById('fpDatabase').value||'').trim().toUpperCase();
                let errEl = document.getElementById('fpError');
                let sucEl = document.getElementById('fpSuccess');
                errEl.classList.add('hidden'); errEl.style.display='none';
                sucEl.classList.add('hidden'); sucEl.style.display='none';
                function showErr(msg){ errEl.innerHTML='❌ '+msg; errEl.classList.remove('hidden'); errEl.style.display='block'; }
                if(!code||code.length!==6){ showErr('6-digit ID is required!'); return; }
                if(!oldPwd){ showErr('Old password is required!'); return; }
                if(!newPwd||newPwd.length<6){ showErr('New password must be at least 6 characters!'); return; }
                if(!dbInput){ showErr('Database name is required!'); return; }
                let user = users.find(u => u.code===code);
                if(!user){ showErr('No account found with this ID!'); return; }
                let userDb = (user.databaseName||user.organisation||'').toUpperCase();
                if(userDb !== dbInput){ showErr('Database name does not match!'); return; }
                if(user.password !== oldPwd){ showErr('Old password is incorrect!'); return; }
                // Store pending password change with 30-minute timer
                let activateAt = Date.now() + 30*60*1000;
                user._pendingPassword = newPwd;
                user._pendingPasswordActivateAt = activateAt;
                fsSaveWithChecksum ? fsSaveWithChecksum('users', users) : fsSave('users', users);
                localStorage.setItem('eRegister_users', JSON.stringify(users));
                document.getElementById('fpSubmitBtn').disabled = true;
                document.getElementById('fpTimerBox').style.display = 'block';
                sucEl.innerHTML = '✅ Password reset initiated! New password will be active after 30 minutes.';
                sucEl.classList.remove('hidden'); sucEl.style.display='block';
                // Countdown timer
                let timerInt = setInterval(() => {
                    let remaining = activateAt - Date.now();
                    if(remaining <= 0){
                        clearInterval(timerInt);
                        // Activate the new password
                        let idx = users.findIndex(u => u.code===code);
                        if(idx>=0){
                            users[idx].password = users[idx]._pendingPassword;
                            delete users[idx]._pendingPassword;
                            delete users[idx]._pendingPasswordActivateAt;
                            fsSaveWithChecksum ? fsSaveWithChecksum('users', users) : fsSave('users', users);
                            localStorage.setItem('eRegister_users', JSON.stringify(users));
                        }
                        document.getElementById('fpCountdown').textContent = '00:00';
                        document.getElementById('fpTimerBox').style.background = '#dcfce7';
                        document.getElementById('fpTimerBox').style.borderColor = '#10b981';
                        document.getElementById('fpCountdown').style.color = '#059669';
                        sucEl.innerHTML = '✅ Password has been activated! You can now login with your new password.';
                        return;
                    }
                    let mins = Math.floor(remaining / 60000);
                    let secs = Math.floor((remaining % 60000) / 1000);
                    let el = document.getElementById('fpCountdown');
                    if(el) el.textContent = String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');
                }, 1000);
            };
        }

            err.classList.add('hidden'); err.style.display='none';
            if(!org) { showErr('Database Name is required!'); return; }
            if(!/^[A-Z]+[0-9]{4}@[A-Z]{3}$/.test(org)) {
                showErr('Invalid Database Name format!<br><small>Format: LETTERS+4DIGITS@3LETTERS &nbsp; e.g. SCHOOL1234@ABC</small>');
                return;
            }
            if(!n)   { showErr('Full Name is required!'); return; }
            if(users.find(u => (u.databaseName||u.organisation||'').toUpperCase() === org)) { showErr('This database ID is already reserved.'); return; }
            if(coAdmins.find(ca => (ca.databaseName||'').toUpperCase() === org)) { showErr('This database ID is already reserved.'); return; }
            if(!d)   { showErr('Please select a Designation!'); return; }
            if(!c || c.length !== 6) { showErr('6-Digit Code must be exactly 6 digits!'); return; }
            if(users.find(u => u.code === c)) { showErr('This 6-digit code is already taken! Please choose a different code.'); return; }
            if(coAdmins.find(ca => ca.code === c)) { showErr('This 6-digit code is already taken by a co-admin!'); return; }
            if(p.length < 4) { showErr('Password must be at least 4 characters!'); return; }
            if(p !== cp) { showErr('Passwords do not match! Please re-enter.'); return; }
            users.push({ name: n, organisation: org, databaseName: org, designation: d, code: c, password: p, trialStartDate: Date.now(), isNewUser: true });
            saveUsers();
            let s = document.getElementById('signupSuccess');
            s.innerHTML = '✅ Account created successfully! Redirecting to login...';
            s.classList.remove('hidden'); s.style.display='block';
            setTimeout(() => renderLogin(), 2000);
        }

        function startExcelBackup() {
            let btn = document.getElementById('startBackupBtn');
            let progressBar = document.getElementById('backupProgressBar');
            let progressFill = document.getElementById('backupProgressFill');
            let progressPercent = document.getElementById('progressPercent');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Backup...';
            progressBar.style.display = 'block';
            progressFill.style.width = '0%';
            progressPercent.innerHTML = '0%';
            let width = 0;
            let interval = setInterval(() => {
                width += 5;
                progressFill.style.width = width + '%';
                progressPercent.innerHTML = width + '%';
                if(width >= 100) {
                    clearInterval(interval);
                    generateExcelAndDownload();
                }
            }, 75);
            function generateExcelAndDownload() {
                try {
                    const workbook = XLSX.utils.book_new();
                    const students = getAllStudents();
                    const todayStr = new Date().toISOString().split('T')[0];
                    const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

                    // ── SHEET A: Class-wise Students List ──
                    const classStudentData = [['Class', 'Roll No', 'Student Name', 'Father Name', 'Mother Name', 'Contact', 'Gender', 'Type', 'Family Name', 'Admission Number', 'DOB', 'Address']];
                    const sortedStudents = [...students].sort((a,b) => (a.className||'').localeCompare(b.className||'') || (a.name||'').localeCompare(b.name||''));
                    sortedStudents.forEach(s => {
                        classStudentData.push([s.className||'', s.rollNo||'', s.name||'', s.fatherName||'N/A', s.motherName||'N/A', s.contact||'', s.gender||'N/A', s.type||'single', s.familyName||'', s.admissionNumber||'', s.dob||'', s.address||'']);
                    });
                    XLSX.utils.book_append_sheet(workbook, XLSX.utils.aoa_to_sheet(classStudentData), 'A-Students Class-wise');

                    // ── SHEET A2: Class-wise Attendance ──
                    const attData = [['Class', 'Student Name', 'Roll No', 'Total Present', 'Total Absent', 'Total Half-Day', 'Last 30D Present', 'Last 30D Absent', 'Attendance %']];
                    sortedStudents.forEach(s => {
                        let key = s.name.replace(/\s/g,'_');
                        let rec = attendanceRecords[key] || {};
                        let totP=0, totA=0, totH=0, l30P=0, l30A=0;
                        Object.keys(rec).forEach(d => {
                            let v = rec[d];
                            if(v==='present') totP++;
                            else if(v==='absent') totA++;
                            else if(v==='half') totH++;
                            let diff=(new Date(todayStr)-new Date(d))/(86400000);
                            if(diff>=0&&diff<=30){ if(v==='present') l30P++; else if(v==='absent'||v==='half') l30A++; }
                        });
                        let total = totP+totA+totH;
                        let pct = total>0 ? (totP/total*100).toFixed(1)+'%' : 'N/A';
                        attData.push([s.className||'', s.name||'', s.rollNo||'', totP, totA, totH, l30P, l30A, pct]);
                    });
                    XLSX.utils.book_append_sheet(workbook, XLSX.utils.aoa_to_sheet(attData), 'A-Attendance Students');

                    // ── SHEET B: Teachers List + Attendance ──
                    const teacherData = [['Name', 'Father Name', 'Contact', 'Gender', 'Qualification', 'Subject', 'Address', 'Total Present', 'Total Absent', 'Attendance %']];
                    teachers.forEach(t => {
                        let key = (t.name||'').replace(/\s/g,'_');
                        let rec = attendanceRecords['teacher_'+key] || attendanceRecords[key] || {};
                        let totP=0,totA=0;
                        Object.keys(rec).forEach(d=>{ let v=rec[d]; if(v==='present') totP++; else if(v==='absent'||v==='half') totA++; });
                        let total=totP+totA;
                        let pct=total>0?(totP/total*100).toFixed(1)+'%':'N/A';
                        teacherData.push([t.name||'', t.fatherName||'N/A', t.contact||'', t.gender||'N/A', t.qualification||'N/A', t.subject||'N/A', t.address||'', totP, totA, pct]);
                    });
                    XLSX.utils.book_append_sheet(workbook, XLSX.utils.aoa_to_sheet(teacherData), 'B-Teachers & Attendance');

                    // ── SHEET C: Day Book (Income + Expense + Activities) ──
                    const dayBookData = [['Date', 'Time', 'Type', 'Category', 'Name/Party', 'Items/Description', 'Amount', 'Mode', 'Admin', 'Remark']];
                    let allQP = [...(quickPayments||[])].sort((a,b)=>(b.timestamp||0)-(a.timestamp||0));
                    allQP.forEach(p => {
                        let items = Array.isArray(p.items) ? p.items.map(it=>`${it.item}×${it.qty||1}`).join(', ') : (p.item||p.description||'—');
                        dayBookData.push([p.date||'', p.time||'', p.type==='income'?'Income':'Expense', p.category||'', p.name||p.party||'', items, p.amount||p.total||0, p.modeOfPayment||p.mode||'', p.submittedBy||'', p.remark||'']);
                    });
                    let allActivities = [...(activityLog||[])].sort((a,b)=>(b.timestamp||0)-(a.timestamp||0));
                    allActivities.forEach(a => {
                        dayBookData.push([a.date||'', a.time||'', 'Activity', a.type||'', a.user||'', a.description||a.details||'', '', '', a.user||'', '']);
                    });
                    XLSX.utils.book_append_sheet(workbook, XLSX.utils.aoa_to_sheet(dayBookData), 'C-Day Book');

                    // ── SHEET D: Fees Details (All Students, All Months, Balance, Advance) ──
                    const feesDetailData = [['Class', 'Student Name', 'Roll No', 'Contact', 'Month(s)', 'Tuition Fees', 'Exam Fees', ...feesColumns.filter(c=>c.toLowerCase().replace(/\s/,'')!=='tuitionfees'), 'Total', 'Discount', 'After Discount', 'Submitted', 'Balance/Advance', 'Mode', 'FC No', 'Date']];
                    sortedStudents.forEach(s => {
                        let hist = paymentHistory[s.id] || [];
                        if(hist.length === 0) {
                            feesDetailData.push([s.className||'', s.name||'', s.rollNo||'', s.contact||'', 'No Records', 0, 0, ...feesColumns.filter(c=>c.toLowerCase().replace(/\s/,'')!=='tuitionfees').map(()=>0), 0, 0, 0, 0, 'N/A', '', '', '']);
                        } else {
                            hist.forEach(h => {
                                let bal = h.balance || 0;
                                let balLabel = bal < 0 ? 'Advance ₹'+Math.abs(bal) : (bal > 0 ? 'Balance ₹'+bal : 'Clear');
                                let extraCols = feesColumns.filter(c=>c.toLowerCase().replace(/\s/,'')!=='tuitionfees').map(c => (h.fees&&h.fees[c]!==undefined)?h.fees[c]:0);
                                feesDetailData.push([s.className||'', s.name||'', s.rollNo||'', s.contact||'', (h.months||[]).join(', '), h.fees&&h.fees['Tuition Fees']?h.fees['Tuition Fees']:0, h.examFees||0, ...extraCols, h.memberTotal||0, h.discount||0, (h.memberTotal||0)-(h.discount||0), h.submittedAmount||h.amount||0, balLabel, h.modeOfPayment||'', h.fcNumber||'', h.date||'']);
                            });
                        }
                    });
                    XLSX.utils.book_append_sheet(workbook, XLSX.utils.aoa_to_sheet(feesDetailData), 'D-Fees Details');

                    // ── SHEET E: Quick Payment Details ──
                    const qpData = [['Date', 'Time', 'Type', 'Party / Name', 'Items', 'Total Amount', 'Discount', 'Submitted', 'Balance/Advance', 'Mode', 'Submitted By', 'Remark']];
                    allQP.forEach(p => {
                        let items = Array.isArray(p.items) ? p.items.map(it=>`${it.item}×${it.qty||1}=₹${it.amount||0}`).join('; ') : (p.item||'—');
                        let bal = (p.balance||0);
                        let balLabel = bal<0 ? 'Advance ₹'+Math.abs(bal) : (bal>0 ? 'Balance ₹'+bal : 'Clear');
                        qpData.push([p.date||'', p.time||'', p.type==='income'?'Income':'Expense', p.name||p.party||'', items, p.total||p.amount||0, p.discount||0, p.submitted||p.amount||0, balLabel, p.modeOfPayment||p.mode||'', p.submittedBy||'', p.remark||'']);
                    });
                    XLSX.utils.book_append_sheet(workbook, XLSX.utils.aoa_to_sheet(qpData), 'E-Quick Payments');

                    // ── SHEET F: Family Students + Free Students ──
                    const familyData = [['Family Name', 'Family ID', 'Student Name', 'Class', 'Roll No', 'Contact', 'Type', 'Free Status', 'Free Type', 'Tuition Free', 'Exam Free', 'Additional Free']];
                    students.forEach(s => {
                        let freeInfo = freeStudentsList ? Object.values(freeStudentsList||{}).find(f=>String(f.studentId)===String(s.id)) : null;
                        let freeStatus = freeInfo ? 'Yes' : 'No';
                        let freeType = freeInfo ? (freeInfo.freeType||'everything') : '';
                        let tuFree = freeInfo ? (freeInfo.tuition||freeInfo.freeType==='tuition'||freeInfo.freeType==='everything' ? 'Yes':'No') : 'No';
                        let exFree = freeInfo ? (freeInfo.exam||freeInfo.freeType==='exam'||freeInfo.freeType==='everything' ? 'Yes':'No') : 'No';
                        let addFree = freeInfo ? (freeInfo.additional||freeInfo.freeType==='additional'||freeInfo.freeType==='everything' ? 'Yes':'No') : 'No';
                        if(s.type==='family' || freeInfo) {
                            familyData.push([s.familyName||'', s.familyId||'', s.name||'', s.className||'', s.rollNo||'', s.contact||'', s.type||'', freeStatus, freeType, tuFree, exFree, addFree]);
                        }
                    });
                    XLSX.utils.book_append_sheet(workbook, XLSX.utils.aoa_to_sheet(familyData), 'F-Family & Free Students');

                    // ── SHEET G: Fees & Charges Structure ──
                    const chargesData = [['Class', 'Tuition Fees (Monthly)', 'Exam Fees', ...feesColumns.filter(c=>c.toLowerCase().replace(/\s/,'')!=='tuitionfees')]];
                    classList.forEach(cls => {
                        let cf = classFeesStructure[cls] || {};
                        let extraVals = feesColumns.filter(c=>c.toLowerCase().replace(/\s/,'')!=='tuitionfees').map(c=>{
                            let ec = extraFeeColumns ? extraFeeColumns.find(e=>e.name===c) : null;
                            return ec ? (ec.amount||0) : (cf.extraFees&&cf.extraFees[c]||0);
                        });
                        chargesData.push([cls, cf.tuitionFees||0, cf.examFees||0, ...extraVals]);
                    });
                    chargesData.push([]);
                    chargesData.push(['=== Item Fees ===']);
                    chargesData.push(['Item Name', 'Price']);
                    Object.entries(itemsFees||{}).forEach(([name,price]) => chargesData.push([name, price||0]));
                    chargesData.push([]);
                    chargesData.push(['=== Book Fees ===']);
                    chargesData.push(['Book Name', 'Price', 'Class']);
                    Object.entries(booksFees||{}).forEach(([name,price]) => chargesData.push([name, price||0, '']));
                    XLSX.utils.book_append_sheet(workbook, XLSX.utils.aoa_to_sheet(chargesData), 'G-Charges & Fees Structure');

                    // ── SHEET H: Default List (Last Month Pending) ──
                    const nowDate = new Date();
                    const lastMonth = nowDate.getMonth() === 0 ? 11 : nowDate.getMonth() - 1;
                    const lastMonthName = monthNames[lastMonth];
                    const defaultData = [['Class', 'Student Name', 'Roll No', 'Contact', 'Last Payment Date', 'Balance/Advance', 'Pending Months', 'Last Submitted', 'FC Number']];
                    sortedStudents.forEach(s => {
                        let hist = paymentHistory[s.id] || [];
                        let lastRec = hist.length > 0 ? hist[hist.length-1] : null;
                        let bal = lastRec ? (lastRec.balance||0) : 0;
                        let balLabel = bal<0 ? 'Advance ₹'+Math.abs(bal) : (bal>0 ? 'Balance ₹'+bal : 'Clear');
                        let paidMonths = [];
                        hist.forEach(h => { (h.months||[]).forEach(m=>{ if(!paidMonths.includes(m)) paidMonths.push(m); }); });
                        let allMonthsPaid = paidMonths.includes(lastMonthName);
                        if(!allMonthsPaid || bal > 0) {
                            let pendingMonths = monthNames.filter(m => !paidMonths.includes(m)).join(', ') || 'All Paid';
                            defaultData.push([s.className||'', s.name||'', s.rollNo||'', s.contact||'', lastRec?lastRec.date:'Never', balLabel, pendingMonths, lastRec?(lastRec.submittedAmount||lastRec.amount||0):0, lastRec?(lastRec.fcNumber||''):'']);
                        }
                    });
                    XLSX.utils.book_append_sheet(workbook, XLSX.utils.aoa_to_sheet(defaultData), 'H-Default List');

                    // ── SHEET I: Fees Transaction History ──
                    const txnData = [['Class', 'Student Name', 'Roll No', 'Contact', 'Date', 'Month(s)', 'Member Total', 'Discount', 'Submitted', 'Balance', 'Old Balance', 'Mode', 'FC Number', 'Receipt No', 'Submitted By', 'Remark']];
                    sortedStudents.forEach(s => {
                        let hist = paymentHistory[s.id] || [];
                        hist.forEach(h => {
                            let bal = h.balance||0;
                            let balLabel = bal<0 ? 'Advance ₹'+Math.abs(bal) : (bal>0 ? 'Balance ₹'+bal : 'Clear');
                            let oldBal = h.oldBalance||0;
                            let oldBalLabel = oldBal<0 ? 'Advance ₹'+Math.abs(oldBal) : (oldBal>0 ? 'Balance ₹'+oldBal : 'Clear');
                            txnData.push([s.className||'', s.name||'', s.rollNo||'', s.contact||'', h.date||'', (h.months||[]).join(', '), h.memberTotal||0, h.discount||0, h.submittedAmount||h.amount||0, balLabel, oldBalLabel, h.modeOfPayment||'', h.fcNumber||'', h.receiptNo||'', h.submittedBy||'', h.remark||'']);
                        });
                    });
                    XLSX.utils.book_append_sheet(workbook, XLSX.utils.aoa_to_sheet(txnData), 'I-Transaction History');

                    // ── SHEET J: Admin & Co-Admin Details ──
                    const adminData = [['Role', 'Name', 'Contact / Username', 'Plan', 'Total Coins', 'Expiry', 'Status']];
                    if(currentUser) {
                        adminData.push(['Admin', currentUser.name||'', currentUser.contact||currentUser.username||'', currentUser.plan||'Basic', currentUser.coins||0, currentUser.planExpiry||currentUser.expiry||'N/A', 'Active']);
                    }
                    let coAdminsList = [];
                    try { coAdminsList = JSON.parse(localStorage.getItem('eRegister_coAdmins')||'[]'); } catch(e){}
                    coAdminsList.forEach(ca => {
                        adminData.push(['Co-Admin', ca.name||'', ca.contact||ca.username||'', ca.plan||'—', ca.coins||0, ca.expiry||'N/A', ca.active===false?'Inactive':'Active']);
                    });
                    adminData.push([]);
                    adminData.push(['=== App Info ===']);
                    adminData.push(['Export Date', new Date().toLocaleString()]);
                    adminData.push(['Total Students', students.length]);
                    adminData.push(['Total Teachers', teachers.length]);
                    adminData.push(['Total Classes', classList.length]);
                    adminData.push(['Total Payment Records', Object.values(paymentHistory).reduce((s,h)=>s+h.length,0)]);
                    XLSX.utils.book_append_sheet(workbook, XLSX.utils.aoa_to_sheet(adminData), 'J-Admin & Plan Details');

                    // ── JSON Backup Sheet (for restore) ──
                    const jsonBackup = {
                        exportDate: new Date().toLocaleString(), version: '1.0',
                        admissions, teachers, attendanceRecords, paymentHistory,
                        examResults, classFeesStructure, feesData, feesColumns,
                        classList, itemsFees, booksFees, admissionSettings, extraFeeColumns,
                        freeStudentsList, billingSaved, editSettings, examFeesMonthWise,
                        quickPayments, selectedWallpaper
                    };
                    const jsonStr = JSON.stringify(jsonBackup, null, 2);
                    XLSX.utils.book_append_sheet(workbook, XLSX.utils.aoa_to_sheet([['JSON Backup Data - For Restore Only'],['====================='],[jsonStr]]), 'JSON_Backup');

                    const fileName = `eRegister_Backup_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.xlsx`;
                    XLSX.writeFile(workbook, fileName);

                    const jsonBlob = new Blob([jsonStr], { type: 'application/json' });
                    const jsonUrl = URL.createObjectURL(jsonBlob);
                    const jsonA = document.createElement('a');
                    jsonA.href = jsonUrl;
                    jsonA.download = `eRegister_Backup_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.json`;
                    jsonA.click();
                    URL.revokeObjectURL(jsonUrl);

                    showPopup('✅ Backup completed! 10-sheet Excel + JSON downloaded.', true);
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-download"></i> Start Excel Backup';
                    setTimeout(() => {
                        progressBar.style.display = 'none';
                        progressFill.style.width = '0%';
                        progressPercent.innerHTML = '';
                    }, 2000);
                } catch(err) {
                    console.error('Backup error:', err);
                    showPopup('❌ Backup failed: ' + err.message, false);
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-download"></i> Start Excel Backup';
                    progressBar.style.display = 'none';
                }
            }
        }

        function handleRestoreFromJSON() {
            const fileInput = document.getElementById('restoreFileInput');
            if(!fileInput.files.length) {
                showPopup('Please select a JSON backup file first!', false);
                return;
            }
            if(!confirm('⚠️ WARNING: This will replace ALL your current data (students, teachers, fees, attendance, payments). Are you absolutely sure?')) return;
            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if(!data.exportDate && !data.admissions) {
                        showPopup('❌ Invalid backup file format!', false);
                        return;
                    }
                    if(data.admissions) admissions = data.admissions;
                    if(data.teachers) teachers = data.teachers;
                    if(data.attendanceRecords) attendanceRecords = data.attendanceRecords;
                    if(data.paymentHistory) paymentHistory = data.paymentHistory;
                    if(data.examResults) examResults = data.examResults;
                    if(data.classFeesStructure) classFeesStructure = data.classFeesStructure;
                    if(data.feesData) feesData = data.feesData;
                    if(data.feesColumns) feesColumns = data.feesColumns;
                    if(data.classList) classList = data.classList;
                    if(data.itemsFees) itemsFees = data.itemsFees;
                    if(data.booksFees) booksFees = data.booksFees;
                    if(data.admissionSettings) admissionSettings = data.admissionSettings;
                    if(data.extraFeeColumns) extraFeeColumns = data.extraFeeColumns;
                    if(data.freeStudentsList) freeStudentsList = data.freeStudentsList;
                    if(data.billingSaved) billingSaved = data.billingSaved;
                    if(data.editSettings) editSettings = data.editSettings;
                    if(data.examFeesMonthWise) examFeesMonthWise = data.examFeesMonthWise;
                    if(data.quickPayments) quickPayments = data.quickPayments;
                    if(data.selectedWallpaper !== undefined) selectedWallpaper = data.selectedWallpaper;
                    saveAllToFirebase();
                    showPopup('✅ Restore successful! Refreshing page...', true);
                    setTimeout(() => location.reload(), 2000);
                } catch(err) {
                    showPopup('❌ Error parsing backup file: ' + err.message, false);
                }
            };
            reader.readAsText(file);
        }

                            <div><i class="fas fa-rupee-sign" style="color:#1a1a2e;width:16px;"></i> <strong>Total Amount:</strong> <span style="font-weight:700;color:#1a1a2e;">₹${combinedTotalAmount}</span></div>
                            <div><i class="fas fa-check-circle" style="color:#10b981;width:16px;"></i> <strong>Submitted:</strong> <span style="font-weight:700;color:#10b981;">₹${combinedSubmitted}</span></div>
                        </div>
                    </div>`;
                    historyHtml += `</div>`;
                }

                if(feeEntries.length > 0) {
                    historyHtml += `<div style="overflow-x:auto; margin-top:15px;"><table class="history-table"><thead></tr>${tableHeaders}</tr></thead><tbody>`;
                    let groups = [];
                    feeEntries.forEach(trans => {
                        let key = trans.date + '|' + (trans.months||[]).join(',');
                        let existing = groups.find(g => g.key === key);
                        if(existing) {
                            existing.members.push(trans);
                        } else {
                            groups.push({ key, date: trans.date, months: trans.months, submittedAmount: trans.submittedAmount, remark: trans.remark, members: [trans] });
                        }
                    });
                    let serialNum = 1;
                    groups.forEach(group => {
                        let monthStr = group.months && group.months.length > 0 ? group.months.join(', ') : '-';
                        let rowCount = group.members.length;
                        let combinedTotal = group.members.reduce((sum, t) => {
                            let ms = getAllStudents().find(s => s.name === t.memberName);
                            let ft = ms ? getStudentFreeType(ms.id) : null;
                            if(ft && (ft === true || ft.everything)) return sum;
                            return sum + (t.total || 0);
                        }, 0);
                        group.members.forEach((trans, mIdx) => {
                            let ms = getAllStudents().find(s => s.name === trans.memberName);
                            let ft = ms ? getStudentFreeType(ms.id) : null;
                            let isEverythingFree = ft && (ft === true || ft.everything);
                            let rowHtml = '';
                            if(mIdx === 0) {
                                rowHtml += `<td rowspan="${rowCount}" style="text-align:center;vertical-align:middle;font-weight:700;">${serialNum}</td>`;
                            }
                            rowHtml += `<td>${trans.memberName}</td><td>${trans.date}</td><td>${monthStr}</td>`;
                            feesColumns.forEach(col => {
                                let val = isEverythingFree ? 0 : (trans.fees[col] !== undefined ? trans.fees[col] : 0);
                                rowHtml += `<td>₹${val}</td>`;
                            });
                            let examFeeVal = isEverythingFree ? 0 : (trans.fees['Exam Fees'] !== undefined ? trans.fees['Exam Fees'] : (trans.examFees || 0));
                            let examCellStyle = examFeeVal > 0 ? 'background:#fff3cd; font-weight:600; color:#b45309;' : '';
                            rowHtml += '<td style="' + examCellStyle + '">₹' + examFeeVal + '</td>';
                            let oldBalVal = isEverythingFree ? 0 : (trans.oldBalance !== undefined ? trans.oldBalance : 0);
                            let oldBalCell = oldBalVal < 0 ? `<span style="color:#10b981;font-weight:700;">+Advance ₹${Math.abs(oldBalVal)}</span>` : `₹${oldBalVal}`;
                            rowHtml += `<td>${oldBalCell}</td>`;
                            if(mIdx === 0) {
                                rowHtml += `<td rowspan="${rowCount}" style="vertical-align:middle;font-weight:700;">₹${combinedTotal}</td>`;
                                rowHtml += `<td rowspan="${rowCount}" style="background:#dcfce7; font-weight:600; color:#059669; vertical-align:middle;">₹${group.submittedAmount || 0}</td>`;
                                // Receipt number for fees card entries - generate FC number
                                let fcNum = getNextFCNumber();
                                rowHtml += `<td rowspan="${rowCount}" style="vertical-align:middle;font-weight:700;color:#dc2626;">${fcNum}</td>`;
                            }
                            historyHtml += `<tr>${rowHtml}</tr>`;
                        });
                        serialNum++;
                    });
                    historyHtml += `</tbody></table></div>`;
                } else if(admissionEntries.length === 0) {
                    historyHtml += `<div style="margin-top:20px; color:#999; text-align:center;"><i class="fas fa-inbox"></i><br>No payment history found</div>`;
                }
                historyHtml += `</div>`;
            } else {
                historyHtml += `<div style="margin-top:20px; color:#999; text-align:center;"><i class="fas fa-inbox"></i><br>No payment history found</div>`;
            }
            
            document.getElementById('app').innerHTML = `<div class="inner-bg"><div class="sticky-header">${getHeader('Transaction History', true)}</div><div class="inner-container"><div class="form-card">${historyHtml}</div></div>${getOverlay()}</div>`;
            window.makeEditable = makeEditable;
        }

        // ==================== FEES SETTING ====================
        function renderFeesSetting() {
            function renderColumns() {
                let colsHtml = '';
                feesColumns.forEach((col, idx) => {
                    colsHtml += `<div class="setting-item"><span>${col}</span><div class="setting-actions"><button class="small-icon-btn" onclick="deleteColumn(${idx})"><img src="${img.deleteIcon}"></button></div></div>`;
                });
                document.getElementById('columnsList').innerHTML = colsHtml;
            }
            
            window.addNewColumnSetting = () => {
                let colName = document.getElementById('newColumnNameSetting').value;
                if(!colName) { showPopup('Please enter column name!', false); return; }
                feesColumns.push(colName);
                fsSave('feesColumns', feesColumns); localStorage.setItem('eRegister_fees_columns', JSON.stringify(feesColumns));
                showPopup('✅ Column created successfully!');
                document.getElementById('newColumnNameSetting').value = '';
                renderColumns();
            };
            
            window.deleteColumn = (idx) => {
                if(confirm('Are you sure you want to delete this column?')) {
                    feesColumns.splice(idx, 1);
                    fsSave('feesColumns', feesColumns); localStorage.setItem('eRegister_fees_columns', JSON.stringify(feesColumns));
                    showPopup('✅ Column deleted successfully!');
                    renderColumns();
                }
            };

            function buildFreeOptions(sid, freeType) {
                let ft = freeType || {};
                let opt = (value, label) => `<label style="display:inline-flex;align-items:center;gap:6px;margin:4px 10px 4px 0;font-size:12px;cursor:pointer;background:#fff;border:1px solid #f3d39b;border-radius:8px;padding:4px 10px;"><input type="checkbox" value="${value}" ${ft[value]?'checked':''} style="width:15px;height:15px;cursor:pointer;">${label}</label>`;
                return `<div style="margin-top:10px;padding-top:10px;border-top:1px dashed #f3d39b;">
                    <div style="font-size:11px;color:#92400e;font-weight:700;margin-bottom:6px;">Kya-kya free karna chahte hain:</div>
                    <div style="display:flex;flex-wrap:wrap;">
                        ${opt('tuitionFree','Tuition Fees')}
                        ${opt('examFree','Exam Fees')}
                        ${opt('dressFree','Dress Fees')}
                        ${opt('bookFree','Book Fees')}
                        ${opt('admissionFree','Admission Fees')}
                        ${opt('registrationFree','Registration Fees')}
                    </div>
                    <button onclick="saveFreeType('${sid}')" style="margin-top:8px;background:linear-gradient(135deg,#f59e0b,#d97706);color:white;border:none;padding:6px 16px;border-radius:14px;font-size:12px;font-weight:600;cursor:pointer;"><i class="fas fa-save"></i> Save</button>
                </div>`;
            }

            window.searchFreeStudent = () => {
                let query = (document.getElementById('freeStudentSearch').value || '').toLowerCase();
                let filterClass = document.getElementById('freeStudentClassFilter').value || 'all';
                let students = getAllStudents();
                let results = students.filter(s => {
                    let matchQ = !query || (s.name||'').toLowerCase().includes(query) || (s.contact||'').includes(query) || (s.familyName && s.familyName.toLowerCase().includes(query)) || (s.fatherName && s.fatherName.toLowerCase().includes(query));
                    let matchC = (filterClass === 'all' || s.className === filterClass);
                    return matchQ && matchC;
                });
                let html = '';
                if(results.length === 0) { html = '<div style="text-align:center;padding:20px;color:#999;">No students found</div>'; }
                else {
                    let shownFamilies = new Set();
                    results.forEach(s => {
                        if(s.type === 'family') {
                            if(shownFamilies.has(s.familyId)) return;
                            shownFamilies.add(s.familyId);
                            let allStudents = getAllStudents();
                            let familyMembers = allStudents.filter(m => m.familyId === s.familyId);
                            let memberBoxes = familyMembers.map(m => {
                                let freeType = getStudentFreeType(m.id);
                                let isFree = !!freeType;
                                let badgeHtml = isFree ? `<span style="background:#f59e0b;color:white;padding:2px 8px;border-radius:10px;font-size:11px;margin-left:8px;">${getFreeTypeBadge(freeType)}</span>` : '';
                                let opts = buildFreeOptions(String(m.id), freeType);
                                return `<div style="background:${isFree?'#fef3c7':'white'};border:2px solid ${isFree?'#f59e0b':'#e0e0e0'};border-radius:14px;padding:12px 16px;margin-bottom:8px;">
                                    <div style="display:flex;justify-content:space-between;align-items:center;">
                                        <div>
                                            <strong>${m.name}</strong> &nbsp;
                                            <span style="font-size:12px;color:#666;">${m.className} | Roll: ${m.rollNo}</span>
                                            ${badgeHtml}
                                        </div>
                                        <input type="checkbox" data-sid="${m.id}" ${isFree?'checked':''} style="width:20px;height:20px;cursor:pointer;" onchange="toggleFreeStudent(this)">
                                    </div>
                                    <div id="freeOptions_${m.id}" style="display:${isFree?'block':'none'};">${opts}</div>
                                </div>`;
                            }).join('');
                            html += `<div style="background:#f8f9fa;border-radius:16px;padding:15px;margin-bottom:15px;">
                                <div style="font-size:13px;color:#667eea;font-weight:700;margin-bottom:10px;"><i class="fas fa-users"></i> Family (${s.fatherName||'N/A'}) — ${s.contact}</div>
                                <div style="font-size:12px;color:#1a73e8;background:#e8f0fe;padding:6px 12px;border-radius:8px;margin-bottom:10px;"><i class="fas fa-info-circle"></i> Select the student you want to teach for free</div>
                                ${memberBoxes}
                            </div>`;
                        } else {
                            let freeType = getStudentFreeType(s.id);
                            let isFree = !!freeType;
                            let badgeHtml = isFree ? `<span style="background:#f59e0b;color:white;padding:2px 8px;border-radius:10px;font-size:11px;margin-left:8px;">${getFreeTypeBadge(freeType)}</span>` : '';
                            let opts = buildFreeOptions(String(s.id), freeType);
                            html += `<div style="background:${isFree?'#fef3c7':'white'};border:2px solid ${isFree?'#f59e0b':'#e0e0e0'};border-radius:14px;padding:12px 16px;margin-bottom:8px;">
                                <div style="display:flex;justify-content:space-between;align-items:center;">
                                    <div>
                                        <strong>${s.name}</strong> &nbsp;
                                        <span style="font-size:12px;color:#666;">${s.className} | Roll: ${s.rollNo} | ${s.contact}</span>
                                        ${badgeHtml}
                                    </div>
                                    <input type="checkbox" data-sid="${s.id}" ${isFree?'checked':''} style="width:20px;height:20px;cursor:pointer;" onchange="toggleFreeStudent(this)">
                                </div>
                                <div id="freeOptions_${s.id}" style="display:${isFree?'block':'none'};">${opts}</div>
                            </div>`;
                        }
                    });
                }
                document.getElementById('freeStudentResults').innerHTML = html;
            };

            window.toggleFreeStudent = (checkbox) => {
                let sid = String(checkbox.getAttribute('data-sid'));
                let optionsDiv = document.getElementById('freeOptions_' + sid);
                if(checkbox.checked) {
                    if(optionsDiv) optionsDiv.style.display = 'block';
                } else {
                    if(optionsDiv) optionsDiv.style.display = 'none';
                    delete freeStudentsList[sid];
                    saveFreeStudents();
                    let studentName = getAllStudents().find(s => String(s.id) === sid)?.name || 'Student';
                    showPopup(`✅ ${studentName} removed from Free Students!`);
                    searchFreeStudent();
                }
            };

            window.saveFreeType = (sid) => {
                let checkboxes = document.querySelectorAll(`#freeOptions_${sid} input[type="checkbox"]`);
                let freeType = { everything: false, tuitionFree: false, examFree: false, dressFree: false, bookFree: false, admissionFree: false, registrationFree: false, additionalFree: false };
                checkboxes.forEach(cb => { if(cb.checked) freeType[cb.value] = true; });
                let anySelected = Object.values(freeType).some(v => v);
                if(!anySelected) { showPopup('Please select at least one free type!', false); return; }
                freeStudentsList[sid] = freeType;
                saveFreeStudents();
                let studentName = getAllStudents().find(s => String(s.id) === sid)?.name || 'Student';
                showPopup(`✅ ${studentName} free settings saved successfully!`);
                searchFreeStudent();
            };

            let classFilterOptions = classList.map(c => `<option value="${c}">${c}</option>`).join('');
            
            document.getElementById('app').innerHTML = `<div class="inner-bg"><div class="sticky-header">${getHeader('Fees Card Option Management', true)}</div><div class="inner-container"><div class="form-card">
                <div class="form-title"><i class="fas fa-cog"></i> Fees Card Option Management</div>
                <div class="description-text">Select options that you want to show in Fees Card</div>
                <div class="search-section"><input type="text" id="newColumnNameSetting" class="search-input" placeholder="New column name"><button class="small-icon-btn" onclick="addNewColumnSetting()"><img src="${img.plusIcon}"></button></div>
                <div id="columnsList"></div>
                <div style="display:flex;align-items:center;gap:15px;margin:28px 0 22px;">
                    <div style="flex:1;border-top:2.5px solid #f97316;"></div>
                    <span style="font-size:16px;font-weight:700;color:#f97316;white-space:nowrap;"><i class="fas fa-user-slash"></i> Mark as a Free Student</span>
                    <div style="flex:1;border-top:2.5px solid #f97316;"></div>
                </div>
                <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:15px;">
                    <div style="flex:1;position:relative;min-width:200px;">
                        <input type="text" id="freeStudentSearch" class="search-input" placeholder="Search by name, contact, family name..." style="padding-right:50px;" oninput="searchFreeStudent()">
                    </div>
                    <button class="search-icon-btn" onclick="searchFreeStudent()" title="Search"><img src="${img.searchIcon}"></button>
                    <div style="position:relative;">
                        <select id="freeStudentClassFilter" onchange="searchFreeStudent()" style="padding:12px 16px;border:2px solid #e0e0e0;border-radius:50px;font-size:14px;background:white;cursor:pointer;">
                            <option value="all"><i class="fas fa-filter"></i> All Classes</option>
                            ${classFilterOptions}
                        </select>
                    </div>
                </div>
                <div id="freeStudentResults"></div>
            </div></div>${getOverlay()}</div>`;
            renderColumns();
            setTimeout(() => { if(window.searchFreeStudent) searchFreeStudent(); }, 50);
        }

                    let examVals = Object.values(classExam);
                    let examAmt = examVals.length > 0 ? examVals[0] : 0;
                    let examAmtDisp = examAmt > 0 ? examAmt : '';
                    let selMonths = Object.keys(classExam).map(Number);

                            ${m.substring(0,3)}</button>`;
                    }).join('');
                    let booksVal = booksFees[className] || 0;

                    tableHtml += `<tr>
