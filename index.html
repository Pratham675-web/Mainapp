            </div>`;

            let billingEditMode = false;
            let billingDeleteMode = false;
            let billingSaved = false;

            document.getElementById('printBillingBtn').style.display = 'none';
            document.getElementById('saveBillingBtn').style.display = 'inline-flex';

            function markUnsaved() {
                billingSaved = false;
                document.getElementById('saveBillingBtn').style.display = 'inline-flex';
                document.getElementById('printBillingBtn').style.display = 'none';
            }

            window.toggleBillingEdit_detail = function() {
                billingEditMode = !billingEditMode;
                let inputs = document.querySelectorAll('#billingSummaryContent input.billing-input, #billingSummaryContent select.billing-input');
                inputs.forEach(inp => {
                    inp.readOnly = !billingEditMode;
                    inp.disabled = !billingEditMode;
                    inp.style.background = billingEditMode ? 'white' : '#f9f9f9';
                    inp.style.border = billingEditMode ? '2px solid #667eea' : '1px solid #e0e0e0';
                });
                showPopup(billingEditMode ? '✏️ Editing enabled' : '✅ Editing locked');
                if(billingEditMode) markUnsaved();
            };

            window.toggleBillingDeleteMode = function() {
                billingDeleteMode = !billingDeleteMode;
                let checks = document.querySelectorAll('#billingTable .billing-delete-check');
                let deleteColHeader = document.getElementById('deleteColHeader');
                let deleteBtn = document.getElementById('deleteSelectedRowsBtn');
                checks.forEach(c => c.style.display = billingDeleteMode ? 'block' : 'none');
                if(deleteColHeader) deleteColHeader.style.display = billingDeleteMode ? 'table-cell' : 'none';
                if(deleteBtn) deleteBtn.style.display = billingDeleteMode ? 'inline-flex' : 'none';
                showPopup(billingDeleteMode ? '🗑️ Select rows to delete' : '✅ Delete mode off');
                if(billingDeleteMode) markUnsaved();
            };

            window.confirmDeleteBillingRows = function() {
                let rows = document.querySelectorAll('#billingTable tbody tr');
                let toDelete = [];
                rows.forEach(row => {
                    let cb = row.querySelector('.billing-delete-check');
                    if(cb && cb.checked) toDelete.push(row);
                });
                if(toDelete.length === 0) { showPopup('Koi row select nahi ki!', false); return; }
                if(confirm(`${toDelete.length} row(s) delete karein?`)) {
                    toDelete.forEach(r => r.remove());
                    showPopup(`✅ ${toDelete.length} row(s) deleted!`);
                    markUnsaved();
                }
            };

            window.recalcBilling = function() {
                let rows = document.querySelectorAll('#billingTable tbody tr');
                rows.forEach(row => {
                    let priceInput = row.querySelector('.billing-input');
                    let qtyInput = row.querySelector('.billing-qty');
                    let totalCell = row.querySelector('.billing-row-total');
                    if (priceInput && qtyInput && totalCell) {
                        let price = parseFloat(priceInput.value) || 0;
                        let qty = parseFloat(qtyInput.value) || 1;
                        let dressQty = row.querySelector('.dress-qty');
                        if (dressQty) {
                            price = parseFloat(dressQty.getAttribute('data-price')) || 0;
                        }
                        totalCell.textContent = '₹' + (price * qty);
                    }
                });
                markUnsaved();
            };

            window.openAddItemModal_billing = function() {
                let listHtml = '';
                defaultItemsList.forEach(item => {
                    let price = itemsFees[item] || 0;
                    listHtml += `<div onclick="addItemToBilling_detail('${item}', ${price})" style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid #f0f0f0;cursor:pointer;border-radius:12px;transition:0.2s;" onmouseover="this.style.background='#f0f0f0'" onmouseout="this.style.background='white'">
                        <span style="font-weight:500;">${item}</span>
                        <span style="font-weight:700;color:#667eea;">₹${price}</span>
                    </div>`;
                });
                // Add inventory items to the list
                (window._inventoryData || []).forEach((inv, invIdx) => {
                    let invPrice = inv.price || 0;
                    let invQtyBadge = inv.qty > 0
                        ? `<span style="font-size:11px;background:#dcfce7;color:#15803d;padding:2px 7px;border-radius:10px;margin-right:6px;">Stock: ${inv.qty}</span>`
                        : `<span style="font-size:11px;background:#fee2e2;color:#dc2626;padding:2px 7px;border-radius:10px;margin-right:6px;">Out of stock</span>`;
                    listHtml += `<div onclick="addItemToBilling_detail('${inv.name}', ${invPrice})" style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid #f0f0f0;cursor:pointer;border-radius:12px;transition:0.2s;" onmouseover="this.style.background='#f0f0f0'" onmouseout="this.style.background='white'">
                        <span style="font-weight:500;"><i class="fas fa-box" style="color:#667eea;font-size:11px;margin-right:5px;"></i> ${inv.name}</span>
                        <span>${invQtyBadge}<span style="font-weight:700;color:#667eea;">₹${invPrice}</span></span>
                    </div>`;
                });
                (admissionSettings.dresses||[]).forEach((dr, di) => {
                    let colorOptions = (dr.color||'').split(',').map(c=>`<option value="${c.trim()}">${c.trim()}</option>`).join('');
                    listHtml += `<div style="padding:14px 16px;border-bottom:1px solid #f0f0f0;border-radius:12px;">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
                            <span style="font-weight:500;">${dr.name||'Dress'}</span>
                            <span style="font-weight:700;color:#667eea;">₹${dr.price||0}</span>
                        </div>
                        <div style="display:flex;align-items:center;gap:8px;">
                            <label style="font-size:12px;color:#666;">Color:</label>
                            <select id="addDressColor_${di}" style="padding:4px 8px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;">${colorOptions}</select>
                            <button onclick="addDressItemToBilling(${di})" style="background:#667eea;color:white;border:none;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;">Add</button>
                        </div>
                    </div>`;
                });
                document.getElementById('itemsSelectionList').innerHTML = listHtml;
                document.getElementById('addItemModal_billing').style.display = 'flex';
            };

            window.addDressItemToBilling = function(di) {
                let dr = admissionSettings.dresses[di];
                if(!dr) return;
                let colorSel = document.getElementById(`addDressColor_${di}`);
                let color = colorSel ? colorSel.value : '';
                let price = dr.price || 0;
                document.getElementById('addItemModal_billing').style.display = 'none';
                let tbody = document.getElementById('billingBody');
                let newRow = document.createElement('tr');
                newRow.innerHTML = `
                    <td style="padding:8px;">${dr.name||'Dress'} <button onclick="this.closest('tr').remove();recalcBilling();" style="background:#ef4444;border:none;color:white;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:12px;margin-left:6px;">×</button></td>
                    <td><select class="billing-input" style="width:120px;padding:6px;border:1px solid #e0e0e0;border-radius:8px;background:#f9f9f9;" disabled>${(dr.color||'').split(',').map(c=>`<option${c.trim()===color?' selected':''}>${c.trim()}</option>`).join('')}</select></td>
                    <td>
                        <div style="display:flex;align-items:center;gap:6px;">
                            <button onclick="let q=this.nextElementSibling;q.value=Math.max(1,parseInt(q.value)-1);recalcBilling();" style="width:28px;height:28px;background:#ef4444;border:none;border-radius:50%;color:white;cursor:pointer;font-size:16px;">−</button>
                            <input type="number" class="billing-qty" value="1" min="1" style="width:50px;padding:6px;border:1px solid #e0e0e0;border-radius:8px;text-align:center;" onchange="recalcBilling()">
                            <button onclick="let q=this.previousElementSibling;q.value=parseInt(q.value)+1;recalcBilling();" style="width:28px;height:28px;background:#10b981;border:none;border-radius:50%;color:white;cursor:pointer;font-size:16px;">+</button>
                        </div>
                    </td>
                    <td class="billing-row-total">₹${price}</td>
                    <td><input type="checkbox" class="billing-delete-check" style="width:18px;height:18px;cursor:pointer;${billingDeleteMode?'':'display:none'}"></td>`;
                tbody.insertBefore(newRow, document.getElementById('addedItemsRows'));
                recalcBilling();
                showPopup(`✅ ${dr.name} added!`);
                markUnsaved();
            };

            window.addItemToBilling_detail = function(itemName, itemPrice) {
                document.getElementById('addItemModal_billing').style.display = 'none';
                let tbody = document.getElementById('billingBody');
                let newRow = document.createElement('tr');
                newRow.innerHTML = `
                    <td style="padding:8px;">${itemName} <button onclick="this.closest('tr').remove();recalcBilling();" style="background:#ef4444;border:none;color:white;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:12px;margin-left:6px;">×</button></td>
                    <td><input type="number" class="billing-input" value="${itemPrice}" style="width:100%;padding:8px;border:1px solid #e0e0e0;border-radius:8px;background:#f9f9f9;" ${billingEditMode?'':'readonly'} onchange="recalcBilling()"></td>
                    <td>
                        <div style="display:flex;align-items:center;gap:6px;">
                            <button onclick="let q=this.nextElementSibling;q.value=Math.max(1,parseInt(q.value)-1);recalcBilling();" style="width:28px;height:28px;background:#ef4444;border:none;border-radius:50%;color:white;cursor:pointer;font-size:16px;">−</button>
                            <input type="number" class="billing-qty" value="1" min="1" style="width:50px;padding:6px;border:1px solid #e0e0e0;border-radius:8px;text-align:center;" onchange="recalcBilling()">
                            <button onclick="let q=this.previousElementSibling;q.value=parseInt(q.value)+1;recalcBilling();" style="width:28px;height:28px;background:#10b981;border:none;border-radius:50%;color:white;cursor:pointer;font-size:16px;">+</button>
                        </div>
                    </td>
                    <td class="billing-row-total">₹${itemPrice}</td>
                    <td><input type="checkbox" class="billing-delete-check" style="width:18px;height:18px;cursor:pointer;${billingDeleteMode?'':'display:none'}"></td>`;
                tbody.insertBefore(newRow, document.getElementById('addedItemsRows'));
                recalcBilling();
                showPopup(`✅ ${itemName} added!`);
                markUnsaved();
            };

            window.calculateGrandTotalBilling = function() {
                let total = 0;
                document.querySelectorAll('#billingTable .billing-row-total').forEach(cell => {
                    total += parseFloat(cell.textContent.replace('₹','')) || 0;
                });
                document.getElementById('bilGrandTotal').textContent = '₹' + total;
                document.getElementById('bilFinalTotal').textContent = '₹' + total;
                document.getElementById('bilDiscount').value = 0;
                document.getElementById('bilSubmitted').value = 0;
                document.getElementById('bilBalance').textContent = '₹' + total;
                document.getElementById('grandTotalBox').style.display = 'block';
            };

            window.applyBillingDiscount = function() {
                let grandRaw = parseFloat(document.getElementById('bilGrandTotal').textContent.replace('₹','')) || 0;
                let disc = parseFloat(document.getElementById('bilDiscount').value) || 0;
                let finalTotal = Math.max(0, grandRaw - disc);
                document.getElementById('bilFinalTotal').textContent = '₹' + finalTotal;
                calcBillingBalance();
                markUnsaved();
            };

            window.calcBillingBalance = function() {
                let finalTotal = parseFloat(document.getElementById('bilFinalTotal').textContent.replace('₹','')) || 0;
                let submitted = parseFloat(document.getElementById('bilSubmitted').value) || 0;
                let balance = Math.max(0, finalTotal - submitted);
                document.getElementById('bilBalance').textContent = '₹' + balance;
                markUnsaved();
            };

            window.saveBillingSummary = function() {
                billingSaved = true;
                let rows = [];
                document.querySelectorAll('#billingTable tbody tr').forEach(row => {
                    let nameCell = row.cells[0];
                    let priceCell = row.querySelector('.billing-input');
                    let qtyCell = row.querySelector('.billing-qty');
                    let totalCell = row.querySelector('.billing-row-total');
                    if(nameCell && totalCell) {
                        rows.push({
                            name: nameCell.textContent.trim().replace('×','').trim(),
                            price: priceCell ? priceCell.value : '',
                            qty: qtyCell ? qtyCell.value : 1,
                            total: totalCell.textContent
                        });
                    }
                });
                // Deduct saved billing items from inventory
                if(window._inventoryData && window._inventoryData.length > 0) {
                    let invChanged = false;
                    rows.forEach(row => {
                        let itemName = (row.name||'').toLowerCase().trim();
                        let itemQty = parseInt(row.qty) || 1;
                        let invIdx = window._inventoryData.findIndex(inv => (inv.name||'').toLowerCase().trim() === itemName);
                        if(invIdx >= 0 && window._inventoryData[invIdx].qty > 0) {
                            window._inventoryData[invIdx].qty = Math.max(0, window._inventoryData[invIdx].qty - itemQty);
                            invChanged = true;
                        }
                    });
                    if(invChanged) {
                        fsSave('inventoryData', window._inventoryData);
                        localStorage.setItem('eRegister_inventory', JSON.stringify(window._inventoryData));
                    }
                }
                let grandTotalRaw = parseFloat((document.getElementById('bilGrandTotal')?.textContent||'0').replace('₹','')) || 0;
                let submittedRaw = parseFloat(document.getElementById('bilSubmitted')?.value || '0') || 0;
                let balanceRaw = parseFloat((document.getElementById('bilBalance')?.textContent||'0').replace('₹','')) || 0;
                let discountRaw = parseFloat(document.getElementById('bilDiscount')?.value || '0') || 0;
                let finalTotalRaw = parseFloat((document.getElementById('bilFinalTotal')?.textContent||'0').replace('₹','')) || 0;

                // Generate ADR number
                let adrNumber = getNextADRNumber();

                let saveData = {
                    admId: admId,
                    rows,
                    grandTotal: '₹' + grandTotalRaw,
                    discount: discountRaw,
                    finalTotal: '₹' + finalTotalRaw,
                    submitted: submittedRaw,
                    balance: '₹' + balanceRaw,
                    savedAt: new Date().toLocaleString(),
                    adrNumber: adrNumber
                };
                let allSaved = Object.assign({}, billingSaved);
                allSaved[admId] = saveData;
                billingSaved = allSaved; fsSave('billingSaved', billingSaved); localStorage.setItem('eRegister_billing_saved', JSON.stringify(allSaved));

                let admission = admissions.find(a => String(a.id) === String(admId));
                if(admission) {
                    let studentIds = [];
                    if(admission.type === 'single') {
                        studentIds.push(admission.id);
                    } else if(admission.type === 'family' || admission.type === 'double') {
                        (admission.students||[]).forEach(s => studentIds.push(admission.id + '_' + s.id));
                    }
                    let primaryId = studentIds[0];
                    if(primaryId) {
                        if(!paymentHistory[primaryId]) paymentHistory[primaryId] = [];
                        paymentHistory[primaryId].push({
                            date: new Date().toLocaleString(),
                            isAdmissionEntry: true,
                            contact: admission.contact || '',
                            totalAmount: finalTotalRaw,
                            submittedAmount: submittedRaw,
                            balance: balanceRaw,
                            months: [],
                            fees: {},
                            amount: submittedRaw,
                            memberTotal: finalTotalRaw,
                            oldBalance: 0,
                            remark: 'Admission Entry',
                            receiptNo: adrNumber
                        });
                        fsSaveWithChecksum('paymentHistory', paymentHistory); localStorage.setItem('eRegister_payment_history', JSON.stringify(paymentHistory));
                    }
                }

                showPopup('✅ Billing saved successfully!');
                document.getElementById('saveBillingBtn').style.display = 'none';
                document.getElementById('printBillingBtn').style.display = 'inline-flex';
            };

            window.printBillingSummary = function() {
                let ps = printSettings;
                let bf = ps.billingFields || {};
                let d = admission;
                let studentHtml = '';
                if(d && d.type==='single') {
                    let rows=[];
                    if(bf.studentName!==false)   rows.push('<tr><td style="font-weight:600;padding:5px 8px;width:40%;color:#555;">Student Name</td><td style="padding:5px 8px;">'+(d.name||'')+'</td></tr>');
                    if(bf.studentClass!==false)   rows.push('<tr><td style="font-weight:600;padding:5px 8px;color:#555;">Class</td><td style="padding:5px 8px;">'+(d.newClass||'')+'</td></tr>');
                    if(bf.fatherName!==false)     rows.push('<tr><td style="font-weight:600;padding:5px 8px;color:#555;">Father\'s Name</td><td style="padding:5px 8px;">'+(d.fatherName||'N/A')+'</td></tr>');
                    if(bf.motherName!==false)     rows.push('<tr><td style="font-weight:600;padding:5px 8px;color:#555;">Mother\'s Name</td><td style="padding:5px 8px;">'+(d.motherName||'N/A')+'</td></tr>');
                    if(bf.dob!==false)            rows.push('<tr><td style="font-weight:600;padding:5px 8px;color:#555;">Date of Birth</td><td style="padding:5px 8px;">'+(d.dob||'N/A')+'</td></tr>');
                    if(bf.contact!==false)        rows.push('<tr><td style="font-weight:600;padding:5px 8px;color:#555;">Contact</td><td style="padding:5px 8px;">'+(d.contact||'N/A')+'</td></tr>');
                    if(bf.gender!==false)         rows.push('<tr><td style="font-weight:600;padding:5px 8px;color:#555;">Gender</td><td style="padding:5px 8px;">'+(d.gender||'N/A')+'</td></tr>');
                    if(bf.aadhar!==false)         rows.push('<tr><td style="font-weight:600;padding:5px 8px;color:#555;">Aadhar</td><td style="padding:5px 8px;">'+(d.aadhar||'N/A')+'</td></tr>');
                    if(bf.address!==false)        rows.push('<tr><td style="font-weight:600;padding:5px 8px;color:#555;">Address</td><td style="padding:5px 8px;">'+(d.presentAddress||d.permanentAddress||'N/A')+'</td></tr>');
                    if(bf.prevSchool!==false)     rows.push('<tr><td style="font-weight:600;padding:5px 8px;color:#555;">Previous School</td><td style="padding:5px 8px;">'+(d.prevSchool||'N/A')+'</td></tr>');
                    if(bf.admissionDate!==false)  rows.push('<tr><td style="font-weight:600;padding:5px 8px;color:#555;">Admission Date</td><td style="padding:5px 8px;">'+(d.date||'')+'</td></tr>');
                    if(rows.length>0) studentHtml='<div style="margin-bottom:14px;"><div style="font-weight:700;font-size:12px;color:#667eea;margin-bottom:6px;border-bottom:1px solid #e0e0e0;padding-bottom:4px;">📋 Student Details</div><table style="border-collapse:collapse;width:100%;font-size:12px;"><tbody>'+rows.join('')+'</tbody></table></div>';
                } else if(d && (d.type==='family' || d.type==='double')) {
                    let members=(d.students||[]).map(s=>'<li style="padding:2px 0;"><strong>'+s.name+'</strong> — Class: '+(s.class||'')+'</li>').join('');
                    studentHtml='<div style="margin-bottom:14px;font-size:12px;"><strong>Family:</strong> '+(d.familyName||'')+'<ul style="margin:4px 0 0 16px;">'+members+'</ul></div>';
                }
                
                let bilTableEl=document.getElementById('billingTable');
                let bilTableClone=bilTableEl?bilTableEl.cloneNode(true):null;
                if(bilTableClone){
                    bilTableClone.querySelectorAll('input').forEach(inp=>{ let s=document.createElement('span'); s.textContent=inp.value||'0'; inp.replaceWith(s); });
                    bilTableClone.querySelectorAll('tr').forEach(row=>{ let last=row.lastElementChild; if(last) last.remove(); });
                }
                let tableHtml = (bf.billingTable!==false && bilTableClone) ? bilTableClone.outerHTML : '';
                let grandTotal = document.getElementById('bilGrandTotal')?.textContent || '₹0';
                let discount   = document.getElementById('bilDiscount')?.value || '0';
                let finalTotal = document.getElementById('bilFinalTotal')?.textContent || '₹0';
                let submitted  = document.getElementById('bilSubmitted')?.value || '0';
                let balance    = document.getElementById('bilBalance')?.textContent || '₹0';
                
                // Get ADR number from saved data
                let adrNumber = '';
                let savedData = billingSaved[admId];
                if(savedData && savedData.adrNumber) adrNumber = savedData.adrNumber;
                if(!adrNumber) adrNumber = getNextADRNumber();

                let bRow = function(label, val, bold, color){
                    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #eee;">'
                        +'<span style="font-size:12px;">'+label+'</span>'
                        +'<span style="font-size:12px;font-weight:'+(bold?'700':'500')+';color:'+(color||'inherit')+';">'+val+'</span>'
                        +'</div>';
                };
                let billingBody = '<div style="margin:10mm;">'
                    + buildPrintHeader()
                    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">'
                    +   '<span style="font-size:14px;font-weight:800;color:#1a1a2e;">Admission Billing Summary</span>'
                    +   '<span style="font-size:10px;color:#888;">'+new Date().toLocaleDateString('en-IN')+'</span>'
                    + '</div>'
                    + (adrNumber ? '<div style="text-align:right;font-size:12px;font-weight:700;color:#dc2626;margin-bottom:6px;">Receipt: '+adrNumber+'</div>' : '')
                    + studentHtml
                    + (tableHtml ? '<div style="margin-bottom:10px;overflow-x:auto;">'+tableHtml+'</div>' : '')
                    + '<div style="margin-top:8px;border-top:2px solid #667eea;padding-top:8px;">'
                    + (bf.grandTotal!==false     ? bRow('Grand Total', grandTotal) : '')
                    + (bf.discount!==false       ? bRow('Discount', '&#8377;'+discount) : '')
                    + (bf.totalAmount!==false    ? bRow('Total Amount', finalTotal, true, '#059669') : '')
                    + (bf.submittedAmount!==false ? bRow('Submitted Amount', '&#8377;'+submitted) : '')
                    + (bf.balance!==false        ? bRow('Balance', balance, true, '#dc2626') : '')
                    + '</div>'
                    + '</div>';
                doPrint(billingBody);
            };
        }

        // ==================== ADMISSION SETTINGS ====================
        function renderAdmissionSettings() {
            let dressDeleteMode = false;

            function renderDressRows() {
                let dressHtml = '';
                (admissionSettings.dresses||[]).forEach((dr, di) => {

        // ==================== WALLPAPER SETTING ====================
        function renderWallpaperSetting() {
            const wallpapers = [
                { css:'linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%)', label:'Purple Glow' },
                { css:'linear-gradient(135deg, #f97316 0%, #ef4444 50%, #ec4899 100%)', label:'Sunset Blaze' },
                { css:'linear-gradient(135deg, #0ea5e9 0%, #06b6d4 50%, #10b981 100%)', label:'Ocean Breeze' },
                { css:'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)', label:'Dark Navy' }
            ];
            let gridHtml = wallpapers.map(w => {
                let isSelected = selectedWallpaper === w.css;
                return `<div onclick="applyWallpaper('${w.css}')" style="cursor:pointer;border-radius:16px;overflow:hidden;border:${isSelected?'4px solid #667eea':'3px solid transparent'};box-shadow:${isSelected?'0 0 0 3px #667eea':'0 2px 12px rgba(0,0,0,0.15)'};transition:all 0.2s;position:relative;">
                    <div style="width:100%;height:160px;background:${w.css};display:flex;align-items:center;justify-content:center;">
                        ${isSelected?`<div style="background:rgba(255,255,255,0.3);border-radius:50%;width:48px;height:48px;display:flex;align-items:center;justify-content:center;font-size:24px;"><i class='fas fa-check' style='color:white;'></i></div>`:'<i class="fas fa-image" style="color:rgba(255,255,255,0.5);font-size:36px;"></i>'}
                    </div>
                    ${isSelected?`<div style="position:absolute;top:8px;right:8px;background:#10b981;color:white;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:16px;"><i class='fas fa-check'></i></div>`:''}
                    <div style="padding:8px 10px;font-size:13px;font-weight:700;color:#333;background:white;text-align:center;">${w.label}</div>
                </div>`;
            }).join('');
            let noneSelected = !selectedWallpaper;
            document.getElementById('app').innerHTML = `<div class="inner-bg"><div class="sticky-header">${getHeader('Setting', true)}</div><div class="inner-container"><div class="form-card"><div class="form-title"><i class="fas fa-image"></i> Wallpaper Setting</div><p style="color:#666;margin-bottom:20px;font-size:14px;"><i class="fas fa-info-circle"></i> Select a wallpaper for your home screen. Click to apply.</p>
            <div style="margin-bottom:20px;"><button onclick="applyWallpaper('')" style="padding:10px 22px;border-radius:30px;border:${noneSelected?'3px solid #667eea':'2px solid #ccc'};background:${noneSelected?'linear-gradient(135deg,#667eea,#764ba2)':'white'};color:${noneSelected?'white':'#333'};font-weight:600;cursor:pointer;font-size:14px;"><i class="fas fa-times-circle"></i> No Wallpaper (Default)</button></div>
            <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px;">${gridHtml}</div>
            </div></div>${getOverlay()}</div>`;
        }

        function applyWallpaper(cssVal) {
            selectedWallpaper = cssVal;
            fsSave('selectedWallpaper', cssVal);
            localStorage.setItem('eRegister_wallpaper', cssVal);
            // Instantly apply to home-bg if visible
            let hbEl = document.querySelector('.home-bg');
            if(hbEl) hbEl.style.backgroundImage = cssVal || '';
            showPopup(cssVal ? '✅ Wallpaper applied successfully!' : '✅ Wallpaper removed.');
            renderWallpaperSetting();
        }

                let rBtn = document.getElementById('qpDiscRsBtn');
                if(pBtn && rBtn) {
                    if(mode === 'percent') {
                        pBtn.style.background = 'rgba(255,255,255,0.3)';
                        rBtn.style.background = 'transparent';
                    } else {
                        rBtn.style.background = 'rgba(255,255,255,0.3)';
                        pBtn.style.background = 'transparent';
                    }
                }
                // Table header buttons only — summary discount is independent
                // Update all item discount inputs to reflect mode
                document.querySelectorAll('.qp-item-disc').forEach(inp => {
                    let row = inp.closest('tr');
                    let idx = row ? parseInt(row.getAttribute('data-idx')) : -1;
                    if(idx >= 0 && window._qpRows[idx]) {
                        window._qpRows[idx].discMode = mode;
                    }
                });
                window._calcQPSummary();
            };

            window._setQPGlobalDiscMode = function(mode) {
                window._qpGlobalDiscMode = mode;
                let sp = document.getElementById('qpSumDiscPctBtn');
                let sr = document.getElementById('qpSumDiscRsBtn');
                if(sp && sr) {
                    if(mode === 'percent') {
                        sp.style.background = '#667eea'; sp.style.color = 'white';
                        sr.style.background = 'transparent'; sr.style.color = '#555';
                    } else {
                        sr.style.background = '#667eea'; sr.style.color = 'white';
                        sp.style.background = 'transparent'; sp.style.color = '#555';
                    }
                }
                window._calcQPSummary();
            };

            window._renderQPRows = function() {
                let rows = window._qpRows;
                document.getElementById('qpItemsBody').innerHTML = rows.map((r, i) => {
                    let price = parseFloat(r.price) || 0;
                    let qty = parseFloat(r.qty) || 0;
                    let discVal = parseFloat(r.discount) || 0;
                    let discMode = r.discMode || 'rupee';
                    let subtotal = price * qty;
                    let discountAmt = discMode === 'percent' ? (subtotal * discVal / 100) : discVal;
                    let amt = Math.max(0, subtotal - discountAmt);
                    return `<tr data-idx="${i}" style="background:${i%2===0?'white':'#f9fafb'};">
                        <td style="padding:6px;text-align:center;font-size:12px;color:#999;">${i+1}</td>
                        <td style="padding:6px;">
                            <input value="${r.item||''}"
                                   placeholder="Item name"
                                   style="width:100%;border:1px solid #e5e7eb;border-radius:7px;padding:5px 8px;font-size:13px;"
                                   oninput="window._qpRows[${i}].item=this.value">
                        </td>
                        <td style="padding:6px;text-align:center;">
                            <input type="text" inputmode="numeric" value="${r.qty||1}"
                                   style="width:50px;border:1px solid #e5e7eb;border-radius:7px;padding:5px 4px;font-size:13px;text-align:center;"
                                   oninput="window._qpRows[${i}].qty=+this.value||1;window._calcQPSummary()">
                        </td>
                        <td style="padding:6px;text-align:right;">
                            <input type="text" inputmode="numeric" value="${r.price||0}"
                                   style="width:72px;border:1px solid #e5e7eb;border-radius:7px;padding:5px 6px;font-size:13px;text-align:right;"
                                   oninput="window._qpRows[${i}].price=+this.value||0;window._calcQPSummary()">
                        </td>
                        <td style="padding:6px;text-align:center;">
                            <input type="text" inputmode="numeric" value="${r.discount||0}"
                                   class="qp-item-disc"
                                   style="width:70px;border:1px solid #f59e0b;border-radius:7px;padding:5px 6px;font-size:13px;text-align:center;"
                                   oninput="window._qpRows[${i}].discount=+this.value||0;window._calcQPSummary()">
                        </td>
                        <td id="qpAmt_${i}" style="padding:6px;text-align:right;font-size:13px;font-weight:700;color:#667eea;">₹${amt}</td>
                        <td style="padding:4px;text-align:center;">
                            ${rows.length>1 ? `<button onclick="window._removeQPRow(${i})"
                                style="background:#fee2e2;border:none;color:#ef4444;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer;font-weight:700;">✕</button>` : ''}
                        </td>
                    </tr>`;
                }).join('');
            };

            window._updateQPMOP = function() {
                let labels = ['qpMopCashLabel','qpMopPaytmLabel','qpMopBothLabel'];
                let colors = ['#10b981','#00baf2','#f59e0b'];
                let isBoth = false;
                labels.forEach((id, i) => {
                    let el = document.getElementById(id);
                    if(el) {
                        let radio = el.querySelector('input[type="radio"]');
                        if(radio && radio.checked) {
                            el.style.borderColor = colors[i];
                            el.style.background = colors[i] + '18';
                            if(id === 'qpMopBothLabel') { document.getElementById('qpMopSubFields').style.display = 'block'; isBoth = true; }
                        } else {
                            el.style.borderColor = '#e0e0e0';
                            el.style.background = 'white';
                            if(id === 'qpMopBothLabel') { document.getElementById('qpMopSubFields').style.display = 'none'; }
                        }
                    }
                });
                let submRow = document.getElementById('qpSubmittedRow');
                if(submRow) submRow.style.display = isBoth ? 'none' : '';
                window._calcQPSummary();
            };

            window._searchOldQPReceipt = function() {
                let query = (document.getElementById('qpOldReceiptInput')?.value || '').trim();
                let resultDiv = document.getElementById('qpOldReceiptResult');
                if(!resultDiv) return;
                if(!query) { resultDiv.style.display = 'none'; return; }
                // Match by last 3-4 digits OR exact receipt number (case-insensitive)
                let queryDigits = query.replace(/\D/g, '');
                let queryUpper = query.toUpperCase();
                let found = quickPayments.filter(p => {
                    let rNo = (p.receiptNo || '').toUpperCase();
                    let rDigits = rNo.replace(/\D/g, '');
                    if(rNo === queryUpper) return true;
                    if(queryDigits.length >= 3 && rDigits.endsWith(queryDigits)) return true;
                    return false;
                });
                if(found.length === 0) {
                    resultDiv.style.display = 'block';
                    resultDiv.innerHTML = '<div style="color:#ef4444;font-size:13px;font-weight:600;"><i class="fas fa-times-circle"></i> Receipt not found: ' + query + '</div>';
                    return;
                }
                let p = found[found.length - 1];
                let mop = p.modeOfPayment || p.type || '—';
                let itemsList = Array.isArray(p.items) ? p.items.map(it => `<span style="background:#e0e7ff;color:#667eea;padding:1px 8px;border-radius:8px;font-size:11px;margin:2px;">${it.item || ''} x${it.qty} @₹${it.price}</span>`).join('') : '—';
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `<div style="background:white;border:1px solid #10b981;border-radius:10px;padding:10px;font-size:12px;">
                    <div style="font-weight:700;color:#10b981;margin-bottom:4px;"><i class="fas fa-check-circle"></i> Found: ${p.receiptNo}</div>
                    <div><strong>Name:</strong> ${p.name || '—'} &nbsp; <strong>Date:</strong> ${p.date || '—'}</div>
                    <div><strong>Items:</strong> ${itemsList}</div>
                    <div><strong>Total:</strong> ₹${p.total||0} &nbsp; <strong>Disc:</strong> ₹${p.discount||0} &nbsp; <strong>Submitted:</strong> ₹${p.submitted||0} &nbsp; <strong>Balance:</strong> ₹${p.balance||0}</div>
                    <div><strong>Mode:</strong> ${mop}</div>
                    <button onclick="navigateTo(renderQPMoreInfo,'${p.receiptNo}')" style="margin-top:8px;padding:7px 16px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;"><i class="fas fa-info-circle"></i> More Information</button>
                </div>`;
            };

            window._calcQPSummary = function() {
                let grandTotal = 0;
                let totalDiscount = 0;
                window._qpRows.forEach((r, i) => {
                    let price = parseFloat(r.price) || 0;
                    let qty = parseFloat(r.qty) || 0;
                    let discVal = parseFloat(r.discount) || 0;
                    let discMode = r.discMode || 'rupee';
                    let subtotal = price * qty;
                    let discountAmt = discMode === 'percent' ? (subtotal * discVal / 100) : discVal;
                    let amt = Math.max(0, subtotal - discountAmt);
                    grandTotal += amt;
                    totalDiscount += discountAmt;
                    let el = document.getElementById('qpAmt_' + i);
                    if(el) el.textContent = '₹' + amt;
                });
                let disc = parseFloat(document.getElementById('qpDiscount').value) || 0;
                // Check if global discount is percent mode (uses its own independent mode)
                if(window._qpGlobalDiscMode === 'percent') {
                    disc = Math.round(grandTotal * disc / 100);
                }
                let finalTotal = Math.max(0, grandTotal - disc);

                // Handle MOP
                let qpMopBoth = document.getElementById('qpMopBoth');
                let isBoth = qpMopBoth && qpMopBoth.checked;
                let subm = 0;
                if(isBoth) {
                    let cashAmt = parseFloat(document.getElementById('qpMopCashAmt')?.value) || 0;
                    let paytmAmt = parseFloat(document.getElementById('qpMopPaytmAmt')?.value) || 0;
                    subm = cashAmt + paytmAmt;
                    let sEl = document.getElementById('qpSubmitted');
                    if(sEl) sEl.value = subm;
                } else {
                    subm = parseFloat(document.getElementById('qpSubmitted').value) || 0;
                }

                let bal = finalTotal - subm;
                document.getElementById('qpTotalDisplay').textContent = '₹' + grandTotal;

                let balLabel = document.getElementById('qpBalanceLabel');
                let balDisplay = document.getElementById('qpBalanceDisplay');
                if(bal < 0) {
                    if(balLabel) balLabel.innerHTML = '<i class="fas fa-plus-circle" style="color:#10b981;"></i> <span style="color:#10b981;">Advance</span>';
                    if(balDisplay) { balDisplay.textContent = '₹' + Math.abs(bal); balDisplay.style.color = '#10b981'; }
                } else {
                    if(balLabel) balLabel.innerHTML = '<i class="fas fa-wallet" style="color:#667eea;"></i> Balance';
                    if(balDisplay) { balDisplay.textContent = '₹' + bal; balDisplay.style.color = '#667eea'; }
                }
            };

            window._addQPRow = function() {
                window._qpRows.push({ id: Date.now(), item:'', qty:1, price:0, discount:0, discMode:window._qpDiscMode || 'rupee' });
                window._renderQPRows();
                window._calcQPSummary();
            };

            window._removeQPRow = function(idx) {
                window._qpRows.splice(idx, 1);
                window._renderQPRows();
                window._calcQPSummary();
            };

            window._showQPSaveOptions = function() {
                let name = document.getElementById('qpName').value.trim();
                let prop = document.getElementById('qpProperty').value;
                let hasItem = window._qpRows.some(r => r.item.trim());
                if(!name){ showPopup('Name required!', false); return; }
                if(!prop){ showPopup('Select property type!', false); return; }
                if(!hasItem){ showPopup('Enter at least one item!', false); return; }
                document.getElementById('qpSaveOptionsBox').style.display = 'block';
                document.getElementById('qpSaveOptionsBox').scrollIntoView({ behavior:'smooth' });
            };

            window._saveQP = function(type) {
                let grandTotal = 0;
                let itemsWithDiscount = window._qpRows.filter(r => r.item.trim()).map(r => {
                    let price = parseFloat(r.price) || 0;
                    let qty = parseFloat(r.qty) || 0;
                    let discVal = parseFloat(r.discount) || 0;
                    let discMode = r.discMode || 'rupee';
                    let subtotal = price * qty;
                    let discountAmt = discMode === 'percent' ? (subtotal * discVal / 100) : discVal;
                    let amt = Math.max(0, subtotal - discountAmt);
                    grandTotal += amt;
                    return { ...r, discountAmt, amt };
                });
                let discRaw = parseFloat(document.getElementById('qpDiscount').value) || 0;
                let disc = (window._qpDiscMode === 'percent') ? Math.round(grandTotal * discRaw / 100) : discRaw;
                let finalTotal = Math.max(0, grandTotal - disc);

                // Get MOP
                let qpMopBothEl = document.getElementById('qpMopBoth');
                let qpIsBoth = qpMopBothEl && qpMopBothEl.checked;
                let subm = 0;
                let modeOfPayment = '';
                let mopCashAmt = 0, mopPaytmAmt = 0;
                if(qpIsBoth) {
                    mopCashAmt = parseFloat(document.getElementById('qpMopCashAmt')?.value) || 0;
                    mopPaytmAmt = parseFloat(document.getElementById('qpMopPaytmAmt')?.value) || 0;
                    subm = mopCashAmt + mopPaytmAmt;
                    modeOfPayment = 'Cash & Paytm';
                } else {
                    subm = parseFloat(document.getElementById('qpSubmitted').value) || 0;
                    let qpMopRadios = document.querySelectorAll('input[name="qpModeOfPayment"]');
                    for(let r of qpMopRadios) { if(r.checked) { modeOfPayment = r.value; break; } }
                }
                let bal = finalTotal - subm;
                let qpNumber = getNextQPNumber();
                
                let rec = {
                    id: Date.now(),
                    name:           document.getElementById('qpName').value.trim(),
                    property:       document.getElementById('qpProperty').value,
                    items:          itemsWithDiscount,
                    total:          grandTotal,
                    discount:       disc,
                    submitted:      subm,
                    balance:        bal,
                    modeOfPayment:  modeOfPayment,
                    cashAmount:     mopCashAmt || undefined,
                    paytmAmount:    mopPaytmAmt || undefined,
                    date: new Date().toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' }),
                    time: new Date().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' }),
                    type: type,
                    receiptNo: qpNumber
                };
                quickPayments.push(rec);
                fsSave('quickPayments', quickPayments);
                localStorage.setItem('eRegister_quick_payments', JSON.stringify(quickPayments));
                showProgress(() => {
                    showPopup('✅ Saved as ' + (type === 'expense' ? 'Expense' : 'Income') + '! Receipt: ' + qpNumber);
                    navigateTo(renderHome);
                });
            };

            window._renderQPRows();
            window._calcQPSummary();
            window._setQPDiscMode('rupee');
        }

                        <span style="background:linear-gradient(135deg,#ef4444,#dc2626);color:white;padding:5px 14px;border-radius:20px;font-weight:700;font-size:13px;"><i class="fas fa-receipt"></i> ${newReceiptPreview} <small style="opacity:0.85;">(New)</small></span>

                    <table style="width:100%;border-collapse:collapse;font-size:13px;border-radius:10px;overflow:hidden;border:1px solid #e5e7eb;">
                        <thead><tr style="background:linear-gradient(135deg,#667eea,#764ba2);color:white;">
                            <th style="padding:8px 10px;text-align:left;">Item</th>
                            <th style="padding:8px 10px;text-align:center;">Qty</th>
                            <th style="padding:8px 10px;text-align:right;">Price</th>
                            <th style="padding:8px 10px;text-align:right;">Amount</th>
                        </tr></thead>
                        <tbody>${itemsList}</tbody>
                    </table>
                    <div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end;">
                        <span style="background:#e0e7ff;color:#667eea;padding:4px 12px;border-radius:10px;font-size:12px;font-weight:700;">Total: ₹${p.total||0}</span>
                        <span style="background:#fef3c7;color:#b45309;padding:4px 12px;border-radius:10px;font-size:12px;font-weight:700;">Disc: ₹${p.discount||0}</span>
                        <span style="background:#d1fae5;color:#065f46;padding:4px 12px;border-radius:10px;font-size:12px;font-weight:700;">Submitted: ₹${p.submitted||0}</span>
                        ${(p.balance||0)>0?`<span style="background:#fee2e2;color:#991b1b;padding:4px 12px;border-radius:10px;font-size:12px;font-weight:700;">Balance: ₹${p.balance}</span>`:''}
                    </div>
                </div>

                <div class="form-title" style="margin-top:6px;"><i class="fas fa-plus-circle" style="color:#667eea;"></i> New Transaction</div>
                <div style="margin-bottom:10px;">
                    <input type="text" id="moreInfoName" value="${p.name||''}" placeholder="Name" class="search-input" style="font-size:14px;margin-bottom:10px;">

                <div style="overflow-x:auto;margin-bottom:10px;">
                    <table style="width:100%;border-collapse:collapse;font-size:13px;" id="miItemsTable">

                            <th style="padding:8px;text-align:center;width:36px;">Sn.</th>

                    </table>
                </div>
                <button onclick="window._addMIRow()" style="background:#e0e7ff;color:#667eea;border:none;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:14px;"><i class="fas fa-plus"></i> Add Row</button>
                <div style="background:#f8f9fa;border-radius:12px;padding:12px;margin-bottom:10px;">

                        <input type="number" id="miDiscount" value="0" min="0" style="width:110px;padding:6px;border:1px solid #e0e0e0;border-radius:8px;text-align:right;" oninput="window._calcMISummary()">
                    </div>
                    <div style="font-size:13px;font-weight:700;color:#555;margin-bottom:8px;"><i class="fas fa-credit-card" style="color:#667eea;"></i> Mode of Payment</div>
                    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;">
                        <label style="display:flex;align-items:center;gap:5px;padding:6px 12px;border:2px solid #10b981;border-radius:16px;cursor:pointer;background:#f0fdf4;font-size:12px;font-weight:600;">
                            <input type="radio" name="miMOP" value="Cash" id="miMopCash" checked style="accent-color:#10b981;"> <i class="fas fa-money-bill-wave" style="color:#10b981;"></i> Cash
                        </label>
                        <label style="display:flex;align-items:center;gap:5px;padding:6px 12px;border:2px solid #e0e0e0;border-radius:16px;cursor:pointer;background:white;font-size:12px;font-weight:600;">
                            <input type="radio" name="miMOP" value="Paytm" id="miMopPaytm" style="accent-color:#00baf2;"> <i class="fas fa-mobile-alt" style="color:#00baf2;"></i> Paytm/UPI
                        </label>
                    </div>
                    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid #e5e7eb;">
                        <span style="font-size:13px;font-weight:600;color:#555;">Total (₹)</span>
                        <span id="miTotalDisplay" style="font-size:18px;font-weight:800;color:#1a1a2e;">₹0</span>

                        <span style="font-size:13px;font-weight:600;color:#555;"><i class="fas fa-hand-holding-usd" style="color:#10b981;"></i> Submitted (₹)</span>

                        <span id="miBalanceDisplay" style="font-size:20px;font-weight:800;color:#667eea;">₹${p.balance||0}</span>

                <button onclick="window._saveMIQP('${p.receiptNo}')" style="width:100%;padding:14px;background:linear-gradient(135deg,#ef4444,#dc2626);color:white;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;">

            // Initialize items list with prev balance as a carry-forward row
            window._miRows = (p.balance > 0) ? [{ item: 'Balance Carry Forward', qty: 1, price: p.balance || 0 }] : [{ item: '', qty: 1, price: 0 }];

            window._renderMIRows = function() {
                let rows = window._miRows;

                    let amt = (r.qty||1) * (r.price||0);
                    return `<tr style="background:${i%2===0?'white':'#f9fafb'};">
                        <td style="padding:6px;text-align:center;font-size:12px;color:#999;">${i+1}</td>
                        <td style="padding:6px;"><input value="${r.item||''}" placeholder="Item name" style="width:100%;border:1px solid #e5e7eb;border-radius:7px;padding:5px 8px;font-size:13px;" oninput="window._miRows[${i}].item=this.value"></td>
                        <td style="padding:6px;text-align:center;"><input type="number" value="${r.qty||1}" style="width:46px;border:1px solid #e5e7eb;border-radius:7px;padding:5px 4px;font-size:13px;text-align:center;" oninput="window._miRows[${i}].qty=+this.value||1;window._calcMISummary()"></td>
                        <td style="padding:6px;text-align:right;"><input type="number" value="${r.price||0}" style="width:80px;border:1px solid #e5e7eb;border-radius:7px;padding:5px 6px;font-size:13px;text-align:right;" oninput="window._miRows[${i}].price=+this.value||0;window._calcMISummary()"></td>
                        <td style="padding:6px;text-align:right;font-size:13px;font-weight:700;color:#667eea;">₹${amt}</td>
                        <td style="padding:4px;text-align:center;">${rows.length>1?`<button onclick="window._miRows.splice(${i},1);window._renderMIRows();window._calcMISummary();" style="background:#fee2e2;border:none;color:#ef4444;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer;">✕</button>`:''}</td>
                    </tr>`;
                }).join('');
            };

            window._addMIRow = function() {
                window._miRows.push({ item: '', qty: 1, price: 0 });
                window._renderMIRows();
            };

            window._calcMISummary = function() {
                let total = (window._miRows||[]).reduce((s,r) => s + ((r.qty||1)*(r.price||0)), 0);
                let disc = parseFloat(document.getElementById('miDiscount')?.value) || 0;
                let finalTotal = Math.max(0, total - disc);
                let submitted = parseFloat(document.getElementById('miSubmitted')?.value) || 0;
                let balance = Math.max(0, finalTotal - submitted);
                let tEl = document.getElementById('miTotalDisplay');
                let bEl = document.getElementById('miBalanceDisplay');
                if(tEl) tEl.textContent = '₹' + finalTotal;
                if(bEl) bEl.textContent = '₹' + balance;
            };

            window._saveMIQP = function(prevReceiptNo) {
                let name = document.getElementById('moreInfoName')?.value.trim();
                if(!name) { showPopup('Name required!', false); return; }
                let items = (window._miRows||[]).map(r => ({ item: r.item, qty: r.qty||1, price: r.price||0, discountAmt: 0 }));
                let total = items.reduce((s,it) => s + ((it.qty||1)*(it.price||0)), 0);
                let disc = parseFloat(document.getElementById('miDiscount')?.value) || 0;
                let finalTotal = Math.max(0, total - disc);
                let submitted = parseFloat(document.getElementById('miSubmitted')?.value) || 0;
                let balance = Math.max(0, finalTotal - submitted);
                let mopEl = document.querySelector('input[name="miMOP"]:checked');
                let mop = mopEl ? mopEl.value : 'Cash';
                let qpNumber = getNextQPNumber();
                let now = new Date();
                let newPayment = {
                    id: Date.now(), receiptNo: qpNumber, name,
                    date: now.toLocaleDateString('en-IN'), time: now.toLocaleTimeString('en-IN'),
                    items, total: finalTotal, discount: disc, submitted, balance,
                    prevReceipt: prevReceiptNo, modeOfPayment: mop, type: 'expense',
                    timestamp: now.getTime()
                };
                quickPayments.push(newPayment);
                fsSave('quickPayments', quickPayments);
                localStorage.setItem('eRegister_quickPayments', JSON.stringify(quickPayments));
                showPopup('✅ Expense saved! Receipt: ' + qpNumber);
                navigateTo(renderQuickPayment);
            };

            window._renderMIRows();
            window._calcMISummary();
        }

        // ==================== DAY BOOK ====================
        function renderDayBook() {
            let income  = quickPayments.filter(p => p.type === 'income');
            let expense = quickPayments.filter(p => p.type === 'expense');

            function getItemSummary(e) {
                if(Array.isArray(e.items) && e.items.length) {
                    let lines = e.items.map(it => {
                        let qty = parseFloat(it.qty)||0;
                        let price = parseFloat(it.price)||0;
                        let discVal = parseFloat(it.discount)||0;
                        let discMode = it.discMode || 'rupee';
                        let subtotal = qty * price;
                        let discountAmt = discMode === 'percent' ? (subtotal * discVal / 100) : discVal;
                        let amt = Math.max(0, subtotal - discountAmt);
                        let discDisplay = discVal > 0 ? (discMode === 'percent' ? discVal + '%' : '₹' + discVal) : '';
                        return `<span style="display:block;">${it.item} ×${qty} @₹${price} ${discDisplay ? 'disc:'+discDisplay : ''} = <strong>₹${amt}</strong></span>`;
                    });
                    let grandTotal = e.items.reduce((s,it) => {
                        let qty = parseFloat(it.qty)||0;
                        let price = parseFloat(it.price)||0;
                        let discVal = parseFloat(it.discount)||0;
                        let discMode = it.discMode || 'rupee';
                        let subtotal = qty * price;
                        let discountAmt = discMode === 'percent' ? (subtotal * discVal / 100) : discVal;
                        return s + Math.max(0, subtotal - discountAmt);
                    }, 0);
                    lines.push(`<span style="display:block;border-top:1px solid #e0e0e0;margin-top:3px;padding-top:3px;color:#667eea;font-weight:700;">Total: ₹${grandTotal}</span>`);
                    return lines.join('');
                }
                return (e.item||'').replace(/\n/g,'<br>');
            }
            function getTotalQty(e) {
                if(Array.isArray(e.items) && e.items.length) {
                    return e.items.reduce((s,it) => s+(parseFloat(it.qty)||0), 0);
                }
                return e.qty||1;
            }
            function getName(e) { return e.name || e.creditorName || ''; }

            // Day Book Print Selection
            let selectedRows = new Set();

            function toggleRowSelect(id, cb) {
                if(cb.checked) selectedRows.add(id);
                else selectedRows.delete(id);
                document.getElementById('dayBookPrintBtn').style.display = selectedRows.size > 0 ? 'inline-flex' : 'none';
            }

            function printSelectedDayBook() {
                let allEntries = [...income, ...expense];
                let selected = allEntries.filter(e => selectedRows.has(e.id));
                if(selected.length === 0) { showPopup('Koi row select nahi ki!', false); return; }
                printDayBookEntries(selected);
            }

            function printDayBookEntries(entries) {
                let rowsHtml = entries.map(e => {
                    let receiptDisplay = e.receiptNo ? `<span style="background:#ef4444;color:white;padding:1px 8px;border-radius:10px;font-size:10px;font-weight:700;">${e.receiptNo}</span>` : '';
                    let mopText = e.modeOfPayment || '—';
                    return `<tr style="background:#f8fafc;border-bottom:1px solid #e0e0e0;">
                        <td style="padding:6px 8px;font-size:11px;">${e.date}<br><span style="color:#999;font-size:9px;">${e.time||''}</span><br>${receiptDisplay}</td>
                        <td style="padding:6px 8px;font-size:11px;font-weight:600;">${getName(e)}</td>
                        <td style="padding:6px 8px;font-size:11px;">${e.property||''}</td>
                        <td style="padding:6px 8px;font-size:11px;max-width:140px;word-break:break-word;">${getItemSummary(e)}</td>
                        <td style="padding:6px 8px;font-size:11px;text-align:center;">${getTotalQty(e)}</td>
                        <td style="padding:6px 8px;font-size:11px;text-align:right;">₹${e.discount||0}</td>
                        <td style="padding:6px 8px;font-size:11px;text-align:right;font-weight:700;">₹${e.total||0}</td>
                        <td style="padding:6px 8px;font-size:11px;text-align:right;color:#667eea;">₹${e.balance||0}</td>
                        <td style="padding:6px 8px;font-size:11px;text-align:left;color:#555;">${mopText}</td>
                    </tr>`;
                }).join('');
                let type = entries[0]?.type || '';
                let color = type === 'income' ? '#10b981' : '#ef4444';
                let typeLabel = type === 'income' ? 'Income' : 'Expense';
                let sumTotal   = entries.reduce((s,e) => s + (e.total||0), 0);
                let sumBalance = entries.reduce((s,e) => s + (e.balance||0), 0);
                let bodyHtml = buildPrintHeader()
                    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">'
                    +   '<span style="font-size:16px;font-weight:800;color:#1a1a2e;">Day Book — ' + typeLabel + '</span>'
                    +   '<span style="font-size:10px;color:#888;">' + new Date().toLocaleDateString('en-IN') + '</span>'
                    + '</div>'
                    + '<table style="width:100%;border-collapse:collapse;font-size:11px;">'
                    + '<thead><tr style="background:'+color+';color:white;">'
                    + '<th style="padding:6px 8px;text-align:left;">Date/Receipt</th>'
                    + '<th style="padding:6px 8px;text-align:left;">Name</th>'
                    + '<th style="padding:6px 8px;text-align:left;">Property</th>'
                    + '<th style="padding:6px 8px;text-align:left;">Items</th>'
                    + '<th style="padding:6px 8px;text-align:center;">Qty</th>'
                    + '<th style="padding:6px 8px;text-align:right;">Discount</th>'
                    + '<th style="padding:6px 8px;text-align:right;">Total</th>'
                    + '<th style="padding:6px 8px;text-align:right;">Balance</th>'
                    + '<th style="padding:6px 8px;text-align:left;">Payment Mode</th>'
                    + '</tr></thead>'
                    + '<tbody>' + rowsHtml + '</tbody>'
                    + '<tfoot><tr style="font-weight:700;background:'+color+'22;">'
                    + '<td colspan="6" style="padding:8px;text-align:right;">Grand Total:</td>'
                    + '<td style="padding:8px;text-align:right;color:'+color+';">₹'+sumTotal+'</td>'
                    + '<td style="padding:8px;text-align:right;color:#667eea;">₹'+sumBalance+'</td>'
                    + '<td></td>'
                    + '</tr></tfoot>'
                    + '</table>';
                doPrint(bodyHtml);
            }

            function buildTable(entries, color, typeLabel) {
                if(entries.length === 0) {
                    return `<div style="text-align:center;padding:24px;color:#999;font-size:14px;">
                        <i class="fas fa-inbox"></i> No ${typeLabel.toLowerCase()} entries yet.
                    </div>`;
                }
                let isExpense = typeLabel === 'Expense';
                let rows = entries.map((e, i) => {
                    let receiptDisplay = e.receiptNo ? `<span style="background:#ef4444;color:white;padding:1px 8px;border-radius:10px;font-size:10px;font-weight:700;">${e.receiptNo}</span>` : '';
                    let deleteBtn = isExpense
                        ? `<td style="padding:6px 4px;text-align:center;">
                            <input type="checkbox" class="expense-del-check" data-id="${e.id}" style="width:16px;height:16px;cursor:pointer;accent-color:#ef4444;display:none;" id="expChk_${e.id}">
                            <button onclick="window._confirmDeleteExpense(${e.id})" class="exp-del-btn-${e.id}" style="background:#fee2e2;border:none;color:#ef4444;border-radius:8px;padding:5px 9px;cursor:pointer;font-size:12px;" title="Delete"><i class="fas fa-trash-alt"></i></button>
                           </td>`
                        : '';
                    return `<tr class="daybook-row-select" style="background:${i%2===0?'white':'#f9fafb'};">
                        <td style="padding:8px 6px;text-align:center;">
                            <input type="checkbox" class="daybook-select-cb" data-id="${e.id}" onchange="window._toggleDayBookRow(${e.id}, this)" style="width:16px;height:16px;cursor:pointer;accent-color:#667eea;">
                        </td>
                        <td style="padding:8px 10px;font-size:12px;white-space:nowrap;">${e.date}<br><span style="color:#999;font-size:10px;">${e.time||''}</span></td>
                        <td style="padding:8px 10px;font-size:12px;font-weight:600;">${getName(e)} ${receiptDisplay}</td>
                        <td style="padding:8px 10px;font-size:12px;">${e.property||''}</td>
                        <td style="padding:8px 10px;font-size:12px;max-width:160px;word-break:break-word;">${getItemSummary(e)}</td>
                        <td style="padding:8px 10px;font-size:12px;text-align:center;">${getTotalQty(e)}</td>
                        <td style="padding:8px 10px;font-size:12px;text-align:right;">₹${e.discount||0}</td>
                        <td style="padding:8px 10px;font-size:13px;font-weight:700;text-align:right;color:${color};">₹${e.total||0}</td>
                        <td style="padding:8px 10px;font-size:12px;text-align:right;color:#667eea;">₹${e.submitted||0}</td>
                        <td style="padding:8px 10px;font-size:12px;text-align:right;color:#667eea;">₹${e.balance||0}</td>
                        ${deleteBtn}
                    </tr>`;
                }).join('');
                let sumTotal   = entries.reduce((s,e) => s + (e.total||0), 0);
                let sumBalance = entries.reduce((s,e) => s + (e.balance||0), 0);
                let sumSubmitted = entries.reduce((s,e) => s + (e.submitted||0), 0);
                let deleteColHeader = isExpense ? `<th style="padding:10px 8px;text-align:center;width:50px;">Del</th>` : '';
                let deleteColFooter = isExpense ? `<td></td>` : '';
                let scrollStyle = isExpense ? 'max-height:400px;overflow-y:auto;' : '';
                return `<div style="overflow-x:auto;${scrollStyle}"><table style="width:100%;border-collapse:collapse;min-width:${isExpense?'780':'720'}px;" id="dayBookTable_${typeLabel}">
                    <thead><tr style="background:${color};color:white;font-size:12px;${isExpense?'position:sticky;top:0;z-index:2;':''}">
                        <th style="padding:6px 4px;text-align:center;width:28px;"><input type="checkbox" id="daybookSelectAll_${typeLabel}" onchange="window._toggleAllDayBook('${typeLabel}', this)" style="width:14px;height:14px;cursor:pointer;accent-color:white;"></th>
                        <th style="padding:10px 8px;text-align:left;white-space:nowrap;">Date & Time</th>
                        <th style="padding:10px 8px;text-align:left;">Name / Receipt</th>
                        <th style="padding:10px 8px;text-align:left;">Property</th>
                        <th style="padding:10px 8px;text-align:left;">Items</th>
                        <th style="padding:10px 8px;text-align:center;">Qty</th>
                        <th style="padding:10px 8px;text-align:right;">Discount</th>
                        <th style="padding:10px 8px;text-align:right;">Total</th>
                        <th style="padding:10px 8px;text-align:right;">Submitted</th>
                        <th style="padding:10px 8px;text-align:right;">Balance</th>
                        ${deleteColHeader}
                    </tr></thead>
                    <tbody>${rows}</tbody>
                    <tfoot><tr style="background:${color}22;font-weight:700;">
                        <td colspan="7" style="padding:10px;text-align:right;font-size:13px;color:${color};">Grand Total:</td>
                        <td style="padding:10px;text-align:right;font-size:14px;color:${color};">₹${sumTotal}</td>
                        <td style="padding:10px;text-align:right;font-size:13px;color:#059669;">₹${sumSubmitted}</td>
                        <td style="padding:10px;text-align:right;font-size:13px;color:#667eea;">₹${sumBalance}</td>
                        ${deleteColFooter}
                    </tr></tfoot>
                </table></div>`;
            }

            window._confirmDeleteExpense = function(id) {
                if(!confirm('Delete this expense entry?')) return;
                let idx = quickPayments.findIndex(p => p.id === id);
                if(idx >= 0) {
                    quickPayments.splice(idx, 1);
                    fsSave('quickPayments', quickPayments);
                    localStorage.setItem('eRegister_quickPayments', JSON.stringify(quickPayments));
                    showPopup('✅ Expense deleted!');
                    navigateTo(renderDayBook);
                }
            };

            // Store selected rows globally for print
            window._dayBookSelected = new Set();

            window._toggleDayBookRow = function(id, cb) {
                if(cb.checked) window._dayBookSelected.add(id);
                else window._dayBookSelected.delete(id);
                document.getElementById('dayBookPrintBtn').style.display = window._dayBookSelected.size > 0 ? 'inline-flex' : 'none';
                // Update select all checkboxes
                ['Income','Expense'].forEach(type => {
                    let allCb = document.getElementById('daybookSelectAll_' + type);
                    if(allCb) {
                        let table = document.getElementById('dayBookTable_' + type);
                        if(table) {
                            let cbs = table.querySelectorAll('.daybook-select-cb');
                            let checked = table.querySelectorAll('.daybook-select-cb:checked');
                            allCb.checked = cbs.length > 0 && cbs.length === checked.length;
                            allCb.indeterminate = checked.length > 0 && checked.length < cbs.length;
                        }
                    }
                });
            };

            window._toggleAllDayBook = function(type, cb) {
                let table = document.getElementById('dayBookTable_' + type);
                if(!table) return;
                let cbs = table.querySelectorAll('.daybook-select-cb');
                cbs.forEach(c => {
                    c.checked = cb.checked;
                    let id = parseInt(c.getAttribute('data-id'));
                    if(cb.checked) window._dayBookSelected.add(id);
                    else window._dayBookSelected.delete(id);
                });
                document.getElementById('dayBookPrintBtn').style.display = window._dayBookSelected.size > 0 ? 'inline-flex' : 'none';
            };

            window._printDayBookSelected = function() {
                let allEntries = [...income, ...expense];
                let selected = allEntries.filter(e => window._dayBookSelected.has(e.id));
                if(selected.length === 0) { showPopup('Koi row select nahi ki!', false); return; }
                printDayBookEntries(selected);
            };

            function buildActivityTable() {
                let entries = activityLog || [];
                if(entries.length === 0) {
                    return `<div style="text-align:center;padding:24px;color:#999;font-size:14px;"><i class="fas fa-inbox"></i> No activity entries yet.</div>`;
                }
                let rows = entries.map((e,i) => `<tr style="background:${i%2===0?'white':'#f9fafb'};">
                        <td style="padding:8px 10px;font-size:12px;white-space:nowrap;">${e.date}<br><span style="color:#999;font-size:10px;">${e.time||''}</span></td>
                        <td style="padding:8px 10px;font-size:12px;font-weight:600;">${e.coAdminName||''}</td>
                        <td style="padding:8px 10px;font-size:12px;font-weight:700;color:#4f46e5;">${e.type||''}</td>
                        <td style="padding:8px 10px;font-size:12px;max-width:380px;word-break:break-word;">${e.details||''}</td>
                    </tr>`).join('');
                return `<div style="overflow-x:auto;max-height:420px;overflow-y:auto;"><table style="width:100%;border-collapse:collapse;min-width:600px;">
                    <thead><tr style="background:#4f46e5;color:white;font-size:12px;position:sticky;top:0;z-index:2;">
                        <th style="padding:10px 8px;text-align:left;">Date & Time</th>
                        <th style="padding:10px 8px;text-align:left;">Co-Admin</th>
                        <th style="padding:10px 8px;text-align:left;">Action</th>
                        <th style="padding:10px 8px;text-align:left;">Details</th>
                    </tr></thead>
                    <tbody>${rows}</tbody>
                </table></div>`;
            }

            document.getElementById('app').innerHTML = `
            <div class="inner-bg"><div class="sticky-header">${getHeader('Day Book', true)}</div><div class="inner-container">
            <div class="form-card">
            <div class="two-column-layout" style="align-items:flex-start;margin-bottom:20px;">
                <div class="image-column">
                    <img src="${img.dayBookIcon}" class="big-logo"
                         onerror="this.onerror=null;this.src='${img.dayBookIconFallback}'">
                </div>
                <div class="form-column">
                    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
                        <div class="form-title" style="margin-bottom:0;"><i class="fas fa-book"></i> Day Book</div>
                        <div style="display:flex;gap:10px;align-items:center;">
                            <button id="dayBookPrintBtn" onclick="window._printDayBookSelected()" style="display:none;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;padding:8px 18px;border-radius:30px;font-size:13px;font-weight:700;cursor:pointer;align-items:center;gap:8px;">
                                <img src="${img.printIcon}" style="width:24px;height:24px;"> Print Selected
                            </button>
                            <button class="btn btn-primary" onclick="navigateTo(renderQuickPayment)" style="padding:8px 16px;font-size:13px;">
                                <i class="fas fa-plus"></i> Add Quick Payment
                            </button>
                        </div>
                    </div>
                    <p style="color:#666;font-size:13px;margin-top:8px;">All Quick Payment records — income &amp; expense entries.</p>
                </div>
            </div>
            <div style="background:linear-gradient(135deg,#e0e7ff,#c7d2fe);border-radius:16px;padding:16px;margin-bottom:20px;">
                <h3 style="color:#4338ca;margin-bottom:12px;font-size:16px;font-weight:700;"><i class="fas fa-clipboard-list"></i> Activity</h3>
                ${buildActivityTable()}
            </div>
            <div style="background:linear-gradient(135deg,#fee2e2,#fecaca);border-radius:16px;padding:16px;">
                <h3 style="color:#dc2626;margin-bottom:12px;font-size:16px;font-weight:700;"><i class="fas fa-arrow-down"></i> Expense</h3>
                ${buildTable(expense, '#ef4444', 'Expense')}
            </div>
            </div></div>${getOverlay()}</div>`;
        }

        // ==================== INVENTORY ====================
        if(!window._inventoryData) window._inventoryData = [];

        function renderInventory() {
            let inv = window._inventoryData || [];
            let deleteMode = false;

            function renderInvRows() {
                let inv2 = window._inventoryData || [];
                let rowsHtml = inv2.length === 0
                    ? '<tr><td colspan="5" style="padding:24px;text-align:center;color:#999;"><i class="fas fa-inbox"></i> No items yet. Click + to add.</td></tr>'
                    : inv2.map((item, i) => `<tr style="background:${i%2===0?'white':'#f9fafb'};">

            document.getElementById('app').innerHTML = `
            <div class="inner-bg"><div class="sticky-header">${getHeader('Inventory', true)}</div><div class="inner-container">
            <div class="form-card">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
