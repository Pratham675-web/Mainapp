                    </div>
                    <table class="fees-structure-table" style="max-width:560px; border-top:3px solid #667eea;" id="itemsFeesTable">
                        <thead><tr><th>Item</th><th style="width:180px;">Price (₹)</th><th style="width:90px; text-align:center;">Action</th></tr></thead>
                        <tbody id="itemsFeesBody">`;
                defaultItemsList.forEach(function(item) {
                    let val = itemsFees[item] || 0;
                    let dispVal = val > 0 ? val : '';
                    tableHtml += `<tr id="itemRow_${item.replace(/\s/g,'_')}">

                            style="width:140px; padding:8px; border:1px solid #e0e0e0; border-radius:8px;" 
                            value="${dispVal}" onchange="updateItemFee('${item}', this.value)"></td>
                        <td style="text-align:center;white-space:nowrap;">
                            <button onclick="startEditItem('${item}')" title="Edit item name" style="background:none;border:none;cursor:pointer;padding:2px;">
                                <img src="https://i.ibb.co/ymMx1nhZ/edit-icon.png" style="width:34px;height:34px;">
                            </button>
                            <button onclick="deleteItemFee('${item}')" title="Delete item" style="background:none;border:none;cursor:pointer;padding:2px;">
                                <img src="https://i.ibb.co/Zpc17jfF/delete-icon.png" style="width:34px;height:34px;">
                            </button>
                        </td>

                            <button onclick="submitNewItem()" style="padding:10px 20px; border:none; border-radius:12px; background:linear-gradient(135deg,#667eea,#764ba2); color:white; cursor:pointer; font-weight:600;">Add Item</button>
                        </div>
                    </div>
                </div>`;

                document.getElementById('structureTableContainer').innerHTML = tableHtml;
            }
            
            window.updateTuitionFees = (className, value) => {
                if(!classFeesStructure[className]) classFeesStructure[className] = { tuitionFees: 0, examFees: 0, extraFees: {} };
                classFeesStructure[className].tuitionFees = parseInt(value) || 0;
                fsSave('classFeesStructure', classFeesStructure); localStorage.setItem('eRegister_class_fees', JSON.stringify(classFeesStructure));
            };
            
            window.updateExamFees = (className, value) => {
                if(!classFeesStructure[className]) classFeesStructure[className] = { tuitionFees: 0, examFees: 0, extraFees: {} };
                classFeesStructure[className].examFees = parseInt(value) || 0;
                fsSave('classFeesStructure', classFeesStructure); localStorage.setItem('eRegister_class_fees', JSON.stringify(classFeesStructure));

            window.updateExtraFees = (className, colName, value) => {
                if(!classFeesStructure[className]) classFeesStructure[className] = { tuitionFees: 0, examFees: 0, extraFees: {} };
                if(!classFeesStructure[className].extraFees) classFeesStructure[className].extraFees = {};

                fsSave('classFeesStructure', classFeesStructure); localStorage.setItem('eRegister_class_fees', JSON.stringify(classFeesStructure));
            };

                if(!examFeesMonthWise[className]) examFeesMonthWise[className] = {};
                let val = parseInt(value) || 0;
                if(val > 0) examFeesMonthWise[className][monthIdx] = val;
                else delete examFeesMonthWise[className][monthIdx];
                fsSave('examFeesMonthWise', examFeesMonthWise); localStorage.setItem('eRegister_exam_fees_monthwise', JSON.stringify(examFeesMonthWise));
                if(el) { el.style.background = val > 0 ? '#fff3cd' : ''; el.style.fontWeight = val > 0 ? '600' : ''; }
            };
            
            window.toggleExamMonth = (className, monthIdx, btn) => {
                if(!examFeesMonthWise[className]) examFeesMonthWise[className] = {};
                let amtInput = document.getElementById('examAmt_' + className);
                let amt = amtInput ? (parseInt(amtInput.value) || 0) : 0;
                let key = String(monthIdx);
                if(examFeesMonthWise[className][key] || examFeesMonthWise[className][monthIdx]) {
                    delete examFeesMonthWise[className][key];
                    delete examFeesMonthWise[className][monthIdx];
                    btn.style.background = 'white';
                    btn.style.color = '#b45309';
                } else {
                    if(amt <= 0) { showPopup('Pehle Exam Fees amount enter karein!', false); return; }
                    examFeesMonthWise[className][key] = amt;
                    btn.style.background = '#f59e0b';
                    btn.style.color = 'white';
                }
                fsSave('examFeesMonthWise', examFeesMonthWise); localStorage.setItem('eRegister_exam_fees_monthwise', JSON.stringify(examFeesMonthWise));
            };
            
            window.updateExamAmtAllMonths = (className, value) => {
                let amt = parseInt(value) || 0;
                if(!examFeesMonthWise[className]) examFeesMonthWise[className] = {};

        function verifyCoAdminId() {
            const code = (document.getElementById('caCode').value||'').trim();
            const msg = document.getElementById('caCodeVerifyMsg');
            if(!code || code.length !== 6) { msg.style.color='#dc2626'; msg.textContent='❌ Exactly 6 digits required'; msg.style.display='block'; return; }
            if(users.find(u=>u.code===code)) { msg.style.color='#dc2626'; msg.textContent='❌ This ID is already taken by an admin'; msg.style.display='block'; return; }
            if(coAdmins.find(ca=>ca.code===code)) { msg.style.color='#dc2626'; msg.textContent='❌ This ID is already taken by a co-admin'; msg.style.display='block'; return; }
            msg.style.color='#16a34a'; msg.textContent='✅ ID is available!'; msg.style.display='block';
        }

        async function handleCreateCoAdmin() {
            const name = (document.getElementById('caName').value||'').trim();
            const code = (document.getElementById('caCode').value||'').trim();
            const pwd  = (document.getElementById('caPassword').value||'').trim();
            const db   = currentUser.databaseName||currentUser.organisation||'';
            const err  = document.getElementById('caCreateError');
            const suc  = document.getElementById('caCreateSuccess');
            function showErr(msg) { err.innerHTML='❌ '+msg; err.classList.remove('hidden'); err.style.display='block'; }
            err.classList.add('hidden'); err.style.display='none';
            suc.classList.add('hidden'); suc.style.display='none';
            if(!name) { showErr('Co-admin name is required!'); return; }
            if(!code||code.length!==6) { showErr('6-digit ID is required!'); return; }
            if(users.find(u=>u.code===code)) { showErr('This ID is already taken by another admin!'); return; }
            if(coAdmins.find(ca=>ca.code===code)) { showErr('This ID is already taken by another co-admin!'); return; }
            if(!pwd||pwd.length!==6) { showErr('6-digit password is required!'); return; }
            const myCoAdmins = coAdmins.filter(ca=>ca.adminCode===currentUser.code);
            if(myCoAdmins.length>=2) { showErr('Maximum 2 co-admins limit has been reached!'); return; }
            const newCa = { id: Date.now().toString(), name, code, password: pwd, databaseName: db, adminCode: currentUser.code, createdAt: new Date().toLocaleString('en-IN'), blocked: false, permissions: collectPermsFromCheckboxes('caNew') };
            const updated = [...coAdmins, newCa];
            try {
                await fsSave('coAdmins', updated);
                coAdmins = updated;
                suc.innerHTML='✅ Co-admin created successfully! Refreshing page...'; suc.classList.remove('hidden'); suc.style.display='block';
                setTimeout(()=>navigateTo(renderAccessibility), 1500);
            } catch(e) { showErr('Firebase error! Please try again.'); }
        }

        function showRenewCoAdminPassword(code) {
            let box = document.getElementById('renewPwdBox_' + code);
            if(box) box.style.display = box.style.display === 'none' ? 'block' : 'none';
        }

        async function confirmRenewCoAdminPassword(code) {
            let inp = document.getElementById('renewPwdInput_' + code);
            let newPwd = inp ? inp.value.trim() : '';
            if(!newPwd || newPwd.length !== 6) { showPopup('6-digit password required!', false); return; }
            const updated = coAdmins.map(ca => ca.code === code ? {...ca, password: newPwd} : ca);
            await fsSave('coAdmins', updated);
            coAdmins = updated;
            showPopup('✅ Co-admin password updated successfully!');
            navigateTo(renderAccessibility);
        }

            let box = document.getElementById('editAccessBox_' + code);
            if(box) box.style.display = box.style.display === 'none' ? 'block' : 'none';
        }

        async function saveCoAdminAccess(code) {
            const perms = collectPermsFromCheckboxes('caEdit_' + code);
            const updated = coAdmins.map(ca => ca.code === code ? {...ca, permissions: perms} : ca);
            await fsSave('coAdmins', updated);
            coAdmins = updated;
            showPopup('✅ Access updated successfully!');
            navigateTo(renderAccessibility);
        }

            const updated = coAdmins.map(ca => ca.code===code ? {...ca, blocked:blockStatus} : ca);
            await fsSave('coAdmins', updated);
            coAdmins = updated;
            navigateTo(renderAccessibility);
        }

            const updated = coAdmins.filter(ca => ca.code!==code);
            await fsSave('coAdmins', updated);
            coAdmins = updated;

                // number 0001 se shuru ho (ADM-0001, QP-0001, FC-0001, ADR-0001).

                _qpSeqNumber = 0;
                _fcSeqNumber = 0;

                document.getElementById('editClassNewName').value = checked[0];
                document.getElementById('editClassModal').style.display = 'flex';
                setTimeout(()=>document.getElementById('editClassNewName').focus(),100);

                let newName = document.getElementById('editClassNewName').value.trim();
                if(!newName) { showPopup('Class ka naam empty hai!', false); return; }

                if(classList.includes(newName)) { showPopup('Yeh naam pehle se exist karta hai!', false); return; }

                if(idx >= 0) classList[idx] = newName;
                saveClassList();
                document.getElementById('editClassModal').style.display = 'none';
                showPopup('✅ Class name updated successfully!');
                renderClassList();

            window.deleteSelectedClasses = () => {
                let toDelete = classList.filter((c,i) => {
                    let cb = document.getElementById('clsChk_'+i);
                    return cb && cb.checked;
                });
                if(toDelete.length === 0) { showPopup('Pehle classes select karein!', false); return; }
                if(!confirm(`${toDelete.length} class(es) delete karein?\n${toDelete.join(', ')}\n\nYeh action undo nahi hogi!`)) return;
                toDelete.forEach(cls => {
                    let i = classList.indexOf(cls);
                    if(i >= 0) classList.splice(i, 1);
                    delete classFeesStructure[cls];
                    delete booksFees[cls];
                    delete examFeesMonthWise[cls];

                fsSave('examFeesMonthWise', examFeesMonthWise); localStorage.setItem('eRegister_exam_fees_monthwise', JSON.stringify(examFeesMonthWise));

                renderClassList();
            };

        function searchByReceiptDigits() {
            let query = (document.getElementById('receiptSearchInput')?.value || '').trim();
            let resultDiv = document.getElementById('receiptSearchResult');
            if(!resultDiv) return;
            if(!query) { resultDiv.innerHTML = ''; return; }
            let queryDigits = query.replace(/\D/g, '');
            if(queryDigits.length < 3) {
                resultDiv.innerHTML = '<div style="color:#f97316;font-size:13px;"><i class="fas fa-exclamation-circle"></i> Please enter at least 3 digits.</div>';
                return;
            }
            let allStudents = getAllStudents();
            let found = [];
            allStudents.forEach(s => {
                let hist = (paymentHistory[s.id] || []);
                let matchRec = hist.find(h => {
                    let rDigits = (h.receiptNo || h.receiptNumber || '').replace(/\D/g, '');
                    return rDigits.endsWith(queryDigits);
                });
                if(matchRec) found.push({ student: s, receipt: matchRec });
            });
            if(found.length === 0) {
                resultDiv.innerHTML = '<div style="color:#ef4444;font-size:13px;font-weight:600;"><i class="fas fa-times-circle"></i> No receipt found ending in "' + query + '"</div>';
                return;
            }
            let html = found.map(f => {
                let s = f.student; let h = f.receipt;
                return `<div style="background:white;border:1.5px solid #10b981;border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer;" onclick="navigateTo(viewFeesStructure,'${s.id}','${s.name}')">
                    <div style="font-weight:700;color:#10b981;font-size:13px;"><i class="fas fa-check-circle"></i> Receipt: ${h.receiptNo || h.receiptNumber || '—'}</div>
                    <div style="font-size:13px;margin-top:4px;"><strong>${s.name}</strong> &nbsp; Class: ${s.className || '—'}</div>
                    <div style="font-size:12px;color:#555;">Submitted: ₹${h.submittedAmount || h.amount || 0} &nbsp; Balance: ₹${h.balance || 0} &nbsp; Date: ${h.date ? new Date(h.date).toLocaleDateString('en-IN') : '—'}</div>
                    <div style="font-size:11px;color:#667eea;margin-top:4px;"><i class="fas fa-arrow-right"></i> Tap to view & submit fees</div>
                </div>`;
            }).join('');
            resultDiv.innerHTML = html;
        }

        function performSearch() {
            let query = document.getElementById('searchQuery').value.toLowerCase().trim();
            let filterClass = document.getElementById('filterClassHidden').value;
            let spinner = document.getElementById('searchSpinner');
            let resultsDiv = document.getElementById('searchResults');
            spinner.style.display = 'block';
            resultsDiv.innerHTML = '';
            setTimeout(() => {
                let students = getAllStudents();
                let results = students.filter(s => {
                    let admNum = String(s.id).toLowerCase();
                    let matchesQuery = !query ||
                                      s.name.toLowerCase().includes(query) || 
                                      s.contact.includes(query) || 
                                      (s.familyName && s.familyName.toLowerCase().includes(query)) ||
                                      admNum.includes(query);
                    let matchesClass = (filterClass === 'all' || s.className === filterClass);
                    return matchesQuery && matchesClass;
                });
                spinner.style.display = 'none';
                if(results.length === 0) {
                    resultsDiv.innerHTML = '<div style="text-align:center;padding:40px;"><i class="fas fa-search-slash"></i><p>No students found</p></div>';
                    return;
                }
                let resultsHtml = '';
                results.forEach(s => {
                    let isFamily = (s.type === 'family');
                    let admBadge = s.admissionNumber ? `<span style="background:#e0e7ff;color:#667eea;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700;margin-left:8px;">${s.admissionNumber}</span>` : '';
                    resultsHtml += `<div class="student-card ${isFamily ? 'family-card' : ''}" onclick="navigateTo(viewFeesStructure, '${s.id}', '${s.name}')">

                    </div>`;
                });
                resultsDiv.innerHTML = resultsHtml;
            }, 500);
        }

            let familyMembers = [];
            if(student.type === 'family') {
                familyMembers = students.filter(s => s.familyId === student.familyId);
            } else {
                familyMembers = [student];
            }
            
            let isFreeStudent = isStudentFree(student.id);
            let isFreeStudentType = getStudentFreeType(student.id);

            // Get admission number
            let admNum = getAdmissionNumber(studentId);
            let admBadge = admNum ? `<span style="background:#e0e7ff;color:#667eea;padding:2px 12px;border-radius:14px;font-size:14px;font-weight:700;margin-left:10px;">${admNum}</span>` : '';

        // ==================== FEES CARD ====================
        function openMonthSelector() {
            let monthCheckboxes = '';
            months.forEach((month, idx) => {
                monthCheckboxes += `<label><input type="checkbox" value="${idx}" ${selectedMonths.includes(idx) ? 'checked' : ''}> ${month}</label>`;
            });
            document.getElementById('monthModalContent').innerHTML = monthCheckboxes;
            document.getElementById('monthModal').style.display = 'flex';
        }

        function saveMonthSelection() {
            selectedMonths = [];
            let checkboxes = document.querySelectorAll('#monthModalContent input[type="checkbox"]');
            checkboxes.forEach(cb => {
                if(cb.checked) selectedMonths.push(parseInt(cb.value));
            });
            selectedMonths.sort((a,b) => a-b);
            document.getElementById('monthModal').style.display = 'none';
            renderSelectedMonths();
            if(typeof window.renderTable === 'function') {
                window.renderTable();
                if(typeof window.calculateTotal === 'function') window.calculateTotal();
            } else {
                calculateFeesFromStructure();
            }
        }

        function renderSelectedMonths() {
            let container = document.getElementById('selectedMonthsContainer');
            if(container) {
                container.innerHTML = selectedMonths.map(m => `<span class="month-tag">${months[m]}</span>`).join('');
            }
        }

        function calculateFeesFromStructure() {
            let multiplier = selectedMonths.length > 0 ? selectedMonths.length : 1;
            let allStudents = getAllStudents();
            let tuitionInputs = document.querySelectorAll('.fee-value');
            tuitionInputs.forEach(input => {
                let col = input.getAttribute('data-column');
                if(col && col.toLowerCase().replace(/\s+/g,'') === 'tuitionfees') {
                    let sid = input.getAttribute('data-student');
                    let member = allStudents.find(s => String(s.id) === String(sid));
                    if(member && isStudentTuitionFree(member.id)) {
                        input.value = 0;
                    } else {
                        let fee = member ? getClassFees(member.className, 'Tuition Fees') : 0;
                        input.value = fee * multiplier;
                    }
                }
            });
            if(typeof window.renderTable === 'function') {
                window.renderTable();
                return;
            }
            let rows = document.querySelectorAll('#feesTableContainer tbody tr');
            rows.forEach((row, idx) => {
                let rowTotal = 0;
                row.querySelectorAll('.fee-value').forEach(input => {
                    rowTotal += parseFloat(input.value) || 0;
                });
                let totalInput = row.querySelector('.row-total');
                if(totalInput) totalInput.value = rowTotal;
            });
            calculateTotal();
        }

        function renderFeesCard(studentId, studentName) {
            let students = getAllStudents();
            let student = students.find(s => s.id == studentId);
            if(!student) {
                showPopup('Student not found!', false);
                return;
            }
            
            window.currentFeesCardStudent = student;
            
            let familyMembers = [];
            if(student.type === 'family') {
                familyMembers = students.filter(s => s.familyId === student.familyId);
            } else {
                familyMembers = [student];
            }
            
            let savedData = feesData[studentId] || {};
            let currentDate = new Date().toLocaleDateString('en-IN', { day:'numeric', month:'long', year:'numeric' });
            
            let primaryMemberForBalance = familyMembers[0];
            let primaryHistoryForBalance = paymentHistory[primaryMemberForBalance?.id] || [];
            let oldBalanceAmount = 0;
            if(primaryHistoryForBalance.length > 0) {
                oldBalanceAmount = primaryHistoryForBalance[primaryHistoryForBalance.length - 1].balance || 0;
            } else {
                let admRec = admissions.find(a => {
                    if(a.status === 'approved') {
                        if(a.type === 'single' && String(a.id) === String(primaryMemberForBalance?.admissionId)) return true;
                        if((a.type === 'family' || a.type === 'double') && a.students) {
                            return a.students.some(s => String(a.id + '_' + s.id) === String(primaryMemberForBalance?.id) || String(a.id) === String(primaryMemberForBalance?.admissionId));
                        }
                        if(String(a.id) === String(primaryMemberForBalance?.admissionId)) return true;
                    }
                    return false;
                });
                if(admRec) {
                    if(admRec.type === 'family' || admRec.type === 'double') {
                        let matchedStu = admRec.students && admRec.students.find(s => String(admRec.id+'_'+s.id) === String(primaryMemberForBalance?.id));
                        oldBalanceAmount = parseFloat((matchedStu && matchedStu.oldBalance) || admRec.oldBalance || 0);
                    } else {
                        oldBalanceAmount = parseFloat(admRec.oldBalance || 0);
                    }
                }
            }
            
            selectedMonths = [new Date().getMonth()];
            
            // Custom columns added via the "+" button are temporary for this card session only -
            // they are NOT saved into the global feesColumns list, so they vanish once you leave this page.
            let sessionFeesColumns = feesColumns.filter(c => c.toLowerCase().trim() !== 'book').slice();
            
            // Get FC number for this fees card session - reuse pending number if not yet saved
            let fcNumber = pendingFcNumbers[studentId];
            if(!fcNumber) {
                fcNumber = peekNextFCNumber();
                pendingFcNumbers[studentId] = fcNumber;
                fsSave('pendingFcNumbers', pendingFcNumbers); localStorage.setItem('eRegister_pending_fc', JSON.stringify(pendingFcNumbers));
            }
            
            function renderTable() {
                let multiplier = selectedMonths.length > 0 ? selectedMonths.length : 1;
                let showExamCol = false;
                familyMembers.forEach(member => {
                    selectedMonths.forEach(m => {
                        let classExam = examFeesMonthWise[member.className] || {};
                        if(classExam[m] > 0 || classExam[String(m)] > 0) showExamCol = true;
                    });
                });
                
                let tableHtml = `<table class="fees-table"><thead>
                    <th style="width:50px; text-align:center;">#</th>
                    <th>Student Name</th>
                    <th style="width:100px;">Class</th>`;
                sessionFeesColumns.forEach(col => { 
                    tableHtml += `<th style="min-width:120px;">${col}</th>`; 
                });
                if(showExamCol) {
                    tableHtml += `<th style="min-width:140px; background:#fff3cd; color:#b45309;">Exam Fees</th>`;
                }
                tableHtml += `<th style="min-width:100px;">Total</th></thead><tbody>`;
                
                familyMembers.forEach((member, idx) => {
                    let isTuitionFree = isStudentTuitionFree(member.id);
                    let isExamFree = isStudentExamFree(member.id);
                    let isAdditionalFree = isStudentAdditionalFree(member.id);
                    let isAnyFree = isStudentFree(member.id);
                    let freeType = getStudentFreeType(member.id);
                    let freeBadgeText = freeType ? getFreeTypeBadge(freeType) : '';

                    let memberData = savedData[member.id] || {};
                    let rowTotal = 0;
                    let tuitionFee = isTuitionFree ? 0 : getClassFees(member.className, 'Tuition Fees');
                    let examFeeThisMonth = isExamFree ? 0 : getExamFeesForSelectedMonths(member.className, selectedMonths);

                    let freeBadgeHtml = isAnyFree ? ` <span style="background:#f59e0b;color:white;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:700;">${freeBadgeText}</span>` : '';
                    tableHtml += `<tr class="${isAnyFree ? 'family-row' : ''}">
                        <td style="text-align:center;">${idx + 1}</td>
                        <td>${member.name}${freeBadgeHtml}</td>
                        <td>${member.className}</td>`;
                    sessionFeesColumns.forEach(col => {
                        let isFixed = col.toLowerCase().replace(/\s+/g,'') === 'tuitionfees';
                        let value = '';
                        if(isFixed) {
                            value = (isTuitionFree || selectedMonths.length === 0) ? 0 : tuitionFee * multiplier;
                        } else {
                            if(isAdditionalFree) {
                                value = 0;
                            } else {
                                value = memberData[col] || '';
                            }
                        }
                        let readonlyAttr = (isFixed && !isTuitionFree) ? 'readonly' : (isAdditionalFree && !isFixed ? 'readonly' : '');
                        let numVal = parseFloat(value) || 0;
                        rowTotal += numVal;
                        tableHtml += `<td><input type="text" class="fee-value" data-student="${member.id}" data-column="${col}" placeholder="0" value="${value}" ${readonlyAttr} oninput="updateRowTotal(${idx})" onchange="updateRowTotal(${idx})"></td>`;
                    });
                    if(showExamCol) {
                        rowTotal += examFeeThisMonth;
                        let examMonthLabels = isExamFree ? '' : selectedMonths.filter(m => getExamFeeForMonth(member.className, m) > 0).map(m => months[m]).join(', ');
                        tableHtml += `<td style="background:#fffbeb;">
                            <input type="text" class="fee-value exam-fee-auto" data-student="${member.id}" data-column="Exam Fees" 
                                value="${examFeeThisMonth}" readonly 
                                title="${isExamFree ? 'Exam Fees Free' : 'Exam Fees for: ' + examMonthLabels}"
                                style="background:#fef3c7; font-weight:600; color:#b45309; width:100%; cursor:not-allowed;">
                            ${!isExamFree && examMonthLabels ? `<div style="font-size:10px; color:#b45309; margin-top:3px;">${examMonthLabels}</div>` : ''}
                        </td>`;
                    }
                    tableHtml += `<td><input type="text" class="row-total" id="rowTotal${idx}" value="${rowTotal}" readonly style="background:#f0f0f0; width:100px;"></td>`;
                    tableHtml += `</tr>`;
                });
                tableHtml += `</tbody></table>`;
                document.getElementById('feesTableContainer').innerHTML = tableHtml;
                if(typeof calculateTotal === 'function') calculateTotal();
            }
            
            window.updateRowTotal = (idx) => {
                let rowTotal = 0;
                let rowInputs = document.querySelectorAll(`#feesTableContainer tr:nth-child(${idx+1}) .fee-value`);
                rowInputs.forEach(input => {
                    rowTotal += parseFloat(input.value) || 0;
                });
                document.getElementById(`rowTotal${idx}`).value = rowTotal;
                calculateTotal();
            };
            
            window._discMode = 'rupee';
            window._setDiscMode = function(mode) {
                window._discMode = mode;
                let pBtn = document.getElementById('discTogglePercent');
                let rBtn = document.getElementById('discToggleRupee');
                if(pBtn && rBtn) {
                    if(mode === 'percent') {
                        pBtn.style.background = '#667eea'; pBtn.style.color = 'white';
                        rBtn.style.background = 'transparent'; rBtn.style.color = '#667eea';
                    } else {
                        rBtn.style.background = '#667eea'; rBtn.style.color = 'white';
                        pBtn.style.background = 'transparent'; pBtn.style.color = '#667eea';
                    }
                }
                calculateTotal();
            };

            window._updateMOP = function() {
                let labels = ['mopCashLabel','mopPaytmLabel','mopBothLabel'];
                let colors = ['#10b981','#00baf2','#f59e0b'];
                let isBoth = false;
                labels.forEach((id, i) => {
                    let el = document.getElementById(id);
                    if(el) {
                        let radio = el.querySelector('input[type="radio"]');
                        if(radio && radio.checked) {
                            el.style.borderColor = colors[i];
                            el.style.background = colors[i] + '15';
                            if(id === 'mopBothLabel') {
                                document.getElementById('mopSubFields').style.display = 'block';
                                isBoth = true;
                            }
                        } else {
                            el.style.borderColor = '#e0e0e0';
                            el.style.background = 'white';
                            if(id === 'mopBothLabel') {
                                document.getElementById('mopSubFields').style.display = 'none';
                            }
                        }
                    }
                });
                // When Cash & Paytm: hide submitted amount row (auto-calc from inputs)
                let submRow = document.getElementById('submittedAmountRow');
                if(submRow) submRow.style.display = isBoth ? 'none' : '';
                calculateTotal();
            };

            window.calculateTotal = () => {
                let grandTotal = 0;
                let rowTotals = document.querySelectorAll('.row-total');
                rowTotals.forEach(rowTotal => {
                    grandTotal += parseFloat(rowTotal.value) || 0;
                });
                let oldBalEl = document.getElementById('oldBalance');
                let oldBalance = parseFloat(oldBalEl ? (oldBalEl.getAttribute('data-raw') || oldBalEl.innerText) : '0') || 0;
                let finalGrandTotal = grandTotal + oldBalance;
                let discInput = parseFloat(document.getElementById('discountAmount').value) || 0;
                let discount = (window._discMode === 'percent') ? Math.round(finalGrandTotal * discInput / 100) : discInput;
                let afterDiscount = finalGrandTotal - discount;

                // Show yellow calculation text when advance exists
                let calcTextEl = document.getElementById('advanceCalcText');
                let settledMsgEl = document.getElementById('advanceSettledMsg');
                if(oldBalance < 0 && grandTotal > 0) {
                    let advAmt = Math.abs(oldBalance);
                    if(calcTextEl) { calcTextEl.style.display = 'inline'; calcTextEl.innerText = grandTotal + '-' + advAmt + '=' + finalGrandTotal; }
                    if(settledMsgEl) settledMsgEl.style.display = 'block';
                } else {
                    if(calcTextEl) calcTextEl.style.display = 'none';
                    if(settledMsgEl && oldBalance >= 0) settledMsgEl.style.display = 'none';
                }

                // Check if Cash & Paytm mode is selected
                let mopRadios = document.querySelectorAll('input[name="modeOfPayment"]');
                let selectedMOP = '';
                for(let r of mopRadios) { if(r.checked) { selectedMOP = r.value; break; } }
                let submittedAmount = 0;
                if(selectedMOP === 'Cash & Paytm') {
                    let cashAmt = parseFloat(document.getElementById('mopCashAmount')?.value) || 0;
                    let paytmAmt = parseFloat(document.getElementById('mopPaytmAmount')?.value) || 0;
                    submittedAmount = cashAmt + paytmAmt;
                    let sEl = document.getElementById('submittedAmount');
                    if(sEl) sEl.value = submittedAmount;
                    let mopTotEl = document.getElementById('mopTotalDisplay');
                    if(mopTotEl) mopTotEl.innerText = '₹' + submittedAmount;
                } else {
                    submittedAmount = parseFloat(document.getElementById('submittedAmount')?.value) || 0;
                }

                let balance = afterDiscount - submittedAmount;
                
                document.getElementById('grandTotal').innerText = finalGrandTotal;
                document.getElementById('afterDiscount').innerText = afterDiscount;

                let balLabel = document.getElementById('fcBalanceLabel');
                let balEl = document.getElementById('balanceAmount');
                let balanceMsg = document.getElementById('balanceMessage');

                if(balance < 0) {
                    if(balLabel) balLabel.innerHTML = '<span style="color:#10b981;font-weight:700;"><i class="fas fa-plus-circle"></i> Advance:</span>';
                    if(balEl) { balEl.innerText = '₹' + Math.abs(balance); balEl.style.color = '#10b981'; }
                    if(balanceMsg) balanceMsg.innerHTML = '<span style="color:#10b981;font-size:12px;font-weight:600;"><i class="fas fa-check-circle"></i> Advance Amount</span>';
                } else if(balance === 0) {
                    if(balLabel) balLabel.innerHTML = 'Balance:';
                    if(balEl) { balEl.innerText = '0'; balEl.style.color = ''; }
                    if(balanceMsg) balanceMsg.innerHTML = '<span class="balance-clear"><i class="fas fa-check-circle"></i> Balance Clear</span>';
                } else {
                    if(balLabel) balLabel.innerHTML = 'Balance:';
                    if(balEl) { balEl.innerText = balance; balEl.style.color = ''; }
                    if(balanceMsg) balanceMsg.innerHTML = '';
                }
            };

            window._getSelectedMOP = function() {
                let radios = document.querySelectorAll('input[name="modeOfPayment"]');
                for(let r of radios) { if(r.checked) return r.value; }
                return '';
            };

            window._mopSubUpdate = function() {
                let cashAmt = parseFloat(document.getElementById('mopCashAmount')?.value) || 0;
                let paytmAmt = parseFloat(document.getElementById('mopPaytmAmount')?.value) || 0;
                let total = cashAmt + paytmAmt;
                document.getElementById('submittedAmount').value = total;
                document.getElementById('mopTotalDisplay').innerText = '₹' + total;
                calculateTotal();
            };
            
            window.saveFeesData = () => {
                let spinner = document.getElementById('saveSpinner');
                let saveBtn = document.getElementById('saveFeesBtn');
                spinner.style.display = 'inline-block';
                saveBtn.disabled = true;
                
                let currentData = {};
                let inputs = document.querySelectorAll('.fee-value');
                let feeValidationErr = null;
                inputs.forEach(input => {
                    let studentIdVal = input.getAttribute('data-student');
                    let column = input.getAttribute('data-column');
                    let amtErr = validateAmount(input.value || '0');
                    if(amtErr && !feeValidationErr) feeValidationErr = amtErr;
                    if(!currentData[studentIdVal]) currentData[studentIdVal] = {};
                    currentData[studentIdVal][column] = input.value;
                });
                if(feeValidationErr) { spinner.style.display='none'; saveBtn.disabled=false; showPopup(feeValidationErr, false); return; }
                let submittedAmtErr = validateAmount(document.getElementById('submittedAmount')?.value || '0');
                if(submittedAmtErr) { spinner.style.display='none'; saveBtn.disabled=false; showPopup(submittedAmtErr, false); return; }
                if(!feesData[studentId]) feesData[studentId] = {};
                Object.assign(feesData[studentId], currentData);
                fsSave('feesData', feesData); localStorage.setItem('eRegister_fees_data', JSON.stringify(feesData));
                
                let totalPaid = parseFloat(document.getElementById('submittedAmount').value) || 0;
                let remark = document.getElementById('remarkText').value || '';
                let currentBalance = parseFloat(document.getElementById('balanceAmount').innerText) || 0;
                let selectedMonthNames = selectedMonths.map(m => months[m]);
                let modeOfPayment = window._getSelectedMOP();
                let mopDetails = '';
                if(modeOfPayment === 'Cash & Paytm') {
                    let cashAmt = parseFloat(document.getElementById('mopCashAmount')?.value) || 0;
                    let paytmAmt = parseFloat(document.getElementById('mopPaytmAmount')?.value) || 0;
                    mopDetails = `Cash: ₹${cashAmt}, Paytm: ₹${paytmAmt}`;
                }
                let fcReceiptNumber = commitFCNumber(fcNumber);
                delete pendingFcNumbers[studentId];
                fsSave('pendingFcNumbers', pendingFcNumbers); localStorage.setItem('eRegister_pending_fc', JSON.stringify(pendingFcNumbers));
                
                familyMembers.forEach(member => {
                    let memberFees = currentData[member.id] || {};
                    let memberTotal = 0;
                    let rowInput = document.getElementById(`rowTotal${familyMembers.indexOf(member)}`);
                    if(rowInput) memberTotal = parseFloat(rowInput.value) || 0;
                    let memberExamFee = getExamFeesForSelectedMonths(member.className, selectedMonths);
                    if(memberExamFee > 0) memberFees['Exam Fees'] = memberExamFee;
                    
                    let now2 = new Date();
                    let yymmdd = now2.getFullYear().toString() + ('0'+(now2.getMonth()+1)).slice(-2) + ('0'+now2.getDate()).slice(-2);
                    let recSeq = ((paymentHistory[member.id]||[]).length + 1).toString().padStart(4,'0');
                    let receiptNo = 'RCP-' + yymmdd + '-' + recSeq;

                    let discountVal = parseFloat(document.getElementById('discountAmount')?.value) || 0;
                    let submittedByName = currentUser ? (currentUser.isCoAdmin ? currentUser.name : currentUser.name) : 'Admin';
                    let historyRecord = {
                        date: new Date().toLocaleString(),
                        months: selectedMonthNames,
                        amount: totalPaid,
                        submittedAmount: totalPaid,
                        memberTotal: memberTotal,
                        balance: currentBalance,
                        oldBalance: oldBalanceAmount,
                        fees: memberFees,
                        examFees: memberExamFee,
                        remark: remark,
                        modeOfPayment: modeOfPayment,
                        mopDetails: mopDetails,
                        receiptNo: receiptNo,
                        fcNumber: fcReceiptNumber,
                        // Profit & Loss Summary ke liye extra structured fields:
                        discount: discountVal,
                        submittedBy: submittedByName,
                        studentName: member.name,
                        studentClass: member.className || '',
                        studentContact: member.contact || '',
                        studentRollNo: member.rollNo || '',
                        studentFatherName: member.fatherName || '',
                        timestamp: now2.getTime()
                    };
                    if(!paymentHistory[member.id]) paymentHistory[member.id] = [];
                    paymentHistory[member.id].push(historyRecord);
                    logActivity('Fees Submitted', `Student: ${member.name}, Contact: ${member.contact||'-'}, Receipt: ${receiptNo}, FC: ${fcReceiptNumber}, Discount: ${document.getElementById('discountAmount')?.value||0}, Member Total: ₹${memberTotal}, Mode: ${modeOfPayment}${mopDetails?(' ['+mopDetails+']'):''}, Submitted: ₹${totalPaid}, Balance: ₹${currentBalance}`);
                });
                fsSaveWithChecksum('paymentHistory', paymentHistory); localStorage.setItem('eRegister_payment_history', JSON.stringify(paymentHistory));
                
                setTimeout(() => {
                    spinner.style.display = 'none';
                    saveBtn.disabled = false;
                    showPopup('✅ Fees saved successfully!');
                }, 1500);
            };
            
            document.getElementById('app').innerHTML = `<div class="inner-bg"><div class="sticky-header">${getHeader('Fees Card', true)}</div><div class="inner-container"><div class="form-card"><div class="header-buttons">
                    <div class="real-time">📅 ${currentDate}</div>
                    <div style="display:flex;align-items:center;gap:10px;">
                        <span style="background:#ef4444;color:white;padding:4px 16px;border-radius:20px;font-size:14px;font-weight:700;">${fcNumber}</span>
                    </div>
                    <div class="action-icons-right">
                        <button class="calendar-icon" onclick="openMonthSelector()"><img src="${img.monthIcon}"></button>
                        <button class="calc-icon" onclick="calculateFeesFromStructure()"><img src="${img.calculateIcon}"></button>
                        <button class="plus-icon-big" title="Add custom column" onclick="document.getElementById('customColModalFC').style.display='flex'"><img src="${img.plusIcon}"></button>
                        <button class="print-icon" onclick="printFeesCard()"><img src="${img.printIcon}"></button>
                        <button class="history-icon" onclick="navigateTo(renderHistoryPage, '${student.id}', '${student.name}')"><img src="${img.historyIcon}"></button>
                    </div>
                </div>
                <div id="selectedMonthsContainer" class="selected-months"></div>
                <div id="feesTableContainer" style="overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%;"></div>
                <div id="customColModalFC" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1001;justify-content:center;align-items:center;">
                    <div style="background:white;border-radius:20px;padding:26px;width:320px;max-width:90%;">
                        <h3 style="margin-bottom:14px;"><i class="fas fa-plus-circle" style="color:#667eea;"></i> Add Custom Column</h3>
                        <input type="text" id="customColNameFC" placeholder="Column name (e.g. Transport)" style="width:100%;padding:10px;border:2px solid #e0e0e0;border-radius:12px;font-size:14px;margin-bottom:14px;">
                        <div style="display:flex;gap:10px;justify-content:flex-end;">
                            <button onclick="document.getElementById('customColModalFC').style.display='none'" style="padding:9px 18px;border:none;border-radius:12px;background:#e0e0e0;cursor:pointer;font-weight:600;">Cancel</button>
                            <button onclick="window._addCustomColFC()" style="padding:9px 18px;border:none;border-radius:12px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;cursor:pointer;font-weight:600;">Add</button>
                        </div>
                    </div>
                </div>
                <div class="calculation-box">
                    <div class="calculation-row">
                        <span style="color:${oldBalanceAmount < 0 ? '#10b981' : '#ef4444'}; font-weight:700;">${oldBalanceAmount < 0 ? '<i class="fas fa-plus-circle"></i> Advance Balance:' : 'Old Balance:'}</span>
                        <span id="oldBalance" data-raw="${oldBalanceAmount}" class="old-balance-text" style="color:${oldBalanceAmount < 0 ? '#10b981' : ''}; font-weight:${oldBalanceAmount < 0 ? '800' : ''};">${oldBalanceAmount < 0 ? '+₹' + Math.abs(oldBalanceAmount) : oldBalanceAmount}</span>

                    ${oldBalanceAmount < 0 ? '<div id="advanceSettledMsg" style="color:#10b981;font-size:12px;font-weight:700;margin:2px 0 6px 0;"><i class="fas fa-check-circle"></i> advance balance automatically settled in fees</div>' : '<div id="advanceSettledMsg" style="display:none;"></div>'}
                    <div class="calculation-row">

                                <button id="discTogglePercent" onclick="window._setDiscMode('percent')"
                                    style="padding:3px 10px;border-radius:15px;border:none;cursor:pointer;font-size:12px;font-weight:700;background:#667eea;color:white;">%</button>
                                <button id="discToggleRupee" onclick="window._setDiscMode('rupee')"

                    <div style="padding:10px 0 6px;border-top:1px dashed #e0e7ff;margin:6px 0 2px;">
                        <div style="font-size:13px;font-weight:700;color:#1a1a2e;margin-bottom:8px;"><i class="fas fa-credit-card" style="color:#667eea;"></i> Mode of Payment</div>
                        <div style="display:flex;gap:8px;flex-wrap:wrap;">
                            <label style="display:flex;align-items:center;gap:7px;padding:9px 18px;border:2px solid #e0e0e0;border-radius:20px;cursor:pointer;background:white;font-size:13px;font-weight:600;transition:0.2s;" id="mopCashLabel">
                                <input type="radio" name="modeOfPayment" value="Cash" id="mopCash" style="width:16px;height:16px;accent-color:#10b981;" onchange="window._updateMOP()">

        // Print Fees Card with MOP and Receipt Number
        function printFeesCard() {
            let ps = printSettings;
            let ff = ps.feesFields || {};
            let isHalf = (ps.feesPageSize !== 'full');

            let tableEl = document.getElementById('feesTableContainer');
            let tableClone = tableEl ? tableEl.cloneNode(true) : null;
            if(tableClone){
                tableClone.querySelectorAll('input').forEach(inp=>{ let s=document.createElement('span'); s.textContent=inp.value||'0'; inp.replaceWith(s); });
                tableClone.querySelectorAll('select').forEach(sel=>{ let s=document.createElement('span'); s.textContent=sel.value||''; sel.replaceWith(s); });
                tableClone.querySelectorAll('th:last-child,td:last-child').forEach(el=>el.remove());
            }
            let tableHtml = (ff.table!==false && tableClone) ? tableClone.innerHTML : '';

            let grandTotal     = document.getElementById('grandTotal')?.innerText || '0';
            let oldBalance     = document.getElementById('oldBalance')?.innerText || '0';
            let discount       = document.getElementById('discountAmount')?.value || '0';
            let afterDiscount  = document.getElementById('afterDiscount')?.innerText || '0';
            let submittedAmt   = document.getElementById('submittedAmount')?.value || '0';
            let balance        = document.getElementById('balanceAmount')?.innerText || '0';
            let remark         = document.getElementById('remarkText')?.value || '';
            // Fees Card form already swaps the label to "Advance" (green) on screen when the
            // customer has paid extra (see _calcFCSummary). Print slip must match that exactly —
            // never show a paid-extra amount under a red "Balance" label.
            let fcBalLabelText = (document.getElementById('fcBalanceLabel')?.innerText || '').toLowerCase();
            let isAdvance      = fcBalLabelText.includes('advance');
            
            // Get MOP
            let mop = window._getSelectedMOP ? window._getSelectedMOP() : '';
            let mopDetails = '';
            if(mop === 'Cash & Paytm') {
                let cashAmt = document.getElementById('mopCashAmount')?.value || '0';
                let paytmAmt = document.getElementById('mopPaytmAmount')?.value || '0';
                mopDetails = `Cash: ₹${cashAmt}, Paytm: ₹${paytmAmt}`;
            } else if(mop) {
                mopDetails = mop;
            }

            // Get FC number from the page
            let fcNumber = document.querySelector('.header-buttons .action-icons-right .fc-number-display')?.innerText || '';
            if(!fcNumber) {
                let fcEl = document.querySelector('.header-buttons div span[style*="background:#ef4444"]');

            let monthEls = document.querySelectorAll('#selectedMonthsContainer .month-tag, #selectedMonthsContainer span, #selectedMonthsContainer .tag');

            if(!monthNames.length){
                let raw = document.getElementById('selectedMonthsContainer')?.innerText||'';
                if(raw.trim()) monthNames = raw.split(/[,\n]+/).map(s=>s.trim()).filter(Boolean);
            }
            let monthsRow = (ff.months!==false && monthNames.length)
                ? '<tr style="background:#eef2ff;"><td colspan="10" style="padding:5px 8px;font-weight:700;font-size:11px;color:#667eea;border:1px solid #ccc;">Months: '+monthNames.join(' &nbsp;|&nbsp; ')+'</td></tr>'
                : '';

            let totals = '';
            let tRow = function(label, val, bold, color){ return '<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid #eee;">'+'<span style="font-size:11px;">'+label+'</span>'+'<span style="font-size:11px;font-weight:'+(bold?'700':'500')+';color:'+(color||'inherit')+';">'+val+'</span>'+'</div>'; };
            if(ff.oldBalance!==false)      totals += tRow('Old Balance', oldBalance);
            if(ff.grandTotal!==false)      totals += tRow('Grand Total', grandTotal);
            if(ff.discount!==false)        totals += tRow('Discount', '&#8377;'+discount);
            if(ff.afterDiscount!==false)   totals += tRow('After Discount', afterDiscount);
            if(ff.submittedAmount!==false) totals += tRow('Submitted Amount', '&#8377;'+submittedAmt);
            if(ff.balance!==false) {

                else          totals += tRow('Balance', '&#8377;'+balance, true, '#dc2626');
            }
            totals += tRow('Mode of Payment', mopDetails || '—');

            let cardBody = buildPrintHeader()
                + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">'
                +   '<span style="font-size:13px;font-weight:800;color:#1a1a2e;">Fees Card</span>'
                +   '<span style="font-size:10px;color:#888;">'+new Date().toLocaleDateString('en-IN')+'</span>'
                + '</div>'
                + (fcNumber ? '<div style="text-align:right;font-size:11px;font-weight:700;color:#dc2626;margin-bottom:4px;">Receipt: '+fcNumber+'</div>' : '')
                + (ff.table!==false && tableHtml ? '<table style="margin-bottom:0;"><thead>'+monthsRow+'</thead><tbody>'+tableHtml+'</tbody></table>' : '')
                + '<div style="margin-top:8px;">' + totals + '</div>'
                + (ff.remark!==false && remark ? '<div style="margin-top:6px;font-size:10px;color:#555;"><strong>Remark:</strong> '+remark+'</div>' : '')
                + (ff.dateTime!==false ? '<div style="margin-top:4px;font-size:9px;color:#aaa;text-align:right;">Printed: '+new Date().toLocaleString('en-IN')+'</div>' : '');

            let bodyHtml, pageStyle;
            if(isHalf){
                pageStyle = '';
                bodyHtml = '<div style="margin:5mm;border:1.5px solid #667eea;padding:6mm;height:133mm;box-sizing:border-box;overflow:hidden;">'
                    + cardBody
                    + '</div>';

                pageStyle = '';
                bodyHtml = '<div style="margin:10mm;">' + cardBody + '</div>';
            }
            doPrint(bodyHtml, pageStyle);
        }

        // ==================== INDIVIDUAL STUDENT ATTENDANCE CALENDAR ====================
        function renderAttendanceCalendar(studentName) {
            let key = studentName.replace(/\s/g,'_');
            if(!attendanceRecords[key]) attendanceRecords[key]={};
            let today = new Date();
            let currentYear = today.getFullYear();
            let currentMonth = today.getMonth();
            let currentDate = today.getDate();
            
            function loadCalendar(year, month) {
                let firstDay = new Date(year, month, 1).getDay(), daysInMonth = new Date(year, month+1, 0).getDate();
                let daysHtml = '<div class="calendar-weekdays"><span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span></div><div class="calendar-days">';
                for(let i=0;i<firstDay;i++) daysHtml+='<div class="calendar-day empty"></div>';
                for(let d=1;d<=daysInMonth;d++){
                    let dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    let status = attendanceRecords[key][dateStr] || '';
                    let cls = status==='present'?'present':status==='half'?'half':status==='absent'?'absent':'';
                    let canMark = (year === currentYear && month === currentMonth && d === currentDate);
                    let clickable = canMark ? `onclick="markAttendanceDay('${studentName}',${year},${month},${d})"` : '';
                    daysHtml+=`<div class="calendar-day ${cls}" ${clickable}>${d}</div>`;
                }
                daysHtml+='</div>';
                // Sirf is mahine (jo abhi dikh raha hai) ke records count karo, all-time nahi —
                // taaki pichhle mahine ka calendar dekhte waqt sahi present/absent dikhe.
                let monthPrefix = `${year}-${String(month+1).padStart(2,'0')}-`;
                let monthEntries = Object.entries(attendanceRecords[key]).filter(([d])=>d.startsWith(monthPrefix)).map(([,v])=>v);
                let present = monthEntries.filter(v=>v==='present').length;
                let half = monthEntries.filter(v=>v==='half').length;
                let absent = monthEntries.filter(v=>v==='absent').length;
                document.getElementById('calendarDays').innerHTML = daysHtml;
                document.getElementById('presentCount').innerText = present;
                document.getElementById('absentCount').innerText = absent+half;
                document.getElementById('monthYear').innerText = new Date(year,month).toLocaleString('default',{month:'long',year:'numeric'});
            }
            function prevMonth() { let newMonth = calMonth-1; if(newMonth>=0){ calMonth=newMonth; loadCalendar(calYear,calMonth); } else if(calYear>2020){ calYear--; calMonth=11; loadCalendar(calYear,calMonth); } else showPopup('Cannot go before 2020',false); }
            function nextMonth() { let newMonth = calMonth+1; if(newMonth<=(currentMonth && calYear===currentYear ? currentMonth : 11)){ calMonth=newMonth; loadCalendar(calYear,calMonth); } else if(calYear<currentYear && newMonth<=11){ calMonth=newMonth; loadCalendar(calYear,calMonth); } else showPopup('Cannot go to future months!',false); }
            
            window.markAttendanceDay = (name,y,m,d) => {
                let dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                if(!canMarkDate(dateStr)) { showPopup('You can only mark attendance for today!', false); return; }
                let k = name.replace(/\s/g,'_');
                let opts = ['present','half','absent'];
                let curr = attendanceRecords[k][dateStr] || '';
                let idx = opts.indexOf(curr);
                let next = opts[(idx+1)%opts.length];
                if(next) attendanceRecords[k][dateStr] = next;
                else attendanceRecords[k][dateStr] = 'present';
                fsSave('attendanceRecords', attendanceRecords); localStorage.setItem('eRegister_attendance', JSON.stringify(attendanceRecords));
                loadCalendar(calYear,calMonth);
                showPopup('Attendance marked successfully!');
            };
            document.getElementById('app').innerHTML = `<div class="inner-bg"><div class="sticky-header">${getHeader(`Attendance: ${studentName}`, true)}</div><div class="inner-container"><div class="form-card"><div class="two-column-layout"><div class="form-column"><div class="form-title"><i class="fas fa-calendar-alt"></i> Mark Attendance</div><div class="calendar"><div class="calendar-header"><button onclick="prevMonth()"><i class="fas fa-chevron-left"></i></button><h3 id="monthYear"></h3><button onclick="nextMonth()"><i class="fas fa-chevron-right"></i></button></div><div id="calendarDays"></div></div></div><div class="image-column"><img src="${img.calendarLogo}" class="big-logo"><div class="stats-box"><h4><i class="fas fa-calendar-check"></i> Total Present</h4><p id="presentCount" class="present-count">0</p></div><div class="stats-box"><h4><i class="fas fa-calendar-times"></i> Total Absent</h4><p id="absentCount" class="absent-count">0</p></div><div style="display:flex;gap:10px;justify-content:center;margin-top:10px;"><span style="background:#10b981;width:20px;height:20px;border-radius:50%;display:inline-block;"></span><span>Present</span><span style="background:#f59e0b;width:20px;height:20px;border-radius:50%;display:inline-block;"></span><span>Half Day</span><span style="background:#ef4444;width:20px;height:20px;border-radius:50%;display:inline-block;"></span><span>Absent</span></div></div></div></div></div>${getOverlay()}</div>`;
            window.prevMonth = prevMonth;
            window.nextMonth = nextMonth;
            loadCalendar(calYear,calMonth);
        }

        // ==================== DEFAULTER LIST ====================
        function renderDefaulterList() {
            let students = getAllStudents();
            let now = new Date();
            let nowYear = now.getFullYear();
            let nowMonth = now.getMonth();
            let allMonthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

            function computeDefaulterData(s) {
                let hist = (paymentHistory[s.id] || []).slice();

                // Regular fee entries aur admission entries alag karo
                let regularEntries = hist.filter(h => !h.isAdmissionEntry);
                let admissionEntries = hist.filter(h => h.isAdmissionEntry);

                let lastPaidMonthName = null;
                let lastPaidYear = nowYear;

                if(regularEntries.length > 0) {
                    // Sabse recent regular fee entry dhundho
                    regularEntries.sort((a, b) => new Date(b.date) - new Date(a.date));
                    let lastEntry = regularEntries[0];
                    let lastEntryMonths = lastEntry.months || [];
                    if(lastEntryMonths.length > 0) {
                        lastPaidMonthName = lastEntryMonths[lastEntryMonths.length - 1];
                        lastPaidYear = new Date(lastEntry.date).getFullYear();
                    }
                } else if(admissionEntries.length > 0) {
                    // Sirf admission entry hai — uske months check karo
                    admissionEntries.sort((a, b) => new Date(b.date) - new Date(a.date));
                    let lastAdm = admissionEntries[0];
                    let admMonths = lastAdm.months || [];
                    if(admMonths.length > 0) {
                        lastPaidMonthName = admMonths[admMonths.length - 1];
                        lastPaidYear = new Date(lastAdm.date).getFullYear();
                    }
                }

                // Unpaid months calculate karo
                let unpaidMonths = [];
                let startFromMonth, startFromYear;

                if(lastPaidMonthName) {
                    let lastMonthIdx = allMonthNames.indexOf(lastPaidMonthName);
                    if(lastMonthIdx < 0) {
                        let shortNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                        lastMonthIdx = shortNames.indexOf(lastPaidMonthName);
                    }
                    if(lastMonthIdx >= 0) {
                        // Agle mahine se shuru karo
                        startFromMonth = (lastMonthIdx + 1) % 12;
                        startFromYear = lastPaidYear + (lastMonthIdx === 11 ? 1 : 0);
                    }
                } else {
                    // Koi bhi payment nahi — admission mahine se shuru karo
                    let admDate = s.admissionDate ? new Date(s.admissionDate) : null;
                    if(admDate && !isNaN(admDate.getTime())) {
                        startFromMonth = admDate.getMonth();
                        startFromYear = admDate.getFullYear();
                    } else {
                        startFromMonth = nowMonth;
                        startFromYear = nowYear;
                    }
                }

                if(startFromMonth !== undefined) {
                    let y = startFromYear, m = startFromMonth;
                    while(y < nowYear || (y === nowYear && m <= nowMonth)) {
                        unpaidMonths.push(allMonthNames[m]);
                        m++; if(m > 11) { m = 0; y++; }
                    }
                }

                // Har pending month ka balance calculate karo (tuition + exam fee)
                let cls = s.className || 'Unknown';
                let tuitionFeePerMonth = classFeesStructure[cls]?.tuitionFees || 0;
                let totalOutstanding = 0;
                unpaidMonths.forEach(monthName => {
                    let mi = allMonthNames.indexOf(monthName);
                    let examFee = mi >= 0 ? getExamFeeForMonth(cls, mi) : 0;
                    totalOutstanding += tuitionFeePerMonth + examFee;
                });

                // Purana balance (last transaction se)
                let oldBal = 0;
                if(hist.length > 0) {
                    let sortedHist = hist.slice().sort((a, b) => new Date(b.date) - new Date(a.date));
                    oldBal = Math.max(0, parseFloat(sortedHist[0].balance) || 0);
                }

                let pendingBal = totalOutstanding + oldBal;
                return { ...s, pendingBal, lastPaidMonthName, unpaidMonths, feePerMonth: tuitionFeePerMonth };
            }

                                    : '';
                                // Pending months RED badges, exam fee wale mahine par yellow star
                                let unpaidBadges = s.unpaidMonths.length > 0 ? s.unpaidMonths.map(mo => {
                                    let mi = allMonthNames.indexOf(mo);

                                    let examTag = hasExam ? `<sup style="background:#f59e0b;color:white;padding:0 3px;border-radius:4px;font-size:8px;">E</sup>` : '';
                                    return `<span style="background:#ef4444;color:white;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:700;">${mo.substring(0,3)}${examTag}</span>`;
                                }).join('') : '';
                                let noHistBadge = !lastPaidBadge && !unpaidBadges ? '<span style="font-size:10px;color:#999;font-style:italic;">No payment history</span>' : '';
                                let descLine = s.unpaidMonths.length > 0 ? `<div style="font-size:11px;color:#ef4444;font-weight:600;margin-top:4px;"><i class="fas fa-exclamation-circle"></i> ${s.unpaidMonths.length} month(s) pending since ${s.unpaidMonths[0]||''}</div>` : '';
                                return `<div style="background:white;border:1px solid #fecaca;padding:12px 16px;border-top:none;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;">
                                    <div style="flex:1;min-width:0;">

                                            ${s.admissionNumber ? `<span style="background:#fef3c7;color:#b45309;padding:1px 7px;border-radius:7px;font-size:10px;font-weight:700;margin-left:3px;">${s.admissionNumber}</span>` : ''}
                                        </div>
                                        <div style="font-size:11px;color:#555;margin-bottom:5px;">
                                            <i class="fas fa-male" style="color:#667eea;"></i> <strong>${s.fatherName||'N/A'}</strong>
                                            &nbsp;<i class="fas fa-phone" style="color:#10b981;"></i> ${s.contact||'—'}
                                            ${s.feePerMonth > 0 ? `&nbsp;<span style="color:#667eea;font-weight:600;">₹${s.feePerMonth}/mo</span>` : ''}

            document.getElementById('app').innerHTML = `<div class="inner-bg"><div class="sticky-header">${getHeader('Defaulter List', true)}</div><div class="inner-container"><div class="form-card">
                <div class="form-title"><i class="fas fa-exclamation-triangle" style="color:#ef4444;"></i> Fee Defaulter List</div>
                <div id="defaulterContainer" style="padding:4px 0;"></div>
            </div></div>${getOverlay()}</div>`;
            buildDefaulterList('');

            window.printDefaulterSlip = function(id, name, father, contact, cls, roll, admNo, bal, unpaidMonthsStr, feePerMonth) {
                let unpaidMonths = unpaidMonthsStr ? unpaidMonthsStr.split(',').filter(Boolean) : [];
                let schoolName = admissionSettings.schoolName || 'School';
                let today = new Date().toLocaleDateString();
                let allMonthNamesPD = ['January','February','March','April','May','June','July','August','September','October','November','December'];
                // Har pending mahine ke liye Tuition Fees aur Exam Fees alag-alag fees
                // structure (File > Fees Structure) se live nikalo — taaki ye number kahin
                // se manually na aaye, balki wahi structure use ho jo already set hai.
                let tuitionFeePM = classFeesStructure[cls]?.tuitionFees || 0;
                let runningTotal = 0;
                let monthRows = unpaidMonths.map((m, i) => {
                    let monthIdx = allMonthNamesPD.indexOf(m);
                    let examFeeThisMonth = monthIdx >= 0 ? getExamFeeForMonth(cls, monthIdx) : 0;
                    let monthTotal = tuitionFeePM + examFeeThisMonth;
                    runningTotal += monthTotal;
                    let examFeeCell = examFeeThisMonth > 0 ? `₹${examFeeThisMonth}` : '—';
                    return `<tr>
                        <td style="padding:6px 10px;border:1px solid #ddd;">${i+1}</td>
                        <td style="padding:6px 10px;border:1px solid #ddd;">${m}</td>
                        <td style="padding:6px 10px;border:1px solid #ddd;">₹${tuitionFeePM}</td>
                        <td style="padding:6px 10px;border:1px solid #ddd;">${examFeeCell}</td>
                        <td style="padding:6px 10px;border:1px solid #ddd;font-weight:700;">₹${monthTotal}</td>
                        <td style="padding:6px 10px;border:1px solid #ddd;color:#ef4444;font-weight:700;">Pending</td>
                    </tr>`;
                }).join('');
                // Agar koi purana balance (old dues, current calculation se alag) bhi hai,
                // use total mein alag se dikhao taaki calculation transparent rahe.
                let extraOldBalance = Math.max(0, (parseFloat(bal)||0) - runningTotal);
                let finalTotal = runningTotal + extraOldBalance;
                let oldBalRow = extraOldBalance > 0 ? `<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px;color:#555;"><span>Other Old Balance:</span><span>₹${extraOldBalance}</span></div>` : '';
                let slipHtml = `<div style="font-family:Arial,sans-serif;max-width:440px;margin:0 auto;padding:20px;border:2px solid #667eea;border-radius:14px;">
                    <div style="text-align:center;margin-bottom:14px;"><h2 style="color:#667eea;margin:0;">${schoolName}</h2><div style="font-size:13px;color:#555;margin-top:4px;">Fee Defaulter Slip</div><div style="font-size:12px;color:#888;">Date: ${today}</div></div>
                    <table style="width:100%;margin-bottom:14px;font-size:13px;"><tr><td style="padding:4px 0;color:#555;">Student:</td><td style="font-weight:700;">${name}</td></tr><tr><td style="padding:4px 0;color:#555;">Class:</td><td>${cls}${roll?' | Roll: '+roll:''}</td></tr><tr><td style="padding:4px 0;color:#555;">Father:</td><td>${father||'N/A'}</td></tr><tr><td style="padding:4px 0;color:#555;">Contact:</td><td>${contact||'N/A'}</td></tr>${admNo?`<tr><td style="padding:4px 0;color:#555;">Adm No:</td><td>${admNo}</td></tr>`:''}</table>
                    <table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:14px;"><thead><tr style="background:#667eea;color:white;"><th style="padding:7px 10px;border:1px solid #ddd;">#</th><th style="padding:7px 10px;border:1px solid #ddd;">Month</th><th style="padding:7px 10px;border:1px solid #ddd;">Tuition Fee</th><th style="padding:7px 10px;border:1px solid #ddd;">Exam Fee</th><th style="padding:7px 10px;border:1px solid #ddd;">Month Total</th><th style="padding:7px 10px;border:1px solid #ddd;">Status</th></tr></thead><tbody>${monthRows}</tbody></table>
                    <div style="background:#fef2f2;border-radius:10px;padding:12px;">
                        <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px;color:#555;"><span>Pending Months Total:</span><span>₹${runningTotal}</span></div>
                        ${oldBalRow}
                        <div style="border-top:1px dashed #fca5a5;margin:6px 0;"></div>
                        <div style="text-align:center;"><div style="font-size:14px;color:#ef4444;font-weight:700;"><i class="fas fa-exclamation-triangle"></i> Total Balance Due</div><div style="font-size:28px;font-weight:900;color:#ef4444;margin-top:4px;">₹${finalTotal}</div></div>
                    </div>
                    <div style="margin-top:14px;font-size:11px;color:#999;text-align:center;">Please clear your pending dues at the earliest.<br>Thank you.</div>
                </div>`;
                doPrint(slipHtml, '');
            };

            window.printAllDefaulters = function() {
                let allDefHtml = '';
                students.forEach(s => {
                    let hist = (paymentHistory[s.id] || []);
                    let paidThisMonth = hist.some(h => {
                        let d = new Date(h.date);
                        return d.getFullYear() === nowYear && d.getMonth() === nowMonth && (h.submittedAmount > 0 || h.amount > 0);
                    });
                    if(!paidThisMonth) {
                        let data = computeDefaulterData(s);
                        let paidBadges = data.lastPaidMonths.map(m=>`<span style="background:#10b981;color:white;padding:1px 6px;border-radius:6px;font-size:10px;margin:1px;">${m.substring(0,3)}</span>`).join('');
                        let unpaidBadges = data.unpaidMonths.map(m=>{
                            return `<span style="background:#ef4444;color:white;padding:1px 6px;border-radius:6px;font-size:10px;margin:1px;">${m.substring(0,3)}</span>`;
                        }).join('');
                        // Calculation ko transparent rakho — sirf final balance nahi, balki
                        // tuition fees x pending months + exam fees ka breakdown bhi dikhao.
                        let cls = s.className || 'Unknown';
                        let tuitionFeePM = classFeesStructure[cls]?.tuitionFees || 0;
                        let examFeeTotal = 0;
                        data.unpaidMonths.forEach(m => {
                            let mi = allMonthNames.indexOf(m);
                            if(mi >= 0) examFeeTotal += getExamFeeForMonth(cls, mi);
                        });
                        let tuitionTotal = tuitionFeePM * data.unpaidMonths.length;
                        let calcStr = data.unpaidMonths.length > 0
                            ? `₹${tuitionFeePM} × ${data.unpaidMonths.length} mo = ₹${tuitionTotal}` + (examFeeTotal > 0 ? ` + Exam ₹${examFeeTotal}` : '')

                        allDefHtml += `<tr><td style="padding:8px;border:1px solid #ddd;">${s.name}</td><td style="padding:8px;border:1px solid #ddd;">${s.className||''}</td><td style="padding:8px;border:1px solid #ddd;">${s.fatherName||''}</td><td style="padding:8px;border:1px solid #ddd;">${s.contact||''}</td><td style="padding:8px;border:1px solid #ddd;">${paidBadges}</td><td style="padding:8px;border:1px solid #ddd;">${unpaidBadges}</td><td style="padding:8px;border:1px solid #ddd;font-size:11px;color:#555;">${calcStr}</td><td style="padding:8px;border:1px solid #ddd;color:#ef4444;font-weight:700;">₹${data.pendingBal}</td></tr>`;
                    }
                });
                let schoolName = admissionSettings.schoolName || 'School';
                let today = new Date().toLocaleDateString();
                let bodyHtml = `<div style="font-family:Arial,sans-serif;padding:20px;"><div style="text-align:center;margin-bottom:18px;"><h2 style="color:#667eea;">${schoolName}</h2><h3 style="margin:4px 0;">Fee Defaulter List</h3><div style="font-size:12px;color:#888;">Date: ${today} | Month: ${allMonthNames[nowMonth]} ${nowYear}</div></div><table style="width:100%;border-collapse:collapse;font-size:12px;"><thead><tr style="background:#667eea;color:white;"><th style="padding:8px;border:1px solid #ddd;">Name</th><th style="padding:8px;border:1px solid #ddd;">Class</th><th style="padding:8px;border:1px solid #ddd;">Father</th><th style="padding:8px;border:1px solid #ddd;">Contact</th><th style="padding:8px;border:1px solid #ddd;">Paid Months</th><th style="padding:8px;border:1px solid #ddd;">Pending Months</th><th style="padding:8px;border:1px solid #ddd;">Calculation</th><th style="padding:8px;border:1px solid #ddd;">Balance</th></tr></thead><tbody>${allDefHtml}</tbody></table></div>`;
                doPrint(bodyHtml, '');
            };
        }

        // ==================== STUDENT LIST ====================
